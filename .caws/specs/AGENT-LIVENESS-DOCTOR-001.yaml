id: AGENT-LIVENESS-DOCTOR-001
title: 'Make prune --dead recency-primary (D4) and teach doctor the lease/worktree drift classes (D10); freshness prevents unsafe cleanup, never authorizes ownership'
risk_tier: 2
mode: fix
lifecycle_state: active
worktree: wt-liveness-doctor
