id: CAWS-CLASSIFY-WORKTREE-PRUNE-AND-RM-REDIRECT-001
title: 'classify_command: admit read-only ''git worktree prune --dry-run''; stop treating shell redirects (2>&1, >file) as rm delete-targets in the reason string'
