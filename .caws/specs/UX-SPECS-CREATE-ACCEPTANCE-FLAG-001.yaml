  - id: A2
    given: 'a CAWS repository with no existing target spec'
    when: 'an operator repeats --acceptance with two values'
    then: 'the created spec contains A1 and A2 in caller order.'
  - id: A3
    given: 'the built CLI command surface'
    when: 'an operator runs caws specs create --help'
    then: 'help lists --acceptance <text> with the v11 acceptance context.'
