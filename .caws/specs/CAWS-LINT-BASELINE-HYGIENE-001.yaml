  - >-
    NO PRODUCTION SOURCE TOUCHED. scope.in is exclusively test files under
    packages/caws-cli/tests/. No src/ file, no hook template, no kernel file is
    in scope. The lint baseline being cleared is entirely in test scaffolding.
acceptance:
  - id: A1
    given: The caws-cli package with a pre-existing lint baseline (1 error + 26 warnings).
    when: '`npm run lint` runs in packages/caws-cli after this slice.'
    then: >-
      It exits 0 with zero errors and zero warnings. The unused `closeSpec`
      import is gone; all 26 stale eslint-disable directives are removed.
  - id: A2
    given: The seven touched test files.
    when: Their suites run (jest) before and after the slice.
    then: >-
      The same tests pass with the same assertions — the edits are dead-lint
      removal only, so test behavior is unchanged.
non_functional:
  reliability:
    - >-
      Clears inherited lint-baseline breakage so the lint gate is a true
      signal (a green lint run means clean, not "1 known pre-existing error we
      ignore"). Prevents the pre-existing error from masking a NEW lint
      regression in a future change.
