invariants:
  - >-
    Foundation only; NO register.ts change, NO behavior change. This slice
    adds the typed metadata interface module and a lock-test skeleton. It does
    NOT touch register.ts, any command handler, or the registered-command-groups
    authority (all scope.out). The CLI's runtime surface, help output, and tests
    are unchanged. COMMAND_SURFACE_METADATA is exported but EMPTY (frozen []) —
    population happens in slices 2-3.
  - >-
    Typed metadata interface. command-metadata.ts exports the interfaces that
    every later slice's per-group metadata object implements: CommandArgMeta
    (name/required/description), CommandOptionMeta (flag/required?/description/
    allowedValues?/defaultValue?/collect?), LeafCommandMeta (kind:'leaf'/name/
    argument?/description/options[]), GroupCommandMeta (kind:'group'/name/
    description/subcommands[]), the CommandMeta union, and the frozen
    COMMAND_SURFACE_METADATA aggregate. Descriptions are typed `string`
    (required) so a missing description fails compilation. The shapes are
    stable so slices 2-3 only ADD entries, never change the interface.
  - >-
    Lock-test skeleton with correct staging. tests/shell/help-metadata-lock.test.js
    establishes the lock harness. L4 (every metadata entry's description is
    non-empty, length > 10) is enforced now and passes trivially over the empty
    array. L1 (metadata group-name set == REGISTERED_COMMAND_GROUPS) is present
    but EXPLICITLY pending/skipped with a comment that it activates in slice 2
    when groups are first populated — because an empty array would otherwise
    make L1 fail spuriously. L3 (allowedValues == kernel enum) and L5 (no inline
    strings in register.ts) are documented as future (slice 2/3) but not yet
    written. The skeleton is honest about what is and is not yet enforced.
  - >-
    The interface is exported from the shell public surface (index.ts) in the
    same style as the existing exports (named type + value exports), so slices
    2-3 and the lock test can import it. No other index.ts content changes.
  - >-
    Build + typecheck + existing suites green. The new module compiles under
    tsconfig.vnext; the new test passes; the full caws-cli suite is unchanged
    (the empty metadata array touches no runtime path). No regression.
