invariants:
  - >-
    All 7 PORT-classified hooks from
    docs/reports/sterling_hook_port_audit_001.md exist at
    packages/caws-cli/templates/hook-packs/claude-code/<name>.sh
    with the standard `# CAWS-MANAGED-HOOK` header (hook_pack,
    hook_pack_version, caws_min_major, lineage_refs,
    do_not_edit_directly).
  - >-
    Each promoted hook is registered in
    src/init/hook-packs/manifest-claude-code.ts:installedFiles[]
    with `managed: true` and the correct executable bit.
  - >-
    Each promoted hook is wired into the correct dispatch file:
    cwd-guard.sh, quiet-merge.sh, protected-paths.sh, scan-secrets.sh
    → dispatch/pre_tool_use.sh; naming-check.sh,
    plan-transcript-snapshot.sh → dispatch/post_tool_use.sh;
    plan-transcript-finalize.sh → dispatch/stop.sh.
  - >-
    naming-check.sh is shipped with the stale `caws naming check`
    CLI reference removed from its advisory message (per audit
    finding); the v11 CLI has no such command and the reference
    would mislead users.
  - >-
    The hook pack version is bumped (post-renderer-fix, from 6 to 7)
    with a comment block explaining "Version 7: promotes 7 Sterling
    hooks per docs/reports/sterling_hook_port_audit_001.md".
  - >-
    `docs/failure-lineage.md` gains entries documenting the
    governance gaps each promoted hook closes (per the pack
    contract that every managed hook trace to a failure-lineage
    entry).
acceptance:
  - id: A1
    given: |
      a fresh git repo and the new pack version
    when: |
      the user runs `caws init --agent-surface claude-code`
    then: |
      all 7 promoted hooks exist at .claude/hooks/<name>.sh after
      init exits 0. Asserted via integration test that runs init in
      a tmpdir and inspects the file listing.
  - id: A2
    given: |
      the pack post-promotion
    when: |
      a fresh `caws init` installs the pack and the user inspects
      .claude/settings.json + the dispatch files
    then: |
      cwd-guard.sh, quiet-merge.sh, protected-paths.sh, scan-secrets.sh
      appear in the PreToolUse dispatch handler list;
      naming-check.sh, plan-transcript-snapshot.sh appear in the
      PostToolUse dispatch handler list; plan-transcript-finalize.sh
      appears in the Stop dispatch handler list. Order matters per
      the existing pack convention: cwd-guard.sh runs early (position
      2 in Sterling, after agent-heartbeat); protected-paths.sh runs
      after scope-guard so a scope-rejected edit fails first;
      scan-secrets.sh is the LAST handler in the PreToolUse list.
  - id: A3
    given: |
      naming-check.sh in the pack post-promotion
    when: |
      a user inspects the script's advisory message text
    then: |
      no `caws naming check` reference appears in any advisory string
      (the v11 CLI does not ship that command). Other generic guidance
      (about banned modifier suffixes, version suffixes, date stamps)
      is preserved.
  - id: A4
    given: |
      `docs/failure-lineage.md` post-promotion
    when: |
      a reader walks the file
    then: |
      it contains an entry per promoted hook documenting the
      governance gap it closes. Concrete examples expected:
      "Entry N: agent-edited-its-own-hook-state" for
      protected-paths.sh; "Entry N+1: cwd-deleted-during-worktree-
      destroy" for cwd-guard.sh + quiet-merge.sh; "Entry N+2:
      shadow-file-creation-without-doctrine-enforcement" for
      naming-check.sh.
  - id: A5
    given: |
      an existing v11 install at the pre-promotion pack version
    when: |
      the consumer re-runs `caws init --agent-surface claude-code`
    then: |
      the 7 new hooks are written into place via the managed_old_version
      → auto-update path. Existing local edits to non-managed hook
      files are not touched. The settings.json wiring still points
      at the existing dispatch files (which now include the new
      handlers in their lists).
  - id: A6
    given: |
      Sterling has been the source-of-truth for all 7 hooks
    when: |
      Sterling does its own upgrade (separate from this slice)
    then: |
      Sterling can delete its local .claude/hooks/<name>.sh copies
      because they are now installed by the pack. (The Sterling-side
      cleanup is NOT covered by this spec — this AC just records the
      expected downstream consequence so future agents understand
      Sterling's hook surface should shrink, not grow, after this
      slice merges.)
  - id: A7
    given: |
      the promotion slice has merged
    when: |
      a user runs `caws doctor` on a project with the new pack
    then: |
      doctor reports no new findings introduced by the promotion.
      The promoted hooks must not produce false positives or
      doctor-level drift on a clean baseline.
non_functional:
  reliability:
    - >-
      Promoted hooks must be backward compatible with existing
      caws-init'd projects at pack version <7. The auto-update path
      (managed_old_version detection) must install the new files
      without disturbing user customizations on any non-managed
      hook file or non-pack-owned path.
  security:
    - >-
      protected-paths.sh enforces that no agent can edit hook files
      or guard-strikes state. This is the same protection Sterling
      relies on; verify it does not regress when promoted (e.g.,
      no inadvertent path-pattern weakening).
contracts: []
closure_notes: |
  DRAFT SPEC — implementation pending.

  Source-of-truth for hook contents:
  /Users/darianrosebrook/Desktop/Projects/sterling/.claude/hooks/
  Per the audit report (docs/reports/sterling_hook_port_audit_001.md):

  PORT candidates (in suggested promotion order — highest-leverage first):

  1. cwd-guard.sh (PreToolUse, position early) — prevents posix_spawn
     ENOENT when CWD has been deleted. 9 lines, no project deps.

  2. protected-paths.sh (PreToolUse, after scope-guard) — blocks
     agents from editing .claude/hooks/* or guard-strikes state.
     Closes the doctrine-vs-enforcement gap.

  3. scan-secrets.sh (PreToolUse, last) — advisory on .env files,
     SSH keys, cloud configs. Advisory-only, can't break anything.

  4. naming-check.sh (PostToolUse) — enforces "no shadow files"
     doctrine. Requires removing stale `caws naming check` CLI
     reference before shipping.

  5. quiet-merge.sh (PreToolUse) — rewrites caws worktree merge/destroy
     commands for CWD safety + output suppression. Closes a real
     context-window-overflow + crash class.

  6. plan-transcript-snapshot.sh (PostToolUse, ExitPlanMode-filtered)
     + plan-transcript-finalize.sh (Stop) — paired hooks for plan
     provenance capture. Promote as a unit.

  User instruction (2026-05-27): implement "the next 4 hooks to
  promote" as the first commit. Choose 4 of the 7 — recommend the
  4 PreToolUse ones (cwd-guard, protected-paths, scan-secrets, plus
  one of quiet-merge/naming-check) since they share a dispatch file
  and the promotion delta is concentrated. The remaining 3 land in
  a follow-up commit on the same worktree.

  Renderer hotfix (CAWS-HOOK-PACK-RENDERER-MISSING-001) should land
  FIRST because it unbreaks an in-pack hook; the promotion slice
  then bumps pack version on top.

  Implementation steps for each hook:
  1. Copy from Sterling, add `# CAWS-MANAGED-HOOK` header with the
     standard fields (hook_pack, hook_pack_version, caws_min_major,
     lineage_refs, do_not_edit_directly).
  2. Remove any Sterling-specific stale CLI references in advisory
     text (naming-check.sh's `caws naming check` mention).
  3. Add an entry in manifest-claude-code.ts:installedFiles[].
  4. Add a dispatch-handler entry in the right dispatch/*.sh file.
  5. Add a failure-lineage.md entry describing the governance gap.

  After all hooks land:
  - Bump CLAUDE_CODE_PACK_VERSION (post-renderer-fix: 6 → 7).
  - Add A1+A2+A7 integration tests under tests/init/hook-packs/.
  - Verify doctor on a freshly-init'd project still reports clean.
