id: CAWS-CLI-KERNEL-DEP-LOCKFILE-HYGIENE-01
title: 'Refresh package-lock for caws-cli kernel dep range (^1.0.0 -> ^1.1.0)'
risk_tier: 3
mode: chore
lifecycle_state: active
worktree: lockfile-hygiene
created_at: '2026-05-26T15:42:54.944Z'
updated_at: '2026-05-26T15:42:54.944Z'
blast_radius:
  modules:
    - package-lock.json
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - .caws/specs/CAWS-CLI-KERNEL-DEP-LOCKFILE-HYGIENE-01.yaml
    - package-lock.json
  out:
    - packages/caws-cli/package.json
    - packages/caws-cli/src
    - packages/caws-kernel/src
    - packages/caws-cli/templates
    - packages/caws-cli/dist
    - packages/caws-kernel/dist
    - packages/caws-cli/CHANGELOG.md
    - README.md
    - AGENTS.md
    - CLAUDE.md
    - docs
    - .caws/policy.yaml
    - CODEOWNERS
    - .github
    - scripts
invariants:
  - 'I1: Lockfile-only slice. NO source code, NO doc changes, NO package.json edits, NO npm publish, NO dist-tag mutations, NO CHANGELOG entries, NO release-script changes. The only tracked file modified is package-lock.json (plus this spec yaml).'
  - 'I2: The lockfile update MUST be produced by `npm install --package-lock-only --ignore-scripts`. Hand-editing the lockfile is forbidden — npm''s deterministic resolution is the authoritative source. The --ignore-scripts flag prevents any package install-hook from running.'
  - 'I3: If the resulting diff includes broad unrelated churn (other workspace package edges, registry shape changes, integrity-hash mass updates beyond the caws-cli edge), the slice STOPS and surfaces the unexpected churn to the maintainer rather than committing. A clean fix limits the diff to the caws-cli dependency edge and its transitive resolution; anything broader needs explicit authorization.'
  - 'I4: NO `npm install` (without --package-lock-only). NO `npm ci`. NO modifications to node_modules. The slice operates on the lockfile alone; it does NOT alter installed packages on disk.'
  - 'I5: NO version-bump commit-message scope. The commit subject is `chore(deps): refresh package-lock ...`, not `fix(cli):` or `feat:`. The tag-driven release-guard (CAWS-RELEASE-TAG-DRIVEN-001) reads commit scope to decide what to publish; a wrong scope here could falsely qualify the lockfile commit for release.'
  - 'I6: The pre-change vs post-change grep evidence MUST be captured in closure_notes verbatim. Future agents reading the closed slice should see exactly what changed in the lockfile without having to git-archeology the diff.'
acceptance:
  - id: A1
    given: 'The pre-change state at HEAD: packages/caws-cli/package.json declares "@paths.design/caws-kernel": "^1.1.0", but package-lock.json line 13153 still records "@paths.design/caws-kernel": "^1.0.0" for the caws-cli package edge. The caws-cli edge''s lockfile-recorded version field is also stale (reads "11.1.2" vs the package.json''s 11.1.6).'
    when: 'The slice begins.'
    then: 'The pre-change grep evidence is captured in the closure_notes verbatim: `grep -n "@paths.design/caws-kernel" packages/caws-cli/package.json package-lock.json` showing the mismatch.'
  - id: A2
    given: 'The pre-change state from A1.'
    when: 'The implementation runs `npm install --package-lock-only --ignore-scripts` from the canonical repo root.'
    then: 'package-lock.json is updated. Zero changes to packages/caws-cli/package.json, zero changes to any source file, zero changes to any doc, zero changes to dist directories, zero changes to .caws/ (other than this spec''s yaml).'
  - id: A3
    given: 'The post-change state.'
    when: 'A grep is run: `grep -n "@paths.design/caws-kernel" package-lock.json packages/caws-cli/package.json | head -20`.'
    then: 'The caws-cli edge in package-lock.json now declares "@paths.design/caws-kernel": "^1.1.0" (matching the package.json declaration). The caws-cli edge''s lockfile-recorded version field shows 11.1.6 (matching the package.json version).'
  - id: A4
    given: 'The slice''s git diff.'
    when: '`git diff --stat` and `git diff --name-only` are inspected.'
    then: 'Only package-lock.json (lockfile content) and .caws/specs/CAWS-CLI-KERNEL-DEP-LOCKFILE-HYGIENE-01.yaml (closure bookkeeping) appear. No source files, no tests, no docs, no package metadata.'
  - id: A5
    given: 'The lockfile post-change.'
    when: 'A validation pass runs: `node -p` to read the package.json dep declaration and a re-run of `npm install --package-lock-only --ignore-scripts --dry-run`.'
    then: 'The node read returns "^1.1.0". The dry-run re-install reports the lockfile is already in sync (no further changes).'
  - id: A6
    given: 'A cheap packaging smoke is available.'
    when: '`npm pack --dry-run --workspace @paths.design/caws-cli` is invoked (or the repo''s established package dry-run command if different).'
    then: 'The dry-run succeeds and reports the expected file list. If the command is not cheap or the workspace flag is unsupported in this monorepo configuration, the slice records why it was skipped in the closure_notes rather than running an expensive or destructive alternative.'
  - id: A7
    given: 'The slice closes.'
    when: 'A reviewer inspects the merged tree.'
    then: 'No runtime behavior change. No docs change. No npm publish, no dist-tag mutation, no CHANGELOG entry, no release script change. Just the lockfile and the spec yaml.'
non_functional:
  reliability:
    - 'The lockfile refresh MUST be reproducible. A second invocation of `npm install --package-lock-only --ignore-scripts` against the same package.json content MUST produce a byte-identical lockfile (or no further changes). If repeated invocations produce churn, the package resolution is non-deterministic and the slice stops to investigate.'
contracts: []
