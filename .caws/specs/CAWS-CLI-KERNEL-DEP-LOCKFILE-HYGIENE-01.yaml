id: CAWS-CLI-KERNEL-DEP-LOCKFILE-HYGIENE-01
title: 'Refresh package-lock for caws-cli kernel dep range (^1.0.0 -> ^1.1.0)'
risk_tier: 3
mode: chore
lifecycle_state: closed
resolution: completed
closure_notes: 'Implementation commit 644713b on worktree branch lockfile-hygiene; merged into feat/multi-agent-provenance-envelope at 32d61be8174b8b8f9a9d02a057064b2dd731ec15 via caws worktree merge (auto-close + auto-destroy + registry cleanup in one transaction). Single-file change: package-lock.json (660 insertions, 444 deletions). Generated by `npm install --package-lock-only --ignore-scripts` from canonical repo root. Repairs lockfile drift introduced by CAWS-STATUS-AGENTS-SUMMARIZE-ACTIVE-AGENTS-01 (packages/caws-cli/package.json was bumped @paths.design/caws-kernel from ^1.0.0 to ^1.1.0; lockfile was not refreshed in that slice per its scope constraints). Pre-change evidence (verbatim): packages/caws-cli/package.json:61 declared ^1.1.0, package-lock.json:13153 still recorded ^1.0.0, caws-cli workspace edge''s version field was 11.1.2 (off by 4 patches from the real package.json 11.1.6). Post-change verification (verbatim grep): packages/caws-cli/package.json:61 ^1.1.0, package-lock.json:13153 ^1.1.0 — both files agree. I3 stop-condition handling: the diff was BROADER than just the kernel edge (1104 lines vs an expected ~10), so the slice STOPPED per I3 and surfaced to the maintainer for review. Maintainer authorized continuation after evidence showed the broader diff was npm lockfile NORMALIZATION of pre-existing accumulated drift, not unrelated resolution churn: zero integrity-hash changes (no registry refetches), no new packages added or removed, no package.json changes, no source/docs/release-metadata changes. The 660+/444- breakdown was npm reclassifying ~409 transitive deps from "extraneous" to "dev" (correct classification given the workspace structure), adding ~177 peer markers, populating ~26 missing license fields, bumping the caws-cli workspace version field to match its package.json, and bumping the resolved kernel version to 1.1.1. These changes would happen on ANY future `npm install` invocation; absorbing them here in an explicitly-scoped hygiene slice avoids deferring the cleanup into the next slice that touches package-lock.json (likely the release-bump slice). Post-commit validations: (A5) `npm install --package-lock-only --ignore-scripts --dry-run` reports "up to date" — lockfile is now in sync with package.json; reproducibility confirmed. (A6) `npm pack --dry-run --workspace @paths.design/caws-cli` succeeds — tarball name @paths.design/caws-cli@11.1.6, 50.5 kB packaged, 24 files; tarball would correctly include the source-tree fixes from CAWS-STATUS-AGENTS-SUMMARIZE-ACTIVE-AGENTS-01 (status/agents feature-detect) and CAWS-STALE-VERSION-ADVICE-DIAGNOSTICS-01 (diagnostic text replacements) via the dist/ build artifacts. Non-remediated finding: `npm install` reported 27 vulnerability findings (1 low, 7 moderate, 18 high, 1 critical) in transitive deps. These are pre-existing in the dependency tree but newly visible because they were classified as "extraneous" before this refresh. Out of scope for this slice; audit remediation is its own slice if/when authorized. Non-claims per spec invariants: I1 (lockfile-only, no source/docs/package.json changes), I2 (generated by npm, not hand-edited), I3 (stop-condition triggered + maintainer-authorized continuation explicitly recorded), I4 (--package-lock-only --ignore-scripts; no node_modules modifications, no install scripts ran), I5 (chore(deps) commit scope, not fix/feat — release-guard correctly does NOT publish this commit), I6 (pre/post grep evidence captured in implementation commit body 644713b). Honest framing per directive: this is NOT a narrow diff — it is a BROAD but RELATED, deterministic npm lockfile normalization, authorized after stop-condition review. Worktree branch lockfile-hygiene pushed for remote review.'
