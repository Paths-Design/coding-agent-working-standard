id: CLI-GATES-003
title: Resolve quality-gates subprocess from the installed CLI package
risk_tier: 2
mode: fix
lifecycle_state: closed
resolution: completed
closure_notes: 'Quality-gates subprocess resolver landed in 27ff6d5. Closed via the canonical v11 path.'
created_at: '2026-05-16T21:00:00.000Z'
updated_at: '2026-05-18T03:22:51.422Z'
blast_radius:
  modules:
    - packages/caws-cli/src/shell/gates/quality-gates-adapter.ts
    - packages/caws-cli/tests/shell
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - packages/caws-cli/src/shell/gates/quality-gates-adapter.ts
    - packages/caws-cli/tests/shell/
  out:
    - packages/quality-gates/
    - packages/caws-kernel/
    - .caws/policy.yaml
    - .caws/events.jsonl
invariants:
  - caws gates run resolves caws-quality-gates from the installed caws CLI package location first, so global and sandboxed installs work even when the consumer project has no node_modules.
  - The subprocess spawn cwd remains input.cwd (the consumer project being analyzed); only executable resolution changes.
  - If both CLI-install-local and project-local bins exist, CLI-install-local wins by design; the order is deterministic and documented in the source.
  - No PATH lookup is added; resolution stays explicit so an attacker-controlled caws-quality-gates earlier in PATH cannot hijack the subprocess.
acceptance:
  - id: A1
    given: A project-local install where node_modules/.bin/caws-quality-gates exists in the consumer's cwd AND the caws CLI is invoked from that same node_modules tree.
    when: defaultRunner resolves the subprocess.
    then: It locates caws-quality-gates and spawns it without ENOENT (no regression vs the prior CLI-GATES-002 happy path).
  - id: A2
    given: A global or sandboxed install where the caws CLI lives outside the consumer project, the CLI's own package directory has caws-quality-gates beside it, and the consumer project has no node_modules.
    when: defaultRunner resolves the subprocess.
    then: It locates caws-quality-gates relative to the CLI's own __dirname/import.meta.url package path and spawns it without ENOENT.
  - id: A3
    given: Any invocation of caws gates run.
    when: defaultRunner spawns the subprocess.
    then: The subprocess cwd is input.cwd (the consumer project), never the CLI's install directory; analyzed files come from the project being analyzed.
  - id: A4
    given: Both a CLI-install-local node_modules/.bin/caws-quality-gates AND a project-local one exist on disk.
    when: defaultRunner resolves the subprocess.
    then: The CLI-install-local bin is selected; the resolution order is CLI-install-local → project-local, and that ordering is documented in the source so future readers know the precedence rule.
  - id: A5
    given: The full 8c.3 final RC verification loop after CLI-GATES-003 is implemented and tarballs are rebuilt.
    when: caws gates run --spec DF-1 is invoked in /tmp/caws-8c2-tempproj using the binary from /tmp/caws-8c2-sandbox.
    then: It exits 0, evaluates all policy-declared gates, and appends one gate_evaluated event per gate to the tempproj .caws/events.jsonl with valid hash chain.
non_functional:
  security:
    - Subprocess resolution checks well-defined node_modules/.bin paths only. No $PATH fallback is added that could be hijacked by an attacker-controlled binary earlier in PATH.
contracts:
  - name: Subprocess executable resolution
    type: behavior
    path: packages/caws-cli/src/shell/gates/quality-gates-adapter.ts
    description: defaultRunner resolves caws-quality-gates from the CLI's own package location first (walking up from __dirname/import.meta.url to the nearest node_modules/.bin), then from input.cwd/node_modules/.bin. Either resolution must produce an executable file path; otherwise GATES_SUBPROCESS_NOT_FOUND is surfaced explicitly with both attempted paths in the diagnostic.
  - name: Subprocess spawn cwd
    type: behavior
    path: packages/caws-cli/src/shell/gates/quality-gates-adapter.ts
    description: The spawn cwd passed to spawnSync remains input.cwd unchanged. Quality-gates reads the consumer's files, not the CLI's install directory.
