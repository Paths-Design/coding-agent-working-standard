invariants:
  - 'Draft activation is a governed lifecycle transition: `caws specs activate <id>` patches lifecycle_state from draft to active and appends exactly one `spec_activated` event through appendEvent.'
  - 'Activation refuses non-draft specs with a typed diagnostic and does not mutate state.'
  - 'Activation is not creation. It preserves the existing spec body, comments, scope, acceptance, contracts, and all fields other than lifecycle_state and updated_at.'
  - 'Tier semantic validation applies to the activated body before writing; a draft that is invalid as active is refused with diagnostics.'
acceptance:
  - id: A1
    given: 'A tracked spec with lifecycle_state: draft.'
    when: '`caws specs activate <id>` runs.'
    then: 'The spec YAML has lifecycle_state: active, updated_at is refreshed, and one spec_activated event is appended.'
  - id: A2
    given: 'A spec whose lifecycle_state is active, closed, or archived.'
    when: '`caws specs activate <id>` runs.'
    then: 'The command exits non-zero with a diagnostic naming the current lifecycle_state and no mutation occurs.'
  - id: A3
    given: 'A draft spec that would fail active-tier semantic validation.'
    when: '`caws specs activate <id>` runs.'
    then: 'The command refuses before writing and prints the kernel diagnostics.'
  - id: A4
    given: 'The command surface help and doctrine docs.'
    when: 'They are read after this slice lands.'
    then: 'They describe `caws specs activate <id>` as the governed draft-to-active path and no longer require hand-editing lifecycle_state.'
non_functional:
  reliability:
    - 'Activation uses the existing lifecycle transaction machinery so event append failure rolls back the YAML patch when possible.'
  security:
    - 'Activation does not bypass scope, worktree, or claim semantics; it only changes spec lifecycle state.'
contracts:
  - name: specs activate lifecycle contract
    type: behavior
    path: packages/caws-cli/src/store/specs-writer.ts
    description: 'Only draft specs can transition to active; the transition appends spec_activated and preserves all unrelated spec bytes.'
