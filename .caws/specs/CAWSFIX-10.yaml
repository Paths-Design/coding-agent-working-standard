id: CAWSFIX-10
type: fix
title: Spec-ID regex accepts multi-segment IDs like P03-IMPL-01 (D2)
status: active
risk_tier: 2
mode: development
created_at: '2026-04-17T16:37:05.436Z'
updated_at: '2026-04-17T16:37:05.436Z'
blast_radius:
  modules:
    - packages/caws-cli/src/validation/spec-validation
    - packages/caws-cli/src/commands/init
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - packages/caws-cli/src/validation/spec-validation.js
    - packages/caws-cli/src/commands/init.js
    - packages/caws-cli/tests/validation/spec-validation.test.js
    - packages/caws-cli/tests/validation/spec-id-regex.test.js
    - .caws/specs/CAWSFIX-10.yaml
  out:
