#
# H4 and H5 (new half-state classes mechanically witnessed by
# LIFECYCLE-ROLLBACK-FAILURE-HARNESS-001, closed 2026-05-22 per ee92234)
# also imply this spec's eventual acceptance set will need amendment to
# fold in H4 as a repairable class (single defensible repair: clear
# spec.worktree). A4 (reconcile) is moving to WORKTREE-DOCTOR-HALF-STATE-001
# as a read-only diagnostic; whether `caws worktree reconcile` survives
# as a thin shell alias is an implementation decision deferred to that
# slice. Do not start implementation here until the authority spec
# closes and the scope/acceptance amendments above land.
#
# Activation prerequisites (must all be true before flipping to active):
