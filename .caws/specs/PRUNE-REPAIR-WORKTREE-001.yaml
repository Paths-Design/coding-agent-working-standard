invariants:
  - 'Repair is an EXECUTOR of already-decided doctrine, NOT a second authority engine. It consumes the §1.4 half-state decision matrix (via the doctor diagnostics from inspectProjectState) to classify; it never re-derives which surface wins. The classes it may mutate are EXACTLY the matrix-unambiguous set: H1 (ghost registry), H4 (ghost spec binding), and H3 on a closed/archived spec. Nothing else.'
  - 'Ambiguous and forbidden classes are REFUSED with a doctrine-pointer diagnostic and ZERO mutation: H2 (registry->missing-spec), H3 on an ACTIVE spec (recreate-vs-clear ambiguity), H5 (3-way), H6 (foreign physical), and the event-backed orphan. This slice does NOT reconcile one-sided bindings in general (the old draft framing) — H3-active and H2 are out by authority.'
  - 'Every mutation appends the honest audit event from WORKTREE-REPAIR-EVENT-CONTRACT-001 through the store writer inside runLifecycleTransaction (the shell never calls appendEvent directly; invariant 14 holds — no new writer). H1 prune appends worktree_pruned (h_class: ghost_registry); H4 / H3-closed clear appends spec_binding_cleared (h_class: ghost_spec_binding / dormant_spec_binding). No new event type, schema, or result kind is introduced.'
  - 'No git worktree directory is ever created or deleted by repair. H1 prune removes only the stale worktrees.json entry (the backing dir is already absent — that is what makes it a ghost). H4/H3-closed clear only the canonical spec.worktree field. The destroyWorktree external-half-state (irreversible git removal) is explicitly out of scope and needs the deferred external_state_recovered result kind first.'
  - 'Repair is dry-run-first: caws worktree repair --dry-run reports exactly the H-class, subject, planned mutation, and the event that WOULD be appended, mutating nothing. The actual run performs only the mutation the dry-run predicted. Foreign-session-owned entries are refused without --takeover (matching destroy/merge), which writes a prior_owners audit.'
  - 'The H5 doctor narrowRepair string is redirected from the superseded WORKTREE-SPEC-AUTHORITY-CONTROL-PLANE-001 to -002 (the live resolution) since this slice touches inspect.ts; no other detection logic changes.'
acceptance:
  - id: A1
    given: 'A repo with a ghost registry entry (H1: worktrees.json[name] present, backing git/canonical dir absent), confirmed by doctor evidence.'
    when: 'caws worktree repair --dry-run is invoked.'
    then: 'It reports the exact H-class (ghost_registry), subject (the worktree name), the planned mutation (remove the registry entry), and the event that would be appended (worktree_pruned). NOTHING is mutated: worktrees.json, specs, git worktrees, and events.jsonl are byte-unchanged.'
  - id: A2
    given: 'The same H1 ghost.'
    when: 'caws worktree repair is invoked (not dry-run).'
    then: 'It performs ONLY the mutation the dry-run predicted: the registry entry is removed; a worktree_pruned event (h_class: ghost_registry) is appended via the store writer; the chain verifies; no git worktree dir is touched.'
  - id: A3
    given: 'An H4 ghost spec binding (registry absent, git/canonical dir absent, spec still has worktree:) and an H3 dormant binding (closed/archived spec with a stale worktree:).'
    when: 'caws worktree repair is invoked.'
    then: 'H4 clears the canonical spec.worktree and appends spec_binding_cleared (h_class: ghost_spec_binding); H3-closed/archived clears it and appends spec_binding_cleared (h_class: dormant_spec_binding). Both mutate only the spec field, never a git dir.'
  - id: A4
    given: 'Ambiguous/forbidden states: H2 (registry->missing-spec), H3 on an ACTIVE spec, H5 (3-way), H6 (foreign physical), and an event-backed orphan.'
    when: 'caws worktree repair is invoked against each.'
    then: 'Each is REFUSED with a typed doctrine-pointer diagnostic and ZERO mutation — specs, registry, git worktrees, and events.jsonl are byte-unchanged. No spec_binding_cleared or worktree_pruned event is appended for any of them.'
  - id: A5
    given: 'Any repair invocation.'
    when: 'It runs (dry-run or actual).'
    then: 'A test proves no repair code path creates or deletes a git worktree directory (the repair surface mutates only worktrees.json and canonical spec YAML, never the filesystem worktree).'
  - id: A6
    given: 'The shipped H5 doctor diagnostic.'
    when: 'inspectProjectState emits WORKTREE_BINDING_CONTRADICTION_3WAY.'
    then: 'Its narrowRepair points at WORKTREE-SPEC-AUTHORITY-CONTROL-PLANE-002 (not the superseded -001), and the existing doctor-authority-policy lock test still proves it carries no executable command.'
  - id: A7
    given: 'The full slice.'
    when: 'Verification runs.'
    then: 'Store, shell, and doctor test suites pass; the kernel repair-event-contract tests stay green; both packages build; the store mutation gate is unchanged unless a touched store file is already gated.'
non_functional:
  reliability:
    - 'Every mutation acquires the lifecycle lock via the store writer and runs inside runLifecycleTransaction, so an injected event-append failure rolls back the registry/spec write (the partial-failure honesty the rollback harness proved). Dry-run holds no lock and mutates nothing.'
  security:
    - 'This is the terminal slice of the Diagnose->Decide->Repair arc. Repair mutates governance state, so it is the highest-risk surface: it acts ONLY on classes the §1.4 matrix decided are unambiguous, refuses everything else, and writes an honest h_class-tagged audit event for every mutation. A repair that touched an ambiguous class would encode the wrong source of truth — the matrix-consumption + refusal is the guard against that.'
observability:
  - 'Dry-run output (H-class + subject + planned mutation + event) and actual-run output (the mutation performed + event appended + chain-verifies) are the verification artifacts, captured per class in closure evidence.'
  - 'The refusal diagnostics for the ambiguous/forbidden classes (doctrine pointer, no command, no mutation) are the regression artifact proving repair stays inside its authorized scope.'
rollback:
  - 'Rollback is a revert of the command + writer + test commits. The two repair event types remain registered (from WORKTREE-REPAIR-EVENT-CONTRACT-001) but unused; no chain contains them until repair runs, so reverting strands nothing.'
contracts:
  - name: half-state-repair-executor
    type: behavior
    path: packages/caws-cli/src/store/worktrees-writer.ts
    description: 'caws worktree repair mutates ONLY the matrix-unambiguous classes (H1 prune -> worktree_pruned; H4/H3-closed clear -> spec_binding_cleared), refuses H2/H3-active/H5/H6/orphan with a doctrine pointer and no mutation, never touches a git worktree dir, and dry-run predicts exactly the actual mutation.'
