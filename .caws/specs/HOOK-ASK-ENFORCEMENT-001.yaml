id: HOOK-ASK-ENFORCEMENT-001
title: 'Capability-aware ask enforcement: blocking-confirmation for capability-derived ask, advisory for legacy/default ask'
risk_tier: 3
mode: feature
lifecycle_state: active
worktree: ask-enforcement
created_at: '2026-06-01T00:59:47.676Z'
updated_at: '2026-06-01T01:10:42.358Z'
blast_radius:
  modules:
    - 'caws-cli hook-pack: classify_command.py — additive source/enforcement metadata on the decision'
    - 'caws-cli hook-pack: block-dangerous.sh — first consumer that branches on enforcement (capability-ask blocks; legacy-ask advisory)'
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - packages/caws-cli/templates/hook-packs/claude-code/classify_command.py
    - packages/caws-cli/templates/hook-packs/claude-code/block-dangerous.sh
    - packages/caws-cli/tests/hook-packs/ask_enforcement.test.js
    - docs/architecture/command-capability-taxonomy.md
  out:
    - packages/caws-cli/templates/hook-packs/claude-code/reset-danger-latch.sh
invariants:
  - 'ENFORCEMENT PROVENANCE, NOT A FLIPPED ASK. The classifier emits TWO additive fields alongside the
    unchanged decision/reason: `source` (capability | legacy_family | regex | rm_classifier |
    find_delete | classifier_error | sidecar_error | unknown) and `enforcement` (pass | advisory |
    confirm | block). `source` is diagnostic provenance; `enforcement` is the wrapper contract.
    block-dangerous.sh branches on `enforcement`, never on reason prose. The bare `ask` -> block rule
    is explicitly REJECTED.'
  - 'CAPABILITY-DERIVED ASK BLOCKS; LEGACY-FAMILY ASK STAYS ADVISORY. An `ask` produced by the
    capability pass (facet lattice / opaque-exec — it carries structured semantic evidence:
    kind=DESTROY/MUTATE/PRIV_ESC, reversibility, scope) gets enforcement=confirm and
    block-dangerous.sh blocks the first occurrence with a human-confirmation message. An `ask` from
    the pre-existing governed-family default / CONFIRM regex (unknown git/gh/npm subcommand —
    uncertainty, NOT graded risk) gets enforcement=advisory and preserves the current exit-0 advisory
    behavior. This is a TRANSITION architecture: legacy-family advisory is a compatibility class that
    shrinks as families are remapped into the capability substrate. CAWS-DANGER-LATCH-CATASTROPHIC-
    ONLY-001 is NOT reverted — blocking all ask would recreate the over-governance it correctly removed.'
  - 'NO NEW DECISION TIER. deny still hard-blocks + latches; allow still passes; ask stays semantically
    ask. The lattice already expresses that kubectl delete pod / aws s3 rm key / curl POST / kill -9 /
    docker system prune are risky-but-not-catastrophic (ask, not deny) — the wrapper makes that ask
    OPERATIONALLY meaningful. A capability-deny tier is explicitly NOT created (it would muddle the lattice).'
  - 'ADDITIVE STDOUT CONTRACT. decision and reason are unchanged; source/enforcement are added. A jq
    consumer reading only .decision/.reason is unaffected. enforcement is always present for a stable
    contract. block-dangerous.sh defaults conservatively when enforcement is absent (ask -> advisory
    for backward-compat within this slice; deny -> block).'
  - 'FAIL-CLOSED PATHS BLOCK/CONFIRM. classifier_unavailable, malformed classifier output, and
    sidecar_error remain fail-closed (enforcement=confirm or block, never advisory) — an unverifiable
    command does not get the advisory grace. This preserves the existing fail-closed latch behavior.'
  - 'SUBSTRATE/ECOLOGY BOUNDARY. CAWS owns the capability facet vocabulary, lattice semantics,
    enforcement behavior for capability-derived risk, and the schema constraints preventing policy
    override. PROJECTS own their tool/subcommand/resource adapter mappings (the .caws/command-
    adapters.json sidecar), local aliases, and migration of legacy-family uncertainty into explicit
    capability mappings. We do not know more than the project developers about every command surface
    in their repo; enforcing a baked-in classification would force a CAWS release every time a repo''s
    operational surface matures.'
  - 'NON-REGRESSION. Existing block-dangerous calibration + the capability suites stay green. Legacy
    asks (git rebase, git cherry-pick, git commit --amend, npm run <script>, unknown git/gh/npm
    subcommands) MUST NOT begin blocking under this slice. deny still latches; allow still passes.'
  - 'CLASSIFIER-COMPLETE vs COMMAND-SAFETY-COMPLETE. With this slice landed, capability-derived ask is
    operationally enforced at the hook boundary, so the command-safety bar is met for the capability
    surface. Legacy-family ask remaining advisory is acknowledged compatibility debt, tracked for
    migration, not a silent gap.'
acceptance:
  - id: A1
    given: 'a command the capability lattice rates ask with a dangerous facet (kubectl delete pod mypod,
      aws s3 rm s3://b/k, curl -X POST, kill -9 1234, docker system prune)'
    when: 'classify_command runs'
    then: 'stdout carries decision=ask, source=capability, enforcement=confirm; block-dangerous.sh
      blocks the first occurrence with a human-confirmation message distinct from a catastrophic deny'
  - id: A2
    given: 'a command that asks via the governed-family default / CONFIRM regex (git rebase -i,
      git commit --amend, unknown npm subcommand)'
    when: 'classify_command runs'
    then: 'stdout carries decision=ask, source=legacy_family (or regex), enforcement=advisory;
      block-dangerous.sh preserves exit-0 advisory behavior — the command is NOT blocked'
  - id: A3
    given: 'deny and allow commands'
    when: 'classify_command runs'
    then: 'deny -> enforcement=block, block-dangerous.sh hard-blocks + latches as today; allow ->
      enforcement=pass, exit 0. No behavior change vs baseline for deny/allow.'
  - id: A4
    given: 'classifier unavailable, malformed classifier output, or a sidecar error state'
    when: 'block-dangerous.sh evaluates a command'
    then: 'the path fails closed (enforcement=confirm or block, never advisory); the existing
      fail-closed latch behavior is preserved'
  - id: A5
    given: 'a capability ask nested inside $(...) or sh -c "..." (eval "kubectl delete pod mypod")'
    when: 'classify_command recurses'
    then: 'the inner capability enforcement=confirm propagates outward to the top-level decision'
  - id: A6
    given: 'an existing jq consumer reading only .decision/.reason'
    when: 'the classifier emits the new source/enforcement fields'
    then: 'the consumer is unaffected (additive contract); the calibration + capability suites stay green'
non_functional:
  security:
    - 'Capability-derived ask is operationally enforced (blocking-confirmation) at the hook boundary;
      the classifier recognizing risk no longer permits first execution. Fail-closed paths never
      downgrade to advisory.'
  reliability:
    - 'Additive stdout fields do not break existing jq consumers; enforcement is always present.'
contracts:
  - name: classifier-decision-envelope-v2
    type: schema
    description: 'classify_command.py stdout adds additive source + enforcement fields to the existing
      {decision, reason} envelope; block-dangerous.sh consumes enforcement. decision/reason semantics
      and the jq-only-.decision consumer contract are unchanged.'
