id: UX-SPECS-RESTORE-PLAN-001
title: 'Add governed archived spec restore'
risk_tier: 3
mode: feature
lifecycle_state: active
worktree: specs-restore-plan
created_at: '2026-07-04T06:04:42.309Z'
updated_at: '2026-07-04T06:04:42.309Z'
blast_radius:
  modules:
    - '@paths.design/caws-cli specs lifecycle shell/store'
    - '@paths.design/caws-kernel event vocabulary'
    - 'CLI command reference and UX audit docs'
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - 'packages/caws-cli/src'
    - 'packages/caws-cli/tests'
    - 'packages/caws-kernel/src'
    - 'packages/caws-kernel/tests'
    - 'docs/api/cli.md'
    - 'docs/architecture/cli-ux-job-model-audit.md'
    - 'docs/command-reference.md'
  out: []
invariants:
  - 'Restore is dry-run by default and never writes .caws/specs or events without --apply.'
  - 'Apply refuses to overwrite an existing canonical .caws/specs/<id>.yaml.'
  - 'Restore must validate the recovered YAML after patching lifecycle_state to the requested draft/active state.'
  - 'Restore preserves the archive/retirement recovery trail and appends a typed spec_restored audit event on apply.'
acceptance:
  - id: A1
    given: 'an archived or retired spec body recoverable from the event log and git'
    when: 'an operator runs caws specs restore <id> --as draft or --as active without --apply'
    then: 'CAWS prints a read-only restore plan with target path, target lifecycle state, source recovery metadata, and the exact apply command, and leaves specs/events unchanged'
  - id: A2
    given: 'the same recoverable archived or retired spec body'
    when: 'an operator runs caws specs restore <id> --as draft --apply'
    then: 'CAWS writes .caws/specs/<id>.yaml with lifecycle_state draft, validates the body, appends spec_restored, and auto-commits when the target path was clean'
  - id: A3
    given: 'a canonical .caws/specs/<id>.yaml already exists'
    when: 'an operator attempts restore for that id'
    then: 'CAWS refuses before writing and reports that restore would overwrite active control-plane state'
  - id: A4
    given: 'CLI help and docs are generated from metadata'
    when: 'the project builds and docs/tests run'
    then: 'caws specs --help and caws specs restore --help list the restore leaf, --as, --apply, --json, and --data, and docs/api plus command-reference match the implemented surface'
non_functional: {}
contracts: []
