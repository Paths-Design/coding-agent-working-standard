  in:
    - packages/caws-cli/templates/hook-packs/claude-code/
    - packages/caws-cli/src/init/hook-packs/manifest-claude-code.ts
    - packages/caws-cli/tests/init/hook-packs/install.test.js
    - packages/caws-cli/CHANGELOG.md
  out: []
invariants:
  - >-
    The canonical template pack becomes the UNION of the best logic across
    all three forks: TEMPLATE keeps its newer logic, and the Sterling /
    caws-local improvements identified in the divergence audit are harvested
    in (lib/caws-state.sh, agent-heartbeat suppression, worktree-write-guard
    base-branch enforcement, scope-guard malformed-spec DENY, block-dangerous
    PROTECTED_HOOK guard, quality-check/validate-spec/stop-worktree-check/
    doc-frontmatter-check v11-correct versions).
  - >-
    No safety guard is weakened relative to the strongest fork. Specifically:
    lib/run-handlers.sh keeps stdout priority (block > ask > advisory);
    scope-guard denies on malformed bound spec; block-dangerous keeps the
    classifier + latch + PROTECTED_HOOK guard.
  - >-
    Every newly-promoted hook is registered in manifest-claude-code.ts with a
    CAWS-MANAGED-HOOK header and wired into the correct dispatcher HANDLERS
    array; install.test.js asserts presence + header for each.
  - >-
    Sterling-project-specific advisory text (rule-file paths, mandatory-
    worktree posture) is generalized when promoted to canonical; consumers
    receive generic CAWS wording.
acceptance:
  - id: A1
    given: the divergence audit findings
    when: the canonical template pack is reconciled
    then: >-
      lib/caws-state.sh ships in the pack and is sourced by the hooks whose
      registry reads were written against its object-shape entriesOf contract
      (worktree-write-guard, stop-worktree-check). NARROWED: worktree-guard
      and session-caws-status keep their pre-existing inline entriesOf — those
      return [key, value] PAIRS (Object.entries shape), a different contract
      than the lib's {name, ...entry} OBJECT shape, so swapping the lib in
      would require rewriting every downstream call-site loop in those
      safety-critical guards. Rewiring them is a behavior-neutral refactor
      with real regression risk and is deferred to a dedicated follow-up
      (HOOK-PACK-ENTRIESOF-UNIFY-01, not yet filed) rather than churned at
      the tail of this slice. scope-guard uses worktreeEntry/boundSpecIdOf
      (single-entry lookup), not entriesOf, so it is not a duplication site.
  - id: A2
    given: the reconciled pack
    when: the hook-pack install + calibration test suites run
    then: all pass, including new presence/header assertions for promoted hooks
  - id: A3
    given: the reconciled canonical pack
    when: caws monorepo .claude/hooks/ is refreshed from it
    then: caws-local runs the classifier-based block-dangerous (not the obsolete regex version) with the danger latch
  - id: A4
    given: the reconciled canonical pack
    when: Sterling .claude/hooks/ is refreshed from it
    then: Sterling gains run-handlers stdout priority, the git-workflow calibration, the canonical-checkout guard, the durable session envelope, and the 4 code-quality hooks; Sterling-local customizations (write-guard allowlist, heartbeat suppression) are preserved
