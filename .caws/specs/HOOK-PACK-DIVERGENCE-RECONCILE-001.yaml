id: HOOK-PACK-DIVERGENCE-RECONCILE-001
title: 'Reconcile divergent claude-code hook forks: harvest Sterling + caws-local improvements into canonical pack, then refresh consumers'
risk_tier: 3
mode: refactor
lifecycle_state: closed
resolution: completed
closure_notes: 'Reconciled the canonical claude-code hook pack into the union of three forks. Promoted from Sterling: lib/caws-state.sh (+manifest), agent-heartbeat two-layer suppression, scope-guard malformed-bound-spec DENY, block-dangerous PROTECTED_HOOK guard, worktree-write-guard full base-branch enforcement (un-deferred from archived CLI-WORKTREE-001 per user; fixed a realpath /tmp-vs-/private/tmp asymmetry the canonical normalization introduced), and 3 opt-in hooks (quality-check/validate-spec/stop-worktree-check, v11-correct Sterling versions). NOT promoted: doc-frontmatter-check (Sterling-specific schema). AC A1 NARROWED: lib sourced where the object-shape entriesOf contract matches (worktree-write-guard, stop-worktree-check); worktree-guard + session-caws-status keep inline [key,value]-pair entriesOf (different contract — rewiring deferred to HOOK-PACK-ENTRIESOF-UNIFY-01, not yet filed). AC A3 met: caws-local refreshed via caws init --overwrite (now classifier-based block-dangerous + latch). AC A4 met in Sterling under STERLING-HOOK-PACK-REFRESH-V11-UNION-01. 201/201 hook-pack + calibration tests. Pack stays v11 (init --overwrite pulls union). NO ephemeral docs created; CHANGELOG updated; doc-lifecycle: none archived/promoted. Ships with 11.1.9 alongside the reset-danger-latch + git-calibration fixes.'
created_at: '2026-05-29T19:20:08.202Z'
updated_at: '2026-05-29T20:34:29.805Z'
