invariants:
  - Dangerous Bash commands do not execute without human permission.
  - A dangerous-command denial latches the Claude session until explicit user reset.
  - Git detection is based on parsed executable/subcommand semantics, not flat substring matching.
acceptance:
  - id: A1
    given: A Bash command invokes git init through wrappers or global options.
    when: The Claude dangerous-command hook classifies it.
    then: The hook returns ask or deny and never allow.
  - id: A2
    given: A dangerous command has been denied in a Claude session.
    when: Another Bash command is attempted in the same session.
    then: The hook blocks it until the latch reset script clears the session latch.
  - id: A3
    given: Inert text mentions git init or rm -rf.
    when: The classifier parses quoted echo and grep style commands.
    then: The hook does not block solely because of the quoted mention.
  - id: A4
    given: Recursive deletion targets differ in severity.
    when: The classifier reports them.
    then: Root, repository, and home deletes are denied while absolute temp deletes require human permission with precise diagnostics.
non_functional:
  security:
    - Dangerous command detection must resist wrapper, git global option, and nested shell -c bypasses.
contracts:
  - name: Claude dangerous Bash hook behavior
    type: behavior
    path: packages/caws-cli/templates/.claude/hooks/block-dangerous.sh
    description: The shipped Claude hook blocks or asks before dangerous Bash primitives execute.
