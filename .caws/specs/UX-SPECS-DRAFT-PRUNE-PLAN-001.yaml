invariants:
  - 'Draft cleanup planning is read-only and never writes .caws/specs, .caws/events.jsonl, or worktrees.json.'
  - 'The plan classifies draft specs with explicit state classes instead of implying every draft is safe to retire.'
  - 'Selectors must be reviewable and deterministic: older-than, include, exclude, and bound/unbound state are visible in JSON.'
acceptance:
  - id: A1
    given: 'a repo with draft specs of different ages and bindings'
    when: 'an operator runs caws specs prune-drafts with selector flags'
    then: 'CAWS prints a read-only plan with candidate/refused/skipped classifications and writes no spec files or events'
  - id: A2
    given: 'draft and non-draft ids selected by include/exclude flags'
    when: 'the command runs with --json'
    then: 'the JSON output includes selector metadata, state class, reason, age, target path, and next safe command for each selected or refused spec'
  - id: A3
    given: 'a draft spec with a worktree binding'
    when: 'the command runs without an explicit bound-draft selector'
    then: 'the plan refuses that draft for automatic retirement and explains that the binding must be resolved first'
  - id: A4
    given: 'CLI help and docs are generated from metadata'
    when: 'the project builds and docs/tests run'
    then: 'caws specs --help and caws specs prune-drafts --help list the read-only planning leaf and its selectors, and docs/api plus command-reference match the implemented surface'
non_functional: {}
contracts: []
