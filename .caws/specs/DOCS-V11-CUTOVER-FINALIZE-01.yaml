invariants:
  - 'I1: Documentation-only slice. NO source code changes, NO test changes, NO hook templates, NO runtime behavior changes, NO release publishes, NO npm dist-tag mutations. Every file modified MUST be a documentation file admitted by scope.in.'
  - 'I2: The fix MUST address the contradictions identified by RELEASE-DISTRIBUTION-SURFACE-RECON-01 §6 mismatch table: README lines 9, 15, 45; AGENTS.md lines 1, 3, 7, 9, 11 (v11.0.0/pin-to-10.2.x); CLAUDE.md line 9 (@11.1.4 stale); packages/caws-cli/README.md line 64 (^11.0.0 caret-misleading). docs/architecture/caws-vnext-command-surface.md §1 framing polish is OPTIONAL — admitted by scope.in but not required to be touched.'
