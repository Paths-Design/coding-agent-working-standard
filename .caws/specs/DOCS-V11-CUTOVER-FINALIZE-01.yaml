  - 'I4: docs/migration-v10-to-v11.md is the CANONICAL location for legacy-pin guidance (it already exists and is current per recon §4). Doc surfaces that currently embed "pin to caws-cli@^10.2.x" inline MUST instead link to the migration guide. This eliminates the downgrade trap while preserving the legacy path for users who genuinely need it.'
  - 'I5: Version-specific references SHOULD use one of two patterns: (a) "the current published line" (resilient to patch bumps) or (b) explicit current `@^11.1.0` (resilient to specific-version drift). The pattern `@^11.0.0` is misleading because the caret resolves to v11.1.6 today; readers may think they''re getting v11.0.x. The pattern `@11.1.4` is brittle (stale within days of any patch bump). Prefer "current published line" with a single anchor reference to npm in the install snippet.'
  - 'I6: Per the rehearsal report''s honest non-claim, NO in-CLI diagnostic strings are touched by this slice (those are CAWS-STALE-VERSION-ADVICE-DIAGNOSTICS-01). This slice only touches authored documentation files (README, AGENTS, CLAUDE.md, package README, architecture doc). The two slices have disjoint surfaces.'
  - 'I7: No new doc files are created. The slice rewrites existing surfaces only. Restructuring (moving an install section to a new file, splitting a doc into multiple files) is OUT OF SCOPE — that is doc architecture work, not the targeted reconciliation this slice is doing.'
