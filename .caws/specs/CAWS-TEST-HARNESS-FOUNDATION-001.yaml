id: CAWS-TEST-HARNESS-FOUNDATION-001
title: 'Test harness foundation: jest config repair, temp-repo factory, shared-install primitive, deadlock root-cause, root toolchain hygiene'
risk_tier: 1
mode: feature
lifecycle_state: active
worktree: test-foundation-01
created_at: '2026-06-13T00:00:00.000Z'
updated_at: '2026-06-13T22:56:04.127Z'
blast_radius:
  modules:
    - packages/caws-cli/jest.config.js
    - packages/caws-kernel/jest.config.js
    - packages/caws-kernel/tsconfig.test.json
    - packages/caws-cli/tests
    - packages/caws-kernel/tests
    - package.json
  data_migration: false
operational_rollback_slo: 30m
scope:
  in:
    - packages/caws-cli/jest.config.js
    - packages/caws-kernel/jest.config.js
    - packages/caws-kernel/tsconfig.test.json
    - packages/caws-cli/tests
    - packages/caws-kernel/tests
