invariants:
  - 'No production source under packages/*/src is modified by this slice; the harness is the system, not the SUT. Code defects discovered are filed as separate tracked defect specs, never fixed inline here.'
  - 'No test bends production wording/behavior to pass; tests pin correct behavior. This slice writes ZERO behavioral assertions about the SUT — it only stands up the runner so later slices can.'
  - 'jest still loads implementation from dist/ (require of compiled JS), not src/; the Stryker contract (mutate dist/, run jest) is preserved.'
  - 'Shared install happens once per suite (beforeAll), never per test (beforeEach), to eliminate the per-test 48-file reinstall cost driver.'
  - 'The parallel-worker deadlock is root-caused and fixed at the isolation layer, not masked with --runInBand.'
acceptance:
  - id: A1
    given: 'Both packages have jest configs with dangling references to deleted setup/mock files (caws-cli setupFiles/setupFilesAfterEnv/moduleNameMapper/testPathIgnorePatterns; kernel tsconfig.test.json).'
    when: 'npx jest --passWithNoTests is run in each package after this slice.'
    then: 'Both exit 0 with no module-not-found startup error; the configs reference only files that exist on disk.'
  - id: A2
    given: 'A test that needs an isolated git repo fixture.'
    when: 'It calls the new temp-repo factory in packages/caws-cli/tests/helpers.'
    then: 'It receives a unique, isolated temp git repo (git init + minimal config + empty commit) that does not share the index, .caws/leases, or working tree with any other worker.'
  - id: A3
    given: 'A suite that installs the hook pack as a fixture.'
    when: 'It uses the shared-install primitive.'
    then: 'The install runs exactly once per suite (beforeAll), verifiable by an install-count assertion or timing, not once per test.'
  - id: A4
    given: 'The deleted suite deadlocked under jest default parallel workers.'
    when: 'The new harness runs an N-suite smoke under default (parallel) workers, not --runInBand.'
    then: 'It completes without hang; the deadlock root cause is documented in the closure notes / commit message with the concrete shared resource identified.'
  - id: A5
    given: 'Root package.json pins jest ^29 + babel-jest ^29 while both packages pin jest 30.1.3, and carries 6 defunct test:* fallback scripts that find||echo not-found.'
    when: 'Root package.json is read after this slice.'
    then: 'Root jest is aligned to 30.x, babel-jest is removed (nothing uses babel), and the 6 defunct fallback scripts are deleted; turbo run test remains the real entry.'
non_functional:
  reliability:
    - 'The harness runs deterministically under default parallel workers (no --runInBand crutch) and under env.CI=true.'
    - 'Per-worker fixture isolation prevents cross-worker contention on the git index and .caws state.'
  security:
    - 'Test fixtures create temp repos under per-test temp dirs only; no fixture writes outside its temp dir, and no fixture reads or transmits real secrets. scan-secrets-relevant fixtures use synthetic tokens.'
observability:
  - 'jest --passWithNoTests output (exit code + zero-test confirmation) is the verification artifact for A1, captured in the closure evidence.'
  - 'The parallel-deadlock root cause (the specific shared resource) is recorded in the commit/closure notes per A4.'
rollback:
  - 'Rollback is a revert of the harness/config commit; no event-log or data migration is introduced by this slice.'
  - 'The deleted-corpus state (HEAD 51b4d00d) is the recovery baseline; every prior test is recoverable at git show 603856fd:<path>.'
contracts:
  - name: harness-jest-clean
    type: behavior
    path: packages/caws-cli/jest.config.js
    description: 'Both packages jest configs reference only on-disk files; npx jest --passWithNoTests exits 0 with no startup error; jest loads SUT from dist/ and the Stryker mutate-dist/run-jest contract is intact.'
