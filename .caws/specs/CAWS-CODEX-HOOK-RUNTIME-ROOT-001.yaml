id: CAWS-CODEX-HOOK-RUNTIME-ROOT-001
title: 'Resolve Codex hook dispatchers from active git root'
risk_tier: 3
mode: fix
lifecycle_state: active
created_at: '2026-06-26T23:17:23.693Z'
updated_at: '2026-06-26T23:17:23.693Z'
blast_radius:
  modules:
    - packages/caws-cli/init
    - packages/caws-cli/hook-packs/codex
    - packages/caws-cli/release-smoke
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - 'packages/caws-cli/src/init/hook-install.ts'
    - 'packages/caws-cli/scripts/fresh-install-smoke.mjs'
    - 'packages/caws-cli/templates/hook-packs/codex/hooks.json'
    - 'packages/caws-cli/src/init/hook-packs/manifest-codex.ts'
    - 'packages/caws-cli/tests/init'
  out: []
invariants:
  - >-
    Codex hook commands installed by caws init --agent-surface codex resolve the
    active Git checkout at hook invocation time, not the checkout path where init
    happened. The hook dispatch target and CAWS_PROJECT_DIR must agree on that
    runtime root.
  - >-
    The installed .codex/hooks.json remains a documented Codex hooks.json shape:
    one command handler per CAWS event, no unresolved template tokens, no inline
    config.toml hook duplication, and all dispatchers live in the shared core at
    .caws/hooks/dispatch.
  - >-
    Codex-specific hook output stays aligned with current Codex behavior:
    ask-level CAWS escalations emit deny, block decisions stay block-compatible,
    and updatedInput is emitted only with permissionDecision: allow.
acceptance:
  - id: A1
    given: caws init --agent-surface codex is run in a fresh Git checkout
    when: the installed .codex/hooks.json is inspected
    then: >-
      each command resolves REPO_ROOT with git rev-parse --show-toplevel (falling
      back to pwd -P), exports CAWS_AGENT_SURFACE=codex and CAWS_PROJECT_DIR to
      that runtime root, and invokes .caws/hooks/dispatch/<event>.sh under the
      same root.
  - id: A2
    given: a Codex hook payload is piped to the installed SessionStart and
      PreToolUse dispatchers in a fresh install
    when: the dispatchers run from the generated .codex/hooks.json wiring
    then: they exit successfully and do not rely on stale .codex/hooks/caws_dispatch
      or install-time absolute project paths.
  - id: A3
    given: the packaged fresh-install smoke validates Codex hook artifacts
    when: it checks installed hook commands and dispatcher locations
    then: it asserts the current shared-core layout rather than stale
      CODEX_PROJECT_DIR/.codex/hooks/caws_dispatch paths.
non_functional: {}
contracts: []
