id: UX-INIT-DRY-RUN-ALIAS-001
title: 'Add init dry-run alias'
risk_tier: 3
mode: fix
lifecycle_state: active
created_at: '2026-07-04T19:10:59.958Z'
updated_at: '2026-07-04T19:10:59.958Z'
blast_radius:
  modules:
    - 'packages/caws-cli init command surface'
    - 'CLI reference documentation'
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - 'packages/caws-cli/src/shell/command-metadata.ts'
    - 'packages/caws-cli/src/shell/register.ts'
    - 'packages/caws-cli/tests/shell/init-dry-run-alias.test.js'
    - 'docs/api/cli.md'
    - 'docs/command-reference.md'
    - 'docs/architecture/cli-ux-job-model-audit.md'
  out: []
invariants:
  - '`caws init --dry-run` is parsed as a compatibility alias for the existing read-only --plan path.'
  - '`--dry-run` never initializes .caws, installs hook packs, writes settings, appends events, or mutates gitignore state.'
  - 'Help and docs present --dry-run as an alias for --plan so agents can discover the preview model without retry loops.'
acceptance:
  - id: A1
    given: 'a git repository without CAWS state'
    when: 'an operator runs caws init --dry-run'
    then: 'the command prints the same read-only init plan as --plan and leaves the repository unmodified.'
  - id: A2
    given: 'a git repository without CAWS state'
    when: 'an operator runs caws init --dry-run --json'
    then: 'the command emits the same JSON plan shape as --plan --json with read_only true.'
  - id: A3
    given: 'the built CLI command surface'
    when: 'an operator runs caws init --help'
    then: 'help lists --dry-run as a compatibility alias for --plan.'
non_functional: {}
contracts:
  - name: 'init-dry-run-alias'
    type: behavior
    path: 'packages/caws-cli/tests/shell/init-dry-run-alias.test.js'
