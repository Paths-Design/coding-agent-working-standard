id: SCOPE-CHECK-CWD-BINDING-RESOLUTION-001
title: 'caws scope check resolves governing binding by path (git-common-dir), not by invocation cwd'
risk_tier: 2
mode: chore
lifecycle_state: active
created_at: '2026-05-28T22:07:45.799Z'
updated_at: '2026-05-28T22:45:00.000Z'
