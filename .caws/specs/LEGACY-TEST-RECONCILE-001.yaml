invariants:
  - 'npm test (the canonical package test runner) MUST pass after this slice. No blanket testPathIgnorePatterns may be used to hide failures.'
  - 'Every test file whose disposition changes (DELETE, REWRITE, RETAIN, QUARANTINE) MUST have its rationale recorded in the closure notes of this spec.'
  - 'A QUARANTINE disposition is legal only when (a) the suite covers an intentionally deferred v11.2+ surface AND (b) a tracking spec exists AND (c) the suite is removed from the default test run, not left failing.'
  - 'No removal of src/ code. This slice is test-surface reconciliation only.'
  - 'No regressions in already-passing suites (worktree, specs, store, kernel-adjacent, shell/register).'
acceptance:
  - id: A1
    given: 'The baseline failing test surface: 15 suites, 72 failed tests recorded in the rehearsal log .rehearsal-cli-full.log.'
    when: 'A per-suite triage is performed.'
    then: 'Every failing suite receives one of: DELETE, REWRITE, RETAIN, QUARANTINE. Each disposition is recorded with rationale before any code change.'
  - id: A2
    given: 'A triaged suite classified DELETE.'
    when: 'The slice executes that classification.'
    then: 'The test file is removed via git rm. No replacement is added unless explicitly noted. Removal is justified by the suite asserting only removed-in-v11 commands or removed-in-v11 state files.'
  - id: A3
    given: 'A triaged suite classified REWRITE.'
    when: 'The slice executes that classification.'
    then: 'The test file is updated in place to assert v11 equivalents of the removed v10 contract. Test intent (what behavior is being protected) is preserved; only the command path and state shape change.'
  - id: A4
    given: 'A triaged suite classified RETAIN.'
    when: 'The slice executes that classification.'
    then: 'The test file remains in place. The failure was harness/config drift (e.g., missing setupFile, stale fixture path) and is corrected with the minimum change.'
  - id: A5
    given: 'A triaged suite classified QUARANTINE.'
    when: 'The slice executes that classification.'
    then: 'The suite is moved out of the default test run via an explicit, per-file mechanism (not a wildcard ignore). A tracking spec id is recorded for the v11.2+ work that will reintroduce the suite. The CHANGELOG entry for v11.1 names the quarantined suite and the tracking spec.'
  - id: A6
    given: 'All triage classifications have been executed.'
    when: 'npm test is run from packages/caws-cli with no arguments and no environment variables overriding the test surface.'
    then: 'Exit code 0. No "X failed" line. Suite count and test count are recorded in the closure notes for v11.1 history.'
  - id: A7
    given: 'A reviewer reading the spec after closure.'
    when: 'They cross-reference closure_notes against the actual test directory.'
    then: 'Every disposition is verifiable: deleted files are absent, rewritten files reflect v11 contracts, retained files have a documented harness fix, quarantined files are excluded by a named mechanism.'
non_functional:
  performance: 'npm test must complete in under 4 minutes on the canonical dev machine (current baseline 210s for the broken surface).'
  reliability: 'No flakiness budget. A retained test that flakes is reclassified to REWRITE or QUARANTINE.'
references:
  - 'docs/architecture/caws-vnext-command-surface.md (A1 posture; removed commands)'
  - 'docs/architecture/event-order.md (event semantics for tests touching events.jsonl)'
  - '.rehearsal-cli-full.log (baseline failure inventory; not committed)'
