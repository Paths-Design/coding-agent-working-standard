id: HOOK-GUARD-LEGIBILITY-001
title: 'Guards self-identify: name the mechanism + print literal remediation in scope/worktree-write/danger-latch messages'
risk_tier: 3
mode: feature
lifecycle_state: active
worktree: wt-guard-legibility
created_at: '2026-06-01T03:10:39.497Z'
updated_at: '2026-06-01T03:26:34.204Z'
blast_radius:
  modules:
    - 'caws-cli hook-pack: lib/guard-message.sh — new shared message-prefix helper (guard identity + remediation)'
    - 'caws-cli hook-pack: scope-guard.sh — strike messages name the guard + print literal caws specs amend-scope remediation'
    - 'caws-cli hook-pack: worktree-write-guard.sh — claimed/ask messages name SESSION context, not a bare shell cd'
    - 'caws-cli hook-pack: block-dangerous.sh — latch copy scoped to mutating/capability-risk, not "every Bash call"'
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - packages/caws-cli/templates/hook-packs/claude-code/lib/guard-message.sh
    - packages/caws-cli/templates/hook-packs/claude-code/scope-guard.sh
    - packages/caws-cli/templates/hook-packs/claude-code/worktree-write-guard.sh
    - packages/caws-cli/templates/hook-packs/claude-code/block-dangerous.sh
    - packages/caws-cli/tests/hook-packs/worktree_guard_ask_redirect.test.js
