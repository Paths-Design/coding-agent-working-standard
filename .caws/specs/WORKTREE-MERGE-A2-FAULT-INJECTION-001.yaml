invariants:
  - 'The test injects a fault into closeSpec''s lifecycle transaction such that the transaction validates planned bytes, then fails post-validation (e.g., during commit-fsync or event append), rolls back, and returns ok({ kind: "partial_failure_recovered", cause: ... }).'
  - 'Under that injected fault, mergeWorktree''s post-condition is: returns err(STORE_RULES.LIFECYCLE_PARTIAL_FAILURE_UNRECOVERED) with a diagnostic naming the merge commit and stating (a) the spec remains active, (b) the worktree is NOT destroyed.'
  - 'No worktree_merged event is appended. No worktree_destroyed event is appended. No spec_closed event is appended. The bound spec''s status field is unchanged. The worktree entry in worktrees.json remains present with its original specId.'
  - 'The merge commit DOES exist on the base branch (the git merge itself succeeded — only the spec-close lifecycle transaction rolled back). This is the honest-failure surface mergeWorktree must surface, not paper over.'
  - 'The fault-injection seam is a SHARED test-only mechanism in lifecycle-transaction.ts (e.g., a `__CAWS_TEST_INJECT_FAULT__` symbol exported only in test builds, or an env-gated branch keyed on `CAWS_TEST_INJECT_LIFECYCLE_FAULT`). It is NOT a one-off mock for this single test. The same seam must be reusable for future regressions covering specs.close, worktree.create, claim.takeover, and bridge claims (the broader scope tracked by LIFECYCLE-ROLLBACK-FAILURE-HARNESS-001).'
  - 'The fault-injection seam is unreachable from production code paths. If env-gated, the env var must be namespaced (`CAWS_TEST_INJECT_*`) and the lifecycle-transaction module must refuse to honor it in any non-test environment (e.g., guarded by `process.env.NODE_ENV === "test"` or `process.env.JEST_WORKER_ID !== undefined`).'
acceptance:
  - id: A1
    given: 'A bound worktree wt-foo with active spec FOO-001 (worktree<->spec binding intact) and an unmerged feature branch with one commit.'
    when: 'A test invokes mergeWorktree with the lifecycle-transaction fault-injection seam configured to make closeSpec''s transaction return partial_failure_recovered.'
    then: 'mergeWorktree returns err(LIFECYCLE_PARTIAL_FAILURE_UNRECOVERED). The diagnostic includes the merge commit SHA and the cause string from closeSpec''s partial_failure_recovered. The worktree is not destroyed. The spec status remains active.'
  - id: A2
    given: 'Same setup as A1.'
    when: 'After mergeWorktree returns the error, the test reads .caws/events.jsonl.'
    then: 'No worktree_merged event is present for this merge attempt. No worktree_destroyed event is present. No spec_closed event is present. (The merge commit on the base branch is a separate audit surface — git history, not events.jsonl.)'
  - id: A3
    given: 'Same setup as A1.'
    when: 'After mergeWorktree returns the error, the test disables the fault-injection seam and invokes mergeWorktree a second time (operator-retry pattern: investigated, fixed, retrying).'
    then: 'The retry completes successfully (spec_closed event, worktree_merged event, worktree destroyed). The first attempt''s partial state did not corrupt the retry path. The retry''s merge commit may or may not be the same SHA as A1 — the test asserts only that the retry succeeds end-to-end.'
  - id: A4
    given: 'A bound worktree with no fault-injection seam active (the happy path).'
    when: 'The test invokes mergeWorktree.'
    then: 'mergeWorktree returns ok({ auto_closed_spec: true, ... }) as before. This acceptance proves the fault-injection seam does not change happy-path behavior when no fault is injected. The seam''s default (env unset, symbol not assigned) is "no fault."'
  - id: A5
    given: 'A production-like environment (NODE_ENV unset or "production", JEST_WORKER_ID undefined).'
    when: 'The fault-injection env var `CAWS_TEST_INJECT_LIFECYCLE_FAULT` is set and a lifecycle transaction runs through closeSpec.'
    then: 'The seam refuses to honor the env var. The lifecycle transaction proceeds normally. A unit test for this behavior is required (the seam''s production-refusal is itself part of the contract).'
non_functional:
  reliability:
    - 'The seam is test-only. Production code paths must not be reachable from the seam. The unit test for A5 verifies this contract.'
    - 'The test is deterministic. No flaky filesystem races, no time-based assertions, no real network operations. The git merge step uses an in-process git harness (the existing worktree.test.js pattern).'
    - 'The seam is REUSABLE. The shape (env var + symbol export, or equivalent) is designed so adding A2-equivalent regressions for specs.close, worktree.create, claim.takeover, and bridge claims requires only new test files, not new seam infrastructure. This is the bridge to LIFECYCLE-ROLLBACK-FAILURE-HARNESS-001.'
  performance:
    - 'The new test adds < 2 s to the worktree.test.js suite total. The fault-injection branch is a single conditional check in lifecycle-transaction''s commit path; no measurable production overhead.'
contracts: []
# --- Triage ----------------------------------------------------------------
# WORKTREE-MERGE-CLEARS-SPEC-BINDING-001's A2 acceptance (close-rollback
# fails honestly) was proven manually during PR #5 implementation: I
# induced a faulty event-data field (the prior_worktree field before
# its schema landed), which triggered the partial_failure_recovered
# path, and verified mergeWorktree surfaced the unrecovered error
# rather than silently faking auto-close. That manual proof is not in
# CI.
#
# This spec adds the missing automated regression. Per the 2026-05-21
# design review, the seam is SHARED, not a one-off mock — the same
# pattern (specs.close transaction returns partial_failure_recovered)
# will recur for worktree.create, claim.takeover, specs.close-direct
# (without merge), and bridge claims. Building this seam well saves
# work on every future lifecycle-rollback regression.
#
# Seam design sketch (not normative — implementation slice decides):
#
#   In lifecycle-transaction.ts, near the post-validation commit step:
#
#     const injectedFault = readInjectedFault();
#     if (injectedFault?.matches(transactionKind)) {
#       // simulate post-validation rollback
#       return ok({ kind: 'partial_failure_recovered',
#                   cause: injectedFault.cause });
#     }
#
#   where readInjectedFault() returns null in production and only
#   honors the env var when NODE_ENV === 'test' or JEST_WORKER_ID is
#   defined.
#
# Relationship to LIFECYCLE-ROLLBACK-FAILURE-HARNESS-001 (existing
# draft): that broader spec proposes adversarial fault-injection
# across ALL composed lifecycle operations. This spec is the narrowest
# concrete starting point — specifically the mergeWorktree
# honest-completion regression. The seam built here is the
# substrate the broader harness will reuse. If
# LIFECYCLE-ROLLBACK-FAILURE-HARNESS-001 activates first, this spec
# becomes its first concrete test case; if this one activates first,
# it lays the seam for the broader harness to build on. Either
# ordering is workable; the seam is the same.
#
# Scope note: scope.in does NOT include
# packages/caws-cli/src/store/lifecycle-transaction.ts because the
# test-only fault-injection seam there will be added by the
# implementation slice, not by this draft-filing slice. The
# implementation slice must amend scope.in to add that file
# explicitly (CLAUDE.md trap #5: kernel-change escape clause). Same
# applies if the seam requires a kernel-side hook.
#
# Activation note: this is test-only and does not change shipped
# behavior. It COULD activate before CAWS-RELEASE-TAG-DRIVEN-001
# lands (no publish needed). The user's preference is still to defer
# the Lane 1 batch until the release substrate is repaired, but
# this is the safest of the Lane 1 trio to consider early if
# priorities shift.
