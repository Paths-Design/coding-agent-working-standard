id: WORKTREE-MERGE-A2-FAULT-INJECTION-001
title: 'Automated regression: mergeWorktree honest-completion on closeSpec partial_failure_recovered (via shared lifecycle fault-injection seam)'
risk_tier: 3
mode: chore
lifecycle_state: closed
resolution: completed
closure_notes: 'Closed via PR #10. Test-only sidecar adds fault-injection seam to lifecycle-transaction.ts and 5 acceptance tests (A1-A5). 130/130 pass in tests/store/. No package version bump, no CHANGELOG entry, no tag, no publish — strictly test-only per slice constraint.'
created_at: '2026-05-21T00:00:00.000Z'
updated_at: '2026-05-21T10:26:56.242Z'
blast_radius:
  modules:
    - packages/caws-cli/src/store/lifecycle-transaction.ts
