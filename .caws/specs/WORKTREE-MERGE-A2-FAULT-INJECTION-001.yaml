scope:
  in:
    - packages/caws-cli/tests/store/worktree-merge-a2-fault-injection.test.js
    - packages/caws-cli/src/store/lifecycle-transaction.ts
    - .caws/specs/WORKTREE-MERGE-A2-FAULT-INJECTION-001.yaml
