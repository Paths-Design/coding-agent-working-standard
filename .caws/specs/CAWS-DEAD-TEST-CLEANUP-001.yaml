    given: a test file under packages/caws-cli/tests that imports src/commands/{burnup,evaluate,iterate,verify-acs}.js or src/sidecars/* or src/parallel/parallel-manager.js
    when: the slice completes
    then: the file no longer exists OR the offending require has been removed and the file's remaining content covers only live v11.1 surface
  - id: A2
