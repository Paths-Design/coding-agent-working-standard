invariants:
  - >-
    Doc relocation, NOT content rewrite. The file's existing 17 entries
    move byte-identically (git mv) from
    packages/caws-cli/docs-status/failure-lineage.md to
    docs/failure-lineage.md. New content (Entry 18) lands as a separate
    edit in the same commit chain so the diff cleanly shows "move +
    append," not "rewrite."
  - >-
    Closed specs and fixture data are frozen. .caws/specs/HOOK-SAFETY-
    001.yaml is in lifecycle_state: closed and references the old path
    in its scope.in / scope.out — those entries are historical record
    of what that slice owned at closure time and MUST NOT be edited.
    docs/rewrite/corpus/gate-outputs/fail.json is corpus/fixture data
    documenting a historical failure case; it MUST NOT be edited.
    Both are in scope.out implicitly (not enumerated in scope.in).
  - >-
    The template at packages/caws-cli/templates/hook-packs/claude-code/
    CLAUDE.md references the failure-lineage path. This template is
    installed into user projects by `caws init`. After the move, the
    in-repo path is correct, but the template (when installed into
    OTHER projects) will reference a path that does not exist in those
    projects — that is a pre-existing template productization defect,
    NOT created by this slice. This slice updates the template to the
    new in-repo path; fixing the template to point at a stable
    canonical URL (e.g., GitHub-hosted) is a separate concern recorded
    as a follow-up.
  - >-
    Reference updates are mechanical, not editorial. Every occurrence
    of "packages/caws-cli/docs-status/failure-lineage.md" in the eight
    in-scope reference files is rewritten to "docs/failure-lineage.md"
    verbatim. No surrounding prose is reorganized. No headings are
    changed. The diff for each reference file is a minimal one-line
    path swap.
  - >-
    Entry 18 is added in the same chain. The relocation slice was
    motivated by the session-13 silent-push incident (see commit 2777e58
    drafting MULTI-AGENT-PUSH-RANGE-GUARD-001). Entry 18 documents that
    incident in the lineage doc's established format. Adding Entry 18
    is the second of two edits to the moved file — the first being the
    rename itself. Logging Entry 18 here means the lineage doc actually
    captures the failure that prompted the relocation, not just the
    relocation.
  - >-
    No release / version / CHANGELOG / template-version-bump / hook-
    pack-version-bump / event-schema edits. The template's
    hook_pack_version header (currently 2) is NOT bumped. Reference-
    path edits inside hook-pack templates do not change pack semantics
    and do not warrant a version bump. (If users have already installed
    the v2 pack into their projects, the path string inside CLAUDE.md
    is a description, not a runtime contract; the rest of the pack
    functions unchanged.)
  - >-
    Audit-quiet activation. v11.1.6 ships no caws specs promote
    surface; this spec is filed directly at lifecycle_state: active by
    a single YAML write. The git commit message is the audit trail.
    Closure follows the canonical CLI path (caws specs close
    --resolution completed --reason-via-file or via this commit's
    closure chain).
