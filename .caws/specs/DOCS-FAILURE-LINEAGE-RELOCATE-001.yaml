    - >-
      The relocation MUST use `git mv` so git tracks the rename
      explicitly (rather than recording it as a delete + add, which
      would lose blame continuity for the file's existing 692 lines).
      Reviewers should be able to follow `git log --follow
      docs/failure-lineage.md` across the rename and see the full
      history including Entry 17's authoring.
    - >-
      Reference updates MUST be a literal string substitution — no
      regex-based path rewriting that could match unintended
      occurrences (e.g., the substring "failure-lineage" inside
      "failure-lineage-archive" or similar). The eight in-scope files
      are inspected manually and updated with explicit Edit calls.
  performance:
    - >-
      Not applicable. This is a one-shot doc relocation; no runtime
      performance characteristic changes.
contracts: []
# --- Triage ----------------------------------------------------------------
# Origin
# ------
# Filed 2026-05-22 in response to session 13's recurring need to log
# failure-lineage entries while the lineage doc lives at a durability-
# fragile path inside the caws-cli package. The maintainer asked the
# agent during the session to log Entry 18 (the silent-push-of-parallel-
# session-commit incident); the agent attempted the edit and tripped
# the scope guard at strike 1 of 3 because the file is not in any
# active spec's scope.in. That strike was structurally correct —
# packages/caws-cli/docs-status/failure-lineage.md is foundational
# project documentation but lives inside a package's docs-status
# subdirectory where it does not belong.
#
# The relocation moves the file to docs/failure-lineage.md (top-level
# project docs) and updates references. Entry 18 is appended in the
# same chain so the lineage doc captures the very failure that
# prompted the relocation.
#
# Why now
# -------
# The session-13 push incident is the most recent in a series of
# multi-agent coordination failures. The lineage doc is the
# established place to record those. Continuing to keep it at the
# old path makes every future entry require either (a) scope
# laundering through an unrelated slice, or (b) a one-off doc slice
# every time. Relocating once removes that friction.
#
# Files updated by this slice
# ---------------------------
# Moved:
#   packages/caws-cli/docs-status/failure-lineage.md
#     -> docs/failure-lineage.md
#
# Reference path updates (literal string substitution,
# "packages/caws-cli/docs-status/failure-lineage.md"
# -> "docs/failure-lineage.md"):
#   1. README.md (line ~150, allowed-historical-references list)
#   2. AGENTS.md (line ~179, Entry 17 link)
#   3. .claude/hooks/CLAUDE.md (line ~23, agent guidance)
#   4. docs/architecture/caws-vnext-command-surface.md (line ~1001,
#      doctrine doc reference)
#   5. packages/caws-cli/src/init/hook-packs/manifest-claude-code.ts
#      (line ~9, source code comment)
#   6. packages/caws-cli/src/init/hook-packs/types.ts (lines ~23-24,
#      source code comment)
#   7. packages/caws-cli/templates/hook-packs/claude-code/CLAUDE.md
#      (line ~23, template reference)
#
# Files NOT updated (explicit non-edit):
#   - .caws/specs/HOOK-SAFETY-001.yaml — closed spec, historical
#     record of what was in scope when that slice was active.
#     Tampering with closed specs' scope arrays is doctrinally
#     forbidden.
#   - docs/rewrite/corpus/gate-outputs/fail.json — fixture/corpus
#     data documenting a historical failure case. Fixtures are
#     frozen.
#
# Template reference caveat
# -------------------------
# packages/caws-cli/templates/hook-packs/claude-code/CLAUDE.md is
# installed into OTHER user projects by `caws init --agent-surface
# claude-code`. After the move, the in-repo template references the
# correct path (docs/failure-lineage.md). But when installed into a
# user project, that project will not have docs/failure-lineage.md
# either — the file exists only in the CAWS repo.
#
# This is a pre-existing template productization defect, NOT created
# by this slice. The template should ideally point at a stable
# canonical URL (e.g., https://github.com/Paths-Design/coding-agent-
# working-standard/blob/main/docs/failure-lineage.md), but that is a
# separate concern recorded as a follow-up. This slice keeps the
# template's reference style (in-repo relative path) and updates the
# path. Productization-fix is OUT OF SCOPE.
#
# Hook pack version
# -----------------
# The Claude Code hook pack template (currently hook_pack_version: 2)
# is NOT bumped. The reference path string inside CLAUDE.md is a
# description, not a runtime contract; the rest of the pack functions
# unchanged. If a future productization fix changes the reference to
# a URL, that change MIGHT warrant a version bump (debatable —
# documentation is not behavior), but this slice does not touch pack
# version.
#
# Non-goals (explicit guards)
# ---------------------------
#   * No content rewrites in the moved file. Entries 1-17 move
#     byte-identically.
#   * No edits to closed specs (HOOK-SAFETY-001.yaml).
#   * No edits to fixture data (fail.json).
#   * No template version bump.
#   * No release / package version / CHANGELOG edits.
#   * No relocation of other docs-status files (legacy-test-reconcile-
#     001.md, quality-gates-report.json, slice-8c*-closure.md). Those
#     remain at their current path; relocating them is a separate
#     decision.
#   * No re-opening or amendment of any other slice.
#   * No new hook, no new CLI command, no new event schema.
#   * No fix to the template productization defect (template references
#     in-repo path that does not exist in user projects); recorded as
#     follow-up.
#
# Activation
# ----------
# Filed directly at lifecycle_state: active per maintainer instruction
# ("Do it now"). v11.1.6 ships no caws specs promote surface; this
# matches the established audit-quiet direct-YAML activation pattern.
# The git commit message is the audit trail.
#
# Closure
# -------
# Closure happens via `caws specs close DOCS-FAILURE-LINEAGE-RELOCATE-
# 001 --resolution completed --reason-file <path>` (the close-reason
# file pattern is unsupported in v11.1.6 directly — `--reason "<text>"`
# is the only option — but a closure_notes block in the YAML before
# closure provides the same audit value, and was the recovery option
# used after the session-13 closure-notes-drop incident; that pattern
# is reused here).
