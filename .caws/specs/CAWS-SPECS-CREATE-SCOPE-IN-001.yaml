id: CAWS-SPECS-CREATE-SCOPE-IN-001
title: 'caws specs create accepts --scope-in <path> to populate scope.in in the same governed write; repoint Next-steps at amend-scope'
risk_tier: 3
mode: feature
lifecycle_state: closed
resolution: completed
closure_notes: 'Shipped --scope-in flag on caws specs create; scope.in populated at creation, guidance points at amend-scope. 38 slice tests green, gates pass.'
created_at: '2026-05-30T07:50:13.721Z'
updated_at: '2026-05-30T08:42:59.982Z'
blast_radius:
  modules:
    - caws-cli specs command
    - caws-cli specs-writer store
    - caws-cli shell command-metadata
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - packages/caws-cli/src/store/specs-writer.ts
    - packages/caws-cli/src/shell/commands/specs.ts
    - packages/caws-cli/src/shell/command-metadata.ts
    - packages/caws-cli/tests/store/specs-create-scope-in.test.js
    - packages/caws-cli/tests/shell/specs-create-scope-in.test.js
    - packages/caws-cli/src/shell/register.ts
    - packages/caws-cli/tests/shell/specs.test.js
  out: []
invariants:
  - >-
    When --scope-in is supplied one or more times, the created spec's scope.in
    contains exactly those paths (in order, de-duplicated) and never the TODO
    placeholder; the paths are written in the same createSpec transaction, not a
    follow-on amend.
  - >-
    When --scope-in is omitted, behavior is unchanged: scope.in retains the
    single TODO placeholder line and the command output is byte-compatible with
    the prior create flow except for the amend-scope guidance line.
  - >-
    The create command's Next-steps guidance names `caws specs amend-scope` as
    the governed way to widen scope later, instead of instructing a raw YAML
    hand-edit as the only path.
acceptance:
  - id: A1
    given: a fresh .caws with no spec of the target id
    when: '`caws specs create ID --title T --mode feature --risk-tier 3 --scope-in a.ts --scope-in b.ts` runs'
    then: 'the written spec has scope.in == [a.ts, b.ts] with no TODO placeholder, lifecycle_state active, and exit 0'
  - id: A2
    given: a fresh .caws with no spec of the target id
    when: '`caws specs create ID ...` runs WITHOUT --scope-in'
    then: 'the written spec scope.in is the single TODO placeholder line, identical to prior behavior'
  - id: A3
    given: the same --scope-in path is supplied twice
    when: 'create runs'
    then: 'scope.in contains that path once (de-duplicated), preserving first-seen order'
  - id: A4
    given: a successful create (with or without --scope-in)
    when: 'the Next-steps guidance is printed'
    then: 'the guidance references `caws specs amend-scope` as the sanctioned way to add scope later'
non_functional: {}
contracts: []
