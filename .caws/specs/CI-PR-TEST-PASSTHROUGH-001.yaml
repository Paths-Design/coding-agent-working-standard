# --- Triage ----------------------------------------------------------------
# Surfaced by PR #3 CI run 26190854016. With the kernel typecheck fix
# unblocking Quick Sanity Checks, the downstream Test Suite job ran for the
# first time on a v11 PR and immediately failed at `npm run test:unit -- --coverage`.
#
# The root `test:unit` script in package.json is:
#   "test:unit": "turbo run test --coverage --passWithNoTests"
# So when the workflow runs `npm run test:unit -- --coverage --passWithNoTests`,
# npm strips the leading `--` and passes `--coverage --passWithNoTests` to
# the script (i.e. to `turbo run test`), and Turbo treats them as its own
# flags rather than as pass-through args. Turbo rejects them.
#
# Turbo's documented pass-through syntax requires `--` BEFORE the
# pass-through args: `turbo run test -- --coverage --passWithNoTests`.
# Through npm, that becomes `npm run test:unit -- -- --coverage --passWithNoTests`
# (double `--` because npm strips one).
#
# Alternative: bypass npm and invoke Turbo directly:
#   `npx turbo run test -- --coverage --passWithNoTests`
# This is more explicit and avoids the double-dash confusion.
#
# Recommendation: the npx turbo invocation. The double-dash form is a
# known JavaScript-ecosystem footgun that future maintainers will trip
# over again. Direct invocation makes the intent obvious.
#
# This is the second NEW spec activated on the feat/ci-v11-workflow-repair
# branch after the original two (CI-CAWS-GATE-V11-SURFACE-001,
# CI-KERNEL-WORKSPACE-TYPECHECK-001). The branch's purpose — CI substrate
# repair — accommodates governing this third defect under its own spec
# rather than smuggling it into one of the existing specs' scopes.
