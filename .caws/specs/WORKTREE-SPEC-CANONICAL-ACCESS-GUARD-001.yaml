invariants:
  - 'I1: The canonical-spec-materialization refusal in worktree-write-guard.sh MUST run BEFORE the existing .caws/* allowlist. If placed after, the allowlist exits 0 for .caws/specs/* and the slice appears implemented while the target path still bypasses the guard.'
  - 'I2: The refusal MUST distinguish WORKTREE_ROOT (cwd / Claude project dir being operated from) from CANONICAL_ROOT (repo root resolved upward from GIT_COMMON_DIR). The refused path is under the LINKED worktree''s .caws/specs/*, not necessarily under the canonical root. The existing PROJECT_DIR-rewrites-to-canonical pattern in worktree-write-guard.sh is useful for broad allowlisting but MUST NOT be reused for this specific path check.'
  - 'I3: Linked-worktree detection MUST use git as primary signal — GIT_COMMON_DIR != GIT_DIR after realpath normalization. CAWS registry (.caws/worktrees.json) is consulted for diagnostic enrichment only (naming the bound spec); a registry desync MUST NOT suppress the refusal.'
  - 'I4: This slice MUST NOT modify packages/caws-cli/src/store/git-sparse-checkout.ts. The repair-sparse command calls configureWorktreeSparseCheckout as-is.'
  - 'I5: This slice MUST NOT modify any dispatcher file under templates/hook-packs/claude-code/dispatch/. The PreToolUse dispatcher already routes Read|Write|Edit|Bash to the handler chain; only the handler''s internal tool_name allowlist is widened.'
  - 'I6: The git sparse-checkout refusal in worktree-guard.sh MUST remain a blanket agent-Bash refusal (no per-subcommand allowlist for `set` / `init`). The CLI repair path bypasses Claude Bash hooks via configureWorktreeSparseCheckout, so allowing `set` from agent Bash is unnecessary. Only the diagnostic text changes.'
  - 'I7: repair-sparse MUST be non-destructive. No stash, no git clean, no reset --hard, no file deletion. Dirty or untracked content under <worktree>/.caws/specs/ MUST cause repair-sparse to refuse with a typed diagnostic and a manual recovery path. The lineage record on stash/destroy as a work-loss class is explicit; do not regress it.'
  - 'I8: CLAUDE_CODE_PACK_VERSION MUST be bumped from 4 to 5. Both worktree-write-guard.sh and worktree-guard.sh per-file hook_pack_version headers MUST be bumped to 5 (matching the manifest constant), per the precedent that template-behavior changes require version lockstep.'
  - 'I9: The refusal MUST be canonical-spec-materialization refusal, not generic spec-access refusal. The diagnostic wording MUST NOT claim that linked worktrees cannot materialize .caws/specs/ as an absolute fact — hostile/manual writes can create those files. The claim is that CAWS does not treat such files as authority and that creating/reading them via tool calls is refused.'
acceptance:
  - id: A1
    given: 'A linked git worktree (GIT_COMMON_DIR != GIT_DIR after realpath normalization) with cwd inside that worktree. The PreToolUse dispatcher invokes worktree-write-guard.sh.'
    when: 'A Read, Write, or Edit tool call targets a path under <worktree-root>/.caws/specs/ — e.g., .caws/specs/SOMESPEC.yaml or .caws/specs/.archive/X.yaml.'
    then: 'The handler exits 2. Stderr contains the canonical-spec-materialization refusal diagnostic prefixed by [worktree-write-guard.sh], naming the target path, naming the canonical authority CLI (`caws specs show <id>`), and naming `caws worktree repair-sparse <name>` as the sparse-invariant recovery path. The refusal MUST fire BEFORE the existing .caws/* allowlist would have exited 0.'
  - id: A2
    given: 'A linked git worktree with cwd inside that worktree, and worktree-write-guard.sh active.'
    when: 'A Read, Write, or Edit tool call targets a path under the worktree that is NOT under .caws/specs/ — e.g., packages/caws-cli/src/index.ts, README.md, .caws/worktrees.json (read), tests/foo.test.js, or .caws/leases/<id>.json.'
    then: 'The handler exits 0. No canonical-spec-materialization diagnostic appears in stderr. The .caws/* allowlist behavior for non-spec paths is preserved exactly as it is in worktree-write-guard.sh v4.'
  - id: A3
    given: 'A canonical checkout (or any cwd where worktree-guard.sh runs) with worktree-guard.sh active in the PreToolUse chain.'
    when: 'A Bash tool call contains any `git sparse-checkout` invocation — including `disable`, `set`, `init`, or `reapply`.'
    then: 'The handler exits 2 (existing v4 behavior preserved). Stderr contains the upgraded canonical-spec-materialization diagnostic prefixed by [worktree-guard.sh]: explains that disabling sparse-checkout would materialize canonical .caws/specs/ inside the linked worktree as non-authoritative private copies; names `caws worktree repair-sparse <name>` as the sanctioned recovery path; names `caws specs show <id>` as the authorized read path. The vague v4 wording (`Use full worktrees without sparse-checkout.`) is NOT present.'
  - id: A4
    given: 'A linked git worktree registered in .caws/worktrees.json with sparse-checkout disabled (core.sparseCheckout=false or absent) and .caws/specs/ materialized in the worktree. The worktree''s .caws/specs/ tree is clean (no dirty or untracked files relative to HEAD).'
    when: '`caws worktree repair-sparse <name>` is invoked from the canonical checkout.'
    then: 'The command exits 0. Post-condition: core.sparseCheckout=true on the worktree, the sparse-checkout pattern is `/*` + `!/.caws/specs/`, and .caws/specs/ is absent from the worktree filesystem. Re-running the command on the now-healthy worktree exits 0 with a no-op diagnostic (idempotency).'
  - id: A5
    given: 'Five distinct preconditions, each tested independently: (a) <name> does not exist in .caws/worktrees.json registry; (b) registry entry exists but the on-disk path is missing; (c) <name> resolves to the canonical checkout itself (not a linked worktree); (d) registry entry exists and on-disk path exists but is NOT a git worktree (e.g., a stale directory after manual git worktree remove); (e) the worktree''s .caws/specs/ contains at least one dirty or untracked file (git status --porcelain .caws/specs/ non-empty).'
    when: '`caws worktree repair-sparse <name>` is invoked from the canonical checkout.'
    then: 'The command exits non-zero (typically 1) in each case with a typed diagnostic naming the specific failure: missing-registry, missing-path, canonical-target-refused, not-a-worktree, dirty-specs-refused. No stash, no git clean, no reset --hard, no file deletion is attempted. The worktree state is unchanged after the refusal. The dirty-specs diagnostic includes a manual recovery path (`commit or remove the dirty files first, then re-run repair-sparse`).'
  - id: A6
    given: 'A linked git worktree created via caws worktree create (sparse-checkout configured correctly per A1 of WORKTREE-SPEC-AUTHORITY-CONTROL-PLANE-001) OR with a hostile manual write at <worktree>/.caws/specs/<id>.yaml. The test for `caws specs show` already exists at tests/shell/specs-show-worktree-cwd.test.js as the A2 narrow regression for WORKTREE-SPEC-AUTHORITY-CONTROL-PLANE-001.'
    when: '`caws specs show <id>` and `caws scope show <path>` are invoked with cwd set inside the linked worktree.'
    then: 'Both commands resolve the spec/scope through the canonical control-plane store (via resolveRepoRoot using git rev-parse --git-common-dir), NOT through any worktree-local materialized file. The existing test at tests/shell/specs-show-worktree-cwd.test.js continues to pass. A companion assertion proves the same for `caws scope show`. No regression of these read-authority commands when worktree-write-guard.sh tool_name allowlist is widened.'
  - id: A7
    given: 'The hook pack manifest at packages/caws-cli/src/init/hook-packs/manifest-claude-code.ts and the per-file hook_pack_version headers at the top of worktree-write-guard.sh and worktree-guard.sh.'
    when: 'tests/init/hook-packs/install.test.js runs.'
    then: 'CLAUDE_CODE_PACK_VERSION === 5 in the manifest. Both worktree-write-guard.sh and worktree-guard.sh per-file `hook_pack_version: 5` headers match. Both files appear in installedFiles with managed: true. The lineage table in templates/hook-packs/claude-code/CLAUDE.md is updated to add the new lineage reference for both touched files.'
  - id: A8
    given: 'The repository-level CLAUDE.md and docs/architecture/caws-vnext-command-surface.md.'
    when: 'Doctrine is consulted for worktree-spec discipline guidance.'
    then: 'Both docs name the rule: do not run `git sparse-checkout disable` in CAWS worktrees; do not Read/Write/Edit <worktree>/.caws/specs/* directly; use `caws specs show <id>` for read and `caws worktree repair-sparse <name>` for sparse-invariant recovery. The rule is phrased as canonical-spec-materialization (the why), not as an absolute statement that the files cannot exist.'
non_functional:
  reliability:
    - 'The widening of worktree-write-guard.sh tool_name allowlist from `Write|Edit` to `Read|Write|Edit` MUST NOT cause false positives outside .caws/specs/*. The refusal predicate is a conjunction: (tool_name in {Read,Write,Edit}) AND (is_linked_worktree via git signal) AND (path under <worktree-root>/.caws/specs/). Removing any conjunct widens refusal beyond the slice scope and is a regression.'
    - 'The canonical-checkout case (GIT_COMMON_DIR == GIT_DIR) MUST pass through unchanged for all paths including .caws/specs/*. The canonical checkout IS authority; refusing reads there would break the editing workflow on canonical and is explicitly out of scope for this slice.'
    - 'repair-sparse MUST resolve target paths through realpath normalization before comparing against canonical-checkout identity. macOS /var vs /private/var symlink drift has been a test-failure class previously; the comparison MUST be drift-immune.'
contracts:
  - type: behavior
    name: canonical-spec-authority-materialization-guard-v1
    path: packages/caws-cli/tests/integration/lite-hooks.test.js
    description: 'Behavioral contract: from inside a linked CAWS worktree, the PreToolUse hook chain refuses Read/Write/Edit targeting <worktree-root>/.caws/specs/* before any allowlist can bypass; the agent-Bash sparse-checkout refusal carries canonical-spec-materialization wording and points to caws worktree repair-sparse; caws worktree repair-sparse is first-class, idempotent, non-destructive, and restores sparse invariant on healthy targets while refusing dirty targets without destructive cleanup; canonical CLI spec/scope access from a linked worktree cwd continues to resolve through canonical authority.'
