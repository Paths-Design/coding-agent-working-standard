# --- Risk tier note --------------------------------------------------------
# Activated at risk_tier: 1 because this slice changes a canonical command
# surface and removes the production subprocess path. Contracts,
# observability, and rollback are recorded above.
#
# --- Preconditions (informational; schema does not admit a preconditions field) ---
# - QG-HOOKS-EXTRACT-001 is closed (hook replacements exist).
# - QUALITY-GATES-PACKAGE-DEPRECATE-001 is closed (deprecation is on record).
#
# --- Decision options ------------------------------------------------------
#
# Option A — Hooks event reader
#   caws gates run no longer spawns caws-quality-gates. It evaluates policy
#   against hook outcomes already recorded in events.jsonl or companion hook
#   artifacts.
#   Pros: cleanest hooks-first architecture; no subprocess contract.
#   Cons: requires a reliable hook event schema and hooks that emit events
#     (current hooks log to .claude/logs/ but do not append to events.jsonl).
#
# Option B — Minimal CI gate runner (recommended TRANSITION)
#   caws gates run remains, but only runs small CI-time checks that are not
#   expressible as single-file hooks. Subprocess to caws-quality-gates is
#   replaced with in-process checks or removed entirely.
#   Pros: preserves v11 command surface; shrinks dependency surface; allows
#     incremental cutover without doctrine change.
#   Cons: a thin runner still exists and must be maintained.
#
# Option C — Deprecate command (recommended TARGET)
#   caws gates run is removed from the v11 command surface. Equivalent
#   intent is served by hooks (synchronous safety) plus caws doctor and
#   caws evidence (read-only state queries).
#   Pros: cleanest long-term model; aligns with hooks-first posture.
#   Cons: doctrine change; affects external workflows and CI pipelines
#     that invoke `caws gates run`.
#
# --- Recommended path: B as transition, A as target ------------------------
# Option B preserves the v11 contract while removing the broken subprocess
# dependency. Once hooks reliably append gate_evaluated events (a separate
# follow-up), option A becomes feasible. Option C should not be pursued
# until external usage of caws gates run is surveyed.
#
# This slice does not have to lock in the final option; it only requires
# that ONE option be chosen, recorded, and implemented. The decision can be
# revisited in a successor slice.
#
# --- Follow-up carried in from CAWS-DEAD-TEMPLATE-V10-RESIDUE-CLEANUP-001 ---
# When quality-gates is retired under this spec, also remove the five
# .caws config files that exist ONLY as inputs to packages/quality-gates
# and have no other live reader:
#   .caws/code-freeze.yaml          (check-code-freeze.mjs, run-quality-gates.mjs)
#   .caws/quality-exceptions.json   (shared-exception-framework.mjs)
#   .caws/duplication-exceptions.yaml (check-duplication.mjs, check-functional-duplication.mjs)
#   .caws/refactor-baselines.yaml   (monitor-refactoring-progress.mjs)
#   .caws/refactor-targets.yaml     (monitor-refactoring-progress.mjs)
# They were deliberately excluded from the template-residue cleanup (and from
# the earlier CAWS-DEAD-CAWS-CONFIG-CLEANUP-001) because they still have live
# readers; their removal is coupled to the package-retirement decision here,
# not to v10 residue cleanup.
