id: CAWS-SPECS-ARCHIVE-BATCH-FEEDBACK-001
title: 'caws specs archive: --filter/--all-closed batch selector with dry-run, JSON schema, and chain-verified summary'
risk_tier: 2
mode: chore
lifecycle_state: active
created_at: '2026-05-28T21:41:56.808Z'
updated_at: '2026-05-28T21:41:56.808Z'
blast_radius:
