invariants:
  - 'An Edit that leaves an already-over-threshold file at roughly the same SLOC (delta below the large-addition threshold) produces NO advisory output and exits 0.'
  - 'An Edit (or Write) that CROSSES the threshold (file was under, now over) still produces the advisory.'
  - 'An Edit that adds a large delta (>= CAWS_GOD_OBJECT_DELTA) to an already-over file still produces the advisory (a big growth is still signal even past threshold).'
  - 'The hook remains advisory: it NEVER blocks and ALWAYS exits 0, unchanged.'
  - 'SHARED_PACK_VERSION is bumped (7->8) and pack-fingerprints.json re-baselined. The live .claude/hooks copy is NOT hand-patched: this repo''s live surface is a pre-shared-core v16 snapshot (different version namespace) refreshed via `caws init`, not a byte mirror of the shared template.'
acceptance:
  - id: A1
    given: 'an already-over-threshold file (SLOC 2004, threshold 2000)'
    when: 'an Edit adds 2 lines (SLOC 2004 -> 2006, delta below the large-addition threshold)'
    then: 'the hook emits no advisory and exits 0 — the noise-on-every-edit behavior is gone'
  - id: A2
    given: 'a file at SLOC 1990 (under threshold 2000)'
    when: 'an Edit adds 20 lines (SLOC 1990 -> 2010, crossing the threshold)'
    then: 'the hook emits the advisory (threshold-crossing is still signal)'
  - id: A3
    given: 'an already-over-threshold file'
    when: 'an Edit adds a large delta (>= CAWS_GOD_OBJECT_DELTA lines)'
    then: 'the hook emits the advisory (large growth past threshold is still signal)'
  - id: A4
    given: 'any of the above'
    when: 'the hook runs'
    then: 'it exits 0 in all cases — the change never makes the advisory blocking'
