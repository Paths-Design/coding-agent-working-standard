# DIAGNOSIS (grounded against canonical source, 2026-06-20):
#
# god-object-check.sh fires the advisory whenever SLOC > THRESHOLD
# (CAWS_GOD_OBJECT_LOC, default 2000) on EVERY Write/Edit. It has no memory of
# the prior size, so a file already over the threshold re-warns on every single
# edit — even a 2-line change. Observed in the migration session: adding ~30
# lines to classify_command.py pushed it 2004 -> 2006 and tripped the advisory
# on every edit. A 2-over advisory on a small addition to an already-over file
# is noise, not signal — and noise trains the agent to ignore the advisory,
# which defeats the one job an advisory hook has.
#
# FIX: make the advisory delta/hysteresis-aware. Warn only when EITHER (a) this
# edit crosses the threshold (was under, now over), OR (b) this edit adds a
# large delta (e.g. >= CAWS_GOD_OBJECT_DELTA, default ~100 SLOC). An edit that
# leaves an already-over file roughly the same size (or shrinks it) is silent.
#
# DESIGN NOTE — where does "prior size" come from? Two candidate sources, to be
# decided in implementation: (1) the Edit payload's old_string/new_string diff
# (no state file needed — compute the SLOC delta of the edit itself; this is the
# loc-delta-check.sh approach and is preferable — stateless, no on-disk sentinel
# to gitignore); (2) a per-file last-seen-SLOC sentinel (stateful, more precise
# for threshold-crossing but adds a state file). Prefer (1): for Edit, derive
# delta from the payload; for Write of a wholly new file, the file IS the delta
# so warn iff the new file is itself over threshold. This keeps the hook
# stateless and consistent with loc-delta-check.sh.
#
# NON-CLAIM: this does not change the SLOC counter (still the simple strip-
# comments/blanks heuristic) and does not couple to packages/quality-gates.
# It changes ONLY when the advisory fires, never that it stays advisory/exit-0.
