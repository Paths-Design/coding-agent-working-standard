id: CAWS-GOD-OBJECT-CHECK-HYSTERESIS-001
title: 'god-object-check: warn only on threshold-crossing or large additions, not every edit to an already-over file'
risk_tier: 3
mode: fix
lifecycle_state: closed
resolution: completed
closure_notes: 'Auto-closed by caws worktree merge wt-god-object-hysteresis at c919137a32eda1bb10642d63d5161c4a195df300'
