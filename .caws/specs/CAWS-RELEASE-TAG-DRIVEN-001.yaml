id: CAWS-RELEASE-TAG-DRIVEN-001
title: 'Tag-driven release for @paths.design/caws-cli (v1: CLI-only; kernel CI publish deferred)'
risk_tier: 2
mode: chore
lifecycle_state: active
created_at: '2026-05-21T00:00:00.000Z'
updated_at: '2026-05-21T02:00:00.000Z'
blast_radius:
  modules:
    - .github/workflows/release.yml
    - scripts/release-tag-publish.mjs
    - docs/release-procedure.md
    - CLAUDE.md
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - .github/workflows/release.yml
    - scripts/release-tag-publish.mjs
    - packages/caws-cli/tests/scripts/release-tag-publish.test.js
    - docs/release-procedure.md
    - CLAUDE.md
    - .caws/specs/CAWS-RELEASE-TAG-DRIVEN-001.yaml
    - packages/caws-cli/CHANGELOG.md
  out:
    - .caws/policy.yaml
    - .caws/events.jsonl
    - packages/caws-kernel/src
    - packages/caws-cli/src
    - packages/caws-cli/package.json
    - packages/caws-kernel/package.json
    - packages/quality-gates
    - scripts/multi-package-release.mjs
    - scripts/release-guard-dry-run.mjs
    - scripts/release-guard-commit-analyzer-check.mjs
    - scripts/release-guard-scope-audit.mjs
invariants:
  - 'Release intent is human-explicit and tag-encoded. A package version is published if and only if a corresponding `<package>-v<version>` git tag is pushed to the remote. Branch-push to main does NOT trigger publishes.'
  - 'Failure invariant is ASYMMETRIC (not "tag iff registry"). Pre-publish failure: if any step before `npm publish` fails (build, prepublish smoke, version validation, auth verification), the workflow deletes or quarantines the pushed tag and surfaces a recovery command; the registry remains untouched. Post-publish failure: if `npm publish` succeeds but a downstream ancillary step (GitHub Release creation, registry verification poll, log emission) fails, the workflow MUST NOT delete the tag — the registry is authoritative and the tag is the provenance anchor; the workflow surfaces a precise repair command (e.g., "gh release create <tag> --notes-file <path>") and exits non-zero. Tag-without-registry is an error state requiring explicit repair, never silent success.'
  - 'No semantic-release-driven version bumps from CI. The current pipeline (semantic-release + multi-package-release.mjs) computes the next version from commit messages and PUSHES a `chore(release): @paths.design/caws-cli@X.Y.Z` commit back to main. That push race against contributors is the structural cause of three ghost releases in the v11.1.x cascade. Replace with: humans tag deliberately; CI publishes the tagged version verbatim.'
  - 'Semantic-release removal is RUTHLESS, not partial. After this slice, `.github/workflows/release.yml` MUST NOT invoke `semantic-release` in any mode that can mutate Git state (no `@semantic-release/git`, no tag creation, no version-bump commits). If semantic-release is retained for CHANGELOG generation only, it MUST run with `--dry-run` and ONLY in PR-advisory paths, never on the tag-trigger workflow. A grep for `semantic-release` in `release.yml` must return zero matches on the publish path.'
  - 'Package version is committed BEFORE tagging. The maintainer manually bumps `packages/<pkg>/package.json` and commits it; THEN tags. The release workflow does NOT modify `package.json`. CI validates that the tag version equals the package.json version at the tag checkout — mismatch fails before npm publish.'
  - 'Release-guard layers are preserved as PR-time CI, not release-time. Layer 1 (releaseRules deny-list), Layer 2 (workflow trigger paths), and Layer 3 (shipping-file classifier) become DRY-RUN advisory checks on every PR via the existing release-guard-dry-run.mjs and release-guard-commit-analyzer-check.mjs harnesses. Their job is to tell reviewers what a release WOULD do; the human decides whether to tag.'
  - 'CHANGELOG generation is decoupled from publishing. The current pipeline conflates "compute next version from commits" + "generate CHANGELOG" + "publish to npm" into one transaction. This slice separates them: CHANGELOG fragments are authored/generated locally and committed BEFORE the tag-push; the tag-push triggers only the build + publish + GitHub Release creation. If the tag commit has no matching CHANGELOG section, the workflow fails before npm publish.'
  - 'Multi-package tagging convention is unambiguous and CANONICAL: `caws-cli-vX.Y.Z` and `caws-kernel-vX.Y.Z`. Legacy `v*` tags are NOT a normal publish path. They are accepted only for historical record (existing tags on origin are not retroactively rewritten); pushing a NEW `v*` tag does not publish. The workflow refuses bare `v*` tags with a clear error pointing at the new convention.'
  - 'Refused release-pattern tags are DELETED, not silently observed. The workflow triggers on all release patterns it can refuse (`caws-cli-v*`, `caws-kernel-v*`, `v*` in v1). When a refused tag is observed, the workflow refuses with structured logs AND deletes the tag from origin via `gh api -X DELETE /repos/{owner}/{repo}/git/refs/tags/{tag}`. "Silent non-trigger" is not the same contract as "refused with deletion" — silent triggers leave refused tags as false release evidence. In v1, the `caws-kernel-v*` prefix is RESERVED, not valid; a future kernel CI publish slice will accept it.'
  - 'Coupled releases are ORDERED, OBSERVABLE, AND REPAIRABLE — not atomic. npm does not provide cross-package transactionality. The release procedure for coupled changes (e.g., kernel schema change consumed by cli) is: publish kernel first; verify registry; publish cli second; if cli fails, kernel remains published and cli is retried. The maintainer pushes two tags in deliberate order. The workflow does NOT attempt to roll back the kernel publish if the cli publish fails.'
  - 'Tarball-truth and release-guard scope-audit remain hard CI gates on every PR. The substrate verification this cascade relied on (PR #3''s tarball-truth hard-block, PR #1''s incident-class harnesses) does NOT regress with this slice.'
acceptance:
  - id: A1
    given: 'A commit lands on main via PR merge. The commit touches packages/caws-cli/src.'
    when: 'No `caws-cli-v*` tag is pushed.'
    then: 'No release workflow runs. No npm publish happens. CHANGELOG is not updated. Branch-push triggers nothing release-related.'
  - id: A2
    given: 'A maintainer has committed a package.json version bump to 11.1.5 and a matching CHANGELOG section, then runs `git tag caws-cli-v11.1.5` and `git push origin caws-cli-v11.1.5`.'
    when: 'The Release workflow runs.'
    then: 'The workflow (a) checks out the tag SHA, (b) validates `packages/caws-cli/package.json` version equals 11.1.5 — mismatch FAILS before publish, (c) validates a CHANGELOG section for 11.1.5 exists — missing FAILS before publish, (d) builds caws-cli only, (e) runs prepublishOnly fresh-install smoke, (f) runs `npm publish` with the configured auth, (g) polls `npm view` to verify registry now has 11.1.5, (h) creates the GitHub Release with the CHANGELOG section as body. Success state: registry has 11.1.5 AND tag remains on origin AND GitHub Release exists.'
  - id: A3
    given: 'Pre-publish failure (any of A2 steps a–e fails).'
    when: 'The workflow detects the failure before `npm publish`.'
    then: 'The workflow deletes the tag from origin (or, if tag deletion is blocked by branch/tag protection, marks the tag with an annotated failure ref and surfaces a precise manual repair command). The registry remains untouched. The workflow exit code is non-zero. No GitHub Release is created.'
  - id: A4
    given: 'Post-publish ancillary failure: `npm publish` succeeded (registry has the new version) but GitHub Release creation OR registry-verification poll OR log emission fails.'
    when: 'The workflow detects the ancillary failure.'
    then: 'The workflow DOES NOT delete the tag. The tag is the provenance anchor for the published version. The workflow emits a precise repair command (e.g., `gh release create caws-cli-v11.1.5 --notes-file CHANGELOG-11.1.5.md` or equivalent) and exits non-zero. A subsequent manual run of the repair command completes the publish without re-publishing to npm.'
  - id: A5
    given: 'V1 NARROWING: A maintainer pushes `caws-kernel-v1.1.2`.'
    when: 'The Release workflow runs.'
    then: 'The workflow OBSERVES the tag (kernel-v* IS a release trigger pattern in v1) and REFUSES it with a clear error: "kernel CI publish is not enabled in v1 — publish caws-kernel manually for now; see docs/release-procedure.md." The refused tag IS DELETED from origin via `gh api`. No build, no publish. Exit code 10 on successful refusal-with-deletion, 11 if deletion also failed. The `caws-kernel-v*` prefix is RESERVED in v1, not valid — leaving the tag in place would create "tag exists, package does not" ambiguity. A future kernel CI publish slice will accept the prefix.'
  - id: A6
    given: 'V1 narrowing applies: kernel publish is manual; cli publish is CI tag-driven.'
    when: 'The maintainer publishes caws-kernel@1.1.2 manually, verifies registry, then pushes `caws-cli-v11.1.5`.'
    then: 'The cli tag publish runs. The procedure documentation in A11 explicitly states the v1 narrowing: kernel is manual until a follow-up slice activates kernel CI publish. Coupled-release ordering remains "ordered, observable, repairable" — the maintainer is the orderer in v1.'
  - id: A7
    given: 'A PR is opened with shipping changes per Layer 3 classifier.'
    when: 'PR Quality Gates run.'
    then: 'The release-guard dry-run advisory runs and reports what a tag-push for this commit would publish. It does NOT publish. It does NOT push a version-bump commit. It is informational only. A grep for `semantic-release` in `release.yml` returns zero matches on the tag-trigger publish path; semantic-release, if retained, runs only in `--dry-run` advisory mode on PR paths.'
  - id: A8
    given: 'A maintainer pushes a NEW bare legacy tag `v11.1.6` (the v11.0–v11.1.4 caws-cli convention).'
    when: 'The Release workflow runs.'
    then: 'The workflow OBSERVES the tag (v* IS a release trigger pattern) and REFUSES it with a clear error pointing at the new convention (`caws-cli-vX.Y.Z`). The pushed bare-v tag IS DELETED from origin via `gh api`. No publish happens. Exit code 10. Existing historical `v*` tags on origin (created before this slice activated) are NOT rewritten — the refusal applies only to NEWLY-PUSHED bare-v tags. To recover, the maintainer re-tags with the canonical convention.'
  - id: A9
    given: 'A maintainer pushes a tag for a version that already exists on npm (e.g., re-tagging `caws-cli-v11.1.4`).'
    when: 'The workflow runs.'
    then: 'npm publish refuses with E409 or equivalent. The workflow surfaces the registry-conflict error clearly. The tag MAY remain (the registry is authoritative; a tag pointing at an already-published version is harmless if intentional, e.g., re-tagging the same content). No half-state is created.'
  - id: A10
    given: 'A new release procedure is in effect.'
    when: 'CI runs the release workflow on a tag push.'
    then: 'The release workflow does NOT modify `packages/<pkg>/package.json` in any way — no version bumps, no commits pushed back to main, no PRs opened. The workflow''s only Git operation against the remote is (a) tag deletion in the pre-publish-failure path, OR (b) the GitHub Release creation API call. No `git push origin main` from CI on the release workflow path.'
  - id: A11
    given: 'CLAUDE.md and docs/release-procedure.md are present after this slice.'
    when: 'A maintainer reads them.'
    then: 'Both documents describe the new tag-driven procedure: (1) verify release-guard-dry-run is happy locally on the PR, (2) author/update the CHANGELOG section for the target version, (3) bump `packages/<pkg>/package.json` version to match, (4) commit both as a single non-shipping commit on main, (5) tag with the canonical convention (`caws-cli-vX.Y.Z` or `caws-kernel-vX.Y.Z`), (6) push tag, (7) verify npm registry shows the new version, (8) verify GitHub Release was created. The asymmetric failure invariant (pre-publish vs post-publish) is documented. The coupled-release ordering procedure is documented. The old "merge to main and let CI auto-publish" procedure is explicitly retired with a pointer to this spec.'
non_functional:
  reliability:
    - 'Failure modes are honest and ASYMMETRIC. Pre-publish failures rollback the pushed tag and leave the registry untouched. Post-publish ancillary failures preserve the tag (the registry is authoritative) and surface a precise repair command. Never silently "succeed" with a tag-without-registry or registry-without-tag mismatch.'
    - 'No race conditions with concurrent main pushes. Tag-driven trigger is immune to "branch behind remote" semantic-release rejections by construction. The release workflow never writes to main.'
    - 'Every release workflow run emits a structured log line naming the tag, the parsed package + version, prepublish smoke verdict, npm publish exit code, registry-verification poll result, and GitHub Release creation result. Observability is a reliability concern.'
    - 'Tag-deletion permission is verified at workflow init. If `contents: write` is not available (e.g., due to branch/tag protection), the workflow uses the "mark failed, require manual deletion" path with a precise command surfaced to the maintainer. The choice is logged on every run.'
  performance:
    - 'A tag push triggers exactly one workflow run; publish completes in under 5 minutes wall-clock for typical packages.'
contracts:
  - name: 'branch-push-never-publishes'
    type: behavior
    description: 'A branch push to main NEVER publishes a package. The release workflow has no `branches: [main]` trigger; only `tags:` triggers.'
  - name: 'tag-naming-canonical-only'
    type: behavior
    description: 'Only canonical `caws-cli-vX.Y.Z` tags trigger a caws-cli publish. Bare `v*` tags and `caws-kernel-v*` tags are OBSERVED by the workflow (all three patterns are triggers) and EXPLICITLY refused in v1 with structured logs, then DELETED from origin so they cannot become false release evidence.'
  - name: 'tag-version-equals-package-json'
    type: behavior
    description: 'Tag version must equal `packages/caws-cli/package.json` version at the tag checkout SHA. Mismatch fails before `npm publish`.'
  - name: 'changelog-section-required'
    type: behavior
    description: 'Tag version must have a matching section in `packages/caws-cli/CHANGELOG.md` at the tag checkout SHA. Missing section fails before `npm publish`.'
  - name: 'pre-publish-failure-deletes-tag'
    type: behavior
    description: 'Pre-publish failures (validation, build, smoke) delete the pushed tag via `gh api -X DELETE repos/{owner}/{repo}/git/refs/tags/{tag}`. The registry remains untouched.'
  - name: 'post-publish-failure-preserves-tag'
    type: behavior
    description: 'Post-publish failures (registry verification poll, GitHub Release creation, log emission) PRESERVE the tag. The workflow emits a precise repair command and exits non-zero. npm registry success is treated as irreversible.'
  - name: 'workflow-never-writes-to-main'
    type: behavior
    description: 'The release workflow NEVER writes to `packages/caws-cli/package.json`, `packages/caws-cli/CHANGELOG.md`, any other tracked file, or `main`. No `git push`, no `git commit` operations against the remote main branch from the release workflow.'
  - name: 'no-semantic-release-on-publish-path'
    type: behavior
    description: 'The release workflow contains zero invocations of `semantic-release`. `scripts/multi-package-release.mjs` is NOT called from `release.yml`. The semantic-release dependency may remain in `package.json` for PR-advisory tooling but is not executed on the publish path.'
# --- Triage ----------------------------------------------------------------
#
# V1 NARROWING (locked in by 2026-05-21 implementation directive):
#
#   V1 publishes ONLY @paths.design/caws-cli via CI.
#   V1 ACCEPTS:  `caws-cli-vX.Y.Z`
#   V1 REFUSES:  bare `v*` tags (no legacy path)
#   V1 REFUSES:  `caws-kernel-v*` tags with explicit "kernel CI publish
#                is not enabled yet — publish manually" error.
#
#   The implementation is table-driven so kernel can be added in a
#   follow-up slice without rewriting the workflow. The PACKAGES table
#   in scripts/release-tag-publish.mjs has ONE entry (caws-cli) and a
#   refused list including the kernel tag prefix. Adding kernel is a
#   one-line table change.
#
#   Why this is narrower than the original spec scope: adding kernel CI
#   publish is a NEW release surface (kernel was never published via
#   CI; all three published versions were manual). Combining "remove
#   semantic-release from the live CLI path" with "introduce first-ever
#   kernel CI publishing" multiplies risk on the same slice.
#
# SECOND V1 NARROWING: scripts/multi-package-release.mjs is NOT
#   deleted in this slice. It is REMOVED from the release workflow but
#   left in place because release-guard advisory scripts
#   (release-guard-dry-run.mjs, release-guard-commit-analyzer-check.mjs,
#   release-guard-scope-audit.mjs) import internals from it. Deleting
#   it now would break PR-time guards while repairing release-time
#   behavior. A follow-up slice will extract the classifier internals
#   to scripts/release-guard-lib.mjs and update advisory script
#   imports, then delete multi-package-release.mjs.
#
# Surfaced by the v11.1.x cascade (PRs #3, #1, #4, #5 + manual recovery
# commits). Three ghost releases in two sessions:
#
# 1. v11.1.3 attempt 1 (PR #4 merge): EINVALIDNPMTOKEN at npm verify
#    step. Tag pushed, package.json bumped on main, npm publish never
#    happened. Recovered by manual local `npm publish` after token
#    refresh.
#
# 2. v11.1.4 attempt 1 (PR #5 merge): semantic-release refused with
#    "The local branch main is behind the remote one, therefore a new
#    version won't be published." Root cause: my closure commit
#    (de3ad9a chore(caws): close WORKTREE-MERGE-CLEARS-SPEC-BINDING-001)
#    was pushed to main BEFORE the release workflow finished. Workflow
#    checked out PR #5's merge SHA, saw main was ahead, refused. No
#    tag created.
#
# 3. v11.1.4 attempt 2 (manual chore(release) commit): I bumped versions
#    + created tag + pushed. CI ran the release workflow, but the
#    shipping classifier said "no changes since lastTag=v11.1.4 — skip"
#    because my push had already created the tag. Pre-existing-tag
#    + same-run-skip race. No publish.
#
# In every case, the manual local `npm publish` worked. The CI publish
# step has never been the reliable one in this two-session arc.
#
# The current architecture forces semantic-release to do too much:
#   - decide the next version from commit messages
#   - generate CHANGELOG
#   - bump package.json on main (push back through HTTPS)
#   - tag the commit
#   - publish to npm
#   - create a GitHub Release
#
# Each of these steps has its own failure mode. The composition is a
# multi-stage transaction with no rollback at the seam between "tag +
# version bump pushed" and "npm publish succeeded". When publish
# fails, main is left in a half-published state that the next workflow
# run cannot recover from (because the tag now exists, so the
# shipping classifier skips).
#
# Tag-driven release inverts this:
#   - Humans (or a deliberate `npm version` + CHANGELOG script) decide
#     the version and write CHANGELOG locally.
#   - Humans push the tag deliberately. This is the "I want to publish
#     this now" signal.
#   - CI does ONE thing: build the tagged content, run prepublishOnly,
#     run `npm publish`, create GitHub Release.
#   - If publish fails, CI deletes the tag from origin (or marks the
#     run failed without ambiguous side effects). Main is untouched.
#
# The release-guard logic stays valuable as PR-time advisory CI: every
# PR gets the existing release-guard-dry-run.mjs and
# release-guard-commit-analyzer-check.mjs harnesses telling reviewers
# what a release-tag for this PR's content would publish. Reviewers
# decide whether to tag.
#
# Design decisions (locked in by 2026-05-21 review):
#
#   1. Tag convention: CANONICAL is `caws-cli-vX.Y.Z` and
#      `caws-kernel-vX.Y.Z`. Legacy bare `v*` tags are accepted
#      ONLY as historical record (existing tags on origin remain
#      untouched). Pushing a NEW bare `v*` tag is REFUSED with an
#      error pointing at the new convention. There is no
#      legacy publish path.
#
#   2. CHANGELOG generation: HUMAN-AUTHORED OR LOCAL SCRIPT, never
#      computed by CI on the tag-trigger path. The maintainer
#      commits a CHANGELOG section for the target version BEFORE
#      tagging. The workflow reads that committed section as the
#      GitHub Release body. Missing section FAILS before publish.
#      Semantic-release's `generateNotes` MAY be retained in PR
#      advisory paths in `--dry-run` mode only.
#
#   3. Tag deletion on publish failure: required for the
#      pre-publish-failure rollback path. The workflow init step
#      verifies `contents: write` is available; if not, it
#      switches to "mark failed + surface manual command" mode and
#      logs the choice. Branch/tag protection rules MUST be
#      audited before activation — if `caws-cli-v*` tags are
#      protected, the rollback path cannot delete them.
#
#   4. Coupled-release atomicity: ORDERED, OBSERVABLE, REPAIRABLE.
#      Two tag pushes in deliberate order (kernel first, verify,
#      then cli). If cli fails after kernel succeeds, kernel
#      remains published. The procedure documentation in A11
#      explicitly states this contract. No release-set manifest
#      in v1.
#
#   5. GitHub Release body: SOURCED FROM THE COMMITTED CHANGELOG
#      SECTION. The maintainer authors it locally; CI does not
#      synthesize release notes. If the CHANGELOG section is
#      missing, the workflow fails before publish (A2 validation).
#
#   6. Migration: existing `v11.1.4` and earlier tags remain as
#      historical record. Starting after this slice activates, the
#      canonical convention applies to ALL new tags. There is no
#      grace period for bare `v*` — they are refused immediately.
#
#   7. Version-bump location: HUMAN, ON A NORMAL BRANCH, BEFORE
#      TAGGING. CI never edits `package.json`. CI never pushes to
#      main. The tag's checkout-SHA contains the final
#      package.json; CI validates equality and publishes verbatim.
#
#   8. Semantic-release removal scope: RUTHLESS. After this slice,
#      `release.yml`'s publish path has zero invocations of
#      `semantic-release`. The `@semantic-release/git` plugin is
#      removed from any release-time config. semantic-release's
#      analyzer may be retained for PR advisory checks in
#      `--dry-run` mode only.
#
# Open implementation prerequisites (verify before activating):
#
#   - Confirm GitHub Actions can delete tags from a tag-triggered
#     workflow under current repo permissions and any branch/tag
#     protection rules. If not, fall back to mark-failed mode.
#   - Inspect `packages/<pkg>/package.json` publish scripts. The
#     tag workflow must validate version equality before npm
#     publish (A2.b).
#   - Decide auth path: bypass-2FA token (current manual-publish
#     recovery path), trusted publishing / npm provenance, or
#     OIDC. Verify the chosen path in a dry-run on a non-production
#     tag (e.g., a `caws-cli-v0.0.0-dryrun` tag pushed against a
#     scoped-to-dryrun branch ruleset) before activation.
#   - Audit any other workflow that mutates main on push events
#     and ensure none can race with a tag publish.
#
# Related follow-up specs (deferred):
#   - CAWS-CLI-BIN-EXECUTABLE-BIT-001 — chmod dist/index.js to 0755
#     in build-cli.js. Required because npm install's bin-linking
#     does it post-publish, but workspace-local installs (CI'') do not.
#   - CAWS-SCOPE-CAMPAIGN-MODE-001 — union-mode scope guard needs a
#     "campaign-mode" notion for coordinated active specs in one
#     branch.
#   - DANGER-LATCH-CALIBRATION-001 — Bash danger-latch over-fires on
#     read-only operations like `tail` and on authorized `git push`.
#   - A2 fault-injection regression test from
#     WORKTREE-MERGE-CLEARS-SPEC-BINDING-001 (honest-failure path).
