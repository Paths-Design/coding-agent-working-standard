id: WORKTREE-CAWS-SHARED-STATE-001
title: 'Make .caws/ shared state across git worktrees instead of per-worktree copies'
risk_tier: 3
mode: refactor
lifecycle_state: draft
created_at: '2026-05-19T00:00:00.000Z'
updated_at: '2026-05-19T00:00:00.000Z'
blast_radius:
  modules:
    - packages/caws-cli/src/shell/commands/worktree.ts
    - packages/caws-cli/src/store
    - .gitignore
  data_migration: false
operational_rollback_slo: 30m
scope:
  in:
    - packages/caws-cli/src/shell/commands/worktree.ts
    - packages/caws-cli/src/store
    - packages/caws-cli/tests/shell/worktree.test.js
    - .gitignore
    - docs/architecture/caws-vnext-command-surface.md
    - .caws/specs/WORKTREE-CAWS-SHARED-STATE-001.yaml
  out:
    - packages/caws-cli/src/error-handler.js
    - packages/caws-cli/src/config/index.js
    - .caws/policy.yaml
    - .caws/events.jsonl
invariants:
  - '.caws/ is project-shared authority state. Every git worktree reads from and writes to the same physical .caws/ directory; no worktree carries its own copy.'
  - 'The implementation must be cross-platform — symlinks (Linux/macOS) and Windows junction-points or per-worktree resolution must both work.'
  - 'Pre-existing worktrees that contain a .caws/ copy must be migrated via caws worktree repair (or a new caws worktree migrate-shared-state command). The transition does not silently delete or move authority state.'
  - 'caws worktree merge no longer needs to reconcile spec/event differences between main tree and worktree — they were the same all along.'
acceptance:
  - id: A1
    given: 'A v11-initialized repo on a base branch with .caws/ populated.'
    when: 'caws worktree create wt-foo --spec FEAT-001 is invoked.'
    then: 'The new worktree at .caws/worktrees/wt-foo does NOT contain its own .caws/ directory. Either a symlink points back at the main tree, or the v11 CLI resolves .caws/ to the main tree from any worktree cwd. Inside the worktree, `cat .caws/specs/FEAT-001.yaml` returns the same content as the main tree.'
  - id: A2
    given: 'An agent inside .caws/worktrees/wt-foo edits .caws/specs/FEAT-001.yaml (e.g., adds an AC).'
    when: 'A second invocation of caws status / scope check is run from the MAIN tree.'
    then: 'The edit is immediately visible. No commit, no sync, no copy is required to propagate.'
  - id: A3
    given: 'A pre-v11.x worktree exists with its own .caws/ copy that has drifted from the main tree.'
    when: 'caws worktree repair (or migrate-shared-state) is invoked.'
    then: 'A typed diagnostic surfaces the drift. The operator can choose to keep main, keep worktree, or merge manually. No state is silently overwritten.'
  - id: A4
    given: 'A platform without symlink support (e.g., Windows without developer mode).'
    when: 'caws worktree create is invoked.'
    then: 'Either a junction-point is used, OR the CLI falls back to a resolution-time strategy where the repo-root lookup always points to the git common dir. A typed diagnostic explains the chosen strategy.'
  - id: A5
    given: 'A worktree that has been destroyed via caws worktree destroy.'
    when: 'Inspection of the main tree.'
    then: 'No leftover symlink, junction, or copy remains. .caws/ in main tree is untouched.'
non_functional:
  reliability:
    - 'No race conditions when two worktrees write to .caws/events.jsonl simultaneously — the existing lifecycle-lock continues to be the sole synchronization point.'
    - 'Pre-existing per-worktree .caws/ copies are detected as a drift class by caws doctor and reported as a known-pre-migration warning until migrated.'
  security:
    - 'Symlinks must not allow path-traversal out of .caws/. The resolver validates that any .caws/ path read or written resolves to a canonical location inside the repo.'
contracts: []
# --- Triage -------------------------------------------------------------
# Background: in ERROR-HANDLER-V11-SURFACE-001 (closed 2026-05-19), the
# agent hit friction because edits to .caws/specs/<id>.yaml made inside a
# worktree were not visible to the CLI when invoked from the main tree.
# The CLI correctly resolves repo-root to the main tree, but git's
# worktree machinery had checked out a separate .caws/ copy.
#
# Three resolutions considered (see plan ~/.claude/plans/tranquil-stargazing-dolphin.md):
#   1. Shared .caws/ via symlink — THIS SPEC.
#   2. Commit-then-visible: tighten the contract that uncommitted spec
#      edits are not visible to tools. Simple but adds friction loops.
#   3. Per-worktree .caws/ overlay with merge-time reconciliation:
#      explodes complexity, contradicts v11 §6.9 invariant (authority is
#      project-shared, not worktree-local).
#
# Open questions before implementation:
#   - Is the resolution a symlink, a git-attr filter, or a CLI-side
#     resolver? Symlinks are simplest on macOS/Linux but Windows
#     requires either junction-points or developer-mode permissions.
#   - How does caws init behave inside a worktree where .caws/ is
#     already a symlink? Refuse? Idempotent passthrough?
#   - Does this affect tmp/<sessionId>/ (which is harness-managed, not
#     CAWS-managed)? Probably no, but worth confirming.
