acceptance:
  - id: A1
    given: 'a draft spec and an attempted caws worktree create <name> --spec <id>'
    when: 'the CLI refuses because the spec is not active'
    then: 'the diagnostic includes caws specs activate <id> and explains that activation preflight must pass first'
  - id: A2
    given: 'a draft spec and an existing registered worktree'
    when: 'the CLI refuses caws worktree bind <name> --spec <id>'
    then: 'the diagnostic includes the same activation handoff without changing registry, spec binding, events, or the worktree directory'
  - id: A3
    given: 'the CLI UX audit and worktree docs'
    when: 'the slice is complete'
    then: 'the draft-bind refusal gap is marked implemented and the worktree create/bind docs describe the activation handoff'
