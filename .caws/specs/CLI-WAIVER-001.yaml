id: CLI-WAIVER-001
title: 'Slice 7a: caws waiver authority surface'
risk_tier: 3
mode: feature
lifecycle_state: draft
created_at: '2026-05-14T22:21:52.990Z'
updated_at: '2026-05-17T00:00:00.000Z'
blast_radius:
  modules:
    - packages/caws-cli/src/shell/commands/waiver.ts
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - packages/caws-cli/src/shell/commands/waiver.ts
    - packages/caws-cli/src/store/waivers-store.ts
    - packages/caws-cli/tests/shell/waiver.test.js
  out:
    - .caws/policy.yaml
    - .caws/events.jsonl
invariants:
  - 'Waivers filter gate violations on the read path; they do not change a gate''s mode (block/warn/skip).'
  - 'Waiver creation, listing, show, and revocation each append exactly one event through appendEvent.'
acceptance:
  - id: A1
    given: 'A repo with no active waivers and a gate violation matching some predicate.'
    when: 'caws waiver create --gate <name> --reason <text> --approved-by <user> --expires-at <iso> is invoked.'
    then: 'A waiver record is created; on subsequent gate evaluations, matching violations are filtered from the surfaced findings.'
  - id: A2
    given: 'An active waiver.'
    when: 'caws waiver revoke <id> is invoked.'
    then: 'The waiver becomes inactive; matching violations re-appear on next gate run.'
non_functional:
  security:
    - 'Waiver creation requires approver and expiration; the kernel rejects records missing either.'
contracts: []
