invariants:
  - 'Earned claim: every direct runLifecycleTransaction caller in specs-writer.ts and worktrees-writer.ts has adversarial regression coverage at the event-append failure boundary, using only the shipped CAWS_TEST_INJECT_LIFECYCLE_FAULT seam (lifecycle-transaction.ts:225-273).'
  - 'Out of scope: any failure boundary the shipped seam does not exercise — validate (step 1), write/fsync (steps 3/3b), lifecycle lock contention, and yaml-patch failures all require separate mechanisms and belong in future slices.'
  - 'Single-event vs multi-event distinction is load-bearing: single-event callers produce ok({ kind: "partial_failure_recovered" }) on injected event-append failure when rollback succeeds (lifecycle-transaction.ts:429-435); multi-event callers can produce err(LIFECYCLE_PARTIAL_FAILURE_UNRECOVERED) when an earlier event was already hash-chained and cannot be un-appended.'
  - 'Tests assert on result.value.kind explicitly (or on typed error diagnostics for err results) — never on isOk(result) alone. Reason: the WORKTREE-MERGE-A2 implementation failed once because partial_failure_recovered is wrapped in ok() and was silently treated as success. CLAUDE.md "Outcome inspection ≠ Result inspection" guidance applies.'
  - 'mergeWorktree event-append-boundary coverage is discharged by WORKTREE-MERGE-A2-FAULT-INJECTION-001 (tests/store/worktree-merge-a2-fault-injection.test.js, A1-A5, closed 2026-05-21 per resolution: completed). This spec cites that suite as evidence rather than duplicating it.'
  - 'No production code changes. lifecycle-transaction.ts, specs-writer.ts, worktrees-writer.ts are read-only references for test design.'
acceptance:
  - id: A1
    given: 'Each direct runLifecycleTransaction caller in specs-writer.ts (createSpec, closeSpec, archiveSpec) and worktrees-writer.ts (createWorktree, bindWorktreeRepair, destroyWorktree, mergeWorktree).'
    when: 'CAWS_TEST_INJECT_LIFECYCLE_FAULT names a planned event for that caller.'
    then: 'A regression test exists in tests/store/lifecycle-rollback-failure-harness.test.js — or, for mergeWorktree, in tests/store/worktree-merge-a2-fault-injection.test.js as discharged evidence cited in closure notes.'
  - id: A2
    given: 'A single-event caller (createSpec, closeSpec, archiveSpec, bindWorktreeRepair, or destroyWorktree) with the seam configured to fire on its sole event.'
    when: 'The caller is invoked under the injected fault.'
    then: 'The return value is ok({ kind: "partial_failure_recovered", ... }) at the txn layer (assert on result.value.kind, not isOk(result)). No event whose `event` field matches the injected eventMatch is appended to events.jsonl (assertion filters by spec_id or data.name for the test subject). The planned-write file is byte-identical to its pre-call snapshot.'
  - id: A3
    given: 'archiveSpec with seam configured to fire on spec_archived.'
    when: 'archiveSpec is invoked.'
    then: 'The source spec file at fromPath still exists (assertion: fs.existsSync(fromPath) === true). The archive destination file at toPath is absent (or byte-identical to its pre-call state). No spec_archived event is appended. This proves the fs.unlinkSync at specs-writer.ts:547 is correctly gated on r.value.kind === "success" and does not run on a non-success outcome.'
  - id: A4
    given: 'createWorktree with seam configured to fire on the FIRST event (worktree_created).'
    when: 'createWorktree is invoked.'
    then: 'The txn returns ok({ kind: "partial_failure_recovered", ... }). Caller compensation runs: the git worktree directory at wtPath no longer exists (fs.existsSync(wtPath) === false; git worktree remove --force was called per worktrees-writer.ts:445); the registry entry for input.name is absent from worktrees.json. The spec.worktree field is unchanged from its pre-call state. Neither worktree_created nor worktree_bound event is appended.'
  - id: A5
    given: 'createWorktree with seam configured to fire on the SECOND event (worktree_bound).'
    when: 'createWorktree is invoked.'
    then: 'The txn returns err(LIFECYCLE_PARTIAL_FAILURE_UNRECOVERED) because worktree_created is already hash-chained and cannot be un-appended. The diagnostic names worktree_bound as the failing event and lists worktree_created in data.already_appended (assertion: parse diagnostic data; not just check error length). Caller compensation still runs (worktree directory removed, registry cleaned per worktrees-writer.ts:444-451). The spec.worktree field is unchanged. The hash chain remains valid: worktree_created is honest evidence of an attempted operation and is NOT retroactively erased.'
  - id: A6
    given: 'mergeWorktree composed with closeSpec, seam fires on spec_closed.'
    when: 'mergeWorktree is invoked.'
    then: 'Discharged by WORKTREE-MERGE-A2-FAULT-INJECTION-001 — tests/store/worktree-merge-a2-fault-injection.test.js, A1-A5, all green in 11.1.6 (closed 2026-05-21 per resolution: completed). This spec adds no new mergeWorktree test. A single sentinel assertion in the new harness file verifies the A2 test file still exists, so a future deletion of A2 coverage will fail this slice''s regression too.'
  - id: A7
    given: 'The full packages/caws-cli/tests/store/ suite.'
    when: 'jest runs the suite.'
    then: 'All tests pass, including the pre-existing worktree-merge-a2-fault-injection.test.js. The harness adds no flakiness and < 3s wall-time to the store suite. No production code in packages/caws-cli/src or packages/caws-kernel/src is modified.'
non_functional:
  reliability:
    - 'Coverage is at the event-append boundary of runLifecycleTransaction across all current direct callers (7 sites). Other boundaries (validate, write, fsync, lock contention, yaml-patch) are explicitly out of scope and require separate mechanisms; if pursued, they belong in their own spec slices with their own injection seams or test infrastructure.'
    - 'The harness distinguishes recovered governance state from unrecoverable external side effects. A5 (createWorktree second-event injection) is the principal example: the hash-chained worktree_created event cannot be un-appended, but caller compensation still runs to clean the git worktree directory and registry entry.'
    - 'No production code changes. The shipped CAWS_TEST_INJECT_LIFECYCLE_FAULT seam is the sole fault-injection mechanism. If a desired test cannot be written with the seam, the spec is amended to record the gap and defer it — no second mechanism is added.'
  performance:
    - 'Total harness adds < 3s to the store test suite wall time on a developer laptop. The fault-injection branch is a single conditional check in lifecycle-transaction.ts and has no measurable overhead.'
contracts: []
# --- Triage ----------------------------------------------------------------
# Provenance: this spec was filed in May 2026 as deferred coverage from
# v11.1.0. The WORKTREE-MERGE-A2-FAULT-INJECTION-001 slice (closed
# 2026-05-21) shipped the SHARED fault-injection seam that this harness
# builds on. The V11-2-STABILIZATION-RECON-001 slice (closed
# 2026-05-21) placed this spec in the §1.2 "implementation-ready"
# bucket as the first post-recon implementation slice.
#
# 2026-05-22 amendment — narrowed earned claim
# ----------------------------------------------
# The original draft listed four acceptance criteria (A1-A4) covering
# four distinct failure boundaries:
#   - A1: worktree.create after git worktree add succeeded (event-append)
#   - A2: worktree.merge after merge commit landed (event-append, composed)
#   - A3: specs.close with unwritable spec file (yaml-patch / step-3 write)
#   - A4: concurrency violation bypassing the lifecycle lock
#
# Source audit (lifecycle-transaction.ts:225-273) confirmed that the
# shipped CAWS_TEST_INJECT_LIFECYCLE_FAULT seam fires at exactly one
# boundary: step-4 event-append. It matches body.event === eventMatch
# and substitutes an err() into the append path. It does NOT exercise:
#   - step-1 validate() rejection
#   - step-3 writeFileAtomic failure (yaml-patch, ENOSPC, EACCES)
#   - step-3b fsync failure
#   - withLifecycleLock contention / bypass
#
# Honoring the original A3 would require either filesystem sabotage
# (chmod 0444 the spec file mid-test, race conditions on directory
# permissions) or a second injection seam in writeFileAtomic. Honoring
# the original A4 would require either bypassing withLifecycleLock from
# test code (which would itself violate the lock's contract) or a
# multi-process test harness. Both are valuable but out of scope for a
# single test-only slice built on the existing seam.
#
# The amended claim is narrower and earned: the seam exercises one
# boundary; the harness proves rollback/diagnostic behavior at that
# boundary across all 7 current direct callers. Other boundaries
# remain valid future work and should be filed as their own specs
# (proposed names: LIFECYCLE-WRITE-FAILURE-HARNESS-001,
# LIFECYCLE-VALIDATE-FAILURE-HARNESS-001,
# LIFECYCLE-LOCK-CONTENTION-HARNESS-001) when there is a concrete
# mechanism to inject those failures.
#
# Resolved open questions (from original triage)
# ----------------------------------------------
# - Where does the fault injector hook in?
#     -> Already resolved: the shipped seam in lifecycle-transaction.ts
#        at the step-4 event-append boundary. No second mechanism.
#
# - How are partial-failure-unrecovered states modeled in the event log?
#     -> Resolved: NOT modeled as a new event type. They are surfaced
#        via the typed err(LIFECYCLE_PARTIAL_FAILURE_UNRECOVERED)
#        diagnostic returned from runLifecycleTransaction, which
#        includes data.already_appended (events that landed before the
#        failure) and data.recovery_instruction. Operators read the
#        diagnostic; no synthetic lifecycle_partial_failure event is
#        appended (that would itself be hash-chain pollution).
#
# - Should there be a caws doctor rule that detects half-applied state?
#     -> Deferred. Not in this slice. A doctor rule needs a concrete
#        artifact class to detect (e.g., "spec.worktree references a
#        name absent from worktrees.json AND no matching git worktree
#        dir exists"). The control-plane authority spec
#        (WORKTREE-SPEC-AUTHORITY-CONTROL-PLANE-001) is the natural
#        home for half-state detection; this harness produces
#        evidence to inform that design, but does not ship the rule.
#
# Multi-event distinction (operational matrix)
# ---------------------------------------------
# Direct runLifecycleTransaction callers and their event arrays:
#
#   createSpec        -> [spec_created]                  single-event
#   closeSpec         -> [spec_closed]                   single-event
#   archiveSpec       -> [spec_archived]                 single-event + external unlink
#   createWorktree    -> [worktree_created,              MULTI-EVENT
#                         worktree_bound]                + external git side effect + compensation
#   bindWorktreeRepair-> [worktree_bound]                single-event
#   destroyWorktree   -> [worktree_destroyed]            single-event + external git side effect
#   mergeWorktree     -> [worktree_merged]               single-event, composed with closeSpec
#                                                        (discharged by A2 slice)
#
# Per lifecycle-transaction.ts:429-435, partial_failure_recovered is
# returned only when rollbackFailed.length === 0 AND
# appendedEvents.length === 0. createWorktree is therefore the only
# current caller where injecting on the second event produces
# unrecovered state (worktree_created is already hash-chained). A4
# covers first-event injection; A5 covers second-event injection.
# Both are required — they prove different invariants.
#
# External side effects
# ---------------------
# - archiveSpec: fs.unlinkSync(fromPath) at specs-writer.ts:547 runs
#   INSIDE the lock callback but AFTER r.value.kind === 'success' check
#   (line 544). A3 asserts the source file remains on injected fault.
#
# - createWorktree: git worktree add runs BEFORE the txn (around
#   worktrees-writer.ts:356). Compensation (rollbackGitWorktree at
#   :460, rollbackRegistryEntry at :465) runs in the !txnOutcome.ok and
#   partial_failure_recovered branches at :437-451. A4 asserts the
#   compensation actually runs (git dir gone, registry clean).
#
# - destroyWorktree: git worktree remove ordering relative to the txn
#   is to be verified during test authoring. If git removal happens
#   BEFORE the txn, injected fault produces an unrecoverable external
#   side effect (worktree gone but event not appended). The test
#   records the observed posture honestly rather than asserting a
#   pretended recovery — if a real ghost-state class emerges, file as
#   evidence feeding PRUNE-REPAIR-WORKTREE-001.
#
# Activation note
# ---------------
# Spec was flipped from draft to active by direct YAML edit on
# 2026-05-22. caws specs does not expose a `promote` subcommand
# (per V11-2-STABILIZATION-RECON-001 §1.3 recon finding 2), and no
# spec_promoted.v1.json event schema exists. The lifecycle_state +
# updated_at change is audit-quiet for now; if SPECS-PROMOTE-DRAFT
# ever ships (deferred past v11.2 per recon §1.1), this transition
# would be retroactively un-auditable, which is acceptable given the
# absent doctrine. Recorded here so the gap is not invisible.
