contracts: []
# --- Preconditions (informational; schema does not admit a preconditions field) ---
# - QG-HOOKS-EXTRACT-001 is closed (replacement hooks exist before the
#   package is publicly deprecated).
#
# --- npm registry deprecation — explicit follow-up (NOT this slice) -------
# This slice ships repo-side deprecation only (README + package.json text).
# It deliberately does NOT mutate npm registry state for already-published
# versions. Two viable follow-ups, in order of caution:
#
#   Follow-up A (recommended): Do nothing on the registry side. Consumers
#     installing @paths.design/caws-quality-gates@2.x see the same package
#     they always did; the deprecation is communicated through repo docs,
#     hook-pack documentation, and natural disuse as the package stops
#     receiving updates. This avoids producing surprising install-time
#     warnings for downstream users.
#
#   Follow-up B (deliberate, requires separate authorization): Run
#     `npm deprecate '@paths.design/caws-quality-gates@<=2.x.x>' "<message>"`
#     against the registry. This adds an install-time warning that the
#     package is deprecated and points users to hook-packs. Per npm policy,
#     `npm deprecate` updates the registry entry visible to installers; it
#     does NOT unpublish or remove the version. The action is reversible by
#     calling `npm deprecate <pkg>@<range> ""` to clear the marker.
#
# If Follow-up B is ever taken, it must be its own slice with explicit user
# authorization, a recorded deprecation message, and a captured npm output
# log as evidence. It must not be silently folded into this slice or any
# child slice (REMOVE in particular).
#
# --- What this slice deliberately does NOT do ------------------------------
# - Does not patch run-quality-gates.mjs (the JSON-stdout fix from
#   e562a0e ships in-repo only; not republished).
# - Does not unpublish v11.1.2 from npm. The npm unpublish policy makes the
#   version space scarred either way, and version reuse is forbidden; leaving
#   v11.1.2 as a known harmless test-infrastructure release is the lower-noise
#   outcome.
# - Does not delete packages/quality-gates. Deletion is a separate slice
#   (QUALITY-GATES-PACKAGE-REMOVE-001) that runs after the doctrine slice and
#   only when caws-cli no longer depends on the package at runtime.
# - Does not change caws gates run's behavior. That is doctrine and lives in
#   GATES-RUN-POST-QG-DOCTRINE-001.
#
# --- Implementation latitude -----------------------------------------------
# The acceptance criteria specify outcomes (no accidental publish of caws-cli
# from quality-gates-only commits) rather than mechanism. Three viable
# approaches:
#   1. semantic-release releaseRules mapping selected scopes (e.g.,
#      scope:quality-gates) to release: false for caws-cli.
#   2. Per-package release lanes via scripts/multi-package-release.mjs that
#      detect changed packages and only invoke semantic-release for those.
#   3. A CI gate that requires an explicit "publish-authorized" label or
#      workflow_dispatch input before semantic-release publishes anything.
# Implementer picks one based on inspecting current automation. Option 2 is
# already partially in place (scripts/multi-package-release.mjs exists);
# auditing it for package-aware behavior may be the lowest-cost path.
