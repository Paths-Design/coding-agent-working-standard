id: CAWS-SESSION-RESOLVER-GUARD-DIVERGENCE-001
title: 'worktree ownership misattribution: the resolver chain and the write-guard chain read different session-id sources'
risk_tier: 1
mode: fix
lifecycle_state: active
worktree: resolver-guard-divergence
created_at: '2026-07-13T00:00:00.000Z'
updated_at: '2026-07-13T00:00:00.000Z'
