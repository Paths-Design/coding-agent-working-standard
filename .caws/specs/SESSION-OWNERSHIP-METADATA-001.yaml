invariants:
  - >-
    Doctrinal amendment 2026-05-28. The original 2026-05-22 premise
    of this spec was to extend .caws/agents.json with claimed_paths
    and last_modified_paths. The very next day, MULTI-AGENT-ACTIVITY-
    REGISTRY-001 closed and FROZE .caws/agents.json: no new fields,
    no new readers, no new writers. Source-of-record for the freeze
    is the comment block at packages/caws-cli/src/store/agents-store.ts
    line 8 and the closure invariants of MULTI-AGENT-ACTIVITY-REGISTRY-
    001 (operational-cache / governance-state separation; lease
    independence; no apply-patch routing for lease writes). This
    amendment reinterprets SESSION-OWNERSHIP-METADATA-001 onto the
    lease substrate. The product requirement (mechanically readable
    session ownership metadata for downstream provenance guards)
    is unchanged. The physical store is .caws/leases/<safe-session-id>.json
    via leases-store.ts and AgentLease (in
    packages/caws-kernel/src/worktree/leases.ts). agents.json
    remains FROZEN by this slice — no reads, no writes, no schema
    change touch it. The apply-patch / agents-store / AgentRecord
    paths are explicitly moved to scope.out. Earlier exploratory
    Commit 1 (51d0476) was authored against AgentRecord (the wrong
    substrate) and is reverted as a wrong-substrate checkpoint
    preserved in history.
  - >-
    Earned claim: every active session writes its currently-claimed file
    paths (if any) and a TTL-bounded set of recently-modified paths into
    its .caws/leases/<safe-session-id>.json lease record. Other tools
    (working-tree provenance guard, push-range classifier, handoff event
    emitter) consult that metadata mechanically rather than inferring
    from git stash names, commit subjects, or file timestamps.
  - >-
    Substrate before policy. This slice ONLY widens the data model. It
    does NOT introduce any blocking behavior, refusal, or guard rule.
    Consumers of the new fields are downstream slices
    (WORKING-TREE-PROVENANCE-GUARD-001, MULTI-AGENT-PUSH-RANGE-GUARD-001,
    MULTI-AGENT-HANDOFF-EVENT-001). If a consumer surface needs new
    semantics beyond "read the field," that semantics is in the
    consumer's spec, not here.
  - >-
    Backward compatibility is non-destructive. Existing lease records
    written by current sessions (with the lease_version: 1 shape —
    session_id, platform, status, started_at, last_active, repo_root,
    cwd, git_common_dir, git_dir, plus optional bound_worktree,
    bound_spec_id, etc.) MUST continue to load and validate. The new
    fields are OPTIONAL on read. A session that has not yet been
    updated to write the new fields is not penalized; its lease simply
    lacks claimed_paths and last_modified_paths, and consumers MUST
    treat that as "no information" rather than "no claims."
  - >-
    last_modified_paths is TTL-bounded, not historical, but the bound
    is CALLER-enforced, not writer-enforced. The field answers "what
    has this session touched recently?" relative to a TTL the caller
    consults (configurable via the policy key
    `agents.last_modified_paths_ttl_seconds`; default 1800, bounds
    60–86400). The stored value is `readonly string[]` with no
    per-path timestamps, so the writer cannot remove "paths older
    than the TTL" by inspection alone — it has no source of truth
    for per-path age. The caller (a future collector hook, the
    explicit-claim CLI, or any provenance surface) is responsible
    for assembling an already-TTL-pruned set and passing it to the
    writer. The writer enforces ONLY storage-bound invariants:
    structural validation (non-empty strings, no null bytes) and
    deterministic max-size truncation at 1000 entries (FIFO,
    caller-order preserved). last_modified_paths is NOT a complete
    edit journal, and this slice does NOT introduce per-path
    timestamps; that would be a different substrate (a
    timestamp-aware edit ledger) and is out of scope.
  - >-
    claimed_paths is explicit, not inferred. Sessions DECLARE claims
    via an explicit call (proposed: caws claim --paths <glob>...);
    they do NOT silently accumulate claims from edit history. Implicit
    claim-by-touch was the design considered and rejected (see the
    triage block's open question Q1 below): it produces ambiguous
    cross-session overlap when sessions touch the same shared files
    for legitimate reasons (e.g., both edit package.json for
    different dependencies). Explicit declaration matches the
    existing scope.in discipline and is auditable.
  - >-
    Heartbeat semantics unchanged. last_active still serves the
    existing display-only / stale-detection role (per
    [[reference_caws_governed_paths]] and the worktree/types.ts
    doctrine comment). Stale-heartbeat detection does NOT escalate
    into claim revocation; another session cannot take over claimed
    paths just because the claiming session went idle. Takeover
    follows the same pattern as worktree claim takeover (explicit
    --takeover flag with durable prior_owners audit) — that surface
    lands in WORKING-TREE-PROVENANCE-GUARD-001, not here.
  - >-
    Schema versioning. The lease substrate's existing discriminator is
    `lease_version: 1`. This slice does NOT bump that version; the new
    fields (claimed_paths, last_modified_paths) are additive optional
    properties on AgentLease. Existing on-disk leases load under the
    widened interface trivially. The original activation amendment also
    called for a bound_spec_id retrofit, but AgentLease already declares
    bound_spec_id (and AgentRecord does too in the parallel agents.json
    surface that this slice no longer touches); A9 is WITHDRAWN. The
    data_migration is write-on-next-update — the first time a session
    writes its lease after the widened interface ships, it includes the
    new fields if applicable; older leases sit unchanged until their
    session next writes. STRUCTURAL NOTE: .caws/leases/ is a directory
    of per-session JSON files, NOT a single mixed-key JSON object. Each
    lease file's content IS the AgentLease record; there is no
    top-level metadata key issue here (unlike .caws/agents.json, which
    is out of scope for this slice). The wrong-substrate Commit 1
    (51d0476) briefly introduced an isAgentRecord predicate on the
    agents.json substrate; it was REVERTED in ffcd4ba and is NOT
    retained. If a future legacy-agents.json reader needs structural
    disambiguation, it should reintroduce a similar utility under the
    unfiled AGENTS-JSON-STRUCTURE-NORMALIZATION-001 slice. This slice's
    lease-substrate path does not need it.
  - >-
    No kernel authority change. The kernel's worktree binding logic,
    ownership decisions, and scope evaluation are all unchanged.
    Consumers of claimed_paths / last_modified_paths are advisory
    surfaces (guards, classifiers, event emitters); none of them
    bypass the existing kernel authority path.
  - >-
    No event schema changes in this slice. A future
    "agent_claimed_paths" event might be useful for audit, but it is
    OUT OF SCOPE here. The lease file is the read source;
    audit-via-events is a stronger posture deferred to the
    MULTI-AGENT-HANDOFF-EVENT-001 slice or its successor. Per the
    closed MULTI-AGENT-ACTIVITY-REGISTRY-001 invariants, lease writes
    never append events.jsonl — that property is preserved by this
    slice and is itself a non-regression test in commit 2.
acceptance:
  - id: A1
    given: |
      An existing .caws/leases/<safe-session-id>.json with a
      lease_version: 1 shape (session_id, platform, status, started_at,
      last_active, repo_root, cwd, git_common_dir, git_dir, plus optional
      bound_worktree, bound_spec_id, etc.) and no claimed_paths or
      last_modified_paths fields.
    when: |
      The store layer's loadLeases parses the lease directory under the
      widened AgentLease interface.
    then: |
      Every existing lease loads without error. The new fields are
      undefined on each record. No diagnostic fires. No file is
      rewritten on read.
  - id: A2
    given: |
      A session in lifecycle that has just declared claimed_paths via
      the new explicit-claim surface (e.g., `caws claim --paths
      "packages/foo/**" --paths "tests/foo.test.js"`).
    when: |
      The session's lease file is written.
    then: |
      The lease contains a claimed_paths field whose value is the list
      of declared paths. Path strings are stored verbatim as the caller
      passed them (no glob expansion, no normalization that would lose
      information). The existing lease_version: 1 fields are preserved
      unchanged.
  - id: A3
    given: |
      A caller (a future collector hook, the explicit-claim CLI, or a
      test harness) has assembled a TTL-bounded set of recently-touched
      paths for the current session and is about to refresh the lease.
    when: |
      The caller invokes the kernel lease patch path with that path
      set, and the store writer applies the patch to the lease file.
    then: |
      The lease's last_modified_paths field contains the caller's path
      set, stored verbatim except for two writer-side guarantees:
        (1) structural validation — every entry is a non-empty string
            with no null bytes; otherwise the write fails closed with a
            diagnostic, no partial write;
        (2) deterministic max-size truncation — at most 1000 entries.
            If the caller passes more than 1000, the writer preserves
            caller order and drops the oldest (lowest-index) overflow
            until the count is 1000.
      TTL membership ("was this path touched within the last N
      seconds?") is the CALLER's responsibility. The writer has no
      per-path timestamps to consult and does NOT compute TTL membership
      from persisted state. The substrate stores; semantic freshness is
      enforced upstream of the writer.
  - id: A4
    given: |
      A reader (consumer slice such as the working-tree provenance
      guard) loads the lease registry and queries "which sessions claim
      <path>?" or "which sessions last touched <path>?".
    when: |
      The query runs against a registry with mixed lease shapes (some
      with the new fields, some without).
    then: |
      Leases with claimed_paths / last_modified_paths populated
      contribute their data normally. Leases without those fields
      contribute nothing for those queries (treated as "no information,"
      not "no claims"). The reader does NOT crash, does NOT panic, does
      NOT raise.
  - id: A5
    given: |
      A session whose lease last_active is older than the TTL (e.g., 2
      hours).
    when: |
      The lease is read.
    then: |
      last_modified_paths is either empty array or absent. The lease
      is NOT pruned by this slice (TTL-driven pruning of stale leases
      is owned by `caws agents stop` / `caws worktree prune` hygiene,
      not by this slice). The stale lease's claimed_paths, if present,
      remain — claim takeover requires explicit action, not TTL expiry.
  - id: A6
    given: |
      The doctor surface (caws doctor) and status surface (caws
      status) run against a registry with the new fields populated.
    when: |
      Each command renders its report.
    then: |
      Neither command introduces new diagnostics in THIS slice. The
      additional fields may surface in the agent panel as additional
      lines (read-only display), but no doctor rule fires on the
      basis of the new fields. Display additions are non-normative
      and OPTIONAL for v1 of this slice.
  - id: A7
    given: |
      All existing kernel and CLI tests, including the existing
      lease-test surface and the negative-invariant test asserting
      that lease operations remain functional when .caws/agents.json
      is deleted or corrupted.
    when: |
      Both test suites run.
    then: |
      All pre-existing tests remain green. New tests cover lease
      backward-compat loading (A1), explicit-claim write (A2),
      validation + truncation (A3), mixed-shape read (A4),
      stale-lease claim preservation (A5), and policy key bounds
      (A10). A9 remains withdrawn (no retrofit needed); a passive
      no-regression assertion for `bound_spec_id` is permitted but
      not required. The .caws/agents.json negative-invariant test
      from MULTI-AGENT-ACTIVITY-REGISTRY-001 MUST remain green —
      this slice does not regress lease/agents.json independence.
      No production diff outside scope.in.
  - id: A8
    given: |
      The 2026-05-22 draft of A8 asserted a structural-disambiguation
      predicate (isAgentRecord) over the mixed-key on-disk shape of
      agents.json. The 2026-05-28 doctrinal amendment moves this slice
      onto the leases substrate, where each .caws/leases/<safe-session-id>.json
      file's content IS the AgentLease record. There is no mixed-key
      enumeration problem on the lease substrate.
    when: |
      Implementation commits for this slice ship.
    then: |
      A8 is REINTERPRETED. The lease-substrate path does NOT
      introduce a predicate over agents.json values; that mixed-key
      problem belongs to the unfiled
      AGENTS-JSON-STRUCTURE-NORMALIZATION-001 slice. The
      isAgentRecord predicate briefly introduced by the wrong-
      substrate Commit 1 (51d0476) was REVERTED in ffcd4ba and is
      NOT retained. If a future legacy-agents.json reader needs
      structural disambiguation, it should reintroduce a similar
      utility under the unfiled normalization slice. Negative lock:
      no new code path in this slice reads or writes
      .caws/agents.json.
  - id: A9
    given: |
      A9 was originally drafted to retrofit `bound_spec_id` into
      AgentRecord. Pre-implementation source inspection showed the
      field was already declared in BOTH AgentRecord (the now-out-of-
      scope agents.json shape, types.ts:118) and AgentLease (the
      in-scope leases.ts shape, leases.ts:91). The earlier recon
      claim that it was "written via spread extras without being
      declared in AgentRecord" was incorrect. The id A9 is preserved
      in place rather than deleted, so the audit trail of the
      correction remains visible to future readers.
    when: |
      Implementation commit 1 of this slice (lease-substrate
      version) ships.
    then: |
      A9 is WITHDRAWN — there is no retrofit work to do. The
      implementation MUST NOT modify or regress the existing
      `bound_spec_id` declaration in AgentLease (or in AgentRecord;
      AgentRecord is now out of scope but the field there must not
      be touched). Tests MAY include a passive no-regression
      assertion, but that is hardening, not new functionality.
      Test counts and closure notes MUST identify A9 as withdrawn
      so test gap analysis is honest.
  - id: A10
    given: |
      A `policy.yaml` that may or may not define
      `agents.last_modified_paths_ttl_seconds`.
    when: |
      The policy schema (packages/caws-kernel/src/schemas/policy.v1.json)
      validates the file and the store loads the policy.
    then: |
      The key is optional, integer-valued. Values below 60 or above
      86400 fail schema validation with a clear diagnostic. Absent key
      resolves to the default 1800 seconds (30 minutes).
      A10 covers ONLY the schema validation and default resolution.
      The writer does NOT consume this value for TTL pruning of
      last_modified_paths — see A3, which clarifies that TTL membership
      is the caller/collector's responsibility, not the writer's. The
      key is exposed configuration for downstream collectors (future
      hooks, the explicit-claim CLI's bounded-recent-modifications view,
      the working-tree provenance guard). Commit 2 proves the key
      can be loaded and defaulted; it does NOT prove any pruning
      semantics, because the substrate does not have any.
non_functional:
  reliability:
    - >-
      The schema change is additive-only. Removing a field from
      AgentRecord (even one introduced by this slice) is a future
      breaking change that requires its own slice. The
      backward-compatibility guarantee is "v1 records load under v2"
      and is structural, not aspirational.
    - >-
      Race conditions on agents.json writes are bounded by the
      existing lifecycle-lock mechanism (whichever serializes writes
      to .caws/state today). This slice does NOT introduce new
      locking; if existing serialization is insufficient for
      multi-session contention on claimed_paths writes, that is a
      pre-existing reliability gap recorded as a follow-up.
  performance:
    - >-
      A typical .caws/agents.json carries fewer than 20 sessions.
      Reading + querying for claimed_paths / last_modified_paths
      against this size is bounded; no indexing needed at v1. If
      production agents.json files grow past ~100 sessions, the
      activator MAY add an in-memory index but that is not a v1
      requirement.
contracts: []
# --- Triage ----------------------------------------------------------------
# Origin
# ------
# Filed 2026-05-22 as point 1 of the four-part multi-agent provenance
# bar (see project_multi_agent_provenance_functional_complete_bar.md in
# the agent's memory). The bar was sharpened after reviewing the
# full-stack-ds transcripts (turn-013 in 450b8c85, turns 28-29 in
# 079d0ab9):
#
#   - Session A discovered three stashes named "parallel-session
#     dom-tree test updates," "parallel-session contract refactor,"
#     "parallel-session IR refactor" — exactly the capability area
#     another session was working on.
#   - Session A had to manually stash that work to clear pre-push
#     gates, push, then restore the stashes.
#   - Session B (a different session) later encountered the restored
#     changes and had to ask "are these my edits or someone else's
#     restored stash?" — answer: "my edits, continue."
#
# The cognitive cost — agents spending tokens reconstructing
# provenance from stash names and file timestamps — is the failure
# mode. Not lost work; reconstructed work.
#
# Why this is point 1
# -------------------
# Three downstream slices depend on this metadata:
#
#   - WORKING-TREE-PROVENANCE-GUARD-001 (point 2): refuses cleanup
#     commands when another session has dirty overlap. Needs
#     last_modified_paths.
#   - MULTI-AGENT-PUSH-RANGE-GUARD-001 (point 3, already drafted at
#     commit 2777e58): classifies outgoing commit range by attributable
#     session. Stronger inference if claimed_paths exists; today's
#     draft relies on file-touch + commit-subject fallback.
#   - MULTI-AGENT-HANDOFF-EVENT-001 (point 4): typed events when one
#     agent picks up another's work. Needs claimed_paths to know
#     "this agent's work."
#
# Without this slice, points 2/3/4 rely on heuristic provenance
# (file timestamps, stash names, commit-subject regex), which is
# what the full-stack-ds transcripts show failing. With this slice,
# they consult mechanically-recorded ownership.
#
# Open design questions (ADR-gated, but lighter than other slices)
# ----------------------------------------------------------------
#
#   Q1. Implicit vs explicit claim semantics.
#       Locked at draft: explicit declaration via a new surface
#       (likely "caws claim --paths ..."). Implicit-by-touch was
#       considered and rejected: it produces ambiguous overlap when
#       legitimate cross-session shared-file edits happen (both
#       sessions edit package.json for different deps). Open: is
#       there a soft middle — "implicitly add to last_modified_paths
#       but NOT to claimed_paths"? Likely yes, but the soft middle
#       is implementation detail; the hard claim plane is explicit.
#
#   Q2. TTL default for last_modified_paths.
#       Proposed: 30 minutes from last_active, capped at 24h. The
#       activator decides whether this is operator-configurable
#       (probably yes via policy.yaml) or fixed at v1.
#
#   Q3. Claim takeover mechanism.
#       NOT part of this slice — takeover lands in WORKING-TREE-
#       PROVENANCE-GUARD-001 where the refusal text actually
#       prompts for it. This slice just records the claim; the
#       guard slice owns the takeover semantic. Cross-reference
#       the worktree claim --takeover pattern (existing v11 surface)
#       as the prior art.
#
#   Q4. Path normalization.
#       claimed_paths and last_modified_paths are stored verbatim
#       as written. Normalization (relative vs absolute, trailing
#       slash, symlink resolution) is the CONSUMER's responsibility,
#       not the storage layer's. This matches existing scope.in /
#       scope.out semantics where paths are also stored verbatim.
#       Note that the cwd-relative-path-normalization defect
#       recorded in [[project_scope_guard_path_normalization_followup]]
#       is the related concern at a different layer (hook-side,
#       not store-side).
#
#   Q5. Glob expansion timing.
#       claimed_paths may contain globs. Expansion happens at
#       consumer query time, not at storage time. This means a
#       session that claims "packages/foo/**" and later modifies
#       packages/foo/bar.ts is matched at query time, not at write
#       time. The activator may choose to validate glob syntax at
#       write time as a structural sanity check, but not expand.
#
#   Q6. Path-set bounded size.
#       last_modified_paths could grow large in busy sessions.
#       Proposed cap: 1000 entries, FIFO eviction. The activator
#       may revisit if real telemetry shows different distributions.
#       claimed_paths is operator-bounded (explicit declarations
#       are limited by human attention) and does not need a cap.
#
# Implementation plan (resolved by ADR; see docs/architecture/session-ownership-metadata.md)
# ---------------------------------------------------------------------------------------
# Q1-Q6 plus two drift findings resolved in the design note. Summary
# of locked choices:
#   Q1. Explicit claimed_paths; implicit last_modified_paths.
#   Q2. CORRECTED to C1-storage-bounds interpretation.
#       Policy key `agents.last_modified_paths_ttl_seconds` ships
#       (integer, bounds [60, 86400], default 1800), but is
#       CALLER-VISIBLE CONFIG, not writer-enforced semantics. The
#       writer cannot prune by per-path age because the substrate
#       (last_modified_paths: readonly string[]) carries no
#       timestamps. Original Q2 phrase "Prune at write time relative
#       to now()" was structurally infeasible for this shape and is
#       withdrawn; TTL enforcement is the caller's responsibility,
#       which is the substrate-vs-policy distinction the four-part
#       bar exists to preserve. See A3 (writer accepts caller-pruned
#       set verbatim) and A10 (policy key validates + defaults; does
#       NOT drive writer pruning) for the correct shape.
#   Q3. Takeover stays in WORKING-TREE-PROVENANCE-GUARD-001.
#       Defensive test for cross-session non-clobber added.
#   Q4. Verbatim storage; consumer canonicalizes.
#   Q5. Query-time glob expansion; write-time validates non-empty
#       and no null bytes only.
#   Q6. last_modified_paths cap 1000 entries, FIFO, ENFORCED BY
#       THE WRITER (caller-order preserved; if caller passes >1000,
#       oldest overflow dropped until count=1000). This is a
#       storage-bound invariant — distinct from TTL because it
#       needs no information beyond ordered input and a max length.
#       claimed_paths cap 256 (enforced at CLI in commit 3); the
#       writer accepts caller-provided claimed_paths verbatim
#       subject only to structural validation.
# Drift 1. agents.json HAS a top-level version: 1; the original
#          invariant is corrected above. No version bump in this
#          slice; structural normalization deferred to
#          AGENTS-JSON-STRUCTURE-NORMALIZATION-001 (unfiled).
# Drift 2. WITHDRAWN. Originally framed as a bound_spec_id
#          retrofit (A9). Pre-implementation source inspection
#          showed bound_spec_id is ALREADY declared in
#          packages/caws-kernel/src/worktree/types.ts:118 and
#          referenced consistently throughout. The earlier recon
#          was wrong; A9 has been withdrawn in place (its id is
#          preserved with a "withdrawn / corrected" body). No
#          retrofit work to do. See ADR §Discovered state for
#          the full correction.
# Schema strategy: no JSON schema for agents.json in this slice.
# TypeScript interface widening + the isAgentRecord predicate
# (A8) are sufficient. A future slice may introduce the first
# JSON schema.
#
# Four commits expected after activation (full detail in the ADR):
#   Commit 1: types + reader predicate (no writer change, no shell).
#             Covers A1, A8. A9 is WITHDRAWN — a passive
#             no-regression assertion for bound_spec_id is
#             permitted but not required.
#   Commit 2: writer + policy key.
#             - Extends RegistryPatch.refresh_agent with optional
#               claimed_paths?: readonly string[] and
#               last_modified_paths?: readonly string[].
#             - Extends applyRefreshAgent to write the new fields
#               when present, preserving existing fields.
#             - Structural validation: strings only, non-empty,
#               no null bytes. Invalid input fails closed.
#             - Storage cap: last_modified_paths truncates at 1000
#               FIFO (caller-order preserved). claimed_paths
#               accepted verbatim from caller (256-cap is CLI-side
#               in commit 3).
#             - Policy key schema adds
#               agents.last_modified_paths_ttl_seconds (integer,
#               bounds [60, 86400], default 1800). Schema validation
#               only; no writer consumption.
#             - Cross-session non-clobber test: writing session A's
#               record leaves session B's claimed_paths byte-identical.
#             - NO TTL prune in the writer (C1 interpretation locked).
#             - Covers A2, A3 (revised), A5, A6, A10 (revised).
#   Commit 3: caws claim --paths CLI surface, behind a follow-up
#             scope amendment that adds shell paths. Covers
#             explicit-claim end-to-end. Acceptance covered by
#             A2 with shell wiring.
#   Commit 4: closure with consumer-slice pointers.
#
# Activation gate
# ---------------
# Activation requires:
#   1. Maintainer authorization (this is recon/draft only).
#   2. ADR sign-off (docs/architecture/session-ownership-metadata.md).
#   3. This amendment commit lands first; the activation commit
#      is separate.
#   4. NO blocking on the other three multi-agent slices —
#      ordering is THIS first, then the consumer slices, but the
#      consumers don't need to be filed before this activates.
#
# Non-goals (explicit guards)
# ---------------------------
#   * No blocking behavior. No guard rules. No refusals.
#   * No new event schemas.
#   * No takeover surface (lives in WORKING-TREE-PROVENANCE-GUARD-001).
#   * No kernel authority changes.
