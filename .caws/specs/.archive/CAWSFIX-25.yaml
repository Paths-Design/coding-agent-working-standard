id: CAWSFIX-25
type: fix
title: D2 lowercase suffix, D7 ghost registry prune, D8 bind resolves worktree-local specs
status: closed
risk_tier: 3
mode: development
created_at: '2026-04-23T05:05:15.205Z'
updated_at: '2026-04-23T05:05:15.205Z'
blast_radius:
  modules:
    - packages/caws-cli/src/worktree
    - packages/caws-cli/src/validation
  data_migration: false
operational_rollback_slo: 5m
change_budget:
  max_files: 8
  max_loc: 320
scope:
  in:
    - packages/caws-cli/src/worktree/worktree-manager.js
    - packages/caws-cli/src/commands/worktree.js
    - packages/caws-cli/src/validation/spec-validation.js
    - packages/caws-cli/templates/.caws/schemas/working-spec.schema.json
    - packages/caws-cli/tests/worktree-manager.test.js
    - packages/caws-cli/tests/validation/spec-validation.test.js
