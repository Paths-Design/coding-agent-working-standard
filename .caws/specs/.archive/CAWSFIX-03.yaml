type: fix
status: closed
risk_tier: 2
mode: development
blast_radius:
  modules:
    - .caws
    - packages/caws-cli/src/gates/spec-completeness
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - .caws/validate.js
    - .caws/working-spec.schema.json
    - package.json
    - packages/caws-cli/src/gates/spec-completeness.js
    - packages/caws-cli/tests/spec-completeness.test.js
    - .caws/specs/CAWSFIX-03.yaml
  out:
    - node_modules/
    - dist/
    - packages/caws-cli/dist/
    - packages/caws-cli/src/gates/budget-limit.js
    - packages/caws-cli/src/gates/scope-boundary.js
    - packages/caws-cli/src/commands/
    - .github/workflows/
    - .caws/waivers/
invariants:
  - Exactly one canonical spec validator exists after this change
  - >-
    The JSON Schema at .caws/working-spec.schema.json is the single source of
    truth for spec structure
  - >-
    Every field the old validate.js required is expressed in the JSON Schema (no
    field silently dropped)
  - >-
    spec-completeness.js gate continues to pass on all currently-active specs
    (EVLOG-001, EVLOG-002, CAWSFIX-02, and the four new CAWSFIX specs)
  - >-
    No consumer of .caws/validate.js is left with a dangling reference after
    deletion
acceptance: &ref_0
  - id: A1
    given: The current repo with .caws/validate.js present
    when: >-
      A reviewer greps the tree for "validate.js" references (excluding
      node_modules and dist)
    then: >-
      Only the file itself remains until it is deleted, and the sole external
      reference is package.json:46 ("caws:validate" script). After the fix, the
      file is gone and package.json either points at the schema-based validator
      (`caws validate`) or the script is removed.
  - id: A2
    given: >-
      The full set of required/checked fields enforced by .caws/validate.js (id,
      title, risk_tier, mode, change_budget, blast_radius,
      operational_rollback_slo, scope, invariants, acceptance, non_functional,
      contracts, with the same constraints on each)
    when: >-
      Those same specs are validated against the updated
      .caws/working-spec.schema.json
    then: >-
      Every spec that previously failed the JS validator for a given reason
      fails the JSON Schema validator for a semantically equivalent reason, and
      every spec that passed continues to pass. No required field is silently
      dropped from the enforcement surface.
  - id: A3
    given: >-
      The spec-completeness gate module at
      packages/caws-cli/src/gates/spec-completeness.js
    when: >-
      It is invoked against each active spec (.caws/specs/EVLOG-001.yaml,
      EVLOG-002.yaml, CAWSFIX-02.yaml, CAWSFIX-03.yaml, CAWSFIX-04.yaml,
      CAWSFIX-05.yaml, CAWSFIX-06.yaml)
    then: >-
      Each spec passes the gate without modification, or the fix explicitly
      updates those specs to conform and documents the update.
  - id: A4
    given: >-
      The package.json `caws:validate` script currently runs `node
      .caws/validate.js`
    when: The fix is applied
    then: >-
      Either the script is removed (preferred — users should run `caws validate
      --spec-id <id>`) or it is rewritten to invoke the bundled CLI. No script
      in package.json references a deleted file.
  - id: A5
    given: The existing test suite before the change
    when: '`cd packages/caws-cli && npx jest` is run after the change'
    then: >-
      No pre-existing test regresses. Any test that covers spec validation
      continues to pass.
  - id: A6
    given: >-
      The JSON Schema has additionalProperties currently set to true
      (permissive)
    when: A spec is submitted with unknown top-level keys
    then: >-
      The schema's handling of unknown keys is explicit (either documented as
      permissive with a rationale, or tightened to warn/fail). The behavior is
      not accidental.
acceptance_criteria: *ref_0
non_functional:
  a11y: []
  perf:
    api_p95_ms: 50
  security:
    - >-
      Schema changes do not introduce new attack surface. Spec files are not
      executed, only parsed.
contracts:
  - type: openapi
    path: .caws/working-spec.schema.json
id: CAWSFIX-03
title: >-
  Unify spec validators — delete legacy validate.js, make JSON schema
  authoritative
created_at: '2026-04-17T15:40:11.009Z'
updated_at: '2026-04-17T16:21:21.285Z'
worktree: cawsfix-03
