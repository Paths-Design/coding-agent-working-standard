id: CAWS-WORKTREE-OWNERSHIP-HARNESS-ID-001
title: 'worktrees.json ownership must resolve to durable harness HOOK_SESSION_ID, not a rotating minted caws-hash capsule; fix resolve-session capsule fallthrough'
risk_tier: 3
mode: fix
lifecycle_state: active
worktree: v11-ownership-harness-id
created_at: '2026-05-28T21:41:23.156Z'
updated_at: '2026-05-28T22:20:00.000Z'
blast_radius:
  modules:
    - packages/caws-cli/src/shell/session/resolve-session.ts
    - .claude/hooks/lib/parse-input.sh
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - .caws/specs/CAWS-WORKTREE-OWNERSHIP-HARNESS-ID-001.yaml
    - packages/caws-cli/src/shell/session/resolve-session.ts
    - packages/caws-cli/src/shell/session/types.ts
    - packages/caws-cli/tests/shell/session/resolve-session.test.js
    - packages/caws-cli/tests/shell/resolve-session-primitive.test.js
    - packages/caws-cli/templates/hook-packs/claude-code/lib/parse-input.sh
    - packages/caws-cli/src/init/hook-packs/manifest-claude-code.ts
    - packages/caws-cli/tests/shell/caller-session-pointer.test.js
    - .claude/hooks/lib/parse-input.sh
  out:
    - .caws/policy.yaml
