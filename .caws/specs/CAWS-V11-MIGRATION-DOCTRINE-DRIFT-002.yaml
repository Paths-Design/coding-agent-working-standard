    changed. Only statements contradicted by the shipped surface are
    edited. The deferred-to-v11.3+ surfaces (caws session, caws parallel)
    remain correctly described as deferred.
  - >-
    No runtime behavior change. index.js edits are comment-only — the
    stale 'What v11 ships: <8 commands>' narrative comment is corrected
