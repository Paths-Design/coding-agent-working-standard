    migrate-registry/repair-sparse but NOT prune/repair/reconcile (those
    are genuinely still deferred); `events` is a registered group (the
    12th). Doc edits must match these, not restate stale plans.
  - >-
    Reconcile, never blanket-rewrite. Each drift instance is corrected
