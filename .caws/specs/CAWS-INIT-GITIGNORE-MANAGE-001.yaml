    - packages/caws-cli/src/shell/commands/init.ts
    - packages/caws-cli/src/shell/render/init-gitignore.ts
    - packages/caws-cli/tests/shell/init-command.test.js
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
