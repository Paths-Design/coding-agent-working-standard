id: CAWS-INIT-GITIGNORE-MANAGE-001
title: 'caws init writes a marked, idempotent .gitignore block for ephemeral .caws/ runtime state (worktrees/agents/leases/events/caches), preserving authority state tracked'
risk_tier: 3
mode: feature
lifecycle_state: active
created_at: '2026-05-29T17:25:01.732Z'
updated_at: '2026-05-29T17:25:01.732Z'
blast_radius:
  modules:
