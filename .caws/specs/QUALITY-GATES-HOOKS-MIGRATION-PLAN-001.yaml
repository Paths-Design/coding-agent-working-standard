contracts: []
# --- Campaign rationale ----------------------------------------------------
# packages/quality-gates accumulated batch-scanner implementations for checks
# whose durable value now lives at the operator-harness hook layer
# (PreToolUse/PostToolUse in Claude Code; equivalents in Cursor/Windsurf
# hook packs).
#
# Sterling already demonstrates the working shape:
#   .claude/hooks/naming-check.sh        — banned-modifier list = shadow-file gate
#   .claude/hooks/scope-guard.sh         — file-scope enforcement with strikes
#   .claude/hooks/doc-frontmatter-check.sh — frontmatter advisory
#
# These ~100-400 LOC bash hooks replaced large .mjs modules (~500-1500 LOC
# each) with single-file, synchronous, file-scoped checks. The remaining
# load-bearing gates from packages/quality-gates collapse to hook shape
# equally well; the surrounding orchestration (run-quality-gates.mjs,
# worker-pool.mjs, cache-manager.mjs, progress.mjs, shared-exception-framework.mjs)
# only exists to make the batch-scan model tolerable and stops mattering
# once the gates move to hooks.
#
# The accidental v11.1.2 release (semantic-release auto-published on a green
# `fix(quality-gates):` commit) made the cost of the current shape concrete:
# we cannot patch packages/quality-gates without risking an unrelated caws-cli
# publish, and the package itself is the wrong long-term home for the checks.
#
# --- Why a campaign, not one slice -----------------------------------------
# A single "delete quality-gates and add hooks" slice would either:
#   (a) leave a functionality gap between deletion and hook coverage, or
#   (b) tempt the agent to half-delete and keep caws gates run wired to the
#       partial package "for compatibility."
# Splitting forces the constructive work (hook extraction) before any
# destructive work (deprecation, doctrine change, deletion), and lets the
# command-surface doctrine change be its own deliberate decision.
#
# --- Parent guard and child slices, in order ------------------------------
# 0. RELEASE-AUTOMATION-GUARD-NONPUBLISH-COMMITS-001 — parent guard.
#    Closes first. Establishes that specs-only, docs-only, tests-only, and
#    packages/quality-gates-only commits do not trigger @paths.design/caws-cli
#    publishes. Without this slice, every subsequent slice empirically tests
#    the v11.1.2 incident conditions against main on every push.
# 1. QG-HOOKS-EXTRACT-001          — add replacement hooks; quality-gates untouched
# 2. QUALITY-GATES-PACKAGE-DEPRECATE-001 — mark package deprecated, isolate releases
# 3. GATES-RUN-POST-QG-DOCTRINE-001 — decide what caws gates run becomes
# 4. QUALITY-GATES-PACKAGE-REMOVE-001 — remove the deprecated package
#
# Slice 0 is non-negotiable. Slices 1-4 land separately, may be paused or
# reordered relative to each other (subject to declared preconditions),
# and may be cancelled without leaving the repo in a half-state.
