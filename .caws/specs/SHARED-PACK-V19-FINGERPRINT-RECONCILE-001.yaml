      (v19 fix) while SHARED_PACK_VERSION stayed 18 and the fingerprint baseline
      was not regenerated'
    when: 'SHARED_PACK_VERSION is bumped to 19 and the shared baseline in
      pack-fingerprints.json is regenerated to {version:19, live fingerprint}'
    then: 'pack-fingerprint.test.js passes: recorded.version === manifest
      version AND recorded.fingerprint === live fingerprint for the shared pack'
  - id: A2
    given: 'the regenerated baseline'
    when: 'the four non-shared pack entries are compared to their pre-change values'
    then: 'they are unchanged (this is a shared-only reconciliation, not a
      full-tree rebaseline)'
non_functional: {}
contracts:
  - name: 'shared-pack-version-fingerprint-consistency'
    type: behavior
