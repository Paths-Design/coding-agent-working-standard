id: CAWS-GUARD-NO-WORKTREE-NO-BLOCK-001
title: 'worktree-write-guard: with zero active worktrees there is nothing to isolate; allow base-branch writes (exit 0) instead of asking, so first-run setup is not wedged'
risk_tier: 3
mode: feature
lifecycle_state: active
worktree: guard-no-worktree-no-block
created_at: '2026-05-30T06:33:25.658Z'
updated_at: '2026-05-30T06:33:25.658Z'
blast_radius:
