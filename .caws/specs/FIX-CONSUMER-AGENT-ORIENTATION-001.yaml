invariants:
  - >-
    ORIENTATION-ONLY, NON-EXPANSIVE pre-release slice. The two runtime defects
    are already closed (FIX-HOOKPACK-CONSUMER-INSTALL-001 + FIX-SPECS-CONTRACT-
    ORIENTATION-001). This slice adds concrete consumer-facing trap guidance so an
    agent takes the RIGHT path through CAWS — it does NOT change enforcement,
    schema, hook behavior, release automation, or kernel contracts, and adds NO
    new CLI surface.
  - >-
    SINGLE CONSUMER SURFACE. The only doc `caws init` installs into a consumer
    project is .claude/hooks/CLAUDE.md (manifest sourcePath 'CLAUDE.md' ->
    destPath '.claude/hooks/CLAUDE.md', i.e. templates/hook-packs/claude-code/
    CLAUDE.md). templates/CLAUDE.md (repo-internal, 17KB) is NOT shipped
    (package.json files[] = dist/README/templates/hook-packs only) and is NOT
    installed by init, so it is out of scope. All consumer orientation goes in
    the one shipped+installed doc.
  - >-
    TRAP COVERAGE (concrete, example-driven). Add: hook-pack managed-file framing
    (already present from the prior slice — keep); the tier-1/2 contract
    requirement + the now-supported --contract "name:type[:path]" shape (NOT raw
    YAML surgery); non_functional.* are ARRAYS of strings not scalars; YAML
    scalars starting with a backtick or special char must be quoted/block-scalar;
    validate authored specs with `caws specs show <id>` / `caws doctor` before
    committing.
  - >-
    NO DANGLING / NO MAINTAINER-ONLY DOCTRINE. The shipped doc must cite NO
    unshipped repo-internal path (docs/guides/*, docs/architecture/*,
    docs/failure-lineage.md) and must make NO consumer-facing reference that
    treats failure-lineage.md or an incident-entry "lineage entry" as a
    consumer-local authority requirement. The line-57 `docs/guides/hook-packs.md`
    pointer (the last dangling ref) is removed/inlined in this slice.
  - >-
    GOVERNED-DOC CATCH-UP. Documentation that governs these tooling areas is
    brought current with the shipped implementation (the --contract path now
    exists; the contract shape is authable in one command), so the consumer doc
    does not describe a pre-fix world.
