updated_at: '2026-05-29T01:35:18.049Z'
blast_radius:
  modules:
    - Root package.json npm-script targets (dead apps/tools/caws/*.js references) and the caws init template CLAUDE.md non_functional doctrine line. No source, schema, policy, or CI change.
