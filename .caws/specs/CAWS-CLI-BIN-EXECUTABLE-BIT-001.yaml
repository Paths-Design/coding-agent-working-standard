id: CAWS-CLI-BIN-EXECUTABLE-BIT-001
title: 'Set executable bit on dist/index.js during caws-cli build (first canonical tag-driven publish bake)'
risk_tier: 3
mode: chore
lifecycle_state: active
created_at: '2026-05-21T00:00:00.000Z'
updated_at: '2026-05-21T04:20:00.000Z'
blast_radius:
  modules:
    - packages/caws-cli/scripts/build-cli.js
    - packages/caws-cli/package.json
    - packages/caws-cli/CHANGELOG.md
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - packages/caws-cli/scripts/build-cli.js
    - packages/caws-cli/tests/scripts/build-cli-bin-mode.test.js
    - packages/caws-cli/tests/scripts/release-tag-publish.test.js
    - packages/caws-cli/package.json
    - packages/caws-cli/CHANGELOG.md
    - .caws/specs/CAWS-CLI-BIN-EXECUTABLE-BIT-001.yaml
  out:
    - .caws/policy.yaml
    - .caws/events.jsonl
    - packages/caws-kernel/src
    - packages/caws-cli/src
    - .github/workflows
    - scripts/release-tag-publish.mjs
invariants:
  - 'After `node scripts/build-cli.js` completes from a clean dist/ on a POSIX system, packages/caws-cli/dist/index.js exists and has the owner-executable bit set (mode & 0o100 is non-zero).'
  - 'The chmod step runs unconditionally on every POSIX build — not gated by env var, opt-in flag, or feature switch. The only conditional is the Windows skip.'
  - 'On Windows (process.platform === "win32"), no chmod is attempted, no POSIX-mode assertion is made, and no error is logged. npm bin-linking handles .cmd shim creation on Windows separately.'
  - 'Only dist/index.js (the package.json `bin.caws` target) has its mode changed by this slice. No other dist artifact is touched.'
  - 'A failed chmod on POSIX fails the build loudly (exit non-zero). A non-executable bin is a published defect; silent skip is not acceptable.'
acceptance:
  - id: A1
    given: 'A clean checkout with no packages/caws-cli/dist/ directory on a POSIX system (process.platform !== "win32").'
    when: 'A developer runs `node packages/caws-cli/scripts/build-cli.js`.'
    then: 'packages/caws-cli/dist/index.js exists. The test asserts `(fs.statSync(distIndex).mode & 0o100) !== 0` — owner-executable bit is set specifically. Group/world bits are not asserted (umask may suppress them).'
  - id: A2
    given: 'A successful build under A1 on a POSIX system.'
    when: 'A developer invokes `./packages/caws-cli/dist/index.js --version` directly (without `node` prefix, relying on the shebang).'
    then: 'The process executes via the shebang line, prints the cli version string, and exits 0. The test runs this via child_process.spawnSync and asserts the exit code and stdout shape.'
  - id: A3
    given: 'A fresh `npm install --workspaces` in the repo root with no prior dist/ or node_modules/.bin symlinks.'
    when: 'After install completes and build finishes, a developer invokes `./node_modules/.bin/caws --version`.'
    then: 'The symlink resolves and the cli runs without EACCES or permission errors. (This is the workspace-local invocation path that tarball-truth tests in the v11.1.x cascade had to work around.)'
  - id: A4
    given: 'A build invoked with process.platform mocked to "win32" (unit-test isolation, not a real Windows runner).'
    when: 'build-cli.js runs.'
    then: 'No chmod call is attempted (verified via spy/mock on fs.chmodSync). No error is logged. The build completes with exit code 0. No POSIX-mode assertion is made on dist/index.js.'
  - id: A5
    given: 'A POSIX build where the chmod call is forced to throw (e.g., fs.chmodSync mocked to throw EPERM).'
    when: 'build-cli.js runs.'
    then: 'The build fails loudly with a clear error message naming "chmod failed on dist/index.js" and the underlying errno. Exit code is non-zero. dist/index.js may still exist but the build is considered failed (the next step in any release pipeline must observe the non-zero exit).'
non_functional:
  reliability:
    - 'The chmod is the LAST step in build-cli.js, after tsc emit completes. If chmod runs before tsc, tsc may overwrite the file and clear the mode bits.'
    - 'No silent skip on chmod errors. POSIX chmod can fail for legitimate reasons (read-only filesystem, EPERM), and those failures must surface, not be masked.'
  performance:
    - 'The chmod adds < 1 ms to the total build wall-clock. No perceptible regression on `npm run build`.'
contracts: []
# --- Triage ----------------------------------------------------------------
# Discovered during PR #3 tarball-truth verification. Tests had to invoke
# `node packages/caws-cli/dist/index.js` rather than the bin symlink
# because the file lacked +x. npm's bin-linking handles this at install
# time for downstream consumers, but local workspaces and tarball-extract
# tests do not.
#
# Implementation is intentionally tiny:
#   - After tsc emit completes in build-cli.js, add:
#       if (process.platform !== 'win32') {
#         fs.chmodSync(path.join(distDir, 'index.js'), 0o755);
#       }
#   - The verification test is the substance. It must:
#       (a) Run the build script in a temp dir (or assert on the
#           main build output if the test environment supports it).
#       (b) stat the file and check the mode bits.
#       (c) Spawn the file directly without `node` prefix and
#           verify the shebang dispatches correctly.
#       (d) Mock process.platform for the Windows-skip case.
#       (e) Mock fs.chmodSync to throw for the loud-failure case.
#
# Activation note: defer until CAWS-RELEASE-TAG-DRIVEN-001 lands.
# This spec ships a CLI build-output change; tagging a publish for it
# before the release substrate is stable risks the ghost-release class
# documented in CLAUDE.md trap #7.
#
# Risk_tier 3 because the change is mechanically tiny and platform-
# guarded. Worst case is a Windows build silently skipping when it
# should not, which has no published impact (Windows bin-linking uses
# .cmd shims, not POSIX modes). Best case is permanent removal of the
# "tests have to use `node` prefix" workaround.
