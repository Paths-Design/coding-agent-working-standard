id: CAWS-ZCODE-AGENT-SURFACE-001
title: 'Add ZCode agent surface'
risk_tier: 2
mode: feature
lifecycle_state: active
created_at: '2026-07-06T15:37:58.223Z'
updated_at: '2026-07-06T15:42:20.797Z'
blast_radius:
  modules:
