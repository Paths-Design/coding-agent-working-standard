  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - packages/caws-cli/templates/hook-packs/shared/lib/agent-surface.sh
    - packages/caws-cli/templates/hook-packs/shared/lib/emit.sh
    - packages/caws-cli/src/init/hook-packs/types.ts
    - packages/caws-cli/src/init/hook-packs/register.ts
    - packages/caws-cli/src/init/hook-packs/manifest-shared.ts
