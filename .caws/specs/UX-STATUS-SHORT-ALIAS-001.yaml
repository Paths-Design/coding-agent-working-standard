updated_at: '2026-07-04T18:48:44.049Z'
blast_radius:
  modules:
    - 'packages/caws-cli status command'
    - 'CLI reference documentation'
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - 'packages/caws-cli/src/shell/commands/status.ts'
    - 'packages/caws-cli/src/shell/render/status.ts'
    - 'packages/caws-cli/src/shell/register.ts'
