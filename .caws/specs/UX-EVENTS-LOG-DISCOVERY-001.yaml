id: UX-EVENTS-LOG-DISCOVERY-001
title: 'Add event log discovery commands'
risk_tier: 3
mode: feature
lifecycle_state: active
created_at: '2026-07-04T05:11:36.838Z'
updated_at: '2026-07-04T05:11:36.838Z'
blast_radius:
  modules:
    - packages/caws-cli
    - docs
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - 'packages/caws-cli/src/shell/commands/events.ts'
    - 'packages/caws-cli/src/shell/index.ts'
    - 'packages/caws-cli/src/shell/register.ts'
    - 'packages/caws-cli/src/shell/command-metadata.ts'
    - 'packages/caws-cli/tests/shell/events-log-discovery.test.js'
    - 'docs/api/cli.md'
    - 'docs/command-reference.md'
    - 'docs/architecture/cli-ux-job-model-audit.md'
  out: []
invariants:
  - 'events list/show are read-only and never append, rotate, archive, rewrite, or lock events.jsonl.'
  - 'Event-log discovery verifies the current chain before reporting chain status, counts, latest event, or rotation records.'
  - 'Rotation summaries reuse the same archive digest and line-count semantics as events rotate and verify-archive.'
  - 'Missing or invalid event refs fail with explicit nonzero diagnostics and do not mutate .caws/.'
acceptance:
  - id: A1
    given: 'a repository with a valid .caws/events.jsonl chain'
    when: 'an operator runs caws events list --json'
    then: 'the command prints read-only chain status, counts by event type, the latest event handle, and rotation summaries without touching events.jsonl'
  - id: A2
    given: 'a repository with a rotated chain and archive'
    when: 'an operator runs caws events list and caws events show latest-rotation --json'
    then: 'the commands report the latest chain_rotated event, archive path, prior digest, prior line count, and whether the archive is present'
  - id: A3
    given: 'a repository with multiple events'
    when: 'an operator runs caws events show <seq|hash|prefix> --json'
    then: 'the command resolves a unique event after chain verification and prints stable seq/hash/event/spec/data fields'
  - id: A4
    given: 'an invalid or ambiguous event reference'
    when: 'an operator runs caws events show <ref>'
    then: 'the command exits nonzero with a targeted message and leaves events.jsonl byte-identical'
  - id: A5
    given: 'the command metadata and docs are regenerated'
    when: 'an operator runs caws events --help, caws events list --help, and caws events show --help from the dist-linked caws binary'
    then: 'the read-only discovery context and latest-rotation shortcut are visible in nested help and docs'
non_functional: {}
contracts: []
