id: CAWS-SPECS-WRITER-AUTOCOMMIT-001
title: 'specs-writer lifecycle ops must auto-commit, parity with worktrees-writer'
risk_tier: 3
mode: fix
lifecycle_state: closed
resolution: completed
created_at: '2026-05-27T19:20:15.837Z'
updated_at: '2026-05-27T19:33:45.432Z'
blast_radius:
  modules:
    - packages/caws-cli/src/store/specs-writer.ts
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - packages/caws-cli/src/store/specs-writer.ts
    - packages/caws-cli/tests/store
    - .caws/specs/CAWS-SPECS-WRITER-AUTOCOMMIT-001.yaml
  out:
    - .caws/policy.yaml
    - CODEOWNERS
    - packages/caws-cli/package.json
    - packages/caws-kernel
invariants:
  - >-
    Every specs-writer lifecycle op that mutates a `.caws/specs/*.yaml`
    file on disk MUST attempt an auto-commit of the change after the
    lifecycle transaction succeeds, exactly the same way
    worktrees-writer.ts:209-249 (autoCommitTransition) does for
    worktree create/bind/destroy/merge. Operations in scope:
    `createSpec` (new yaml), `closeSpec` (in-place yaml patch),
    `archiveSpec` (write to archive path + unlink original — both
    paths in the same autocommit).
  - >-
    The autocommit must run AFTER mapTxnToOutcome confirms
    `kind: 'success'`. A `partial_failure_recovered` outcome
    MUST NOT auto-commit, because the transaction rolled back its
    intended writes and there is nothing valid to commit.
  - >-
    The autocommit outcome rides on the writer's returned outcome's
    `data.audit_commit` field, mirroring worktrees-writer's outcome
    shape. Callers that want the sha can read it; callers that
    don't care still see `{ kind: 'success', id, path }` unchanged.
  - >-
    Cross-write chains MUST be commit-clean. Specifically: after
    `caws specs close <id>` writes the yaml, a subsequent
    `caws worktree destroy <bound-worktree>` MUST NOT see the spec
    yaml as `wasDirtyBeforeWrite`, because the prior `closeSpec`
    auto-committed it. This is the precise failure mode the slice
    was authored to fix (observed during the
    CAWS-WORKTREE-DESTROY-SESSION-RESOLUTION-001 close on
    2026-05-27).
acceptance:
  - id: A1
    given: |
      a clean git repo with .caws/ initialized and a fresh spec
      `FEAT-001`. The working tree is clean before the test.
    when: |
      `createSpec(cawsDir, {id: 'FEAT-002', ...})` is invoked.
    then: |
      The result is `Ok({kind: 'success', ...})` AND the writer
      auto-committed the new yaml. Asserted by:
        1. `git log --oneline -1` shows a `chore(caws): create FEAT-002`
           commit;
        2. `git status --short` shows the working tree is clean;
        3. The returned outcome's `data.audit_commit.kind === 'committed'`
           with a non-empty sha.
  - id: A2
    given: |
      a clean git repo with `FEAT-001` already created (and prior
      auto-commit landed). The working tree is clean.
    when: |
      `closeSpec(cawsDir, {id: 'FEAT-001', resolution: 'completed', ...})`
      is invoked.
    then: |
      The result is `Ok({kind: 'success', ...})` AND the spec yaml
      change (lifecycle_state: active → closed, +resolution, bumped
      updated_at) is auto-committed. `git status --short` returns
      empty after the call.
  - id: A3
    given: |
      a closed spec `FEAT-001` (after the A2 close). Working tree
      is clean.
    when: |
      `archiveSpec(cawsDir, {id: 'FEAT-001', ...})` is invoked.
    then: |
      The result is `Ok({kind: 'success', ...})` AND the auto-commit
      stages BOTH the new path under `.archive/` AND the deletion of
      the original active path. `git log --oneline -1` shows a single
      `chore(caws): archive FEAT-001` commit covering both file
      changes; `git status --short` is clean after.
  - id: A4
    given: |
      a clean git repo with spec `FEAT-001` that has been manually
      edited (a human added a comment to closure_notes and saved
      without committing). The yaml is dirty in the working tree.
    when: |
      `closeSpec(cawsDir, {id: 'FEAT-001', ...})` is invoked.
    then: |
      The result is `Ok({kind: 'success', ...})` — the lifecycle
      transaction still applies — BUT the autoCommit outcome on
      `data.audit_commit.kind === 'refused_dirty'`, naming the
      pre-write dirtiness as the reason. The user's prior edit is
      preserved AND the spec change is applied to the working tree
      (not committed). This preserves the existing autoCommit safety
      contract: never silently overwrite a user's uncommitted work.
  - id: A5
    given: |
      a clean git repo + a bound worktree + spec `FEAT-001` (the
      bound spec). The working tree is clean.
    when: |
      `closeSpec` is invoked, THEN `destroyWorktree` is invoked on
      the bound worktree. Both run sequentially in the same process
      against the same repo.
    then: |
      Both commands succeed AND both writes are committed. After the
      sequence, `git status --short` is clean. Specifically: the
      destroyWorktree autocommit succeeds (no `refused_dirty` from
      the spec yaml being dirty), because the prior closeSpec
      already auto-committed it. This is the regression test for
      the exact failure mode observed on 2026-05-27.
non_functional:
  reliability:
    - >-
      The autocommit must reuse the existing
      `git-autocommit.ts:autoCommit` function — no new commit
      machinery, no `--no-verify`, no `git add -A`. The function's
      existing safety contracts (skipped_no_git, refused_dirty,
      pre-commit-hook-respecting) carry through unchanged.
    - >-
      `archiveSpec` is the only op that writes two paths (the new
      archived yaml + the unlinked active yaml). The autocommit
      MUST stage both via a single `git add -- <toPath> <fromPath>`
      to produce one atomic commit; staging them separately or
      committing twice would split the move audit trail.
  security:
    - >-
      The autocommit must NEVER use `--no-verify` or any flag that
      bypasses pre-commit hooks. A downstream project's hook
      refusing the commit is a legitimate outcome
      (`AutoCommitOutcome.kind === 'refused_dirty'`); CAWS surfaces
      it as a non-fatal warning, never silences it.
contracts: []
closure_notes: |
  ROOT CAUSE (verified 2026-05-27 during CAWS-WORKTREE-DESTROY-
  SESSION-RESOLUTION-001 close):

  worktrees-writer.ts has autoCommitTransition (line 209) wired to
  every lifecycle op (createWorktree, bindWorktreeRepair,
  destroyWorktree, mergeWorktree). The autocommit captures
  pre-write state via capturePreWriteState (line 194), then calls
  git-autocommit.ts:autoCommit, which refuses if
  `wasDirtyBeforeWrite === true`.

  specs-writer.ts has NO autoCommit calls. createSpec, closeSpec,
  and archiveSpec write the yaml via runLifecycleTransaction and
  return — the change sits dirty in the working tree until the
  user manually commits.

  This is asymmetric, and the asymmetry is a latent bug:

  Scenario (observed 2026-05-27):
    1. User runs `caws specs close FEAT-001 --resolution completed`.
       Writer flips lifecycle_state, transaction succeeds, NO commit
       happens. Spec yaml is dirty.
    2. User runs `caws worktree destroy <bound-wt>`.
       destroyWorktree's capturePreWriteState checks
       isPathDirty(repoRoot, specRelPath) — TRUE because of step 1.
       Then autoCommit gets called with `wasDirtyBeforeWrite: true`
       and returns `kind: 'refused_dirty'`.
    3. The destroy's REGISTRY write (worktrees.json) is applied
       but NOT committed — silently sitting in the working tree
       until the next agent stumbles on it.

  The fix is mechanical: add autoCommit calls to createSpec,
  closeSpec, archiveSpec. The pattern is right there in
  worktrees-writer.ts:194-249; copy the shape.

  IMPLEMENTATION NOTES FOR THE AGENT:

    - Reuse `capturePreWriteState`-style helper but specialize for
      a single spec path (specs-writer doesn't touch worktrees.json).
    - Build the commit message from `(verb, specId)`:
        createSpec  → "chore(caws): create <ID>"
        closeSpec   → "chore(caws): close <ID>"
        archiveSpec → "chore(caws): archive <ID>"
    - For archiveSpec: pass BOTH the new archived path AND the
      unlinked original path to autoCommit so the move is one
      atomic commit. Pre-write dirtiness check is on the original
      path (the one we're moving).
    - Place the autoCommit call AFTER mapTxnToOutcome confirms
      `kind: 'success'`. Match the worktrees-writer.ts:611-628 shape:

        const autoCommitOutcome = autoCommitFor({...});
        return ok({
          kind: 'success',
          id: input.id,
          path: ...,
          data: { audit_commit: autoCommitOutcome },
        });

    - Extend `SpecWriterOutcome` to carry the optional
      `data.audit_commit` field, mirroring `WorktreeWriterOutcome`.

  TEST FILES TO CREATE/EXTEND:
    - packages/caws-cli/tests/store/specs-writer-autocommit.test.js
      (NEW): A1, A2, A3, A4 + A5 cross-write regression.

  RESIDUALS (out of scope for this slice; noted so they are not
  silently ignored):

    - R1 — `caws specs migrate` (specs-migration.ts) also writes
      spec yaml and may have the same gap. Sibling agent's
      CAWS-MIGRATE-V10-SPECS-001 owns that surface; check after
      merge whether autoCommit is needed there too.
    - R2 — `caws evidence record` writes `.caws/events.jsonl`
      (append-only); event appends are NOT yaml mutations and do
      not need this autocommit pattern. The events log is a separate
      audit surface.
    - R3 — Failure-lineage doc entry could be added (this is the
      second autocommit-related bug — Sterling's `partial_failure_
      unrecovered` was the first). Deferred; the in-source comment
      block on the new spec-write autoCommit calls captures the
      rationale for the next agent.
