invariants:
  - 'caws specs create --id <spec-id> must be equivalent to supplying the positional <id>.'
  - 'Supplying both positional <id> and --id must fail before writing a spec or event.'
  - 'The positional id remains supported, and missing id diagnostics remain controlled by the create handler.'
acceptance:
  - id: A1
    given: 'an initialized CAWS project'
    when: 'an operator runs caws specs create --id <id> with the normal required semantic flags'
    then: 'the spec is created with that id through the existing spec_created path'
  - id: A2
    given: 'a create invocation with both a positional id and --id'
    when: 'caws specs create is invoked'
    then: 'the command refuses before spec/event mutation and explains that only one id source may be supplied'
  - id: A3
    given: 'help/docs/audit surfaces'
    when: 'build and docs checks run'
    then: 'they list --id as a compatibility alias and record the unknown-option evidence as fixed'
