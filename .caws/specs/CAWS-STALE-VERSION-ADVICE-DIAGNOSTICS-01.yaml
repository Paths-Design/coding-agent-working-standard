invariants:
  - 'I1: Strings-only fix in the listed files. NO behavioral changes to any kernel function or CLI command. The diagnostic structure (rule, severity, subject, narrowRepair) and conditions under which each diagnostic fires MUST remain identical; only the text content of the stale-version-advice strings changes.'
  - 'I2: The slice MUST patch every source-emission site of the stale-advice strings identified by the recon. There are 7 sites total: 6 in the kernel (packages/caws-kernel/src/doctor/inspect.ts:158/193/231, packages/caws-kernel/src/worktree/transitions.ts:82, packages/caws-kernel/src/scope/evaluate.ts:82/96), 1 in the CLI (packages/caws-cli/src/shell/commands/claim.ts:122-125). Leaving any of the 7 unpatched is a regression.'
  - 'I3: Kernel is admitted by scope.in by necessity (CLAUDE.md trap #5 escape clause). The admitted kernel files are the EXACT three identified by recon (inspect.ts, transitions.ts, evaluate.ts). Other kernel files (index.ts, spec, policy, result, diagnostics, schemas, evidence, waiver) are explicitly scope.out — a regression that touches them is a defect in this slice.'
  - 'I4: NO changes to packages/caws-cli/package.json or package-lock.json. The preflight check identified a lockfile drift caused by CAWS-STATUS-AGENTS-SUMMARIZE-ACTIVE-AGENTS-01 (package.json says @paths.design/caws-kernel:^1.1.0; lockfile still says ^1.0.0). That drift is recorded as the follow-up candidate slice CAWS-CLI-KERNEL-DEP-LOCKFILE-HYGIENE-01 and MUST NOT be repaired here.'
  - 'I5: NO changes to documentation. DOCS-V11-CUTOVER-FINALIZE-01 already handled the README/AGENTS.md/CLAUDE.md/architecture-doc surface. CHANGELOG entries are also out of scope (a release-bump slice may bundle this fix later).'
  - 'I6: NO changes to the status/agents code path from CAWS-STATUS-AGENTS-SUMMARIZE-ACTIVE-AGENTS-01 (status.ts, agents.ts). Disjoint scope is preserved.'
  - 'I7: NO new diagnostic emission paths created. NO new exported kernel symbols. NO changes to public types or shapes. The fix is purely text-replacement within existing string literals.'
  - 'I8: The replacement diagnostic text MUST point users at canonical current commands. Strings that say "pin to caws-cli@^10.2.x for caws worktree merge X" become "use caws worktree merge X" (the command exists in v11.1.x; the conditional has been false for months). Strings that say "v11.0.0 does not ship caws worktree bind; pin to caws-cli@^10.2.x for the convenience command" become text that names caws worktree bind directly. Strings that say "v11.0.0 does not ship worktree lifecycle commands" should be removed or rewritten to use caws worktree create/destroy/merge/bind/repair-sparse. The docs/migration-v10-to-v11.md doc is only mentioned for users migrating FROM v10.2, never as downgrade advice.'
acceptance:
  - id: A1
    given: 'The 7 source emission sites of the stale-advice strings identified by recon.'
    when: 'The slice patches them.'
    then: 'A `grep -rn "v11.0.0 does not ship\|pin to caws-cli@\^10.2" packages/caws-cli/src packages/caws-kernel/src` returns ZERO matches. No source emission site retains the stale text. The grep MUST be exhaustive across both packages'' src trees.'
  - id: A2
    given: 'The replacement text in the 6 kernel sites + 1 CLI site.'
    when: 'A reviewer reads each replacement against its surrounding context.'
    then: 'Each replacement names the current canonical command for the situation: caws worktree bind (for scope-evaluate unbound), caws worktree merge/destroy (for transition blocks), the actual command corresponding to each doctor finding. No replacement invents a non-existent command. No replacement directs users to npm install commands or pin advice.'
  - id: A3
    given: 'A new regression test at packages/caws-kernel/tests/diagnostic-text.test.ts (or .js, matching kernel test convention).'
    when: 'The test is run.'
    then: 'The test imports the relevant kernel functions (inspectProjectState, the scope evaluator, the transition validators), invokes them against fixtures that trigger each of the 6 kernel-emitted stale-advice rules, asserts the resulting narrowRepair / message string does NOT match /pin to caws-cli@\^10\.2/ or /v11\.0\.0 does not ship/. At least 6 sub-tests (one per kernel rule).'
  - id: A4
    given: 'A new regression test at packages/caws-cli/tests/shell/claim-stale-version-advice.test.js.'
    when: 'The test is run.'
    then: 'The test invokes runClaimCommand with cwd outside any CAWS worktree, asserts stderr does NOT contain "v11.0.0 does not ship" or "pin to caws-cli@^10.2.x", asserts stderr DOES contain current v11.1-aware advice (cd into a worktree under .caws/worktrees/<name>, or use caws claim --takeover when appropriate).'
  - id: A5
    given: 'The fix applied.'
    when: 'Existing kernel + CLI test suites are run.'
    then: 'All existing tests pass. No regression in doctor.test.ts, scope-evaluate tests, transition tests, claim-command.test.js, or any other suite that exercises diagnostic content. A small number of existing tests may currently assert ON the stale text (e.g., snapshot tests). Such tests MUST be updated as part of this slice to assert on the new text; that is a legitimate scope-in change.'
  - id: A6
    given: 'The slice closes.'
    when: 'The merged tree is inspected.'
    then: 'Modified files are exactly the 4 source files (packages/caws-kernel/src/doctor/inspect.ts, packages/caws-kernel/src/worktree/transitions.ts, packages/caws-kernel/src/scope/evaluate.ts, packages/caws-cli/src/shell/commands/claim.ts), plus any test files added or updated under packages/caws-kernel/tests or packages/caws-cli/tests/shell. No docs, no package.json, no CHANGELOG, no release artifacts, no status/agents files, no other kernel files touched.'
  - id: A7
    given: 'Preflight identified lockfile drift (packages/caws-cli/package.json declares @paths.design/caws-kernel:^1.1.0, but package-lock.json line 13153 still says ^1.0.0).'
    when: 'The slice closes.'
    then: 'The lockfile is unchanged by this slice. The drift is recorded in closure_notes as the candidate follow-up CAWS-CLI-KERNEL-DEP-LOCKFILE-HYGIENE-01. A grep `grep -n "@paths.design/caws-kernel" package-lock.json` after the slice still shows ^1.0.0 — same as before the slice.'
  - id: A8
    given: 'The merged tree.'
    when: 'A future CAWS-CLI-KERNEL-DEP-LOCKFILE-HYGIENE-01 slice is opened to repair the lockfile drift, OR a release-bump slice publishes v11.1.7 bundling this stale-advice fix.'
    then: 'Zero scope conflict with this slice: this slice owns text-replacement in diagnostic emission sites; those slices own package.json/lockfile/CHANGELOG/release artifacts respectively. Disjoint.'
non_functional:
  reliability:
    - 'The text replacements MUST be deterministic. No timestamps, session ids, runtime-dependent content. A future re-run of the same edits against the same HEAD MUST produce a byte-identical diff.'
    - 'The new test assertions MUST be specific enough to catch a regression where the stale text is re-introduced (e.g., a future agent reverts a string). Substring negation (`expect(text).not.toMatch(/pin to caws-cli/)`) is preferred over equality checks because future doctor messages may legitimately reorder unrelated content.'
