invariants:
  - 'Root cause (confirmed empirically 2026-05-29): the agent Bash tool runs with HOOK_SESSION_ID unset (verified: `echo $HOOK_SESSION_ID` => empty in agent Bash). parse-input.sh exports HOOK_SESSION_ID only into the hook''s own subshell; Claude Code hooks run as separate processes and cannot inject env into the tool''s shell. So a `caws` command the agent invokes directly skips resolveSession tier-1 (CLAUDE_SESSION_ID) and tier-2 (HOOK_SESSION_ID) and lands in tier-2.5 (durable-envelope scan).'
  - 'The race: with N>=2 concurrent agents there are >=2 fresh tmp/<id>/.session-envelope.json files, so tier-2.5 consults the disambiguator tmp/.caller-session.json (written by parse-input.sh lines 209-239). That pointer is a SINGLE shared per-repo file overwritten last-writer-wins by whichever session most recently fired ANY hook. A `caws worktree create` issued while a sibling''s PreToolUse hook fired last is stamped with the sibling''s session_id as owner.'
  - 'This is a regression/gap in the now-closed CAWS-WORKTREE-OWNERSHIP-HARNESS-ID-001, which introduced .caller-session.json to fix capsule-fallthrough but substituted a last-writer-wins shared singleton for per-process identity. The transcript folder (tmp/<HOOK_SESSION_ID>/) is unaffected because session-log.sh reads HOOK_SESSION_ID directly in-process — which is why it is the only stable id (maintainer observation, 2026-05-29).'
  - 'CHOSEN FIX (probe confirmed 2026-05-29): Claude Code exports CLAUDE_CODE_SESSION_ID into EVERY tool subprocess including agent-Bash. Its value is the harness session UUID — identical to HOOK_SESSION_ID, to tmp/<id>/, and to the worktrees.json owner format (bare UUID). It is distinct per session and currently referenced NOWHERE in the resolver or hooks. Probe evidence: in this session CLAUDE_CODE_SESSION_ID=7afd0e73… equals the status-reported session; the mis-stamped worktree owner was the sibling 14132976…; a tier reading CLAUDE_CODE_SESSION_ID would have stamped the true caller. Fix: add it as authority tier 1.5 in resolveSession (after CLAUDE_SESSION_ID operator-override, before HOOK_SESSION_ID) and mirror it in resolveSessionCandidates; source label claude_code_env; new SHELL_RULES.SESSION_RESOLVED_FROM_CLAUDE_CODE_ENV. The racy tmp/.caller-session.json path remains as a lower-tier fallback for harnesses (e.g. Cursor) that do not set CLAUDE_CODE_SESSION_ID — no removal, no behavior change for them. Still exact session_id equality, still per-session, never newest-wins; foreign-claim refusal untouched. Live binary runs from dist/, so a dist rebuild is required for the fix to take effect.'
  - 'Out of scope and untouched: .caws/policy.yaml, CODEOWNERS, CLAUDE.md, and the worktrees-writer ownership-comparison surface (resolveSessionCandidates/admitsOwner already admit all fresh envelopes for COMPARISON; the defect is on the WRITE/stamp path in resolveSession, not the comparison path).'
acceptance:
  - id: A1
    given: two or more concurrent agent sessions active in the same repo, each having fired hooks, with HOOK_SESSION_ID unset in each agent''s Bash tool shell
    when: one agent runs a write-class caws command that stamps ownership (e.g. caws worktree create)
    then: the owner recorded in .caws/worktrees.json is the invoking agent''s harness session id, deterministically, regardless of which sibling fired a hook most recently.
  - id: A2
    given: the repo with two fresh durable envelopes and a tmp/.caller-session.json naming the OTHER session
    when: resolveSession runs for a write-class command on behalf of the actual caller
    then: it resolves to the caller''s own harness id (not the pointer''s last-writer), or refuses with a typed ambiguity diagnostic — never silently stamps the wrong session.
  - id: A3
    given: a single-agent repo (one fresh envelope, HOOK_SESSION_ID unset in agent Bash)
    when: any caws write-class command runs
    then: resolution is unchanged from today (the sole fresh envelope resolves cleanly); no regression to the common single-agent path.
  - id: A4
    given: the implemented fix
    when: the caws-cli resolve-session test suite runs
    then: a new regression test reproduces the >=2-fresh-envelope last-writer-wins misattribution and asserts the fix resolves to the correct caller; existing resolve-session tests still pass.
non_functional:
  security:
    - The fix must not weaken the foreign-claim refusal or admit a session to take ownership it did not earn; session_id equality remains the only ownership-admission rule.
  reliability:
    - No newest-wins or recency-based authority. Ambiguity that cannot be resolved to the true caller must REFUSE with a typed diagnostic, not guess. Stale lease/pointer is evidence, never authority (doctrine invariant 8).
