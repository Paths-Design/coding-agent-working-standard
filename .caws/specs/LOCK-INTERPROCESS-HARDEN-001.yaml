invariants:
  - 'One quality-gates subprocess runs per (cwd) at a time. v11.1.0 already enforces per-cwd lock placement; this slice adds the regression test that proves it.'
  - 'Locks are released on normal exit AND on uncaught termination (SIGINT, SIGTERM, parent process death).'
  - 'A foreign stale lock (older than the lock TTL with an unreachable pid) is reclaimable; a foreign live lock is not.'
acceptance:
  - id: A1
    given: 'A quality-gates subprocess is already running in cwd X.'
    when: 'A second quality-gates subprocess is launched in cwd X.'
    then: 'The second subprocess waits (or fails fast, TBD by implementation) until the first releases. The two subprocesses never run concurrently in cwd X.'
  - id: A2
    given: 'Quality-gates subprocesses are running concurrently in distinct cwds X and Y.'
    when: 'Both run to completion.'
    then: 'Neither blocks the other. (Per-cwd lock invariant — already shipped in v11.1.0; this is the missing regression test.)'
  - id: A3
    given: 'A quality-gates subprocess has crashed leaving a stale lockfile.'
    when: 'A new subprocess is launched in the same cwd.'
    then: 'The stale lock is reclaimed; the new subprocess proceeds. No manual cleanup required.'
non_functional:
  reliability:
    - 'Lock acquire/release path is tested under SIGTERM and unhandled-throw failure modes.'
  performance:
    - 'Per-cwd lock has no observable contention cost in the single-runner case.'
contracts: []
# --- Triage (deferred from v11.1.0) -----------------------------------------
# The per-cwd fix (commit 1fa38c3) eliminated the parallel-jest-worker
# contention that caused the 180s timeout. But the fix has no dedicated
# regression test — the cross-cwd invariant is exercised only incidentally
# by jest's parallelism.
#
# Open questions before implementation:
#   - Should the second-runner-in-same-cwd path wait (with timeout) or fail
#     fast? Current behavior is wait; fail-fast might be more useful for CI.
#   - What is the lock TTL? Should it be configurable per project?
#   - Are there platforms where flock semantics differ (Windows, certain
#     container filesystems) that need explicit handling?
