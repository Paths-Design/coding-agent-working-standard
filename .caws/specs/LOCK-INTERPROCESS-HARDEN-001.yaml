id: LOCK-INTERPROCESS-HARDEN-001
title: 'Quality-gates lock — interprocess hardening + regression coverage'
risk_tier: 3
mode: chore
lifecycle_state: draft
created_at: '2026-05-18T00:00:00.000Z'
updated_at: '2026-05-18T00:00:00.000Z'
blast_radius:
  modules:
    - packages/quality-gates/scripts/run-quality-gates.mjs
    - packages/quality-gates/lib/lock.mjs
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - packages/quality-gates/scripts/run-quality-gates.mjs
    - packages/quality-gates/lib/lock.mjs
    - packages/quality-gates/tests/lock-interprocess.test.js
    - .caws/specs/LOCK-INTERPROCESS-HARDEN-001.yaml
  out:
    - packages/caws-cli/src/store/lifecycle-lock.ts
