id: CAWS-SCOPE-AMEND-COMMAND-001
title: 'caws specs amend-scope: governed scope.in amendment without agent cherry-pick; reconcile amendment protocol with the cherry-pick danger latch'
risk_tier: 2
mode: feature
lifecycle_state: active
created_at: '2026-05-30T01:53:24.257Z'
updated_at: '2026-05-30T01:53:24.257Z'
