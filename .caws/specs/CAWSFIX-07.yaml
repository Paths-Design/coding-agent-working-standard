id: CAWSFIX-07
type: fix
title: Budget derivation no-ops cleanly when spec has no change_budget (D4)
status: active
risk_tier: 2
mode: development
created_at: '2026-04-17T16:37:05.364Z'
updated_at: '2026-04-17T16:37:05.365Z'
blast_radius:
  modules:
    - packages/caws-cli/src/budget-derivation
    - packages/caws-cli/src/gates/budget-limit
  data_migration: false
operational_rollback_slo: 5m
