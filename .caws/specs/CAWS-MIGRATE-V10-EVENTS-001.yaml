# v10/v11 hash divergence (the load-bearing investigation finding):
#
# v10 hashed envelopes with top-level session_id and a string actor:
#   { seq, ts, session_id, actor: "cli", event, spec_id?, data?,
#     prev_hash }
# v11 hashes envelopes with no top-level session_id and a structured
# actor:
#   { seq, event, ts, actor: {kind, id, session_id?, platform?},
#     spec_id?, data, prev_hash }
# Domain separator (`caws.events.v1\x00`) is identical between v10 and
# v11. Canonicalization (sorted keys, no whitespace) is identical. Hash
# algorithm (sha256) is identical. The breaking differences are
# session_id at envelope level and actor as string vs object — either
# one alone is sufficient to produce a mismatched digest. Conclusion:
# v11 verifyChain re-hashing a v10 line will produce a digest that does
# not match the stored event_hash. prior_chain_status: 'verified' is
# unreachable.
#
