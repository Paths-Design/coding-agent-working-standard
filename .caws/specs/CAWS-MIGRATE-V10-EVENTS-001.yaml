invariants:
  - >-
    Invariant 1 (the original "events.jsonl is written ONLY through
    appendEvent") is AMENDED, not superseded. The slice introduces a
    second sanctioned writer, rotateEvents, in the same module
    (packages/caws-cli/src/store/events-store.ts), holding the same lock
    (.caws/events.jsonl.lock). No third writer is permitted. Shell
    commands NEVER write events.jsonl directly; migration tooling NEVER
    bypasses the lock. The amendment lands in
    docs/architecture/caws-vnext-command-surface.md §6 as invariant 14
    before any kernel or store code in this slice is merged.
  - >-
    Chain rotation preserves the prior chain VERBATIM under a timestamped
    archive name (events.jsonl.archive-<ISO timestamp>). The new chain
    starts with a single chain_rotated genesis event citing the prior
    tail hash, the archive file path, the archive file's sha256 digest,
    the prior line count, the actor-shape stats, the migration reason,
    and the prior chain status. Rewriting hashes is explicitly REFUSED
    as a strategy — the v11 hash algorithm hashes a different envelope
    shape than v10 (top-level session_id moved into actor.session_id,
    actor string → structured object), so re-hashing under v11 code
    produces a different digest and silently destroys tamper-evidence.
  - >-
    Old v10 chains can NEVER reach prior_chain_status `verified` under
    v11 code. The enum is `["parseable_unverified", "unparseable",
    "empty"]`. `"verified"` is deliberately excluded because the v11
    hash algorithm consumes a structurally different envelope than v10
    did (confirmed by hash.ts:36-54 vs git show 962ff7c^:packages/
    caws-cli/src/utils/event-log.js). A future enum extension for
    v11→v11 rotations (where hashes ARE re-verifiable) is permitted
    but is NOT a v11.2 deliverable.
  - >-
    Archive bytes are cryptographically tied to the new chain via the
    prior_file_digest field on the chain_rotated event. After rotation,
    `caws events verify-archive` recomputes the archive's sha256 + line
    count and asserts match against the chain_rotated payload. If the
    archive is edited after rotation, verify-archive surfaces the
    mismatch as a typed diagnostic — the old chain's integrity is
    preserved by external storage of the digest in the new chain, not
    by the old chain's internal hash linkage (which v11 cannot verify).
  - >-
    Half-upgrade refusal is a structural guard, not a documentation
    note. `caws events migrate --apply` MUST refuse when v10 spec YAMLs
    are detected unless `--allow-partial-upgrade` is explicitly passed.
    The check is mechanical: scan .caws/specs/*.yaml for v10 top-level
    keys (`type`, `status`, `acceptance_criteria`) and refuse if any
    are found. Until deliverable 2 (CAWS-MIGRATE-V10-SPECS-001) lands,
    the detector is implemented in this slice as a minimal scanner —
    deliverable 2 may replace it with the richer detectSpecVersion
    function, but the refusal behavior is owned by this slice and MUST
    NOT be deferred.
  - >-
    `caws events rotate` (the direct rotation command, distinct from
    `caws events migrate --apply`) REFUSES against a clean v11 chain
    unless `--allow-clean` is passed. General log rotation is a
    legitimate operator operation but it MUST NOT be casual — an
    archive boundary can hide inconvenient evidence behind it, and
    making the operation explicit-and-friction guards against that
    failure mode without forbidding the operation outright. `--reason
    "<text>"` is REQUIRED for every rotate invocation regardless of
    chain state; the reason is recorded verbatim in the chain_rotated
    payload's migration_reason field.
  - >-
    rotateEvents is implemented in events-store.ts (NOT in a separate
    module) so it reuses the private acquireLock/releaseLock/
    tryRecoverStaleLock primitives directly. Lifting the lock
    primitives to module-exported helpers would expose a third writer
    surface to any caller that imports them — exactly the failure mode
    invariant 14 forbids. The lock primitives stay private; the second
    writer co-locates with the first.
  - >-
    The migration detector (detectEventsLogShape in events-migration.ts)
    NEVER calls validateChainedEvent on legacy lines. Calling the strict
    validator on a v10 line is the exact failure mode this slice exists
    to repair — the detector parses each line with JSON.parse, classifies
    actor shape by direct type inspection (typeof obj.actor === 'string'
    → v10, object with kind → v11), and emits stats without invoking
    the kernel's evidence validator on lines it has classified as v10.
  - >-
    Packaging integrity is enforced structurally. A new kernel-side
    test (packages/caws-kernel/tests/packaging/schemas-shipped.test.js)
    asserts that every src/schemas/**/*.json has a counterpart in
    dist/schemas/**/*.json after build. This closes the gap that
    caws-cli already has via tests/packaging/files-allowlist.test.js
    and prevents the class of failure where the new chain_rotated.v1.json
    is in source but missing from the published tarball. Adding a
    static import in evidence/validate.ts is necessary but not
    sufficient — the test makes the post-build invariant verifiable.
  - >-
    Functional completeness is not "unit tests pass." The slice is
    complete only when (a) the doctrine amendment is published and
    invariant 14 is canonical, (b) `npm pack` smoke for both packages
    shows chain_rotated.v1.json in the tarball, (c) the
    events-migration-smoke.mjs script runs the full end-to-end flow
    against a hand-authored v10 events.jsonl in a scratch directory
    against installed tarballs (not source), and (d) the sterling
    smoke (in a disposable sterling copy) confirms the legacy 1500-
    entry events.jsonl rotates cleanly, verify-archive succeeds, and
    a subsequent appendEvent works normally. Sterling smoke is the
    final acceptance gate; sterling stays pinned to caws-cli@10.2.0
    until that gate passes.
acceptance:
  - id: A1
    given: |
      docs/architecture/caws-vnext-command-surface.md §6 currently
      defines invariant 1 ("events.jsonl is written ONLY through
      appendEvent") and v11.2 invariants 8-13. No mention of rotation.
    when: |
      The doctrine commit lands in this slice (first commit, before
      any kernel/store code).
    then: |
      §6 contains a new invariant 14 explicitly permitting rotateEvents
      as a second writer in events-store.ts under the same lock,
      enumerating that shell commands and migration tooling are NOT
      permitted to write events.jsonl directly, and stating that no
      third writer is permitted. A new control-plane subsection
      enumerates the events command group (rotate, migrate, verify-
      archive) and specs migrate as maintenance/control-plane
      operations distinct from normal evidence operations. Audit 1 in
      §9 ("Result: zero blockers") is amended with a note that
      rotateEvents is explicitly permitted by invariant 14 and does
      not violate invariant 1.
  - id: A2
    given: |
      The kernel's events.v1.json envelope schema lists 23 event types
      and the EventType union in evidence/types.ts mirrors it. No
      chain_rotated event exists.
    when: |
      The kernel slice of this work lands.
    then: |
      Four kernel files are modified: (1) events.v1.json gains
      "chain_rotated" in the envelope event enum at lines 51-74 and the
      $comment at line 97 is updated. (2) types.ts EventType union
      gains 'chain_rotated' and the NO_SPEC_ID Set at lines 126-131
      gains 'chain_rotated' (rotation is a repo-level event). (3) A
      new payload schema chain_rotated.v1.json exists at packages/
      caws-kernel/src/schemas/events/ with required fields:
      prior_tail_hash (sha256 pattern OR null for prior-empty chains
      enum class), prior_file_path (string, minLength 1),
      prior_file_digest (sha256 pattern), prior_line_count (integer,
      minimum 0), prior_chain_status (enum ["parseable_unverified",
      "unparseable", "empty"]), actor_shape_stats (object with integer
      counts v10_string_actor, v11_object_actor, unparseable),
      migration_reason (string, minLength 1). Optional: prior_seq
      (integer, minimum 1). additionalProperties: false. (4) validate.ts
      gains a static import of the new schema, adds 'chain_rotated' to
      KNOWN_EVENT_TYPES, and registers it in PAYLOAD_SCHEMAS.
  - id: A3
    given: |
      The new chain_rotated payload schema and a representative
      payload object.
    when: |
      validateEventBody is called on the payload.
    then: |
      A complete valid payload (all required fields present, types
      correct, prior_chain_status in enum, sha256 patterns match)
      returns ok. A payload missing any required field returns err
      with a diagnostic naming the missing field. A payload with
      prior_chain_status outside the enum returns err. A payload with
      a prior_file_digest that doesn't match the sha256 pattern
      returns err. A payload with additionalProperties returns err.
  - id: A4
    given: |
      A built caws-kernel package with dist/schemas/events/ present
      on disk.
    when: |
      packages/caws-kernel/tests/packaging/schemas-shipped.test.js
      runs.
    then: |
      The test enumerates every file under src/schemas/**/*.json and
      asserts its counterpart exists under dist/schemas/**/*.json.
      The test explicitly asserts that dist/schemas/events/
      chain_rotated.v1.json exists (it is the test case that proves
      the new schema would survive npm publish). The test fails if
      the static import is missing from validate.ts (because tsc
      wouldn't copy the file) or if package.json files allowlist
      excludes dist/schemas/.
  - id: A5
    given: |
      An events-store.ts that exports appendEvent and the private lock
      primitives acquireLock/releaseLock/tryRecoverStaleLock.
    when: |
      The store slice of this work lands.
    then: |
      events-store.ts gains an exported rotateEvents(cawsDir, opts:
      { reason: string, actor: Actor, allowClean?: boolean }) function.
      Under the lock (using the existing private primitives, NOT a
      new lock surface): (1) stat the file; if missing or empty,
      refuse with STORE_RULES.EVENTS_ROTATE_NOTHING_TO_ROTATE.
      (2) Compute sha256 of the file bytes (streaming). (3) Tolerant
      tail-scan: read the last non-empty line, JSON.parse defensively,
      pluck event_hash and seq if present (no validateChainedEvent
      call). (4) Full-file actor-shape scan, counting v10_string_actor
      / v11_object_actor / unparseable. (5) If detection shows
      all-v11 actor shapes and allowClean !== true, refuse with
      STORE_RULES.EVENTS_ROTATE_CLEAN_CHAIN_REQUIRES_ALLOW_CLEAN.
      (6) fs.renameSync to events.jsonl.archive-<ISO>. (7) Build
      chain_rotated body with all gathered evidence. (8) Call
      prepareAppend(null, body) for genesis of new chain.
      (9) fs.openSync(eventsPath, 'w') + writeFileSync + fsyncSync
      the genesis line. (10) Release lock. Returns the new
      ChainedEvent on success. New rules constants added to
      packages/caws-cli/src/store/rules.ts:
      EVENTS_ROTATE_NOTHING_TO_ROTATE,
      EVENTS_ROTATE_CLEAN_CHAIN_REQUIRES_ALLOW_CLEAN,
      EVENTS_ARCHIVE_DIGEST_MISMATCH,
      EVENTS_ARCHIVE_LINE_COUNT_MISMATCH,
      EVENTS_MIGRATE_PARTIAL_UPGRADE_REFUSED.
  - id: A6
    given: |
      A scratch directory containing a 3-line v10-shape events.jsonl
      (actor as string).
    when: |
      rotateEvents is called with reason "smoke test".
    then: |
      The new events.jsonl contains exactly one line: a chain_rotated
      genesis event. The archive file events.jsonl.archive-<ISO>
      contains the original 3 lines byte-for-byte (proven by sha256
      comparison against a digest captured before the call). The
      chain_rotated payload has: prior_line_count = 3,
      actor_shape_stats.v10_string_actor = 3, v11_object_actor = 0,
      unparseable = 0, prior_chain_status =
      "parseable_unverified", prior_tail_hash = the third line's
      event_hash extracted by tolerant parse, prior_seq = 3,
      prior_file_path = "events.jsonl.archive-<ISO>",
      prior_file_digest matches the archive's recomputed sha256,
      migration_reason = "smoke test". A subsequent appendEvent
      call succeeds (the new chain is appendable). The lock file
      events.jsonl.lock does not persist after the function returns.
  - id: A7
    given: |
      A scratch directory containing an empty events.jsonl, or no
      events.jsonl file at all.
    when: |
      rotateEvents is called.
    then: |
      The function returns err with STORE_RULES.
      EVENTS_ROTATE_NOTHING_TO_ROTATE. The events.jsonl file (if
      present) is unchanged. No archive file is created. The lock
      file does not persist.
  - id: A8
    given: |
      A scratch directory containing a clean v11-shape events.jsonl
      (all entries have structured actor with kind/id).
    when: |
      rotateEvents is called with allowClean omitted or false.
    then: |
      The function returns err with STORE_RULES.
      EVENTS_ROTATE_CLEAN_CHAIN_REQUIRES_ALLOW_CLEAN. The file is
      unchanged. No archive is created. When allowClean: true is
      passed, the rotation proceeds normally with prior_chain_status
      = "parseable_unverified" still (v11 hashes also cannot be
      reverified across a rotation by v11 code that hashes the
      genesis event of the new chain — verification is per-chain,
      not cross-chain).
  - id: A9
    given: |
      A built caws-cli package with events-migration.ts in the store.
    when: |
      detectEventsLogShape is called with arrays of raw JSONL lines
      representing each classification case.
    then: |
      Returns { kind: 'all_v10', stats } for a list of all v10-actor
      lines. Returns 'all_v11' for all-object-actor lines. Returns
      'mixed_v10_v11' when both shapes appear. Returns 'empty' for
      an empty input. Returns 'unparseable_only' when every line
      fails JSON.parse. The function does NOT call
      validateChainedEvent — proven by import inspection of the
      compiled module. Stats correctly tally
      v10_string_actor / v11_object_actor / unparseable across all
      input lines.
  - id: A10
    given: |
      A scratch directory with both a v10 events.jsonl and v10-shape
      spec YAMLs in .caws/specs/.
    when: |
      runEventsMigrateCommand is called with from: 'v10', apply: true,
      allowPartialUpgrade: false (or omitted).
    then: |
      The command returns err with STORE_RULES.
      EVENTS_MIGRATE_PARTIAL_UPGRADE_REFUSED. The error message names
      the specific spec file(s) detected as v10 and the explicit
      remediation: "run 'caws specs migrate --from v10 --dry-run'
      first or pass --allow-partial-upgrade". When the same call is
      made with allowPartialUpgrade: true, the migration proceeds.
      When the v10 specs are absent (or are all v11), the migration
      proceeds without needing the flag. The v10-spec detection in
      this slice uses a minimal scanner (top-level keys 'type',
      'status', 'acceptance_criteria'); deliverable 2 may replace it
      with the richer detectSpecVersion but the refusal behavior is
      owned by this slice.
  - id: A11
    given: |
      A rotated chain (one chain_rotated genesis event in events.jsonl)
      and the corresponding events.jsonl.archive-<ISO> file.
    when: |
      runEventsVerifyArchiveCommand is called with archivePath
      omitted (defaults to the path named by the most recent
      chain_rotated event).
    then: |
      The command recomputes the archive file's sha256 and line count
      and asserts both match the chain_rotated payload's
      prior_file_digest and prior_line_count. Returns ok with a
      verification summary line on match. Returns err with
      EVENTS_ARCHIVE_DIGEST_MISMATCH if the digest differs (proves
      tamper detection). Returns err with EVENTS_ARCHIVE_LINE_COUNT_
      MISMATCH if line count differs. Returns err with a typed
      "archive missing" diagnostic if the file is absent. When
      archivePath is supplied explicitly, verifies against the most
      recent chain_rotated event regardless of which archive the user
      named (the chain is the authority for what should be verified).
  - id: A12
    given: |
      A packaged caws-cli and caws-kernel installed into a scratch
      directory via npm pack + npm install (NOT source-tree imports).
    when: |
      packages/caws-cli/scripts/events-migration-smoke.mjs runs.
    then: |
      The script: (1) creates a tmpdir with .caws/; (2) hand-authors
      a 3-line v10 events.jsonl; (3) runs `node bin/caws events
      migrate --from v10 --dry-run` (assert all_v10 detection in
      output); (4) runs `node bin/caws events rotate --reason
      "smoke"` (assert exit 0; assert archive file created); (5)
      runs `node bin/caws events verify-archive` (assert exit 0,
      match reported); (6) runs `node bin/caws specs create FOO-001
      --mode chore --risk-tier 3 --title "smoke"` (assert exit 0
      proving appendEvent works on the new chain). The script is
      wired into packages/caws-cli/scripts/fresh-install-smoke.mjs
      so it runs as part of the prepublishOnly chain.
non_functional:
  reliability:
    - >-
      rotateEvents is atomic from the operator's perspective: under the
      events.jsonl.lock, the sequence rename-old → write-new-genesis is
      uninterruptible. A crash between rename and genesis-write leaves
      the archive on disk but no new events.jsonl — the next caws
      command sees "no events.jsonl, create on first append" (invariant
      5: events.jsonl is never required at rest), and the archive is
      still verifiable by hash if the operator preserved the digest
      out-of-band. A crash during rename leaves events.jsonl in place
      (rename is atomic on a single filesystem); the rotation can be
      retried.
    - >-
      The lock primitives (acquireLock with stale-recovery + bounded
      retry, releaseLock with best-effort cleanup) are reused verbatim
      by rotateEvents. No new lock surface is introduced. The stale-
      recovery threshold (30s) and max attempts (3) match appendEvent
      exactly so behavior is uniform across the two writers.
    - >-
      Cross-platform: rotation uses fs.renameSync which is atomic on
      macOS/Linux/Windows when source and destination are on the same
      filesystem. The archive name uses a sortable ISO 8601 timestamp
      (events.jsonl.archive-<YYYY-MM-DDTHH-mm-ss-sssZ>); colons in the
      timestamp are replaced with hyphens for Windows filesystem
      compatibility.
  performance:
    - >-
      Full-file actor-shape scan reads the file once with a line-
      iterator; memory pressure is bounded by line size, not file
      size. For a 1500-entry log (sterling's observed case), the scan
      completes in well under 100ms on a typical workstation. The
      archive sha256 computation also streams; no full-file buffer is
      allocated.
contracts:
  - name: event-log-writer-surface
    type: behavior
    path: packages/caws-cli/src/store/events-store.ts
    description: >-
      The events.jsonl writer surface is closed and enumerated.
      (1) appendEvent is the canonical writer for evidence appends. It
      acquires events.jsonl.lock, validates the new event body, reads
      the prior chain via loadEvents to compute the next seq + prev_hash,
      calls prepareAppend, and writes the new line atomically.
      (2) rotateEvents is the sanctioned second writer for chain
      maintenance. It acquires the same lock, performs a tolerant tail
      scan (NOT validateChainedEvent) to capture prior_tail_hash + seq,
      computes prior_file_digest + actor_shape_stats, renames the
      existing file to events.jsonl.archive-<ISO>, builds a
      chain_rotated genesis body, calls prepareAppend(null, body), and
      writes the new file. (3) No other code in any package writes to
      events.jsonl; shell commands and migration tooling invoke these
      two functions through their exported store surface. (4) The lock
      primitives (acquireLock, releaseLock, tryRecoverStaleLock) are
      private to events-store.ts and MUST NOT be exported — exporting
      them would create a third writer surface by exposing the lock
      acquisition to callers that bypass the canonical functions.
      (5) chain_rotated has prior_chain_status enum
      ["parseable_unverified", "unparseable", "empty"]; "verified" is
      deliberately excluded for v10→v11 rotations because the v11 hash
      algorithm hashes a different envelope shape than v10. (6) Half-
      upgrade refusal: events migrate --apply MUST refuse when v10 specs
      detected unless --allow-partial-upgrade is passed; the detection
      is mechanical and lives in this slice (a minimal scanner that
      deliverable 2 may replace with a richer version). (7) Friction
      flags: --allow-clean is required to rotate a clean v11 chain;
      --reason "<text>" is required for every rotate invocation. These
      flags exist to make the operation explicit and auditable, not to
      prevent it. The contract is the normative interface for invariant
      14 in docs/architecture/caws-vnext-command-surface.md §6;
      implementation that drifts from these clauses violates the
      contract and requires a scope amendment.
# --- Triage ----------------------------------------------------------------
# Origin: two compounding regressions surfaced when a downstream consumer
# (the sterling project) updated to caws-cli@11.1.6:
#
# 1. events.jsonl shape regression (commit 962ff7c, Slice 3 evidence
#    kernel, 2026-05-08). The envelope `actor` field changed from string
#    ("actor": "cli", enum {cli, hook, session, agent}) to structured
#    object ({kind, id, session_id?, platform?}, kind enum {human,
#    agent, system, automation}). Top-level session_id was moved into
#    actor.session_id. Because appendEvent calls loadEvents which
#    validates every line, a single old-shape line makes the entire log
#    unappendable. Sterling has 1500 entries going back to 2026-04-11
#    that cannot be appended-after.
#
# 2. Spec YAML shape regression (v11.0 cutover via kernel Slice 1) —
#    OWNED BY CAWS-MIGRATE-V10-SPECS-001 (deliverable 2 of the migration
#    line). This slice handles only events; spec migration is a separate
#    spec. The half-upgrade refusal in A10 is the integration point
#    between the two slices: this slice REFUSES to apply event migration
#    while v10 specs are still present, so a partial upgrade cannot
#    silently happen.
#
# Investigation findings that shaped the design:
#
# A. Hashes are permanently parseable_unverified. The v11 hash algorithm
#    (packages/caws-kernel/src/evidence/hash.ts:36-54) hashes a different
#    envelope shape than v10. Re-hashing a v10 line under v11 code
#    produces a different digest. There is no path to verified for v10
#    chains. This is clarifying: the design does not need a verify
#    branch, just an honest classification. The chain_rotated payload's
#    prior_chain_status enum excludes "verified" deliberately and
#    permanently for the v10→v11 case.
#
# B. Spec migration crosswalk has traps this slice does NOT solve.
#    `mode: development` appears 13 times in repo; acceptance_criteria
#    has three shapes including {id, description, test_nodeids}; AC-1
#    id format needs renumbering to A1; risk_tier: T3 string form
#    exists in fixtures. All owned by deliverable 2.
#
# C. Packaging needs one new gate. caws-cli has prepublishOnly smoke +
#    tests/packaging/files-allowlist.test.js. caws-kernel has neither.
#    Adding chain_rotated.v1.json is safe iff (i) static import in
#    validate.ts, (ii) dist/schemas/events/chain_rotated.v1.json exists
#    post-build, (iii) a new kernel-side packaging test fires on PR.
#    This slice ships (iii) as A4.
#
# Authority-preservation framing (the reason this is not a one-day fix):
#
# This is not "make sterling upgrade." It is CAWS repairing a broken
# cutover contract. v11 deliberately removed legacy lifecycle surfaces
# to avoid mixed-regime authority conflicts; consumers needing
# lifecycle were expected to pin to caws-cli@^10.2.x until v11
# lifecycle returned. Now that v11 lifecycle is back (v11.1.x), the
# migration path must exist AND must preserve authority — not merely
# unblock the visible failure. Four guardrails enforce this:
#
#   1. Doctrine first (A1). Invariant 14 lands before any code.
#   2. chain_rotated is evidentiary, not decorative (A2/A6/A11). Payload
#      cites prior_file_digest, prior_line_count, prior_chain_status,
#      actor_shape_stats. verify-archive command exists.
#   3. Friction flags (A8, A10). --allow-clean for clean rotation;
#      --allow-partial-upgrade for events without specs.
#      --reason required always.
#   4. No half-upgraded state (A10). Mechanical refusal when v10 specs
#      detected.
#
# Commit ordering within the slice (the implementer's contract):
#
#   1. Doctrine amendment (A1) — lands first, reviewable on its own.
#   2. Kernel: chain_rotated event vocabulary (A2, A3).
#   3. Kernel: packaging guard test (A4).
