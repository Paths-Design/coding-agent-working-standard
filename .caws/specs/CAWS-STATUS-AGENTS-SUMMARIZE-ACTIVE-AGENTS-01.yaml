invariants:
  - 'I1: Code-fix slice. NO doc changes (README, AGENTS, CLAUDE.md, docs/* are out of scope). NO release publishes, NO npm dist-tag mutations, NO CHANGELOG entries authored in this slice (a release-bump slice may bundle this fix later). NO in-CLI stale-version-advice diagnostic strings touched (that is the disjoint scope of CAWS-STALE-VERSION-ADVICE-DIAGNOSTICS-01).'
  - 'I2: The fix MUST address the recon-identified root cause: caws-cli@11.1.x declares @paths.design/caws-kernel: ^1.0.0, which can resolve to kernel 1.0.0 (pre-leases, no summarizeActiveAgents export). The semver caret was correct at the time of publish but became too loose once kernel 1.1.0 introduced the leases substrate. Tighten the dep range to ^1.1.0 (the minimum kernel version that exports summarizeActiveAgents).'
  - 'I3: Tightening the dep range alone is necessary but not sufficient. The CLI MUST ALSO defensively guard the kernel feature so that a future kernel rev that removes or renames summarizeActiveAgents (or a broken/partial install) produces a typed diagnostic, not a Node `is not a function` crash with exit 0. The guard pattern is feature-detect (typeof === function) → use; else → return a typed empty/unavailable activity summary + warn via diagnostics, never throw.'
  - 'I4: Both runStatusCommand and runAgentsListCommand are call sites for summarizeActiveAgents (status.ts:236, status.ts:290, agents.ts:247, agents.ts:537 per recon). Every call site MUST be wrapped consistently. A regression where one site is guarded and another is not would leave the bug live on the unguarded path.'
  - 'I5: The empty/missing-state behavior the rehearsal report describes (status renders, agents list returns empty) MUST be preserved when summarizeActiveAgents IS available. The defensive guard is for the abnormal case (kernel-export missing); when the kernel is healthy, normal behavior is unchanged.'
  - 'I6: A regression test MUST exercise the kernel-export-missing case. The test pattern: mock or stub the imported summarizeActiveAgents to undefined at runtime, invoke runStatusCommand and runAgentsListCommand, assert non-crash exit code + presence of the typed diagnostic. The test must NOT mutate the canonical kernel or require a kernel build.'
  - 'I7: This slice MUST NOT modify packages/caws-kernel. The kernel source is correct; the bug is in the CLI''s consumption discipline. Adding a function or changing an existing function in the kernel would be a separate slice with its own contracts.'
  - 'I8: The fix MUST be observable: when the guard fires, the user sees a one-line typed diagnostic (e.g., "kernel does not export summarizeActiveAgents; agent activity unavailable. Reinstall: npm install -g @paths.design/caws-cli@latest") instead of a stack trace or silent empty output.'
acceptance:
  - id: A1
    given: 'A reproducer fixture where the imported `summarizeActiveAgents` symbol is undefined (simulating either the pre-1.1.0 kernel or a broken install).'
    when: 'runStatusCommand is invoked.'
    then: 'The command does NOT throw a "is not a function" error. Stdout includes the rest of the status panel (project, doctor findings, claim where applicable) up to the activity-summary line. Stderr includes a typed diagnostic naming the missing kernel function and a recovery hint (reinstall caws-cli@latest). Exit code is the documented status exit (0 for ok, or the doctor-derived value), not the implicit Node exit-on-throw.'
  - id: A2
    given: 'The same fixture from A1.'
    when: 'runAgentsListCommand is invoked.'
    then: 'The command does NOT throw. Stdout includes either the empty-list rendering (zero active agents) or a typed unavailability message. Stderr includes the same kernel-feature-unavailable diagnostic. Exit code is the documented agents-list exit (0 on success, no agents to list is success, not failure).'
  - id: A3
    given: 'packages/caws-cli/package.json currently declares "@paths.design/caws-kernel": "^1.0.0".'
    when: 'The slice tightens the dep range.'
    then: 'The declared range is "^1.1.0" (the minimum kernel version that exports summarizeActiveAgents per recon). This is the necessary half of the fix: future installs cannot resolve to a kernel that lacks the function. A grep `grep -n "@paths.design/caws-kernel" packages/caws-cli/package.json` shows the bumped range.'
  - id: A4
    given: 'The healthy-kernel path (kernel 1.1.x or later, summarizeActiveAgents present).'
    when: 'runStatusCommand and runAgentsListCommand are invoked against a normal fixture (no leases / empty leases / populated leases).'
    then: 'Existing tests in status-command.test.js, agents-command.test.js, agents-linked-worktree.test.js, and status-leases.test.js continue to pass byte-identical. The defensive guard does not alter the happy-path output or exit code.'
  - id: A5
    given: 'The new regression test at packages/caws-cli/tests/shell/status-kernel-feature-detect.test.js.'
    when: 'The test is run.'
    then: 'The test injects undefined for the summarizeActiveAgents import (via either a `jest.doMock` of @paths.design/caws-kernel that strips the export, or via dependency injection if status.ts is refactored to accept the kernel as a parameter), invokes runStatusCommand and runAgentsListCommand, asserts non-throw, asserts the diagnostic surfaces. At least 3 sub-tests: status path, agents list path, mixed (status with leases dir present but kernel function missing).'
  - id: A6
    given: 'The full lifecycle of relevant test suites.'
    when: 'jest is invoked on tests/shell/status-command.test.js, agents-command.test.js, agents-linked-worktree.test.js, status-leases.test.js, and the new status-kernel-feature-detect.test.js.'
    then: 'All suites pass. No regression in any existing test. The new suite adds at least 3 passing tests.'
  - id: A7
    given: 'The slice closes.'
    when: 'The merged tree is inspected.'
    then: 'Modified files are exactly: packages/caws-cli/package.json (dep range bump), packages/caws-cli/src/shell/commands/status.ts (feature-detect guard), packages/caws-cli/src/shell/commands/agents.ts (feature-detect guard), packages/caws-cli/tests/shell/status-kernel-feature-detect.test.js (new). No kernel, no templates, no docs, no CHANGELOG, no release artifacts touched.'
  - id: A8
    given: 'The merged-and-closed slice.'
    when: 'A future CAWS-STALE-VERSION-ADVICE-DIAGNOSTICS-01 slice is opened.'
    then: 'Zero file overlap: this slice touches status.ts/agents.ts/package.json/the new test. The stale-diagnostics slice touches diagnostic strings elsewhere in the codebase (likely repo-root.ts, scope command, claim command, doctor messages). The two are disjoint.'
non_functional:
  reliability:
    - 'The feature-detect guard MUST be runtime-cheap. `typeof fn === "function"` is O(1) and adds no measurable latency to the status/agents-list happy path.'
    - 'The diagnostic text MUST be deterministic across runs (no timestamps, no PIDs, no random ids). Snapshots and assertions depend on stable text.'
