id: CAWS-STATUS-AGENTS-SUMMARIZE-ACTIVE-AGENTS-01
title: 'Fix caws status / agents list crash on summarizeActiveAgents (Bug-001/002)'
risk_tier: 3
mode: fix
lifecycle_state: closed
resolution: completed
closure_notes: 'Implementation commit 10ee80b on worktree branch caws-status-agents-summarize; merged into feat/multi-agent-provenance-envelope at e76802b73c51304269c14ed238fe0fdbe38ecabf via caws worktree merge (auto-close + auto-destroy + registry cleanup in one transaction). Fixes Bug-001/002 from USER-E2E-SETUP-REHEARSAL-001. Two-half fix per spec invariants I2+I3: (I2) packages/caws-cli/package.json dep range tightened from @paths.design/caws-kernel:^1.0.0 to ^1.1.0 (kernel 1.1.0 is the minimum version exporting summarizeActiveAgents, introduced as part of MULTI-AGENT-ACTIVITY-REGISTRY-001 leases substrate; npm timing: kernel 1.1.0 published 2026-05-18T08:25:39Z, cli 11.1.0 published 2026-05-18T08:28:58Z, three-minute propagation window was the original install-race origin); (I3) defensive feature-detect guard added at all four call sites (status.ts:236, status.ts:290, agents.ts:247 computeActiveSummary, agents.ts:537 runAgentsListCommand) via private helper callSummarizeActiveAgentsSafe returning null when typeof summarizeActiveAgents !== function, fallback to empty ActivitySummary {total:0, active:[], stale:[], stopped:[]}, typed stderr diagnostic naming the missing function + recovery path npm install -g @paths.design/caws-cli@latest. Concrete runtime artifacts (captured by tests/shell/status-kernel-feature-detect.test.js with --verbose): A1 runStatusCommand against broken kernel exits 0, stderr carries the documented diagnostic, stdout renders the CAWS Status panel through project/specs/worktrees/events rows. A2 runAgentsListCommand exits 0, stderr carries diagnostic, stdout renders "active: 0". A3 --json exits 0, emits parseable JSON {ok:true, counts.active:0}. A4 negative invariant: the exact Node TypeError pattern /caws_kernel_\d+\.summarizeActiveAgents.*is not a function/ does NOT appear anywhere in stdout/stderr; no throw occurred. Test evidence: new suite 4/4 pass; existing status/agents/leases suites 44/44 pass; full shell suite 273/273 across 24 suites with no regression. False-confidence risks noted in commit body 10ee80b: jest doMock proves the in-process guard but not the npm dep-range bump in real installs (would need a fresh-install smoke); mock strips only summarizeActiveAgents, not adjacent kernel symbols (dep-range bump is the primary defense, feature-detect is bounded to this one symbol). Non-claims per I1: no kernel source touched, no docs touched, no in-CLI stale-version-advice strings touched (Bug-003 / CAWS-STALE-VERSION-ADVICE-DIAGNOSTICS-01 remains disjoint), no CHANGELOG entry (a release-bump slice may bundle this fix into v11.1.7), no release publish, no dist-tag mutation. Worktree branch caws-status-agents-summarize pushed at 10ee80b for remote review.'
