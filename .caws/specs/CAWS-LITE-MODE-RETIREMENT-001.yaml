invariants:
  - >-
    No code path reachable from the v11 CLI surface reads
    `.caws/mode.json`, `.caws/scope.json` (the lite-scope cache),
    or any "lite" branch in init/specs/scaffold. Lite mode is a
    completed retirement, not a half-decommissioned feature.
  - >-
    A consumer project upgrading from v10 with `.caws/mode.json` on
    disk gets a single `caws doctor` finding naming the legacy file
    and pointing at the migration guide. The finding is informational
    (not blocking). After the consumer deletes the file (or runs an
    optional migrator), the finding goes away. The runtime behavior
    does not silently change between "mode.json present" and
    "mode.json absent" — both reach the same v11 governance path.
  - >-
    The retirement is exhaustive across the full layer stack:
    (a) v10 source files for lite/scaffold/modes are deleted, not
    just orphaned; (b) v10 tests for those files are deleted, not
    just skipped; (c) hook templates that branch on
    `.caws/mode.json` are simplified to remove the lite branch;
    (d) docs/migration-v10-to-v11.md gains a "lite mode retirement"
    section.
acceptance:
  - id: A1
    given: |
      a fresh `caws init` in a clean git repo with no prior caws state
    when: |
      grep -rln "lite\\|mode\\.json\\|scaffold" .caws/ .claude/
    then: |
      zero hits in the produced state OR all hits are in pre-existing
      hook files that intentionally treat absence as the default.
      (No new .caws/mode.json, no new lite-scope cache, no scaffold
      surface installed.)
  - id: A2
    given: |
      a consumer project upgrading from v10 with .caws/mode.json
      (current: lite) on disk
    when: |
      the consumer runs `caws doctor`
    then: |
      doctor emits exactly one finding naming the legacy file, with
      severity INFO (or WARN — implementer choice) and a repair string
      pointing to the migration guide. After the consumer deletes the
      file, doctor is clean. No runtime behavior depends on the file's
      presence vs absence.
  - id: A3
    given: |
      the v11 CLI binary
    when: |
      the user runs `caws lite`, `caws mode`, `caws scaffold`
    then: |
      each command exits with "unknown command" (current v11 behavior,
      regression guard).
  - id: A4
    given: |
      the caws-cli test suite (post-retirement)
    when: |
      jest runs the full suite
    then: |
      tests/integration/lite-hooks.test.js and tests/lite-scope.test.js
      are deleted (not skipped). Suite runtime measurably shorter
      (lite-hooks at 1977 LOC of integration tests is the single
      largest file).
  - id: A5
    given: |
      docs/migration-v10-to-v11.md
    when: |
      a reader consulting it during a v10->v11 upgrade
    then: |
      the doc contains a "Lite mode retirement" section explaining:
      (a) what lite mode was, (b) why it was removed, (c) what to do
      with a legacy .caws/mode.json (delete it; v11 has one workflow),
      (d) what to do with .caws/scope.json (assess case-by-case —
      Sterling currently uses it for v10-era scope hints; v11 derives
      scope from spec.in directly).
  - id: A6
    given: |
      tests/axe/cli-accessibility.test.js contains assertions that
      `caws init` (with no project-name argument) emits "Project name
      is required" + "Usage:" error messages. These are v10 contract
      assertions; the v11 `caws init` does not take a project-name
      argument (it bootstraps in cwd) and so cannot produce those
      error strings. The assertions fail on the v11 surface for the
      same v10-test-on-v11-CLI reason as lite-hooks.test.js
    when: |
      the lite/v10-surface retirement is complete
    then: |
      either (a) the v10 contract assertions in
      tests/axe/cli-accessibility.test.js are deleted (the underlying
      "argument-missing error message" surface no longer exists), OR
      (b) the assertions are rewritten against a real v11 error path
      (e.g. `caws specs create` without --title emits a usage-style
      diagnostic; that assertion would be honest about what v11
      actually produces). The implementing agent picks based on
      whether the accessibility contract is still valuable on a
      different v11 entrypoint. Two test failures resolve either way.
non_functional:
  reliability:
    - >-
      The retirement must NOT silently change behavior for a project
      that was using lite mode under v10. Either the migration is
      mechanical (delete the file, no behavior change) or doctor
      surfaces the divergence explicitly. No "your lite-mode rules
      stopped being enforced but nobody told you" outcomes.
contracts: []
closure_notes: |
  DRAFT SPEC — investigation + implementation not yet started.

  Discovered during USER-E2E-SETUP-REHEARSAL-001 follow-up work
  (2026-05-26): lite mode is half-decommissioned in upstream caws.
  - CLI surface: removed (caws lite/mode/scaffold all return "unknown
    command" in v11.1.7)
  - v10 source code: still present
    (src/commands/init.js, src/config/lite-scope.js,
     src/config/modes.js, src/scaffold/, src/worktree/worktree-manager.js
     lite branches)
  - Hook templates: still read .caws/mode.json if present (no test
    proves the v11 hooks ignore it)
  - Tests: still run against the v10 source paths
    (tests/integration/lite-hooks.test.js at 1977 LOC, the single
     largest test file in the caws-cli suite)
  - Consumer impact: Sterling has .caws/scope.json (lite-scope cache),
    no .caws/mode.json. full-stack-ds has neither. The retirement
    surface is narrow on these two consumers but unknown for any
    project that adopted v10 lite mode at scale.

  Concrete evidence backing A6 (added 2026-05-27 in
  CAWS-FIRST-CONTACT-UX-001 closure verification): the post-merge
  full jest run for CAWS-FIRST-CONTACT-UX-001 surfaced two failing
  tests in tests/axe/cli-accessibility.test.js — "should provide
  clear and helpful error messages" and "should handle invalid
  project names accessibly". Both assert v10 contract: that
  `caws init` (with no project-name argument) emits "Project name
  is required" + "Usage:" strings. v11's `caws init` does not take
  a project-name argument (bootstraps in cwd), so it cannot produce
  those strings. The test received a v11 init success block instead
  of the expected error. Same v10-test-on-v11-CLI class as the
  lite-hooks failures. Retirement of these assertions falls under
  this spec; they are not regressions from CAWS-FIRST-CONTACT-UX-001.

  Investigation steps for the implementing agent:
  - audit `.caws/mode.json` and `.caws/scope.json` reads across the
    full src/ tree (grep + manual)
  - identify which reads are v10-only (delete safely) vs v11-active
    (the hook templates — needs careful retirement)
  - propose the migration shape: doctor finding? auto-migrator?
    silent delete on first v11 init?
  - sequence the deletions (source first, then tests, then hook
    templates) so the test suite stays green throughout
  - estimate the test-suite runtime improvement (lite-hooks is
    1977 LOC of real-git-fixture integration tests; deleting it
    measurably speeds up CI)

  Risk: a consumer with .caws/mode.json that we don't know about may
  rely on the hook-side lite branching. Investigation must confirm
  the v11 hook behavior under both present-and-absent before deletion
  is safe.

  Token-budget note: this spec deletes far more code than it adds.
  The retirement removes ~3-5k LOC of source plus ~2-3k LOC of tests.
  Net change is strongly negative — the spec is a cleanup, not a
  feature.

  No implementation in this draft.
