id: WORKTREE-MERGE-V11-SHAPE-001
title: 'caws worktree merge accepts v11 direct-key worktrees.json shape (regression lock)'
risk_tier: 3
mode: fix
lifecycle_state: closed
resolution: completed
closure_notes: 'V11 mergeWorktree contract locked by regression tests A1+A2+A3; migration guide notes v10.2 asymmetry. Diagnosis pivot: original failure mode reproduces only against npm-installed v10.2.0 (legacy loadRegistry); v11.1.6 source already correct. See commit message for the side-by-side artifact.'
created_at: '2026-05-23T10:29:11.308Z'
updated_at: '2026-05-23T11:34:26.074Z'
blast_radius:
  modules:
    - packages/caws-cli/src/store/worktrees-store.ts
    - packages/caws-cli/src/store/worktrees-writer.ts
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - .caws/specs/WORKTREE-MERGE-V11-SHAPE-001.yaml
    - packages/caws-cli/tests/store/worktree-merge-v11-shape.test.js
    - docs/migration-v10-to-v11.md
  out:
    - .caws/policy.yaml
invariants:
  - >-
    The v11 `mergeWorktree` code path (packages/caws-cli/src/store/worktrees-writer.ts)
    MUST accept .caws/worktrees.json in the v11 direct-key shape
    (`{<name>: {status, ...}, ...}`) as the canonical on-disk form. The v11
    `loadWorktrees` loader is shape-agnostic by design: it parses JSON
    object-shaped payloads without enforcing a particular envelope.
  - >-
    The schema-validated v10 nested shape (`{version: 1, worktrees: {<name>: {...}}}`)
    is enforced ONLY by the legacy `loadRegistry` in
    packages/caws-cli/src/worktree/worktree-manager.js, which is dead code
    for the `worktree merge` dispatch path in v11. Any future refactor that
    routes `worktree merge` (or any v11 lifecycle command) through legacy
    `loadRegistry` would reintroduce the documented `@paths.design/caws-cli@10.2.0`
    failure mode and must be rejected.
acceptance:
  - id: A1
    given: |
      A canonical checkout with .caws/worktrees.json in v11 direct-key
      shape and at least one active worktree entry.
    when: |
      The v11 mergeWorktree writer is invoked via the runWorktreeMergeCommand
      shell wrapper with `dryRun: true`.
    then: |
      The command succeeds with exit 0, returns a `dry_run` outcome whose
      `findings` reflect actual prerequisite checks (uncommitted changes,
      ownership mismatches, missing spec binding), and never raises
      `Cannot read properties of undefined`. The phrase "Worktree registry
      has schema violations" never appears in stderr.
  - id: A2
    given: |
      A controlled fixture .caws/worktrees.json containing a v11 direct-key
      entry with `status: active`, `branch`, `baseBranch`, and `specId`.
    when: |
      mergeWorktree is invoked with dryRun: true and a clean working tree.
    then: |
      The dry-run outcome's `canProceed` is true and `findings` is empty.
  - id: A3
    given: |
      The same fixture but with an entry owned by a foreign session id.
    when: |
      mergeWorktree is invoked with dryRun: true.
    then: |
      The dry-run outcome's `canProceed` is false and `findings` contains
      "worktree is owned by a different session". The command still exits 0
      from the writer (the dry-run is a successful query); the CLI wrapper
      maps `!canProceed` to exit 1, but the writer does not crash.
  - id: A4
    given: docs/migration-v10-to-v11.md.
    when: |
      The file is read.
    then: |
      A subsection titled "v10.2 cannot read v11-shaped worktrees.json"
      exists, documents the failure mode (literal stderr output), names the
      affected command (`caws worktree merge`), and instructs users to
      upgrade with `npm install -g @paths.design/caws-cli@latest`.
non_functional:
  reliability:
    - >-
      Defect class: cross-version artifact mismatch. The v11 source was
      always correct; the bug only reproduces when an npm-globally-installed
      v10.2.0 CLI reads a worktrees.json written by a v11 kernel. The
      regression test locks the v11 source contract so any future refactor
      that accidentally re-introduces v10 schema enforcement on the v11
      dispatch path is caught at CI time.
    - >-
      Test coverage: tests/store/worktree-merge-v11-shape.test.js asserts
      A1-A3 against the v11 mergeWorktree writer directly (no shell
      subprocess), using a tmpdir fixture with a synthesized v11 registry.
      The test does NOT execute git (mergeWorktree's git invocations only
      run on the non-dry-run path).
contracts: []
