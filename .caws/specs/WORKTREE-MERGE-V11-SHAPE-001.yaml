id: WORKTREE-MERGE-V11-SHAPE-001
title: 'caws worktree merge --dry-run rejects v11 direct-key worktrees.json shape'
risk_tier: 3
mode: fix
lifecycle_state: draft
created_at: '2026-05-23T10:29:11.308Z'
updated_at: '2026-05-23T10:30:00.000Z'
blast_radius:
  modules:
    - packages/caws-cli/src/shell/commands/worktree.ts
    - packages/caws-cli/src/store/worktrees-store.ts
    - packages/caws-kernel/src/worktree
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - .caws/specs/WORKTREE-MERGE-V11-SHAPE-001.yaml
    - packages/caws-cli/src/shell/commands/worktree.ts
    - packages/caws-cli/src/store/worktrees-store.ts
    - packages/caws-cli/src/store/lifecycle-transaction
    - packages/caws-cli/tests/shell/worktree-merge.test.js
  out:
    - .caws/policy.yaml
invariants:
  - >-
    Every worktree-lifecycle CLI command must accept BOTH the v10 nested
    shape (`{version, worktrees: {<name>: {...}}}`) AND the v11 direct-key
    shape (`{<name>: {status, ...}, ...}`) of .caws/worktrees.json. The
    kernel writes v11; legacy installs may still have v10. Per the
    session-caws-status.sh dual-shape entriesOf helper precedent (see
    templates/hook-packs/claude-code/session-caws-status.sh:55-86),
    every reader has the same dual-shape obligation.
acceptance:
  - id: A1
    given: A canonical checkout with .caws/worktrees.json in v11 direct-key
      shape and at least one active worktree (`<name>: {status: active,
      ...}`).
    when: |
      The operator runs `caws worktree merge <name> --dry-run`.
    then: |
      The command succeeds, prints a conflict-preview summary (or "no
      conflicts"), exits 0, and does not raise `Cannot read properties
      of undefined`. It does NOT print "Worktree registry has schema
      violations" for the direct-key shape.
  - id: A2
    given: Same canonical state.
    when: |
      The operator runs `caws worktree merge <name>` without --dry-run.
    then: |
      The command destroys the worktree, merges the branch with the
      enforced `merge(worktree):` commit format, deletes the branch
      (unless --no-delete-branch), and exits 0. The merge commit is
      identical in shape to the manual `git merge --no-ff` fallback
      currently used.
  - id: A3
    given: A canonical checkout with .caws/worktrees.json in the legacy
      v10 nested shape (`{version: 1, worktrees: {<name>: {...}}}`).
    when: |
      The operator runs `caws worktree merge <name> --dry-run`.
    then: |
      The command STILL succeeds and produces the same diagnostic shape
      as A1. Backward compatibility is preserved for legacy installs.
  - id: A4
    given: A new test `tests/shell/worktree-merge.test.js`.
    when: |
      The test runs with fixture worktrees.json files in both shapes.
    then: |
      Both shapes produce equivalent --dry-run output and equivalent
      non-dry-run merge behavior. Regression coverage is permanent.
non_functional:
  reliability:
    - >-
      Defect class: silent v10/v11 schema drift. The worktree-merge
      code path was not updated when worktrees-store moved to v11
      direct-key shape; the validation schema and the dispatch loop
      both assumed v10 nested. Discovered during the
      MULTI-AGENT-ACTIVITY-REGISTRY-001 merge at end of slice
      (2026-05-23). Operator workaround: fall back to `git merge --no-ff`
      with manual `-F /tmp/msg.txt` for the merge commit message; the
      commit-msg hook enforces the `merge(worktree):` format.
contracts: []
# --------------------------------------------------------------------------
# History
# --------------------------------------------------------------------------
#
# 2026-05-23: Spec created in lifecycle_state: draft (parking state).
#   Discovered during the merge of MULTI-AGENT-ACTIVITY-REGISTRY-001.
#   Reproduction:
#     1. Be in canonical checkout with v11 direct-key worktrees.json.
#     2. Run `caws worktree merge <name> --dry-run`.
#   Failure output (current):
#     ```
#     Worktree registry has schema violations: [
#       { path: '', message: "must have required property 'version'", ... },
#       { path: '', message: "must have required property 'worktrees'", ... },
#       { path: '', message: 'must NOT have additional properties',
#         params: { additionalProperty: '<name>' }, ... },
#       ...
#     ]
#     Cannot read properties of undefined (reading '<name>')
#     ```
#   Manual workaround: git merge --no-ff -F /tmp/msg.txt <branch>.
#   The commit-msg hook accepts the merge(worktree): format and the slice
#   merges cleanly via the fallback; the lifecycle command is the gap.
