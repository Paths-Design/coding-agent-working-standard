id: SPEC-SCOPE-OVERBROAD-OUT-DETECTION-001
title: 'Detect specs whose scope.out entry shadows a scope.in entry within the same spec'
risk_tier: 3
mode: chore
lifecycle_state: closed
resolution: completed
closure_notes: 'Earned claim: spec.semantic.scope.overbroad_out kernel semantic validation rule detects same-spec scope contradictions (scope.out entry that is a path-segment-boundary prefix of a scope.in entry within the same spec) at parseAndValidateSpec time, before contradictory specs become active. The rule lives entirely in the spec validation layer; scope-evaluation semantics, cross-spec policy, and the scope kernel surface (packages/caws-kernel/src/scope) are all unchanged. Rule id: spec.semantic.scope.overbroad_out. Semantic validator site: packages/caws-kernel/src/spec/validate-semantics.ts (lines 153-199 add the rule; helpers normalizeScopePath and isPathSegmentPrefix are defined at the bottom of the file). Rule constant site: packages/caws-kernel/src/spec/rules.ts (SPEC_RULES.SCOPE_OVERBROAD_OUT). Kernel fixtures: +10 (A1, A2 x2, A3, A5, A6, A8 x4), full kernel 492/492. Store fixtures: +3 (A7 repo scan, wiring guard, A4 cross-spec), full store 195/195. A7 real corpus scan: 50 specs scanned (1 active + 35 closed + 14 draft under .caws/specs/); 0 offenders; KNOWN_OFFENDERS empty. Migration-slice failure shape locked as A5 regression (scope.in containing three packages/caws-cli/src/shell/* paths with scope.out containing packages/caws-cli/src/shell emits exactly three diagnostics, one per shadowed entry, all naming the same scope_out_prefix). Exact-equal pairs intentionally deferred: scope.in === scope.out is a different defect class and is NOT covered by this rule; a future spec.semantic.scope.exact_conflict may be filed if the need surfaces. Path-segment-boundary semantics confirmed: "a/b" shadows "a/b/c" but does NOT shadow "a/bc"; trailing slash normalized. Cross-spec policy unchanged: A4 fixture (in commit 2b) verifies that SpecA admitting a/b/c.ts with SpecB refusing a/b emits zero diagnostics from either spec — same-spec-only is structurally guarded, not just documented. Scope-evaluation semantics unchanged: the scope kernel still resolves scope.in / scope.out at decision time with prefix-only matching; this slice only changes what shapes of spec are allowed to load. No longest-prefix-wins: the repair text names only two acceptable remedies (remove or narrow the broad scope.out, OR move documentary exclusions to a future non_goals field) and does NOT suggest the kernel implement same-spec admit-over-refuse. No strike-reset automation. Commit chain: 10a4ab7 draft, ea0a7c0 activate, ae658e1 commit 2a (kernel rule + 10 kernel fixtures; commit 2 split to defer A7 after the cwd-relative scope guard hook fired twice in that session), e1d01c0 commit 2b (A7 store-side scan + wiring guard + A4 cross-spec; authored without strikes after session reset), this closure commit. Cwd-relative hook path-normalization remains a separate follow-up candidate (proposed earned claim recorded in memory as project_scope_guard_path_normalization_followup.md); NOT filed here, NOT folded into this slice — different architectural level (hook, not kernel). No adjacent v11.2 specs touched: WORKTREE-SPEC-AUTHORITY-CONTROL-PLANE-001, WORKTREE-CAWS-SHARED-STATE-001, PRUNE-REPAIR-WORKTREE-001, WORKTREE-DOCTOR-HALF-STATE-001, WORKTREE-DOCTOR-HALF-STATE-FOLLOWUP-001, WORKTREE-REGISTRY-LEGACY-ENVELOPE-MIGRATION-001 all remain in their pre-existing states. No CHANGELOG / package version / release workflow / template edits. Next slice: WORKTREE-SPEC-AUTHORITY-CONTROL-PLANE-001 (the durable next step in v11.2). The cwd-relative hook defect remains recorded but unfiled unless it blocks authority slice implementation in practice. Audit-drift note (recorded for this closure only): the spec_closed event for this slice in .caws/events.jsonl carries data.resolution: completed but data.closure_notes is empty, because the operator''s shell variable $CLOSURE_NOTES was not exported into the bash -c subshell that invoked caws specs close --reason. The YAML field above is the authoritative closure record; the event-payload gap is bounded and not retro-emitted (the hash chain is preserved). Follow-up candidate: SPECS-CLOSE-REASON-GUARD-001 — make caws specs close refuse empty --reason for resolution: completed, add --reason-file / --reason-stdin to avoid shell-quoting fragility.'
