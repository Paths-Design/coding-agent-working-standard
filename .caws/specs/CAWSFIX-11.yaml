id: CAWSFIX-11
type: fix
title: scope.schema.json version field is optional on inline scope blocks (D3)
status: active
risk_tier: 3
mode: development
created_at: '2026-04-17T16:37:05.470Z'
updated_at: '2026-04-17T16:37:05.470Z'
blast_radius:
  modules:
    - packages/caws-cli/templates/.caws/schemas/scope
    - packages/caws-cli/src/validation
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - packages/caws-cli/templates/.caws/schemas/scope.schema.json
    - packages/caws-cli/tests/lite-scope.test.js
    - packages/caws-cli/tests/validation/scope-version-optional.test.js
    - .caws/specs/CAWSFIX-11.yaml
  out:
    - node_modules/
    - dist/
    - packages/caws-cli/dist/
    - .caws/scope.json
    - .caws/policy.yaml
    - .caws/working-spec.schema.json
    - packages/caws-cli/src/commands/
invariants:
  - >-
    A CAWS Lite `.caws/scope.json` file MUST continue to require `version` (tracked state artifact; compatibility
    contract)
  - >-
    An inline `scope:` block (inside a working-spec.yaml or feature spec) does NOT require `version` — scope blocks
    inside specs are governed by the working-spec schema, not the standalone scope schema
  - >-
    The standalone scope.schema.json is used only to validate `.caws/scope.json` on disk, never to validate inline scope
    blocks (separating the two surfaces)
  - >-
    OR alternatively, the `version` requirement is lifted from scope.schema.json entirely if no read path actually
    enforces version mismatch; if that path exists, document it and keep version as required with a default
  - Sterling's turn-023 D3 reproduction no longer emits "scope.json schema violation: must have required property 'version'" during spec validation
acceptance:
  - id: A1
    given: A CAWS Lite project with `.caws/scope.json` that includes version=1 and allowedDirectories
    when: Scope validation runs against that file
    then: Validation passes. The version field is still enforced for standalone scope files (back-compat).
  - id: A2
    given: A CAWS Lite project with `.caws/scope.json` missing the version field
    when: Scope validation runs
    then: >-
      EITHER validation fails with a clear error ("scope.json must have required property 'version'") — same as today —
      AND an explanation points at CAWSFIX-11's decision to keep version required on standalone files; OR validation
      passes with a warning that version is missing and a default of 1 is assumed. The choice is documented in the
      spec's commit message.
  - id: A3
    given: A feature spec YAML with an inline `scope:` block containing `in:` and `out:` lists (no version key)
    when: The full spec validation runs (including whatever path currently triggers the scope-schema check)
    then: >-
      The scope.json schema-violation warning about the missing `version` property does NOT appear. The inline scope
      block validates via the working-spec schema's scope sub-schema, not the standalone scope.schema.json.
  - id: A4
    given: The caws-cli source code
    when: A reviewer traces which code paths load and apply `scope.schema.json`
    then: >-
      The only caller is the standalone `.caws/scope.json` validator (CAWS Lite scope). Inline scope blocks inside
      working-spec.yaml or feature specs do NOT invoke the standalone schema. This is documented in a comment in
      scope.schema.json or in the module that loads it.
  - id: A5
    given: >-
      Sterling's turn-023 reproduction where `caws validate --spec-id P03-IMPL-01` emits a scope.json schema-violation
      warning about the missing `version` property — despite the spec having no standalone scope.json file
    when: The same command is run after this fix
    then: That specific warning no longer appears.
  - id: A6
    given: The existing test suite before this change
    when: '`cd packages/caws-cli && npx jest lite-scope validation` is run'
    then: No pre-existing test regresses. New tests in scope-version-optional.test.js cover A1-A3.
non_functional:
  perf:
    api_p95_ms: 10
  a11y: []
  security:
    - Scope schema is a read-side contract; relaxing `version` to optional does not widen any write path
contracts:
  - type: openapi
    path: packages/caws-cli/templates/.caws/schemas/scope.schema.json
worktree: cawsfix-11
