invariants:
  - >-
    Renderer prose no longer contains the literal token "policy.yaml". The
    init .gitignore step panel (renderGitignore, created/adopted branches)
    described the authority-state split using "policy.yaml", which collides with
    the pre-existing init-command test "partially-initialized state is filled in
    additively" — that test asserts the init stdout does NOT match /policy\.yaml/
    (the pre-existing policy.yaml must not appear in the created-paths list). The
    reword keeps the same meaning (authority state = specs, policy, waivers stays
    tracked) using "policy" (no ".yaml") so the panel does not trip the test's
    not-created guard. No behavior change; renderer text only.
  - >-
    No change to the managed block, the entry set, or the gitignore-manage logic.
    Only src/shell/render/init-gitignore.ts display strings change. The actual
    .gitignore block content (gitignore-manage.ts EPHEMERAL_CAWS_ENTRIES + the
    in-file comment) is unchanged and still untouched by this fix — the in-block
    comment legitimately names .caws/policy.yaml inside .gitignore itself, which
    is correct and is NOT part of init's stdout (so it does not affect the test).
  - >-
    The .gitignore step is SKIPPED outside a git working tree. A .gitignore in a
    non-git directory is inert noise — `caws init` can run outside a git work
    tree, and writing the block there serves no purpose. The step is gated on the
    same isInsideGitWorkingTree(repoRoot) predicate init already uses for the
    commit-hint (step 5): when not inside a git work tree, manageGitignore is not
    called and a brief "skipped (not a git working tree)" panel is rendered
    instead. Inside a git work tree, behavior is unchanged.
  - >-
    Full init-command suite green on canonical. After the reword + non-git gate,
    the complete tests/shell/init-command.test.js suite passes on canonical where
    the binary builds — including the partially-initialized test, the five A1-A5
    gitignore tests, and a new case asserting the step is skipped (no .gitignore
    written) when init runs in a non-git directory.
acceptance:
  - id: A1
    given: packages/caws-cli/src/shell/render/init-gitignore.ts after the fix.
    when: the file is read.
    then: >-
      No display string in the created/adopted/any branch contains the literal
      "policy.yaml"; the authority-state split is described using "policy"
      (without the ".yaml" suffix) while keeping the same meaning.
  - id: A2
    given: The full tests/shell/init-command.test.js suite on canonical.
    when: it runs against the rebuilt binary.
    then: >-
      All tests pass, including "partially-initialized state is filled in
      additively" (its /policy\.yaml/ not-match guard is satisfied) and the
      A1-A5 .gitignore tests.
  - id: A3
    given: caws init run in a directory that is NOT a git working tree.
    when: the .gitignore step would run.
    then: >-
      manageGitignore is not invoked; no .gitignore is written; the step renders
      a "skipped — not a git working tree" panel; init still exits 0.
non_functional:
  reliability:
    - >-
      Resolves a regression introduced by CAWS-INIT-GITIGNORE-MANAGE-001: the new
      step's panel prose tripped an existing test's broad stdout guard. Fixing the
      renderer prose (rather than weakening the test) preserves the test's intent
      — the pre-existing policy.yaml must not be reported as a created path — and
      keeps the init output honest.
