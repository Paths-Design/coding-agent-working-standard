id: CAWS-MERGE-CLOSE-MISSING-UPDATED-AT-001
title: 'closeSpec and archiveSpec insert updated_at when absent'
risk_tier: 3
mode: fix
lifecycle_state: closed
resolution: completed
closure_notes: 'Manually closed post-merge fc7a48d (merge required conflict resolution with tombstone, auto-close path not used)'
created_at: '2026-05-27T21:17:04.469Z'
updated_at: '2026-05-27T21:52:15.667Z'
blast_radius:
  modules:
    - packages/caws-cli/src/store/specs-writer.ts
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - .caws/specs/CAWS-MERGE-CLOSE-MISSING-UPDATED-AT-001.yaml
    - packages/caws-cli/src/store/specs-writer.ts
    - packages/caws-cli/tests/store/specs-store.test.js
    - packages/caws-cli/tests/store
  out:
    - packages/caws-kernel
    - .caws/policy.yaml
    - CODEOWNERS
    - packages/caws-cli/package.json
    - packages/caws-cli/CHANGELOG.md
    - packages/caws-cli/src/store/worktrees-writer.ts
    - packages/caws-cli/src/store/yaml-patch.ts
    - packages/caws-cli/src/shell
invariants:
  - >-
    closeSpec inserts a top-level `updated_at` scalar when the spec
    YAML lacks one, using the same raw-byte / comment-preserving
    patch primitives already used for `resolution` and
    `closure_notes`. Pattern: `has*` regex check, branch to
    setTopLevelScalar (update existing) or insertTopLevelScalarAfter
    (insert new at deterministic anchor). MUST NOT pre-validate
    `updated_at` presence in a way that refuses absent-key specs.
  - >-
    archiveSpec applies the identical insert-or-update fallback for
    `updated_at`. The bug is a shared writer-side gap; the fix is a
    shared writer-side primitive. Out-of-scope: refactoring the two
    paths into a single helper — that's a hygiene concern, not a
    closure blocker.
  - >-
    The insert anchor is deterministic: after `created_at` when
    present (the natural pair-ordering), otherwise after
    `lifecycle_state`. The choice of anchor matters for byte-order
    stability across re-runs and for human-readable spec layout.
    Specs written by the v11 `createSpec` path always have
    `created_at` so the `lifecycle_state` fallback only fires for
    legacy / v10-migrated / hand-authored specs.
  - >-
    The fix preserves the raw-byte / comment-preserving patch
    discipline. No structural YAML rewrite. No reordering of unrelated
    fields. The patched spec MUST byte-equal the pre-patch spec
    everywhere except (a) the patched scalar values and (b) the new
    `updated_at` line when it was absent.
  - >-
    Out-of-scope adjacencies, intentionally not touched:
    - yaml-patch.ts (the primitive's "not found" behavior is correct;
      the consumer's pre-flight check is what needs the fallback);
    - worktrees-writer.ts (the merge-side error surfacing buries the
      underlying YAML_PATCH_KEY_NOT_FOUND in
      partial_failure_unrecovered; eliminating the underlying failure
      removes the buried-error class, no surfacing improvement needed);
    - kernel schema (updated_at is correctly optional per spec.v1.json
      required[]).
  - >-
    No new event is appended. The fix is purely a writer-side
    correctness change; existing `spec_closed` and `spec_archived`
    event emission is unchanged. The shared-now factory threading from
    mergeWorktree to closeSpec is also unchanged — that path already
    works correctly for specs with present `updated_at` and continues
    to work after this fix for specs missing it.
acceptance:
  - id: A1
    given: |
      A spec on disk with lifecycle_state: active and NO top-level
      updated_at field (e.g., a v10-migrated or hand-authored spec
      that omitted the timestamp).
    when: |
      closeSpec is invoked with resolution: completed and a
      deterministic injected now.
    then: |
      The command exits ok with kind: success. The on-disk spec YAML
      now has lifecycle_state: closed, resolution: completed, and a
      new updated_at: '<iso8601>' line inserted after created_at
      (or after lifecycle_state if created_at is also absent). One
      spec_closed event is appended.
  - id: A2
    given: |
      A spec on disk with lifecycle_state: closed and NO top-level
      updated_at field.
    when: |
      archiveSpec is invoked with a deterministic injected now.
    then: |
      The command exits ok. The on-disk spec YAML (now under
      .caws/specs/.archive/) has lifecycle_state: archived and a
      new updated_at: '<iso8601>' line. One spec_archived event is
      appended.
  - id: A3
    given: |
      The same active spec as A1.
    when: |
      closeSpec is invoked.
    then: |
      Every unrelated line in the spec YAML — comments, blank lines,
      field ordering of non-touched fields, trailing whitespace — is
      byte-preserved. The diff between pre- and post-close YAML
      contains ONLY the four patches: lifecycle_state, inserted
      resolution, optionally-inserted closure_notes, and inserted
      updated_at. No other lines change.
  - id: A4
    given: |
      A spec on disk WITH a present updated_at: '<old-iso8601>' field.
    when: |
      closeSpec is invoked with a different injected now.
    then: |
      The existing updated_at line is updated in place (NOT
      duplicated, NOT moved). Behavior matches pre-fix path for
      specs that had the field — the insert fallback fires only when
      the field is absent.
  - id: A5
    given: |
      The merge composition path
      `mergeWorktree → closeSpec` invoked against a bound spec that
      lacks updated_at.
    when: |
      The merge command runs end-to-end (git merge --no-ff, closeSpec,
      worktree_merged append, worktree destroy).
    then: |
      The composition succeeds. The bound spec is closed with the
      inserted updated_at. The pre-fix behavior of
      partial_failure_unrecovered with buried
      YAML_PATCH_KEY_NOT_FOUND is GONE. This AC is covered by the
      A1 closeSpec unit test plus the existing merge-path test
      coverage; no new mergeWorktree test is required (production
      fix is in specs-writer.ts only per scope.in).
  - id: A6
    given: |
      The existing close/archive test corpus in specs-store.test.js
      (A5/A6 describes) and the existing merge/auto-close tests in
      worktree.test.js.
    when: |
      The slice's edits are applied.
    then: |
      All pre-existing tests pass unchanged. The fix is additive at
      the YAML patch layer.
non_functional:
  reliability:
    - >-
      The defect class is "writer assumes optional schema field is
      always present." This slice eliminates the class for
      `updated_at` in close/archive paths. Future hygiene work could
      extract a `setOrInsertTopLevelScalar` helper to prevent the
      same class from recurring on other optional fields; that is
      explicitly out-of-scope here (the fix is two parallel patches,
      not an abstraction extraction).
contracts: []
# --- Triage ---------------------------------------------------------------
# Origin: tier-1 follow-up queue item #7 (docs/reports/tier1-followups-queue.md).
# Sterling P1 — composed merge auto-close fails with
# partial_failure_unrecovered when the bound spec lacks updated_at.
#
# Recon findings (verified 2026-05-27 against HEAD 21df74a):
#   - specs-writer.ts:462 (closeSpec) calls setTopLevelScalar with
#     no insert fallback for updated_at.
#   - specs-writer.ts:606 (archiveSpec) has the same bug.
#   - setTopLevelScalar (yaml-patch.ts:169-176) correctly returns
#     YAML_PATCH_KEY_NOT_FOUND when the key is absent.
#   - Kernel schema (spec.v1.json:8-20) does NOT list updated_at as
#     required — specs without it pass validation, then fail at the
#     patch step. This is a writer-side gap, not a schema gap.
#   - mergeWorktree (worktrees-writer.ts:1067-1077) correctly threads
#     sharedNowFactory; the now-propagation path is fine. The defect
#     is purely the absent-key case.
#   - Sibling patches for `resolution` (specs-writer.ts:427-441) and
#     `closure_notes` (445-459) use the correct has*-check +
#     insertTopLevelScalarAfter fallback pattern — the fix mirrors
#     that exact pattern for updated_at.
#
# Empirical verification that the standard path works: every recent
# merge-auto-closed spec (CAWS-SESSION-ID-DURABLE-HOOK-ENVELOPE-001,
# CAWS-SPECS-CLOSE-DEFAULT-RESOLUTION-001, CAWS-GATES-RUN-ABORT-ON-
# CORRUPT-CHAIN-001, CAWS-MIGRATE-V10-SPECS-001) has a fresh
# updated_at distinct from created_at. The refresh works when the
# field is already present; the bug is exclusively about absent
# fields on legacy specs.
#
# Out of scope:
#   - Kernel schema changes (updated_at correctly optional)
#   - mergeWorktree-side diagnostic surface (eliminating the
#     underlying failure removes the buried-error class)
#   - yaml-patch.ts primitive changes (its "not found" behavior is
#     correct; the fix is at the consumer)
#   - Extracting a setOrInsertTopLevelScalar helper (hygiene, not
#     closure)
#   - Release tooling (tag-driven per CLAUDE.md trap #7)
