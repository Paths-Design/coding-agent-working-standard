id: CAWS-CLI-HELP-METADATA-AUTHORITY-001
title: 'Durable --help metadata authority slice 0: export kernel spec enums (mode/resolution/risk_tier/lifecycle/contract-type) as const arrays, collapse the CLI VALID_MODES/VALID_RESOLUTIONS duplicates, amend kernel 1.1.4 changelog'
risk_tier: 3
mode: refactor
lifecycle_state: active
created_at: '2026-05-29T08:41:28.358Z'
updated_at: '2026-05-29T08:41:28.358Z'
blast_radius:
  modules:
    - packages/caws-kernel/src/spec/types.ts
    - packages/caws-cli/src/shell/commands/specs.ts
    - packages/caws-kernel/CHANGELOG.md
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - packages/caws-kernel/src/spec/types.ts
    - packages/caws-kernel/CHANGELOG.md
    - packages/caws-cli/src/shell/commands/specs.ts
    - .caws/specs/CAWS-CLI-HELP-METADATA-AUTHORITY-001.yaml
  out:
    - packages/caws-kernel/src/spec/validate-shape.ts
    - packages/caws-kernel/src/schemas
    - packages/caws-cli/src/shell/register.ts
    - packages/caws-cli/package.json
