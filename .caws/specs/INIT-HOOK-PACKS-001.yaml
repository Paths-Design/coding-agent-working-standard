id: INIT-HOOK-PACKS-001
title: caws init installs durable v11 Claude Code hook pack (first-contact governance)
risk_tier: 2
mode: feature
lifecycle_state: active
created_at: '2026-05-17T00:00:00.000Z'
updated_at: '2026-05-17T00:00:00.000Z'
blast_radius:
  modules:
    - packages/caws-cli/src/init
    - packages/caws-cli/src/shell/commands/init.ts
    - packages/caws-cli/templates/hook-packs/claude-code
    - packages/caws-cli/tests/init/hook-packs
    - .claude/hooks
  data_migration: false
operational_rollback_slo: 15m
scope:
  in:
    - packages/caws-cli/src/init/
    - packages/caws-cli/src/shell/commands/init.ts
    - packages/caws-cli/templates/hook-packs/claude-code/
    - packages/caws-cli/tests/init/hook-packs/
    - packages/caws-cli/tests/integration/init-hook-packs.test.ts
    - .claude/hooks/
    - .caws/specs/INIT-HOOK-PACKS-001.yaml
  out:
    - .caws/events.jsonl
    - .caws/policy.yaml
    - .caws/specs/registry.json
    - packages/caws-kernel/src/
    - packages/caws-cli/src/shell/commands/specs.ts
    - packages/caws-cli/src/shell/commands/worktree.ts
    - packages/caws-cli/src/store/
invariants:
  - caws init --agent-surface claude-code installs the canonical Claude Code hook pack in a fresh repo with no manual file copying required.
  - Installed hooks read lifecycle_state before status and treat closed/archived/completed as terminal for union enforcement.
  - Installed worktree guards recognize both v11 direct-key worktrees.json and legacy nested registry shape, and accept both specId and spec_id during transition.
  - Every managed hook file carries a CAWS-MANAGED-HOOK header recording hook_pack, hook_pack_version, caws_min_major, and lineage_refs.
  - Re-running init with the same pack version is idempotent; non-managed files at install paths refuse without explicit --adopt or --overwrite.
  - Hooks parse local files directly for state truth; global caws is only consulted for the advisory version-skew warning.
  - Entry 17 protections (tokenized git command classification, wrapper detection, danger latch) are preserved verbatim in the installed pack.
  - The CAWS repo's own .claude/hooks/ is a managed install of the same canonical pack — no snowflake.
  - caws init --agent-surface none is explicit; it installs no hook pack and clearly states that no pre-tool-call governance was installed.
  - This spec supersedes the earlier HOOK-V11-COMPAT-001 framing referenced in CLI-CONTRACT-001's commit closure note. The fix is not a project-local patch but a durable install surface.
acceptance:
  - id: A1
    given: A fresh git repo with no .caws/ or .claude/ directories.
    when: A developer runs caws init --agent-surface claude-code.
    then: Canonical .caws/ state is created and the Claude Code hook pack is installed under .claude/hooks/ with managed headers on every generated file.
  - id: A2
    given: A repo with a managed Claude Code hook pack already installed at pack_version N.
    when: caws init --agent-surface claude-code is re-run with the same pack version.
    then: The command is a no-op; no managed files are rewritten and no file content changes.
  - id: A3
    given: A repo with a managed Claude Code hook pack at pack_version N.
    when: caws init --agent-surface claude-code is re-run with a newer pack version N+1.
    then: Managed files are updated to the new version; files without a managed marker are preserved untouched.
  - id: A4
    given: A repo with a user-authored .claude/hooks/scope-guard.sh that has no managed marker.
    when: caws init --agent-surface claude-code is invoked.
    then: Install refuses with a clear diagnostic instructing the user to rename or remove the file before retry; no managed install proceeds at that path.
  - id: A5
    given: A repo with a managed Claude Code hook pack file that has been locally modified (managed marker present but content drifted from the pack-bundled version).
    when: caws init --agent-surface claude-code is re-run without --adopt or --overwrite.
    then: Install refuses with a diagnostic explaining the drift and the two explicit resolution flags.
  - id: A6
    given: A fresh repo, no harness signals present, non-interactive invocation.
    when: caws init is run without --agent-surface.
    then: No hook pack is installed; the output warns about absent first-contact governance and prints the exact follow-up command (caws init --agent-surface <name>).
  - id: A7
    given: A v11-shape spec with lifecycle_state closed (no status field) at .caws/specs/<id>.yaml.
    when: The installed scope-guard.sh evaluates an edit against active specs.
    then: The closed spec does not participate in union enforcement; only active specs are consulted.
  - id: A8
    given: A v11 worktrees.json using the direct-key shape ({ "wt-name": { ... } }).
    when: The installed worktree-guard.sh reads worktree ownership and binding.
    then: The entry is recognized; both specId and spec_id keys are tolerated for the bound spec id.
  - id: A9
    given: An installed Claude Code hook pack on a system where the globally installed caws major version differs from the repo's caws-cli major version.
    when: The session start surface (session-caws-status.sh) runs.
    then: A non-blocking WARNING is emitted naming both major versions.
  - id: A10
    given: A fresh repo without any spec or worktree binding.
    when: An agent invocation attempts a governed Write or Edit on a non-trivial path.
    then: The installed scope-guard.sh blocks the write under the unbound-no-authority rule (Entry 12); init activation output instructed restart before substantive work.
  - id: A11
    given: An installed pack containing block-dangerous.sh and classify_command.py.
    when: An agent attempts git --bare init, git -C /tmp/foo init, or another Entry 17-class bypass.
    then: The command is classified as dangerous by argv parsing (not substring matching) and blocked or sent for human approval; the session danger latch engages on first denial.
  - id: A12
    given: The CAWS repo's own .claude/hooks/ directory.
    when: caws init --agent-surface claude-code is run against the CAWS repo (dogfood).
    then: After resolving any pre-existing local additions, .claude/hooks/ is a managed install of the canonical pack; no file is a snowflake.
  - id: A13
    given: A developer who passes --agent-surface none.
    when: caws init --agent-surface none runs.
    then: No hook pack is installed; output explicitly states that no pre-tool-call governance was installed and that the repo is not agent-safe for multi-session work without external governance.
non_functional:
  security:
    - Managed hook files must carry CAWS-MANAGED-HOOK headers to prevent silent treatment as ordinary scripts.
    - Install must refuse rather than overwrite non-managed files at managed paths.
    - Danger-command detection (Entry 17) must remain tokenization-aware in the installed pack; substring matching is regression.
  reliability:
    - Re-running install with same pack version produces zero file mutations.
    - Activation contract printed on every install so harness restart semantics are explicit.
  compatibility:
    - Installed scope-guard accepts v11 lifecycle_state and falls back to v10 status; closed/archived/completed are terminal regardless of which field is present.
    - Installed worktree guards accept both registry shapes during the v10 to v11 transition.
contracts:
  - name: HookPackV1 manifest
    type: schema
    path: packages/caws-cli/src/init/hook-packs/types.ts
    description: Manifest shape enumerating id, target_surface, pack_version, caws_min_major, lifecycle_events, installed_paths, state_model, and lineage_refs for each registered hook pack.
  - name: caws init --agent-surface
    type: cli
    path: packages/caws-cli/src/shell/commands/init.ts
    description: caws init accepts --agent-surface claude-code|cursor|windsurf|none; only claude-code is fully implemented in v11.1.
  - name: Managed hook header
    type: file-marker
    path: packages/caws-cli/templates/hook-packs/claude-code/
    description: Every managed file begins with a CAWS-MANAGED-HOOK comment block declaring hook_pack, hook_pack_version, caws_min_major, lineage_refs, and a do-not-edit-directly note.
