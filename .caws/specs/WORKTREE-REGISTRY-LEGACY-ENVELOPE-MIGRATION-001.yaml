id: WORKTREE-REGISTRY-LEGACY-ENVELOPE-MIGRATION-001
title: 'Migrate or explicitly classify v10.2 legacy-envelope .caws/worktrees.json before authority-control-plane activation'
risk_tier: 3
mode: chore
lifecycle_state: closed
resolution: completed
closure_notes: 'Migration ran successfully against this repo. Pre-state: .caws/worktrees.json was 987 bytes in v10.2 envelope shape {"version": 1, "worktrees": {<two destroyed records>}}; doctor reported 1E/4W/0I including doctor.worktree.ghost_registry_entry on subject "worktrees". Post-state: 3 bytes (literal "{}\n"); doctor reports 0E/4W/0I. The H1 finding on subject "worktrees" disappeared exactly as predicted. No new H1 findings were introduced by the migration (hard claim per the maintainer''s precision point). Idempotency verified: a second invocation of caws worktree migrate-registry reported "is an empty object. No action required." and wrote zero bytes. Initial dry-run refused with destroyed_blocked because /.../.caws/worktrees/ci-caws-gate-wt existed on disk; inspection showed the directory contained ONLY harness session-log telemetry (tmp/<sessionId>/turn-*.json + session.json/session.txt/handoff.json), not the destroyed worktree''s original git contents. Per maintainer authorization, the telemetry was moved (preserved verbatim) to $HOME/.claude/quarantine/caws-worktree-telemetry/ci-caws-gate-wt-c23b547a-f574-414a-b108-17baa364ac3a-2026-05-22; the migration policy was NOT amended (the directory existing was real, the command was right to refuse, and operator cleanup is the right resolution — not adding telemetry-shape recognition to migration doctrine). Test counts: store-helper 42/42; shell integration 23/23; full CLI 1764/1776 (2 pre-existing axe failures confirmed unrelated to this slice); full kernel 482/482 unchanged. No new event kind was emitted; the audit trail is the git commit chain (52c7b83 draft, 87d38a9 activate+A11, a83927c audit findings, d03a051 A12 amendment, 15c5ea3 scope amendment, 841ebaf implementation+tests, this closure commit). Loader (packages/caws-cli/src/store/worktrees-store.ts) remains unchanged and permissive. Doctor H1 remains unchanged; the finding disappeared because the file shape changed, not because the rule was weakened. No CHANGELOG / package version / release workflow / template edits. WORKTREE-CAWS-SHARED-STATE-001 remains unclosed (closure deferred to authority slice activation commit #1 per its prerequisite #7). WORKTREE-SPEC-AUTHORITY-CONTROL-PLANE-001 remains draft; its activation prerequisite #6 ("migration slice must complete first") is now satisfied. PRUNE-REPAIR-WORKTREE-001 remains blocked on authority. The Diagnose / Decide / Repair stratification (§1.4) is preserved: this slice was format normalization, not Decide or Repair. Mid-implementation amendments recorded in triage: (1) audit findings on writeFileAtomic + loadSpecs semantics; (2) A12 added for spec-load-failure refusal; (3) over-broad scope.out removed after scope-strike 1 of 3 (the third recurrence of CLAUDE.md trap #4 in this v11.2 line, motivating the SPEC-SCOPE-OVERBROAD-OUT-DETECTION-001 follow-up which is filed separately, not bundled). Authority-slice activation prerequisite #6 satisfied; proceed to authority activation per its prerequisite list.'
