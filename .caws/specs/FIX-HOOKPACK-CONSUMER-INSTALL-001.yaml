id: FIX-HOOKPACK-CONSUMER-INSTALL-001
title: 'Claude Code hook pack is not operable in consumer repos: CommonJS oracle crashes under type:module, and the template ships CAWS-internal failure-lineage doctrine'
risk_tier: 2
mode: fix
lifecycle_state: active
