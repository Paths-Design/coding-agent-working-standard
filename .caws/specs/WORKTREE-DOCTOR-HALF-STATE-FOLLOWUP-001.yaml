invariants:
  - 'Diagnose-only. Doctor remains pure observation. No repair behavior, no auto-fix, no mutation of .caws/, no git-worktree-altering commands, no event append on doctor invocation.'
  - 'Kernel purity (§6.3) holds. inspectProjectState performs no fs reads/writes, no process.env mutation, no git invocation, no Date.now beyond the snapshot timestamp. All new filesystem observations are pre-computed by the store layer (doctor-snapshot.ts) and delivered as plain DoctorInput fields.'
  - 'Store layer does not depend on shell. No imports added from packages/caws-cli/src/shell/. The deferred parser/type deduplication debt recorded in WORKTREE-DOCTOR-HALF-STATE-001 closure notes is NOT addressed here.'
  - 'No re-opening of WORKTREE-DOCTOR-HALF-STATE-001. That spec is closed; its closure event is hash-chained and authoritative. This follow-up is a separate slice with its own audit trail. The closed spec is listed in scope.out as a guard.'
  - 'H4 enrichment is an observable filesystem fact about the canonical-path state of a spec-claimed worktree name. It is NOT provenance proof that destroyWorktree caused the state. The new data payload makes this explicit (canonical_dir_observed boolean alongside canonical_dir_present).'
  - 'The H4 fix uses a NEW spec-claim-keyed map (filesystem.specClaimedWorktreeDirByName), distinct from the existing registry-keyed map (filesystem.worktreeDirByName). The registry-keyed map is preserved for H1 — which is correctly registry-scoped.'
  - 'The only production semantic change is the spec-claimed canonical-dir observation for H4. Everything else in this slice is regression-signal tightening around the previous slice.'
acceptance:
  - id: A1
    given: 'A DoctorInput where filesystem.specClaimedWorktreeDirByName is populated from spec.worktree fields, and a spec claims worktree: X with no registry entry for X'
    when: 'doctor runs and the H4 enrichment block on BINDING_SPEC_MISSING_REGISTRY fires'
    then: 'The diagnostic data payload uses canonical_dir_observed (boolean derived from "is X a key in specClaimedWorktreeDirByName") and canonical_dir_present (boolean from the map value, omitted when canonical_dir_observed is false). The kernel does NOT consult the registry-keyed worktreeDirByName for spec-claim-based H4 enrichment.'
  - id: A2
    given: 'Three kernel fixtures: (a) specClaimedWorktreeDirByName = { X: true }; (b) specClaimedWorktreeDirByName = { X: false }; (c) specClaimedWorktreeDirByName = {} or undefined; each paired with a spec claiming worktree: X and an empty worktrees registry'
    when: 'doctor runs each'
    then: 'Each produces a distinct, asserted data shape. (a) canonical_dir_observed: true, canonical_dir_present: true. (b) canonical_dir_observed: true, canonical_dir_present: false. (c) canonical_dir_observed: false, canonical_dir_present omitted. The previous slice''s git_worktree_present field is removed in favour of this two-field shape.'
  - id: A3
    given: 'A kernel DoctorInput.worktrees containing the v10.2 legacy envelope shape { version: 1, worktrees: {...} } (a number value under "version" and an object value under "worktrees") leaking through a future loader regression'
    when: 'doctor runs the H1 emission'
    then: 'No H1 finding is emitted for the "version" name (record is a number; defensive filter skips). Behavior for the "worktrees" name (object-shaped) is asserted explicitly: the kernel emits a ghost-registry finding for it by design — the kernel cannot distinguish "a real worktree named worktrees" from "a legacy envelope key" at the rule layer. The test documents the discharge behavior so future removal of the defensive filter regresses.'
  - id: A4
    given: 'A store integration fixture exercising H1 (registry entry wt-ghost-int, no canonical dir, not in git list)'
    when: 'doctor runs and the test inspects the report'
    then: 'The test filters report.findings by f.rule === WORKTREE_GHOST_REGISTRY_ENTRY AND f.subject === "wt-ghost-int", asserts EXACTLY ONE such finding, and asserts the data payload shape (spec_id, expected_path, canonical_dir_present: false, git_worktree_listed: false). The earlier "any-finding-matches" assertion is replaced.'
  - id: A5
    given: 'H2 discharge regression (BINDING_ONE_SIDED on the H2 fixture) and H3 discharge regression (BINDING_SPEC_MISSING_REGISTRY on the H3 active and draft fixtures)'
    when: 'doctor runs each'
    then: 'Each test asserts the diagnostic data payload shape — worktree_name and spec_id present; for BINDING_ONE_SIDED, the specHasWorktree/registryHasSpecId fields present. This pins the data contract downstream authority logic (WORKTREE-SPEC-AUTHORITY-CONTROL-PLANE-001) will read.'
  - id: A6
    given: 'An A8-style mutation-free doctor purity test exercising a fixture with H1, H3, H4 enrichment, H5, and H6 conditions'
    when: 'doctor runs and the test snapshots .caws/ + git worktree list before and after'
    then: 'The byte-snapshot helper is extended to include .caws/events.jsonl (or its line count, whichever is cheaper). The test asserts byte-equal pre/post for events.jsonl. The .caws/worktrees/ subdirectory exclusion remains, and a docstring records WHY (git worktree dirs are independent state managed by git, not CAWS).'
  - id: A7
    given: 'The H5 binding_contradiction_3way diagnostic'
    when: 'doctor runs the H5 fixture'
    then: 'The existing substring-refusal assertions remain unchanged (caws worktree, caws specs, git, rm, mv, sh, bash, $, backtick). NEW: a structural assertion that the repair text contains EXACTLY the doctrine pointer "WORKTREE-SPEC-AUTHORITY-CONTROL-PLANE-001" and no other tokens that look like a capability/command identifier. The test docstring records that substring-refusal is a tripwire (necessary but not sufficient) and that the structural assertion adds a positive shape constraint.'
  - id: A8
    given: 'The full pre-existing kernel and store test suites'
    when: 'jest runs both suites'
    then: 'All pre-existing tests remain green. No production diff outside scope.in. observeFilesystem signature change is backward-compatible at call sites within store (composeStoreSnapshot updates its single call accordingly). No new event schema. No CHANGELOG/package version bump.'
  - id: A9
    given: 'Real .caws/ state on this repo (which contains the v10.2 legacy envelope worktrees.json)'
    when: 'caws doctor runs against this repo after the implementation'
    then: 'The set of rules that fire on this repo''s real state is unchanged from the previous slice. Only the data payload on BINDING_SPEC_MISSING_REGISTRY enrichment may differ (the new two-field shape replaces the single git_worktree_present field). No new ERROR/WARN finding appears that did not appear before. This slice does not change which findings fire — only the H4 data shape.'
  - id: A10
    given: 'Closure'
    when: 'caws specs close WORKTREE-DOCTOR-HALF-STATE-FOLLOWUP-001 --resolution completed runs'
    then: 'closure_notes explicitly states: (1) H4 enrichment is now distinguishing canonical_dir_observed from canonical_dir_present, derived from a spec-claim-keyed map, NOT from the registry-keyed map. (2) H4 enrichment is an observable filesystem fact, NOT provenance proof that destroyWorktree caused the state. (3) H1 defensive filter, H1 store data shape, H2/H3 data payloads, H5 doctrine-pointer structural assertion, and A8 events.jsonl coverage are pinned by regression tests. (4) The next slice remains WORKTREE-SPEC-AUTHORITY-CONTROL-PLANE-001. (5) Doctor stays diagnose-only; repair remains blocked on the authority slice.'
non_functional:
  reliability:
    - 'Detect-only. Doctor remains pure (kernel: no fs/git/process/Date.now; store: read-only observations).'
    - 'H4 enrichment data shape is explicit about provenance. The kernel surfaces both observable facts (registry absence + canonical-dir state for spec-claimed name) and lets downstream authority logic decide what they mean. No inference is baked in.'
    - 'No re-opening of the closed predecessor spec. Scope.out lists it as an enforcement guard.'
  performance:
    - 'specClaimedWorktreeDirByName observation adds O(N) statSync calls where N = number of specs with worktree: set. Bounded; same shape as the existing registry-keyed map.'
contracts:
  - name: 'doctor-h4-enrichment-honesty'
    type: behavior
    path: packages/caws-kernel/src/doctor
    description: 'BINDING_SPEC_MISSING_REGISTRY data payload, when enriched, distinguishes canonical_dir_observed (whether the store knew about the spec-claimed name at all) from canonical_dir_present (whether the canonical path exists on disk). The kernel does NOT collapse "unobserved" into "absent." The single git_worktree_present field from the previous slice is replaced by this two-field shape.'
