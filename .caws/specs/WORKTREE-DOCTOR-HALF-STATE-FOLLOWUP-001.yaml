# Provenance
# ----------
# Filed 2026-05-22 in response to the honest post-implementation review of
# WORKTREE-DOCTOR-HALF-STATE-001 (closed 2026-05-22, commits 9a794c9,
# f67a71f, a84ac60). The review surfaced one semantic gap (H4 enrichment
# overstates what the implementation can distinguish) and five
# regression-signal gaps (green CI does not prove what the closure notes
# claimed for the H1 defensive filter, H1/H2/H3 data shapes, H5 structural
# invariant, and A8 mutation-free claim).
#
# Activated 2026-05-22 by direct YAML edit. v11.1.6 ships no
# `caws specs promote` or `caws specs update --lifecycle-state`; the only
# CLI surface for active-spec authoring is direct-YAML, which is the
# established practice in this repo (see WORKTREE-DOCTOR-HALF-STATE-001
# triage block lines 107-109, PRUNE-REPAIR-WORKTREE-RECON-001 closure
# notes). Audit-quiet by necessity; the slice's audit trail is the
# commit chain plus the spec_closed event on completion.
#
# This spec is a Diagnose-level correctness hardening slice in the §1.4
# Diagnose / Decide / Repair stratification. It does not move the
# stratification forward. The next slice in the ordering remains
# WORKTREE-SPEC-AUTHORITY-CONTROL-PLANE-001 (Decide).
#
# Scope discipline
# ----------------
# The only production semantic change in this slice is the spec-claimed
# canonical-dir observation for H4. Everything else is regression-signal
# tightening — adding assertions to existing tests, adding a defensive-
# filter regression test, extending the A8 byte-snapshot to cover the
# event log. No new rules. No new event schemas. No shell imports. No
# release surface.
#
# The closed predecessor spec (.caws/specs/WORKTREE-DOCTOR-HALF-STATE-001.yaml)
# is listed in scope.out as an explicit enforcement guard against
# accidental re-opening. The two adjacent specs (PRUNE-REPAIR-WORKTREE-001
# still blocked on authority; WORKTREE-SPEC-AUTHORITY-CONTROL-PLANE-001
# is the next slice) are also in scope.out to prevent cross-slice edits.
#
# Implementation plan
# -------------------
# Commit 1 (this commit): spec authoring + activation only.
#   No implementation edits. No test edits.
#
# Commit 2: implementation + test tightening.
#   - packages/caws-kernel/src/doctor/types.ts: add
#     filesystem.specClaimedWorktreeDirByName?: Readonly<Record<string, boolean>>.
#   - packages/caws-kernel/src/doctor/inspect.ts: replace the
#     git_worktree_present enrichment in §2b with the two-field shape
#     (canonical_dir_observed + canonical_dir_present) sourced from the
#     new spec-claim-keyed map.
#   - packages/caws-cli/src/store/types.ts: declare the new
#     StoreSnapshot.filesystem.specClaimedWorktreeDirByName field.
#   - packages/caws-cli/src/store/doctor-snapshot.ts: extend
#     observeFilesystem to accept specs and populate the new map by
#     statSync on path.join(cawsDir, 'worktrees', spec.worktree) for
#     each spec with a worktree field. Update composeStoreSnapshot
#     callsite accordingly.
#   - packages/caws-kernel/tests/unit/doctor-half-state.test.ts:
#     • 3 H4 enrichment tests covering the canonical_dir_observed
#       true/present-true, true/present-false, false/omitted shapes.
#     • 1 H1 defensive-filter regression test on the v10.2 envelope shape.
#     • Data-payload assertions added to existing H2 and H3 discharge tests.
#     • H5 doctrine-pointer structural assertion added.
#   - packages/caws-cli/tests/store/doctor-half-state.test.js:
#     • H1 integration test: filter findings by subject; assert exactly
#       one; assert data shape.
#     • H4 integration test: real-fixture pair where canonical dir is
#       present vs. observably absent.
#     • A8 byte-snapshot extended to include events.jsonl.
#
# Commit 3: spec closure with closure notes recording the H4 honesty
