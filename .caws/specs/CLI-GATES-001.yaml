invariants:
  - 'caws gates run is driven by policy.yaml gate declarations; it does not hard-code gate names.'
  - 'Each declared gate emits exactly one gate_evaluated event per invocation through appendEvent.'
acceptance:
  - id: A1
    given: 'A policy.yaml declaring one or more gates and a bound spec id.'
    when: 'caws gates run --spec <id> is invoked.'
    then: 'Each declared gate is evaluated and a gate_evaluated event is appended to events.jsonl.'
  - id: A2
    given: 'A gate whose subprocess invocation fails.'
    when: 'caws gates run encounters the failure.'
    then: 'The failure surfaces as a typed diagnostic and the command exits non-zero; the events.jsonl chain remains valid.'
non_functional:
  reliability:
    - 'gates run is idempotent at the event level: re-runs append new events, never mutate prior ones.'
