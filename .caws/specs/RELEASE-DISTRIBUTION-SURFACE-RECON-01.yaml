id: RELEASE-DISTRIBUTION-SURFACE-RECON-01
title: 'Recon: resolve published-surface skew (Bug-004 / P0-0)'
risk_tier: 3
mode: chore
lifecycle_state: active
created_at: '2026-05-26T08:35:43.461Z'
updated_at: '2026-05-26T08:35:43.461Z'
blast_radius:
  modules:
    - docs/reports/release_distribution_surface_recon_01.md
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - .caws/specs/RELEASE-DISTRIBUTION-SURFACE-RECON-01.yaml
    - docs/reports/release_distribution_surface_recon_01.md
  out:
    - packages
    - .caws/policy.yaml
    - CODEOWNERS
invariants:
  - 'I1: Recon/decision slice only. No npm publish, no code change, no documentation rewrite, no kit edit, no .caws/agents.json repair, no amendment to the closed USER-E2E-SETUP-REHEARSAL-001 report. All recommendations land in the report as candidate slice ids for subsequent authorization.'
  - 'I2: All npm-side observations MUST be read-only (`npm view`, never `npm publish`, `npm dist-tag`, or `npm unpublish`). Repository-side reads MUST NOT mutate any tracked file other than the spec yaml and the new report.'
  - 'I3: Findings MUST distinguish three surfaces explicitly: (a) the npm registry truth (what `npm install -g @paths.design/caws-cli` actually resolves to today), (b) the repo-local source-of-truth (`packages/caws-cli/package.json` version + most recent release tag), (c) the documentation surface (README.md, CHANGELOG.md, docs/architecture/*, kit, CLAUDE.md). A claim about "skew" without naming which two surfaces disagree is a defect in the report.'
  - 'I4: The maintainer''s local global-install version is OBSERVATIONAL ENVIRONMENT STATE, not a finding about the published surface itself. The rehearsal''s Bug-004 framing conflated the two; this slice''s report MUST keep them separate. A stale global install on one machine is a personal-environment issue; a stale npm `latest` dist-tag would be a release issue.'
  - 'I5: The decision options enumerated in the report MUST be exhaustive within the recon evidence: every plausible resolution path that the evidence supports gets a row, with pros/cons/blast-radius for each. The slice does not pick the winner — the maintainer picks the winner. The report ranks options only by which has the smallest blast radius for the most user benefit.'
  - 'I6: The report MUST name candidate follow-up slice ids for whichever decision option the maintainer selects. Subsequent slices are NOT opened in this slice; they are NAMED.'
acceptance:
  - id: A1
    given: 'The npm registry is reachable and `npm view @paths.design/caws-cli` returns metadata.'
    when: 'The recon executes `npm view ... version`, `npm view ... dist-tags --json`, `npm view ... versions --json`, and `npm view ... time --json`.'
    then: 'The report records the exact `latest` dist-tag value, the dist-tag JSON object verbatim, the most recent five versions with publish timestamps, and the gap (in days) between the most recent v10.x publish and the most recent v11.x publish. These numbers are quoted, not paraphrased.'
  - id: A2
    given: 'The repo-local source-of-truth at `packages/caws-cli/package.json` and `packages/caws-cli/CHANGELOG.md`.'
    when: 'The recon reads `version` from package.json and the topmost release header from CHANGELOG.md.'
    then: 'The report records the repo-local version verbatim and the most recent CHANGELOG entry''s version+date+subject line. Any mismatch between package.json `version` and CHANGELOG topmost version is itself a finding.'
  - id: A3
    given: 'The documentation surface: README.md (root), CHANGELOG.md, docs/architecture/caws-vnext-command-surface.md, CLAUDE.md (root + templates), AGENTS.md, the rehearsal kit at docs/reports/user_e2e_setup_rehearsal_001_kit.md.'
    when: 'The recon greps each for install-related strings: `npm install`, `@paths.design/caws-cli`, version specifiers (`10.`, `11.`, `^10`, `^11`), and pin-to-X advice.'
    then: 'The report tabulates every install-guidance string found, classifies each as "current" or "stale", and quotes the stale ones verbatim with file:line citation. Stale strings whose recommendation contradicts the npm `latest` truth are flagged as user-impacting.'
  - id: A4
    given: 'The release automation surface: `.github/workflows/release.yml`, `scripts/release-*.mjs`, `packages/caws-cli/.npmignore` (if present), the tag-driven-release doctrine in CLAUDE.md trap #7.'
    when: 'The recon enumerates release-triggering paths and identifies which mechanism (tag push, branch push, manual run, etc.) is the canonical publish trigger.'
    then: 'The report names the canonical release trigger, identifies whether a fresh publish requires any maintainer action beyond tag push, and notes any divergence between the documented release procedure and the workflow file''s actual triggers.'
  - id: A5
    given: 'The npm reality (A1), repo-local truth (A2), documentation surface (A3), and release automation (A4).'
    when: 'The recon composes the mismatch table (report §6).'
    then: 'Every mismatch is a row with: source surface, target surface, observed value, expected value, user impact (high/medium/low), and disposition recommendation (doc-fix / release / no-action-needed). A mismatch without a user-impact rating is a defect in the report.'
  - id: A6
    given: 'The mismatch table from A5.'
    when: 'The recon composes the decision-options section (report §8).'
    then: 'At least 4 explicit options are listed (publish-fix-forward / repoint-docs-to-10.2 / split-channels / block-on-v11-P0s), plus an "other" row only if evidence supports it. Each option lists: prerequisites, action surface (what files/commands change), blast radius (what users feel), and rollback path (how to undo if wrong). The report does NOT pick a winner; it ranks by smallest-blast-radius-for-most-benefit only.'
  - id: A7
    given: 'The recon completes.'
    when: 'The report''s §9 names candidate follow-up slices.'
    then: 'For each decision option in §8, the slice id(s) that would implement it are named (e.g., "Option A → DOCS-V11-CUTOVER-REFRESH-01 + maybe a release-bump slice if a 11.1.7 is needed"). These ids are CANDIDATES; no spec is created. The maintainer authorizes the next slice in a separate turn.'
  - id: A8
    given: 'The slice closes.'
    when: 'The report is committed and the spec is closed via `caws specs close`.'
    then: 'No file outside `scope.in` is modified. No npm command other than `npm view` is executed. `.caws/agents.json` is not created or modified. The closed USER-E2E-SETUP-REHEARSAL-001 report is not amended.'
non_functional:
  reliability:
    - 'The npm view commands MUST be invoked with explicit package-name args, not via repo-root context, to avoid pnpm-workspace interference. The earlier rehearsal session noted `npm warn Ignoring workspaces for specified package(s)` on these invocations; that warning is benign for read-only `npm view` and the report should note it but not act on it.'
contracts: []
