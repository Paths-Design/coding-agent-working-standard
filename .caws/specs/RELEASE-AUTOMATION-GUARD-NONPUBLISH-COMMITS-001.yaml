id: RELEASE-AUTOMATION-GUARD-NONPUBLISH-COMMITS-001
title: 'Prevent non-shipping commits from triggering package publishes'
risk_tier: 2
mode: chore
lifecycle_state: active
created_at: '2026-05-18T00:00:00.000Z'
updated_at: '2026-05-18T10:55:00.000Z'
blast_radius:
  modules:
    - .github/workflows
    - .releaserc.json
    - scripts/multi-package-release.mjs
    - package.json
    - packages/caws-cli/package.json
    - packages/quality-gates/package.json
  data_migration: false
operational_rollback_slo: 30m
scope:
  in:
    - .github/workflows
    - .releaserc.json
    - package.json
    - packages/caws-cli/package.json
    - packages/quality-gates/package.json
    - scripts
    - docs/architecture/caws-vnext-command-surface.md
    - docs/architecture/release-automation.md
    - .caws/specs/RELEASE-AUTOMATION-GUARD-NONPUBLISH-COMMITS-001.yaml
  out:
    - packages/caws-cli/src
    - packages/caws-cli/templates
    - packages/caws-kernel
invariants:
  - 'No npm unpublish is performed.'
  - 'No package version is bumped by this slice.'
  - 'No release tag is created by this slice.'
  - 'The v11.1.2 release remains accepted as an accidental but valid patch release; it is not retroactively justified or apologized for in changelog text added by this slice.'
  - 'A docs-only, spec-only, or test-only commit must not trigger @paths.design/caws-cli publish.'
  - 'A packages/quality-gates-only commit must not trigger @paths.design/caws-cli publish.'
  - 'A real caws-cli shipped-artifact change must still be capable of publishing through the authorized release path; the guard restricts unintentional publishes, not intentional ones.'
  - 'No package boundary is dissolved or merged by this slice; release scoping respects current workspace boundaries.'
  - 'Within packages/caws-cli/, packages/quality-gates/, and packages/caws-kernel/, only the top-level package.json files may be modified by this slice; no src/, templates/, tests/, dist/, or checker .mjs/.ts file is touched.'
acceptance:
  - id: A1
    given: 'A commit touching only files under .caws/specs/.'
    when: 'Release automation evaluates the commit on the release branch.'
    then: 'No package publish, tag, or version bump is produced; the release job logs a structured skip reason naming the specs-only file set.'
  - id: A2
    given: 'A commit touching only files under docs/ (any extension).'
    when: 'Release automation evaluates the commit on the release branch.'
    then: 'No package publish, tag, or version bump is produced; the release job logs a structured skip reason naming the docs-only file set.'
  - id: A3
    given: 'A commit touching only files under packages/quality-gates/.'
    when: 'Release automation evaluates the commit on the release branch.'
    then: '@paths.design/caws-cli is not published; @paths.design/caws-quality-gates is not published unless an explicit release-authorization marker is present (commit-message marker, workflow_dispatch input, or label — implementer chooses).'
  - id: A4
    given: 'A commit touching only test files (tests/**, *.test.*, *.spec.*) or diagnostic helpers that are not shipped in the package tarball.'
    when: 'Release automation evaluates the commit on the release branch.'
    then: 'No package publish occurs; the release job logs the skip reason and the file set that triggered it.'
  - id: A5
    given: 'A real caws-cli runtime change (src/**, templates/hook-packs/**, dist-bound files) committed with a release-classified conventional-commit type (fix/feat/perf).'
    when: 'Release automation evaluates the commit on the release branch.'
    then: 'The normal patch/minor release of @paths.design/caws-cli is published as expected. If the chosen implementation introduces a release-authorization marker, the marker is required ONLY for ambiguous or non-shipping commit patterns (per A3/A4); ordinary caws-cli shipping commits do not need it. The guard is one-sided: it prevents false publishes from non-shipping commits, not legitimate publishes from shipping commits.'
  - id: A6
    given: 'The six current draft specs (QUALITY-GATES-HOOKS-MIGRATION-PLAN-001, QG-HOOKS-EXTRACT-001, QUALITY-GATES-PACKAGE-DEPRECATE-001, GATES-RUN-POST-QG-DOCTRINE-001, QUALITY-GATES-PACKAGE-REMOVE-001, RELEASE-AUTOMATION-GUARD-NONPUBLISH-COMMITS-001) remain untracked at the start of this slice.'
    when: 'This slice closes.'
    then: 'A safe commit path for draft specs is documented (under docs/architecture/release-automation.md or equivalent) and has been verified to be non-publishing via dry-run evidence captured in A7.'
  - id: A7
    given: 'The implemented release-automation guard.'
    when: 'A dry-run of release automation is executed against representative example commits.'
    then: 'The dry-run evidence is captured in the slice closure notes; specs-only, docs-only, tests-only, quality-gates-only, caws-cli-shipping, and mixed-commit examples each produce the expected publish/no-publish outcome; no real publish occurs during the dry-run.'
  - id: A8
    given: 'A commit that mixes shipping caws-cli changes with non-shipping changes (e.g., src/foo.ts + docs/bar.md).'
    when: 'Release automation evaluates the commit.'
    then: 'The mixed commit is treated as shipping; @paths.design/caws-cli is published. The guard is one-sided: it prevents publishes from purely-non-shipping commits, not from mixed commits.'
non_functional:
  reliability:
    - 'Release dry-run evidence must be captured for: specs-only, docs-only, tests-only, quality-gates-only, caws-cli-shipping, and mixed-commit examples.'
    - 'The guard mechanism must not silently change the meaning of existing conventional commit types; if conventional-commits rules are extended (releaseRules), the addition must be documented in docs/architecture/release-automation.md.'
    - 'A revert PR can restore prior behavior in under 10 minutes; the slice does not introduce migrations or persistent state.'
  security:
    - 'The guard must not weaken authentication or token scope for npm publishing; it narrows when publishes happen, not who can publish.'
    - 'The guard must not introduce a new way to publish that bypasses semantic-release; if a release-authorization marker is introduced, it must flow through the existing release workflow.'
contracts:
  - name: release-intent-contract
    type: behavior
    path: .github/workflows/release.yml
    description: 'Defines which commit/file-change combinations are allowed to publish packages and which require an explicit release-authorization marker. Inputs: changed file set, commit message, current branch. Outputs: publish/skip decision per workspace package, with structured log line stating reason.'
# --- Observability and rollback (schema does not admit these as fields) ---
# Observability requirements (lifted out of non_functional for schema compliance):
#   - The release workflow logs must state why a publish was skipped,
#     including the file set evaluated and the rule that matched.
#   - The release workflow logs must state why a publish proceeded,
#     including which package(s) qualified and which rule authorized them.
# These belong in the contract description (above) and the release-automation
# doc that the slice produces; the schema's non_functional shape only admits
# reliability and security categories today.
#
# Rollback plan (covered above in non_functional.reliability):
#   - Revert the release-automation config change. No registry mutation is
#     part of this slice and therefore no registry rollback is needed.
#
# --- v11.0.0 active-spec binding limitation --------------------------------
# This spec is active before v11.1 worktree lifecycle commands exist.
# `caws doctor` may emit doctor.spec.unbound_active_stale because the active
# spec is not bound through .caws/worktrees.json. That warning is accepted
# for this slice only as a known v11.0.0 lifecycle gap.
#
# Do NOT hand-edit .caws/worktrees.json to silence the warning. That would
# create a stronger governance violation (governed-paths bypass) than the
# warning itself. This slice proceeds on branch feat/release-automation-guard
# with the warning documented, and closure notes must record both the warning
# and the reason it was accepted.
#
# Once v11.1 lifecycle commands exist, future active implementation slices
# should bind through the canonical lifecycle path (caws specs bind /
# caws worktree bind, whichever ships) instead of relying on this exception.
# This exception is precedent only for the release-governance repair itself,
# not a general waiver of the v11 binding requirement.
#
# Evidence path for closure:
#   - Doctor output before slice close still shows the warning (expected).
#   - Closure notes cite this comment block and link to the v11.1 ticket
#     that restores lifecycle binding commands.
#
# --- Risk tier note --------------------------------------------------------
# risk_tier: 2 reflects that release automation changes are reversible
# (revert the config commit) and do not touch the npm registry directly,
# but they govern every future release and therefore deserve careful review.
# Not T1 because no doctrine change is required; not T3 because a mistake
# here gates or breaks every future publish.
#
# --- Why this is the parent guard for the quality-gates campaign -----------
# The five quality-gates-migration drafts cannot be committed safely until
# this slice closes:
#   - QUALITY-GATES-HOOKS-MIGRATION-PLAN-001 (specs-only): currently risks
#     triggering a caws-cli publish under the v11.1.2 incident conditions.
#   - QG-HOOKS-EXTRACT-001 (templates + tests): could trigger publish under
#     current rules if the conventional-commit type is fix/feat.
#   - QUALITY-GATES-PACKAGE-DEPRECATE-001 (release-config + docs): would
#     itself trigger the very automation it's trying to govern.
#   - GATES-RUN-POST-QG-DOCTRINE-001 (caws-cli src changes): needs the
#     mixed-commit rule (A8) defined before it can ship safely.
#   - QUALITY-GATES-PACKAGE-REMOVE-001 (package removal): must not publish
#     a final patch release as a side effect of removal.
# Closing this slice first means every subsequent slice can be committed
# without empirically testing release behavior in production.
#
# --- v11.1.2 incident context ---------------------------------------------
# On 2026-05-18 a commit `fix(quality-gates): route CI/FIX mode banners
# through logHuman to preserve JSON stdout` (e562a0e) was pushed to main
# under the standing instruction "no publish/no tag/no bump". semantic-release
# auto-published @paths.design/caws-cli@11.1.2 with the test-only diagnostic
# helper from the prior commit; the actual fix lived in
# packages/quality-gates and was never shipped to npm under any version.
# The release was not reverted (npm unpublish policy creates more scar tissue
# than the release does). This slice is the long-term fix; the immediate
# response was to stop pushing to main.
#
# --- Implementation latitude -----------------------------------------------
# Acceptance criteria specify outcomes, not mechanism. Viable approaches:
#
#  1. semantic-release releaseRules: map specific scopes/paths to release:
#     false. Lowest friction; works inside existing automation; transparent
#     to commit authors.
#
#  2. scripts/multi-package-release.mjs path detection: detect changed
#     packages and skip semantic-release entirely for the unchanged ones.
#     Already partially present in repo; auditing/extending this script is
#     likely the lowest-cost real path.
#
#  3. Workflow-level guard: require an explicit "publish-authorized" label
#     or workflow_dispatch input before semantic-release runs at all.
#     Strongest gate; adds friction to every release.
#
# Implementer should audit current automation (scripts/multi-package-release.mjs
# already exists per the file name) and choose the option that requires the
# least new infrastructure while satisfying A1-A8. Option 2 is a strong
# candidate but the file's current behavior should be inspected before
# committing.
#
# --- What this slice deliberately does NOT do ------------------------------
# - Does not change which conventional-commit types trigger releases in
#   principle (fix:/feat:/perf: still release; chore:/docs:/test: still
#   don't). It changes when those rules ACTUALLY produce a publish based
#   on what files changed.
# - Does not introduce a manual release approval step for every release;
#   only for non-shipping commit patterns that should never auto-publish.
# - Does not modify semantic-release itself; it adds configuration or
#   wraps the release invocation.
# - Does not address the question of what to do with the
#   @paths.design/caws-quality-gates package on npm; that is handled by
#   QUALITY-GATES-PACKAGE-DEPRECATE-001 and QUALITY-GATES-PACKAGE-REMOVE-001.
