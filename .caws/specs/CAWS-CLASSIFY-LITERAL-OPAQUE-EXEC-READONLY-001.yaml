id: CAWS-CLASSIFY-LITERAL-OPAQUE-EXEC-READONLY-001
title: 'block-dangerous: opaque -c/-e exec refuses with a prescriptive remediation instead of arming the sticky session latch'
risk_tier: 2
mode: fix
lifecycle_state: active
worktree: classify-literal-readonly
created_at: '2026-06-16T16:25:48.456Z'
updated_at: '2026-06-16T16:47:02.200Z'
blast_radius:
  modules:
    - 'hook-pack/shared/block-dangerous (opaque-exec ask handling — block vs latch decision)'
    - 'hook-pack/danger-latch (arming policy: opaque-exec no longer writes a session latch)'
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - docs/architecture/command-capability-taxonomy.md
    - packages/caws-cli/templates/hook-packs/shared/block-dangerous.sh
    - packages/caws-cli/tests/hooks/bats/block-dangerous.bats
    - packages/caws-cli/src/init/hook-packs/manifest-shared.ts
    - packages/caws-cli/tests/init/pack-fingerprints.json
  out:
    - packages/caws-cli/templates/hook-packs/shared/classify_command.py
invariants:
  - 'An opaque-exec ask (classifier reason "opaque execution — cannot prove payload", source=capability) is REFUSED with a block decision and a prescriptive remediation message — telling the agent to write the probe to a .py/.js file and run it by path, or use the Read tool for inspection — modeled on the protected-paths.sh pattern (refuse THIS command with an actionable alternative).'
  - 'An opaque-exec refusal does NOT write the per-session danger latch (record_danger_latch is not called on this path). The session is not frozen: the agent self-recovers by rewriting the probe, and no human reset is required. This is the behavioral change from the prior warn-first→arm escalation.'
  - 'Recall is preserved: the opaque-exec command itself is still refused (it never runs), so a genuinely dangerous python3 -c "...$VAR..." is blocked exactly as before — only the sticky session-wide latch side effect is removed.'
  - 'Every OTHER ask/deny path is unchanged: catastrophic deny (rm -rf /, protected-guard edits, naked rm on .caws/specs) still arms the latch; non-opaque capability asks (HTTP_MUTATE, PROC_KILL, DESTROY) keep their existing warn-first→arm escalation. The carve-out is scoped to the opaque-exec reason only.'
  - 'The change lives entirely in block-dangerous.sh (the ask/confirm handling branch); classify_command.py is unchanged — the classifier keeps returning the same {decision:ask, reason:opaque..., source:capability} verdict, and the shell layer reinterprets how that verdict is enforced.'
acceptance:
  - id: A1
    given: 'an opaque-exec command the classifier returns ask for with reason "opaque execution — cannot prove payload", e.g. python3 -c "...$SOMEVAR..." or a $VAR-in-path read like python3 -c "json.load(open(\"$ART\"))" (the shape of the 14 benign FPs in Sterling danger-latch-resets.log)'
    when: 'block-dangerous.sh processes it'
    then: 'the hook returns a block (non-zero / deny JSON) whose message names the sanctioned alternative (write to a .py/.js file and run by path, or use Read), AND NO danger-latch sentinel file is written in the session state dir'
  - id: A2
    given: 'a SECOND opaque-exec command later in the same session'
    when: 'block-dangerous.sh processes it'
    then: 'it is refused with the same prescriptive block and still writes NO latch — i.e. there is no warn-first→arm escalation for the opaque-exec class; every occurrence is independently refusable and the session never freezes'
  - id: A3
    given: 'a catastrophic-deny command (rm -rf /) and a non-opaque capability ask (a PROC_KILL such as pkill -f x)'
    when: 'block-dangerous.sh processes each'
    then: 'the rm -rf / still arms the latch (catastrophic deny unchanged); the PROC_KILL keeps its existing warn-first→arm behavior — the opaque-exec carve-out does not weaken either path'
  - id: A4
    given: 'the shipped bats suite at packages/caws-cli/tests/hooks/bats/block-dangerous.bats (sandboxed latch in a temp repo)'
    when: 'it runs against the modified block-dangerous.sh'
    then: 'all prior tests still pass (git-init, rm -rf /, curl|sh, latch sandboxing) and the new opaque-exec tests for A1-A3 pass — asserting BOTH the block decision AND the absence of a latch sentinel file'
non_functional:
  reliability:
    - 'The opaque-exec carve-out is keyed to the exact classifier reason string + source=capability, not to a broad interpreter match, so it cannot accidentally swallow a deny. If the classifier ever returns a non-ask decision for the same command, that decision (allow/deny) is honored unchanged — the carve-out only reinterprets the ask-confirm enforcement, never overrides allow or deny.'
contracts:
  - name: 'block-dangerous-opaque-exec'
    type: behavior
    path: 'packages/caws-cli/templates/hook-packs/shared/block-dangerous.sh'
