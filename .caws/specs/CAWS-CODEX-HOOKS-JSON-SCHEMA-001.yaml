id: CAWS-CODEX-HOOKS-JSON-SCHEMA-001
title: 'Keep Codex hooks.json schema valid'
risk_tier: 3
mode: fix
lifecycle_state: active
created_at: '2026-06-29T14:53:49.542Z'
updated_at: '2026-06-29T14:53:59.866Z'
blast_radius:
  modules:
    - packages/caws-cli init hook-pack installer
    - codex hook-pack template
    - fresh-install smoke proof
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - packages/caws-cli/templates/hook-packs/codex/hooks.json
    - packages/caws-cli/src/init/hook-install.ts
    - packages/caws-cli/scripts/fresh-install-smoke.mjs
    - packages/caws-cli/tests/init/init-hook-pack-render.test.js
    - .caws/specs/CAWS-CODEX-HOOKS-JSON-SCHEMA-001.yaml
  out: []
invariants:
  - 'Codex hooks.json installed by CAWS must conform to the Codex parser schema: top-level hooks only, no CAWS metadata fields.'
  - 'CAWS reinstall/adopt/overwrite decisions must still distinguish CAWS-generated Codex hooks.json from unmanaged user-authored JSON without hidden unsupported fields.'
  - 'Fresh-install smoke must prove runtime-root shared-core Codex commands and schema validity from the installed artifact.'
acceptance:
  - id: A1
    given: a fresh project initialized with the Codex hook pack
    when: the installed .codex/hooks.json is parsed
    then: the JSON has exactly the supported top-level hooks key and five runtime-root shared-core dispatcher commands.
  - id: A2
    given: a CAWS-generated Codex hooks.json without embedded metadata
    when: caws init evaluates the managed file state on a later run
    then: it recognizes the artifact as CAWS-owned only when the runtime-root Codex dispatcher shape matches, otherwise preserving unmanaged-collision protection.
  - id: A3
    given: the package build and fresh-install smoke suite
    when: Codex pack validations run
    then: they fail on unsupported top-level metadata, unresolved placeholders, stale .codex/hooks/caws_dispatch paths, or absolute install-root commands.
non_functional: {}
contracts: []
