id: UX-SPECS-CREATE-SCOPE-DOT-ALIAS-001
title: 'Add specs create scope.in alias'
risk_tier: 3
mode: fix
lifecycle_state: active
created_at: '2026-07-04T18:33:49.870Z'
updated_at: '2026-07-04T18:33:49.870Z'
blast_radius:
  modules:
    - 'packages/caws-cli shell specs create'
    - 'CLI reference documentation'
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - 'packages/caws-cli/src/shell/commands/specs.ts'
    - 'packages/caws-cli/src/shell/register.ts'
    - 'packages/caws-cli/src/shell/command-metadata.ts'
    - 'packages/caws-cli/tests/shell/specs-create-scope-dot-alias.test.js'
    - 'docs/api/cli.md'
    - 'docs/command-reference.md'
    - 'docs/architecture/cli-ux-job-model-audit.md'
  out: []
invariants:
  - '`caws specs create --scope.in <path>` writes the same canonical scope.in YAML as --scope-in.'
  - 'Supplying both --scope-in and --scope.in is refused before spec files or events are written.'
  - 'The nested create help and CLI docs expose the alias without changing the canonical YAML field.'
acceptance:
  - id: A1
    given: 'a CAWS repository with no existing target spec'
    when: 'an operator runs caws specs create --id <id> ... --scope.in README.md'
    then: 'the command succeeds and the created spec contains scope.in: [README.md].'
  - id: A2
    given: 'a CAWS repository with no existing target spec'
    when: 'an operator supplies both --scope-in and --scope.in to specs create'
    then: 'the command exits non-zero and writes no spec file or event.'
  - id: A3
    given: 'the built CLI command surface'
    when: 'an operator runs caws specs create --help'
    then: 'help lists both --scope-in <path> and --scope.in <path> with the shared scope.in context.'
non_functional: {}
contracts:
  - name: 'specs-create-scope-dot-alias'
    type: behavior
    path: 'packages/caws-cli/tests/shell/specs-create-scope-dot-alias.test.js'
