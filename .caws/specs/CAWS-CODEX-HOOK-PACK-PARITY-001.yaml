invariants:
  - >-
    `codex` is a first-class known and implemented agent surface. The hook-pack
    registry resolves it to a manifest, `.codex` harness signals are detected,
    and `caws init --agent-surface codex` installs the pack without weakening
    the existing Claude Code pack.
  - >-
    Codex installs through the project-local `.codex/hooks.json` model with one
    CAWS dispatcher command per Codex event. The dispatcher preserves ordered
    internal CAWS guard execution because Codex launches multiple matching
    command hooks concurrently.
  - >-
    Codex installed files carry Codex-specific managed-hook metadata. Script
    headers use `hook_pack: codex`; JSON hook config uses managed metadata that
    the installer can parse for no-op/update/drift/collision decisions.
  - >-
    Codex hook commands are rendered with absolute git-root-resolved paths and
    a repo-root environment binding. No installed `hooks.json` command depends
    on the Codex session starting from the repo root.
  - >-
    Codex hook IO follows the documented Codex contract. Unsupported Codex
    semantics, especially PreToolUse ask, are degraded conservatively and
    documented in the pack README rather than emitting unsupported fields that
    Codex treats as hook failures.
acceptance:
  - id: A1
    given: >-
      The hook-pack registry and harness detector.
    when: >-
      `codex` is requested explicitly or `.codex/` is present.
    then: >-
      `codex` is recognized, implemented, resolves to a pack, and is selected
      exactly like `claude-code`; ambiguous `.claude` + `.codex` detection still
      requires an explicit surface.
  - id: A2
    given: >-
      A fresh git repo.
    when: >-
      `caws init --agent-surface codex` runs.
    then: >-
      `.codex/hooks.json` and every manifest file under `.codex/hooks/` are
      created with managed metadata and executable bits where declared.
  - id: A3
    given: >-
      An installed Codex hook pack.
    when: >-
      init is rerun, an older managed version is present, managed drift is
      present, or unmanaged collisions exist.
    then: >-
      Rerun is a no-op, old managed files update, drift/collisions refuse by
      default, `--adopt` leaves local bytes, and `--overwrite` replaces them.
  - id: A4
    given: >-
      Codex hook input/output fixtures.
    when: >-
      the parser and emitter libraries are invoked.
    then: >-
      Bash and apply_patch payloads parse to the expected CAWS hook variables;
      block, context, conservative ask, and updatedInput envelopes match the
      current Codex hook contract; malformed input fails open.
  - id: A5
    given: >-
      A Codex project-local hook install.
    when: >-
      the generated `.codex/hooks.json` is inspected.
    then: >-
      It contains one command hook per event dispatcher, absolute repo-root
      commands, no relative `.codex/hooks/...` command paths, and documentation
      tells users to review/trust changed project hooks through `/hooks`.
non_functional: {}
contracts:
  - name: 'codex-hook-contract'
    type: behavior
    path: 'packages/caws-cli/tests/init/hook-packs/codex-install.test.js'
