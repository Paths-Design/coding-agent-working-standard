id: DANGER-LATCH-RESET-LOG-CLASSIFY-001
title: 'Classify vague danger-latch reset audit reasons from embedded latch/session context'
risk_tier: 3
mode: chore
lifecycle_state: active
created_at: '2026-06-10T15:37:03.701Z'
updated_at: '2026-06-10T15:37:14.747Z'
blast_radius:
  modules:
    - local Claude danger-latch reset audit log
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - .claude/logs/danger-latch-resets.log
    - .caws/specs/DANGER-LATCH-RESET-LOG-CLASSIFY-001.yaml
  out: []
invariants:
  - >-
    Local danger-latch reset audit entries keep their original timestamps, latch
    file paths, cleared_latch payloads, and command context; only vague reset
    operator reasons such as "lol" are replaced with factual classifications.
  - >-
    Replacement classifications are derived from the embedded cleared_latch
    reason/command plus the corresponding .caws/sessions transcript context
    where needed.
acceptance:
  - id: A1
    given: 'danger-latch reset JSONL entries whose reset reason is "lol" or a variant'
    when: 'the log is curated'
    then: 'those reset reasons are specific enough to explain the workflow or probe that required the human reset'
  - id: A2
    given: 'the curated danger-latch reset log'
    when: 'each line is parsed as JSON'
    then: 'the file remains valid JSONL and all cleared_latch objects remain intact'
non_functional: {}
contracts: []
