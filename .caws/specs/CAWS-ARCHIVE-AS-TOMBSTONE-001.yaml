id: CAWS-ARCHIVE-AS-TOMBSTONE-001
title: 'Archived specs are tombstones + git history, not authoritative file-tree surface'
risk_tier: 3
mode: fix
lifecycle_state: active
created_at: '2026-05-27T20:03:15.092Z'
updated_at: '2026-05-27T20:03:15.092Z'
