invariants:
  - >-
    `caws specs archive <id>` MUST NOT write a yaml body to
    `.caws/specs/.archive/<id>.yaml`. The archive operation captures
    the spec yaml's blob_sha (via `git hash-object` or `git ls-tree
    HEAD <path>`) BEFORE the deletion, removes the live spec from
    `.caws/specs/<id>.yaml` (via `git rm` inside the lifecycle
    transaction so the deletion is staged for the autocommit landed
    in CAWS-SPECS-WRITER-AUTOCOMMIT-001), and appends a
    `spec_archived` event carrying `blob_sha` as the authoritative
    recovery target.
  - >-
    The default file-tree surface MUST NOT contain archived spec
    bodies. `ls .caws/specs/` returns only active and draft specs. An
    agent that greps `.caws/specs/` does not get archived content as
    a hit, eliminating the context-rot vector where stale spec shapes
    re-enter agent reasoning as if they were current authority.
  - >-
    `caws specs show <id>` defaults to ACTIVE specs only. Archived
    specs are NOT silently surfaced through `show`. To access an
    archived spec body, the caller must explicitly opt in via
    `caws specs show <id> --archived` (which reads the event log's
    blob_sha and runs `git show <blob_sha>`) or use the dedicated
    `caws specs recover <id>` command. This breaks the v11.1.x
    transparent-fallback behavior (where `show` walked
    `.caws/specs/.archive/`) by design â€” the transparent fallback
    was the bug, not a feature.
  - >-
    Archived specs remain RECOVERABLE on demand. `caws specs recover
    <id>` reconstructs the body via `git show <blob_sha>`, where
    `blob_sha` is read from the `spec_archived` event's payload.
    blob_sha is content-addressed and topology-independent â€” recovery
    works regardless of whether the archive commit was a fast-forward,
    a merge, or rebased. Recovery NEVER mutates `.caws/specs/`; the
    body is written to stdout or to `--out <path>`. The recovery is
    explicit (caller must invoke the command), not implicit (no
    fallback path silently re-reads from disk).
  - >-
    Consumers with a legacy `.caws/specs/.archive/` directory (e.g.,
    Sterling has 554 such files) get a doctor WARN finding naming
    the directory and pointing to `caws specs prune-archive` for
    migration. The finding does NOT auto-fix; the maintainer decides
    when to prune (verifies recoverability for each archived id
    BEFORE the prune deletes anything).
  - >-
    `caws specs prune-archive` verifies each legacy
    `.caws/specs/.archive/<id>.yaml` is recoverable via git history
    (the body MUST be reachable from at least one commit on the
    current branch's history). Files that fail the recoverability
    check are QUARANTINED (moved to `.caws/specs/.archive/.unrecoverable/`)
    and reported as warnings â€” never silently deleted. Files that
    pass are removed from the working tree. Output: per-id status
    report. DRY-RUN BY DEFAULT; `--apply` required for any mutation.
    The "prove-recovery-or-quarantine" invariant is absolute: the
    command will REFUSE to delete a body it cannot prove recoverable
    via git, even when `--apply` is passed.
  - >-
    Schema evolution is ADDITIVE. The amended `spec_archived.v1.json`
    schema uses a `oneOf` discriminating legacy vs new events:
      - Legacy shape: { from_path, to_path }
      - New shape:    { from_path, blob_sha, source_commit_sha? }
    Both shapes preserve `additionalProperties: false` at the branch
    level. Read-side consumers (`caws specs list --include-archived`,
    `caws specs recover`, doctor) MUST handle both shapes. For legacy
    events lacking blob_sha, recovery falls back to
    `git log --all --follow -- <from_path>` to find a containing
    commit; if zero commits exist (local-only body), recovery returns
    a typed Err diagnostic naming the gap.
acceptance:
  - id: A1
    given: |
      a clean repo + an active spec `FEAT-001` that has been closed
      (lifecycle_state: closed). The working tree is clean. The
      spec yaml's content at HEAD has blob_sha B (as reported by
      `git hash-object .caws/specs/FEAT-001.yaml`).
    when: |
      `caws specs archive FEAT-001` is invoked.
    then: |
      Step-ordered behavior:
        1. `archiveSpec` captures blob_sha B (via
           `git ls-tree HEAD <path>` or `git hash-object <path>`)
           BEFORE any filesystem mutation.
        2. `archiveSpec` removes `.caws/specs/FEAT-001.yaml` from
           the working tree (via `git rm`, staged inside the
           lifecycle transaction).
        3. The lifecycle transaction appends a `spec_archived` event
           carrying `{ from_path: '.caws/specs/FEAT-001.yaml',
           blob_sha: B }` (no `to_path`).
        4. The autocommit (from CAWS-SPECS-WRITER-AUTOCOMMIT-001)
           commits the staged deletion.
      Post-conditions:
        - `ls .caws/specs/` does NOT list FEAT-001.yaml.
        - No file is written to `.caws/specs/.archive/`.
        - `git show B` prints the pre-archive yaml content
          (topology-independent recovery target).
        - The `spec_archived` event in `.caws/events.jsonl` carries
          the new shape (blob_sha, no to_path) and is valid against
          the amended schema.
  - id: A2
    given: |
      a spec archived per A1; blob_sha = B was recorded in the
      `spec_archived` event payload.
    when: |
      `caws specs recover FEAT-001` is invoked (no flags).
    then: |
      The command:
        1. Reads `.caws/events.jsonl` and finds the most recent
           `spec_archived` event for spec_id 'FEAT-001'.
        2. Validates the event's blob_sha (40-hex, never raw shell
           interpolation â€” uses execFileSync with array args).
        3. Runs `git show <B>` and prints the result to stdout.
        4. Exits 0.
      Recovery does NOT mutate `.caws/specs/`. Recovery does NOT
      depend on commit topology (works with merge commits, rebases,
      shallow clones AS LONG AS the blob is reachable in git's
      object store â€” which is true for any commit that ever
      contained the file, fetched or not).

      Error cases:
        - Spec id has no `spec_archived` event in the log â†’ typed
          Err: `spec not archived: FEAT-001`.
        - Event lacks blob_sha (legacy event from pre-slice) â†’ fall
          back to `git log --all --follow -- <from_path>`; if a
          containing commit exists, recover via `git show
          <commit>:<from_path>`. If zero commits, typed Err:
          `spec FEAT-001 is a legacy archive with no reachable git
          history; body is unrecoverable from this clone`.
        - blob_sha present but `git show <sha>` fails (truly missing
          from object store) â†’ typed Err: `blob <sha> not in object
          store; try `git fetch --unshallow` or `git fetch
          --all`.
  - id: A3
    given: |
      a closed spec `FEAT-001` (NOT yet archived). The working tree
      is clean.
    when: |
      `caws specs show FEAT-001` is invoked (no flags).
    then: |
      Output is the spec yaml content from `.caws/specs/FEAT-001.yaml`
      (active path). Exit 0. This is the current-state happy path
      and MUST be preserved.
  - id: A4
    given: |
      a spec `FEAT-001` archived per A1. The active path no longer
      exists.
    when: |
      `caws specs show FEAT-001` is invoked (no flags).
    then: |
      Output is a typed diagnostic naming the gap:
      `spec 'FEAT-001' is not in active specs. It was archived; to
      view its body, use \`caws specs show FEAT-001 --archived\` or
      \`caws specs recover FEAT-001\`.`
      Exit 1. The command does NOT silently fall back to walking
      `.caws/specs/.archive/` (the v11.1.x transparent fallback).
  - id: A5
    given: |
      same as A4.
    when: |
      `caws specs show FEAT-001 --archived` is invoked.
    then: |
      Output is the recovered yaml body (resolved via the event log's
      blob_sha + `git show`). Exit 0. Equivalent to
      `caws specs recover FEAT-001` for the read-only case, but
      reads more naturally for callers who think of it as "show
      this archived spec."
  - id: A6
    given: |
      `caws specs list` invoked in a project with 2 active specs, 1
      draft spec, and 3 archived specs (whose bodies have been
      removed from disk per A1; their `spec_archived` events are in
      the log).
    when: |
      `caws specs list` is invoked WITHOUT `--include-archived`.
    then: |
      Output lists only the 2 active + 1 draft specs. The 3
      archived specs do NOT appear. The file-tree default surface
      is current+in-flight only.
  - id: A7
    given: |
      Same project as A6.
    when: |
      `caws specs list --include-archived` is invoked.
    then: |
      Output lists the 2 active + 1 draft + a separate "Archived
      (recoverable from history)" section enumerating the 3
      archived specs by id, with the blob_sha (8-char prefix) and
      the `caws specs recover <id>` hint per entry. The listing is
      derived from `.caws/events.jsonl` by scanning for
      `spec_archived` events (and discarding any spec_id that has
      been re-created since â€” the most recent lifecycle event for
      a spec_id wins). NO walk of `.caws/specs/.archive/` â€”
      that directory should be empty/absent post-slice, and
      walking it would re-introduce the ambient-surface
      anti-pattern this slice eliminates.
  - id: A8
    given: |
      a project with a legacy `.caws/specs/.archive/` directory
      containing 5 yaml files: 4 are reachable from current branch
      history (their pre-archive commits exist; `git log --all
      --follow -- .caws/specs/<id>.yaml` returns â‰Ą1 commit), 1 was
      archived manually without ever being committed (no reachable
      commit contains its body â€” local-only on disk).
    when: |
      `caws specs prune-archive --dry-run` is invoked.
    then: |
      Output reports per-id status:
        - 4 marked "RECOVERABLE: would remove from working tree
          (body reachable at git blob <sha> via commit <sha>)";
        - 1 marked "UNRECOVERABLE: would QUARANTINE to
          .caws/specs/.archive/.unrecoverable/<id>.yaml (body not
          found in git history; preserving on disk for human
          review)".
      Exit 0. NO mutation (dry-run).
  - id: A9
    given: |
      same project as A8.
    when: |
      `caws specs prune-archive --apply` is invoked.
    then: |
      Mutation happens, but with the ABSOLUTE invariant:
        - The 4 recoverable files are removed from the working tree
          (each via `git rm` if tracked, or `fs.unlinkSync` if
          untracked-but-ignored). Each removal emits one
          `spec_archive_pruned` event with `{ spec_id, from_path,
          blob_sha, action: 'removed' }`.
        - The 1 unrecoverable file is MOVED to
          `.caws/specs/.archive/.unrecoverable/<id>.yaml` via
          `fs.renameSync`. The body is preserved on disk for human
          review; the file is NOT deleted. Emits a
          `spec_archive_pruned` event with `{ spec_id, from_path,
          action: 'quarantined' }` (no blob_sha because there is
          none).
        - If at any point the command would delete a file whose
          recoverability it cannot prove via git, the command MUST
          refuse and quarantine instead. This invariant is
          unconditional â€” there is no `--force` flag, no
          `--allow-unrecoverable-delete`, no override. The only
          way to lose a body through this command is to also lose
          the quarantine directory, which is a manual `rm -rf`
          operation outside CAWS scope.
      Post-state: `.caws/specs/.archive/` contains only the
      `.unrecoverable/` subdirectory (with 1 file). All 4
      recoverable files are gone from disk but recoverable via
      `caws specs recover`. The event log has 5 new
      `spec_archive_pruned` entries.
  - id: A10
    given: |
      a project with a non-empty `.caws/specs/.archive/` directory
      AFTER the slice has landed (i.e., not all consumers have
      run `prune-archive` yet).
    when: |
      `caws doctor` is invoked.
    then: |
      Doctor surfaces a WARN finding naming
      `.caws/specs/.archive/` and reporting the file count. The
      finding includes a repair hint: `Run
      \`caws specs prune-archive --dry-run\` to preview migration;
      \`--apply\` to execute.` Doctor does NOT auto-fix.
non_functional:
  reliability:
    - >-
      `prune-archive` must NEVER delete an archived spec body that
      cannot be reconstructed from git history. The quarantine move
      preserves the body under `.unrecoverable/` for human inspection.
      The recoverability check uses `git log --all --follow --
      .caws/specs/<id>.yaml` to find any commit that ever contained
      the file at that path; if zero results, the file is
      unrecoverable and quarantined. This invariant has NO override
      flag â€” there is no way to instruct `prune-archive` to delete
      an unrecoverable body. The only path that loses a body is a
      manual `rm` outside CAWS.
    - >-
      Schema evolution is ADDITIVE under a `oneOf`. The amended
      `spec_archived.v1.json` admits TWO shapes:
        - Legacy: { from_path, to_path }
        - New:    { from_path, blob_sha, source_commit_sha? }
      Each branch preserves `additionalProperties: false` so neither
      shape leaks fields into the other. Read-side consumers
      (`caws specs list --include-archived`, `caws specs show
      --archived`, `caws specs recover`, doctor) MUST handle both
      shapes. The hash-chained `events.jsonl` is never
      retroactively rewritten â€” no back-fill migration is needed
      because the oneOf admits the historical shape.
    - >-
      blob_sha is recovery-authoritative because it is content-
      addressed and topology-independent. Recovery via
      `git show <blob_sha>` works under ALL of: fast-forward
      merges, no-ff merges, rebased histories, cherry-picked
      archive commits, and squash-merged branches. The only
      failure mode is "blob not in object store" (shallow clone
      that never fetched the relevant pack), which surfaces a
      typed diagnostic with `git fetch --unshallow` as the repair
      hint.
  security:
    - >-
      `caws specs recover` runs `git show` against a blob_sha that
      came from a kernel-validated event payload. The blob_sha
      format MUST be validated (40-hex exactly, or 7+ hex prefix
      with disambiguation via `git rev-parse --verify`) BEFORE
      being passed to `git show` â€” never interpolate raw event
      payload into shell. Existing CAWS shell discipline
      (execFileSync with array args, never spawned shell strings)
      carries through.
    - >-
      `prune-archive --apply` is destructive (removes files from
      the working tree, even though they're recoverable from git).
      It MUST require explicit `--apply` (default is dry-run).
      Non-interactive callers (CI) cannot accidentally destructive-
      mode by omitting `--apply`. When stdin is a TTY AND `--apply`
      is passed, the command prints a one-line summary
      (`N recoverable, M unrecoverable`) and waits for the
      operator to press y/N before proceeding. CI workflows that
      automate prune MUST pass `--apply --yes` to bypass the
      prompt; `--yes` is the only flag that suppresses the
      confirmation, and it does NOT relax the quarantine
      invariant.
contracts:
  - name: spec-archived-event-v1-evolution
    type: schema
    path: packages/caws-kernel/src/schemas/events/spec_archived.v1.json
    description: |
      Additive evolution under a oneOf admitting two shapes:
        legacy: { from_path, to_path }
        new:    { from_path, blob_sha, source_commit_sha? }
      Each branch keeps additionalProperties: false. blob_sha is
      the authoritative recovery target (topology-independent via
      git show <blob_sha>). source_commit_sha is recorded for
      human audit only and is NOT used by recover. Legacy events
      remain valid against the amended schema â€” no back-fill
      migration needed. Hash-chained events.jsonl is never
      rewritten.
  - name: caws-specs-cli-archived-default
    type: behavior
    path: packages/caws-cli/src/shell/commands/specs.ts
    description: |
      `caws specs show <id>` defaults to active-only resolution
      (.caws/specs/<id>.yaml). Archived specs require explicit
      opt-in via `--archived` flag or the dedicated
      `caws specs recover <id>` command. v11.1.x's transparent
      fallback (silently walking `.caws/specs/.archive/`) is
      removed by design. `caws specs list` defaults to active +
      draft only; `--include-archived` reads the event log
      instead of walking the directory. New `caws specs recover
      <id>` resolves via the event log's blob_sha + git show.
      New `caws specs prune-archive` migrates legacy archive
      bodies with a prove-recovery-or-quarantine invariant
      (no override flag for the quarantine).
closure_notes: |
  MOTIVATION (verified evidence, 2026-05-27):

  Sterling's `.caws/specs/.archive/` contains 554 archived spec
  yaml files totaling 7.6 MB / ~155K lines / ~1.7Mâ€“2.2M tokens.
  Only 1 of those 554 is git-tracked; the other 553 are ignored
  by the canonical `.gitignore` `.archive/` rule. This is the
  worst combination of all three model choices: visible enough
  for agents to grep/RAG/cite, ungoverned enough to drift across
  machines, and large enough to single-handedly exceed every
  reasonable agent context window if loaded naively.

  CAWS (this canonical repo) has the same `.gitignore` rule and
  the same archive-as-on-disk-yaml behavior â€” it's just that this
  repo's archive is currently empty so the cost hasn't compounded
  yet. Every CAWS consumer is on the same trajectory.

  Three surfaces (per maintainer's framing):

    1. Current authority: active + in-flight specs in
       `.caws/specs/<id>.yaml`. Default agent context. Default grep
       target. Default doctor input.
    2. Historical audit: `.caws/events.jsonl` (hash-chained) + git
       commits. Surfaced through `caws specs list --include-archived`
       and `git log`. NOT loaded into agent context by default.
    3. Archaeology: archived spec bodies. Recoverable on demand via
       `caws specs recover <id>`. NOT present in the working tree.
       NOT searchable via ordinary repo tools.

  Current state collapses (2) and (3) into a single on-disk surface
  under `.caws/specs/.archive/`, then makes that surface invisible
  to git (via `.gitignore`) while remaining visible to every
  filesystem-based tool (grep, ripgrep, VS Code search, agent
  embedding indexers, RAG pipelines). The fix separates them.

  WHY NOT JUST GIT-TRACK THE ARCHIVES:

  Tracking 550+ archived specs in git would solve the durability
  problem but worsen every other axis:

    - Repo size: +7.6 MB on Sterling alone; compounds with every
      consumer.
    - Schema/validator churn: every future CAWS schema change must
      decide what to do with 550 legacy yamls â€” parse them
      (compatibility tax) or skip them (then tracking bought
      nothing).
    - Authority gradient inversion: a tracked archived spec looks
      MORE authoritative than a git commit, even when its content
      is obsolete. Agents will cite it.
    - Default-grep noise: `grep -r .caws/specs/` returns 550+ hits
      that bury the 3 active specs that actually matter.

  WHY NOT JUST LEAVE THEM ON DISK BUT IGNORED:

  This is the current state and it's the worst option. The local
  `.archive/` dir has high agent-discoverability and zero shared
  truth. One machine has it, another clone doesn't. Drift cannot
  be reviewed. Sterling-class consumers accumulate 1.9M-token
  shadow corpora that any agent grep accidentally pulls into
  context. The CAWS failure lineage already records "stale
  duplicate/shadow file accumulation" as a known reasoning hazard;
  the `.archive/` dir is the modern instance.

  PRIOR ART REFERENCE:

  This slice follows the same doctrine CAWS-LITE-MODE-RETIREMENT-001
  applied to the lite-mode scope.json branch: remove the legacy
  ambient surface entirely; provide a single sanctioned recovery
  path; let doctor surface any consumer that still has the legacy
  residue.

  IMPLEMENTATION OUTLINE FOR THE AGENT:

  1. Schema (kernel): amend `spec_archived.v1.json` to add
     `commit_sha` (string, hex pattern). Decide on legacy-event
     tolerance: either schema-level `oneOf` (new vs legacy shape)
     or runtime back-fill migration. Document choice in $comment.

  2. Writer (specs-writer.ts): in `archiveSpec`, replace
     `fs.renameSync` + write-to-`.archive/` with `git rm` of the
     active path inside the lifecycle transaction. The existing
     autocommit (CAWS-SPECS-WRITER-AUTOCOMMIT-001) then commits the
     deletion; capture the resulting sha and write it back into the
     `spec_archived` event payload. Note: this means the event is
     authored AFTER the autocommit, which is a different ordering
     than other writes; document the rationale (commit_sha is not
     known until commit lands).

     ORDERING ALTERNATIVE: pre-compute commit_sha by computing the
     would-be commit's tree hash deterministically. Probably
     overengineered for v1; ship the "commit-then-event-append"
     ordering and accept that this one event is appended outside
     the lifecycle transaction.

  3. Recovery (new command): `caws specs recover <id>` reads the
     `spec_archived` event, validates commit_sha, runs `git show
     <sha>^:.caws/specs/<id>.yaml`, prints to stdout or writes
     to `--out <path>`.

  4. List (specs-writer.ts:789): `caws specs list --include-archived`
     reads archived ids from the event log instead of walking the
     `.archive/` directory. Output format adds a separate
     "Archived (recoverable)" section with commit_sha + recover
     hint per id.

  5. Migration command: `caws specs prune-archive` walks any
     existing `.caws/specs/.archive/*.yaml`. For each: run `git
     log --all --follow -- .caws/specs/<id>.yaml`. If at least one
     commit contains the file at that path, mark recoverable. If
     zero commits, mark unrecoverable. Dry-run shows the plan;
     `--apply` removes recoverable files (via `git rm` if tracked,
     or unlink + autocommit if untracked) and moves unrecoverable
     files to `.caws/specs/.archive/.unrecoverable/`. Each action
     emits a `spec_archive_pruned` event (NEW event type â€” kernel
     schema addition).

  6. Doctor: add finding for non-empty `.caws/specs/.archive/`
     post-slice. Severity: warn. Repair hint: `caws specs
     prune-archive --dry-run`.

  TEST FILES (predeclared so the implementing agent scopes correctly):

    - packages/caws-cli/tests/store/specs-writer-archive-tombstone.test.js
      (A1, A2 â€” writer-level + recovery)
    - packages/caws-cli/tests/shell/specs-list-archived.test.js
      (A3, A4 â€” list surface)
    - packages/caws-cli/tests/shell/specs-prune-archive.test.js
      (A5 â€” migration command)
    - packages/caws-cli/tests/store/doctor-legacy-archive.test.js
      (A6 â€” doctor finding)

  RESIDUALS NAMED (not silently deferred):

    R1 â€” DOCS ARCHIVES. Sterling's `docs/.archive/` reportedly
    contains ~1,300 markdown files. The same doctrine applies even
    more strongly (docs are more semantically seductive to agents
    than yamls). This spec does NOT touch docs; it touches
    `.caws/specs/.archive/` only. A follow-up spec
    (`CAWS-DOCS-ARCHIVE-AS-TOMBSTONE-001` or similar) should apply
    the same pattern to documentation. Owned by docs author; out
    of CAWS-kernel scope.

    R2 â€” RECOVERY EVENT TRACKING. Whether `caws specs recover`
    should emit a `spec_recovered` event is an open question. Pro:
    audits who's reaching into history. Con: pollutes the event log
    with read operations that don't change state. Deferred until
    consumer feedback indicates the audit value. Out of scope for v1.

    R3 â€” SHALLOW CLONE FAILURE MODE. `caws specs recover` requires
    the commit_sha to be reachable. Shallow clones (e.g., CI
    checkouts with `--depth=50`) may not contain old archive
    commits. Documented as an operator constraint. A future
    `caws specs recover --fetch-deepen` could call `git fetch
    --deepen=N` automatically; deferred to a separate slice once
    CI patterns shake out.

    R4 â€” EVENT BACK-FILL. The schema-evolution invariant proposes
    either schema-level tolerance OR a one-time event-log back-fill.
    If the back-fill route is chosen, that's a separate
    `caws specs migrate-events` command and should be its own
