invariants:
  - >-
    `caws specs archive <id>` MUST NOT write a yaml body to
    `.caws/specs/.archive/<id>.yaml`. The archive operation removes the
    live spec from `.caws/specs/<id>.yaml` (via `git rm` inside the
    lifecycle transaction so the deletion is staged for the autocommit
    landed in CAWS-SPECS-WRITER-AUTOCOMMIT-001) and appends a
    `spec_archived` event carrying enough metadata to recover the body
    from git history.
  - >-
    The default file-tree surface MUST NOT contain archived spec
    bodies. `ls .caws/specs/` returns only active and draft specs. An
    agent that greps `.caws/specs/` does not get archived content as
    a hit, eliminating the context-rot vector where stale spec shapes
    re-enter agent reasoning as if they were current authority.
  - >-
    Archived specs remain RECOVERABLE on demand. `caws specs recover
    <id>` (new command) reconstructs the body from the
    `spec_archived` event's `commit_sha` (the post-archive commit)
    via `git show <sha>^:.caws/specs/<id>.yaml`. The recovery is
    explicit, audited (emits a `spec_recovered` info event if we
    decide to track recovery actions; out-of-scope for this slice
    unless trivially co-shippable), and never silently re-materializes
    a body on disk.
  - >-
    Consumers with a legacy `.caws/specs/.archive/` directory (e.g.,
    Sterling has 554 such files) get a doctor WARN finding naming
    the directory and pointing to `caws specs prune-archive` for
    migration. The finding does NOT auto-fix; the maintainer decides
    when to prune (verifies recoverability for each archived id
    BEFORE the prune deletes anything).
  - >-
    `caws specs prune-archive` (new command) verifies each legacy
    `.caws/specs/.archive/<id>.yaml` is recoverable via git history
    (the body MUST be reachable from at least one commit on the
    current branch's history). Files that fail the recoverability
    check are QUARANTINED (moved to `.caws/specs/.archive/.unrecoverable/`)
    and reported as warnings — never silently deleted. Files that
    pass are removed from the working tree. Output: per-id status
    report. Dry-run by default; `--apply` required for actual mutation.
  - >-
    The `spec_archived.v1.json` schema gains a REQUIRED `commit_sha`
    field. `to_path` becomes OPTIONAL (legacy events that named the
    archive destination remain valid; new events do not populate it).
    This is a schema evolution, not a breaking change — old events
    continue to validate against the new schema as long as the
    schema's `additionalProperties: false` is preserved with both
    fields admitted.
acceptance:
  - id: A1
    given: |
      a clean repo + an active spec `FEAT-001` that has been closed
      (lifecycle_state: closed). The working tree is clean.
    when: |
      `caws specs archive FEAT-001` is invoked.
    then: |
      The active yaml at `.caws/specs/FEAT-001.yaml` is REMOVED from
      the working tree (the deletion is staged + auto-committed via
      the autocommit landed in CAWS-SPECS-WRITER-AUTOCOMMIT-001). No
      file is written to `.caws/specs/.archive/`. The `spec_archived`
      event in `.caws/events.jsonl` carries `commit_sha` equal to
      the autocommit's sha. `ls .caws/specs/` no longer lists
      FEAT-001.yaml.
  - id: A2
    given: |
      a spec archived per A1; the autocommit landed at sha S; the
      pre-archive content of `.caws/specs/FEAT-001.yaml` is named B0
      and is the parent commit's blob content.
    when: |
      `caws specs recover FEAT-001` is invoked.
    then: |
      The command prints the recovered yaml body B0 to stdout (or
      writes to a path specified via `--out <path>`) without
      mutating `.caws/specs/`. The recovery resolves the commit_sha
      from the `spec_archived` event, then runs
      `git show <S>^:.caws/specs/FEAT-001.yaml`. Exit 0 on success.
      Exit 1 with a typed diagnostic if the commit is unreachable
      (shallow clone), the file was not at that path historically,
      or the event lacks `commit_sha` (legacy event from before this
      slice).
  - id: A3
    given: |
      `caws specs list` invoked in a project with 2 active specs, 1
      draft spec, and 3 archived specs (whose bodies have been
      removed from disk per A1; their `spec_archived` events are in
      the log).
    when: |
      `caws specs list` is invoked WITHOUT `--include-archived`.
    then: |
      Output lists only the 2 active + 1 draft specs. The 3
      archived specs do NOT appear. The file-tree default surface
      is current+in-flight only.
  - id: A4
    given: |
      Same project as A3.
    when: |
      `caws specs list --include-archived` is invoked.
    then: |
      Output lists the 2 active + 1 draft + a separate "Archived
      (recoverable from history)" section enumerating the 3
      archived specs by id, with the closing commit_sha and the
      `caws specs recover <id>` hint. No body content is loaded
      (we read the event log, not the on-disk archive dir).
  - id: A5
    given: |
      a project with a legacy `.caws/specs/.archive/` directory
      containing 5 yaml files: 4 are reachable from current branch
      history (their pre-archive commits exist), 1 was archived
      manually without ever being committed (no reachable commit
      contains its body).
    when: |
      `caws specs prune-archive --dry-run` is invoked.
    then: |
      Output reports per-id status: 4 marked "recoverable, would
      remove from working tree", 1 marked "NOT recoverable, would
      quarantine to .caws/specs/.archive/.unrecoverable/<id>.yaml".
      Exit 0 (dry-run never mutates). Subsequent invocation with
      `--apply` performs both the removals AND the quarantine move
      AND emits one `spec_archive_pruned` event per id (NEW event
      type) recording the action taken.
  - id: A6
    given: |
      a project with a non-empty `.caws/specs/.archive/` directory
      AFTER the slice has landed (i.e., not all consumers have
      run `prune-archive` yet).
    when: |
      `caws doctor` is invoked.
    then: |
      Doctor surfaces a WARN finding naming
      `.caws/specs/.archive/` and reporting the file count. The
      finding includes a repair hint: `Run
      \`caws specs prune-archive --dry-run\` to preview migration;
      \`--apply\` to execute.` Doctor does NOT auto-fix.
non_functional:
  reliability:
    - >-
      `prune-archive` must NEVER delete an archived spec body that
      cannot be reconstructed from git history. The quarantine move
      preserves the body under `.unrecoverable/` for human inspection.
      The recoverability check uses `git log --all --follow --
      .caws/specs/<id>.yaml` to find any commit that ever contained
      the file at that path; if zero results, the file is
      unrecoverable and quarantined.
    - >-
      Schema evolution must be additive. Legacy `spec_archived`
      events (with `from_path` + `to_path` but no `commit_sha`)
      MUST continue to validate. The schema makes `commit_sha`
      required for NEW events authored by this slice's writer; the
      kernel's runtime validator MUST accept legacy events as a
      transition concession (event_log_min_version-style read-side
      tolerance), documented in the schema's `$comment`. If this
      tolerance is hard to express cleanly in the JSON schema, an
      acceptable alternative is a one-time migration that walks
      `.caws/events.jsonl` and back-fills `commit_sha` where the
      legacy `to_path` is recoverable; the slice picks one of the
      two approaches and documents the choice.
  security:
    - >-
      `caws specs recover` runs `git show` against a commit_sha
      that came from a kernel-validated event payload. The
      commit_sha format MUST be validated (40-hex or 7+ hex prefix)
      BEFORE being passed to `git show` — never interpolate raw
      event payload into shell. Existing CAWS shell discipline
      (execFileSync with array args, never spawned shell strings)
      carries through.
    - >-
      `prune-archive --apply` is destructive (removes files from
      the working tree, even though they're recoverable from git).
      It MUST require either `--apply` (explicit flag, default is
      dry-run) or an interactive confirmation prompt when stdin is
      a TTY. Non-interactive callers (CI) cannot accidentally
      destructive-mode by omitting `--apply`.
contracts: []
closure_notes: |
  MOTIVATION (verified evidence, 2026-05-27):

  Sterling's `.caws/specs/.archive/` contains 554 archived spec
  yaml files totaling 7.6 MB / ~155K lines / ~1.7M–2.2M tokens.
  Only 1 of those 554 is git-tracked; the other 553 are ignored
  by the canonical `.gitignore` `.archive/` rule. This is the
  worst combination of all three model choices: visible enough
  for agents to grep/RAG/cite, ungoverned enough to drift across
  machines, and large enough to single-handedly exceed every
  reasonable agent context window if loaded naively.

  CAWS (this canonical repo) has the same `.gitignore` rule and
  the same archive-as-on-disk-yaml behavior — it's just that this
  repo's archive is currently empty so the cost hasn't compounded
  yet. Every CAWS consumer is on the same trajectory.

  Three surfaces (per maintainer's framing):

    1. Current authority: active + in-flight specs in
       `.caws/specs/<id>.yaml`. Default agent context. Default grep
       target. Default doctor input.
    2. Historical audit: `.caws/events.jsonl` (hash-chained) + git
       commits. Surfaced through `caws specs list --include-archived`
       and `git log`. NOT loaded into agent context by default.
    3. Archaeology: archived spec bodies. Recoverable on demand via
       `caws specs recover <id>`. NOT present in the working tree.
       NOT searchable via ordinary repo tools.

  Current state collapses (2) and (3) into a single on-disk surface
  under `.caws/specs/.archive/`, then makes that surface invisible
  to git (via `.gitignore`) while remaining visible to every
  filesystem-based tool (grep, ripgrep, VS Code search, agent
  embedding indexers, RAG pipelines). The fix separates them.

  WHY NOT JUST GIT-TRACK THE ARCHIVES:

  Tracking 550+ archived specs in git would solve the durability
  problem but worsen every other axis:

    - Repo size: +7.6 MB on Sterling alone; compounds with every
      consumer.
    - Schema/validator churn: every future CAWS schema change must
      decide what to do with 550 legacy yamls — parse them
      (compatibility tax) or skip them (then tracking bought
      nothing).
    - Authority gradient inversion: a tracked archived spec looks
      MORE authoritative than a git commit, even when its content
      is obsolete. Agents will cite it.
    - Default-grep noise: `grep -r .caws/specs/` returns 550+ hits
      that bury the 3 active specs that actually matter.

  WHY NOT JUST LEAVE THEM ON DISK BUT IGNORED:

  This is the current state and it's the worst option. The local
  `.archive/` dir has high agent-discoverability and zero shared
  truth. One machine has it, another clone doesn't. Drift cannot
  be reviewed. Sterling-class consumers accumulate 1.9M-token
  shadow corpora that any agent grep accidentally pulls into
  context. The CAWS failure lineage already records "stale
  duplicate/shadow file accumulation" as a known reasoning hazard;
  the `.archive/` dir is the modern instance.

  PRIOR ART REFERENCE:

  This slice follows the same doctrine CAWS-LITE-MODE-RETIREMENT-001
  applied to the lite-mode scope.json branch: remove the legacy
  ambient surface entirely; provide a single sanctioned recovery
  path; let doctor surface any consumer that still has the legacy
  residue.

  IMPLEMENTATION OUTLINE FOR THE AGENT:

  1. Schema (kernel): amend `spec_archived.v1.json` to add
     `commit_sha` (string, hex pattern). Decide on legacy-event
     tolerance: either schema-level `oneOf` (new vs legacy shape)
     or runtime back-fill migration. Document choice in $comment.

  2. Writer (specs-writer.ts): in `archiveSpec`, replace
     `fs.renameSync` + write-to-`.archive/` with `git rm` of the
     active path inside the lifecycle transaction. The existing
     autocommit (CAWS-SPECS-WRITER-AUTOCOMMIT-001) then commits the
     deletion; capture the resulting sha and write it back into the
     `spec_archived` event payload. Note: this means the event is
     authored AFTER the autocommit, which is a different ordering
     than other writes; document the rationale (commit_sha is not
     known until commit lands).

     ORDERING ALTERNATIVE: pre-compute commit_sha by computing the
     would-be commit's tree hash deterministically. Probably
     overengineered for v1; ship the "commit-then-event-append"
     ordering and accept that this one event is appended outside
     the lifecycle transaction.

  3. Recovery (new command): `caws specs recover <id>` reads the
     `spec_archived` event, validates commit_sha, runs `git show
     <sha>^:.caws/specs/<id>.yaml`, prints to stdout or writes
     to `--out <path>`.

  4. List (specs-writer.ts:789): `caws specs list --include-archived`
     reads archived ids from the event log instead of walking the
     `.archive/` directory. Output format adds a separate
     "Archived (recoverable)" section with commit_sha + recover
     hint per id.

  5. Migration command: `caws specs prune-archive` walks any
     existing `.caws/specs/.archive/*.yaml`. For each: run `git
     log --all --follow -- .caws/specs/<id>.yaml`. If at least one
     commit contains the file at that path, mark recoverable. If
     zero commits, mark unrecoverable. Dry-run shows the plan;
     `--apply` removes recoverable files (via `git rm` if tracked,
     or unlink + autocommit if untracked) and moves unrecoverable
     files to `.caws/specs/.archive/.unrecoverable/`. Each action
     emits a `spec_archive_pruned` event (NEW event type — kernel
     schema addition).

  6. Doctor: add finding for non-empty `.caws/specs/.archive/`
     post-slice. Severity: warn. Repair hint: `caws specs
     prune-archive --dry-run`.

  TEST FILES (predeclared so the implementing agent scopes correctly):

    - packages/caws-cli/tests/store/specs-writer-archive-tombstone.test.js
      (A1, A2 — writer-level + recovery)
    - packages/caws-cli/tests/shell/specs-list-archived.test.js
      (A3, A4 — list surface)
    - packages/caws-cli/tests/shell/specs-prune-archive.test.js
      (A5 — migration command)
    - packages/caws-cli/tests/store/doctor-legacy-archive.test.js
      (A6 — doctor finding)

  RESIDUALS NAMED (not silently deferred):

    R1 — DOCS ARCHIVES. Sterling's `docs/.archive/` reportedly
    contains ~1,300 markdown files. The same doctrine applies even
    more strongly (docs are more semantically seductive to agents
    than yamls). This spec does NOT touch docs; it touches
    `.caws/specs/.archive/` only. A follow-up spec
    (`CAWS-DOCS-ARCHIVE-AS-TOMBSTONE-001` or similar) should apply
    the same pattern to documentation. Owned by docs author; out
    of CAWS-kernel scope.

    R2 — RECOVERY EVENT TRACKING. Whether `caws specs recover`
    should emit a `spec_recovered` event is an open question. Pro:
    audits who's reaching into history. Con: pollutes the event log
    with read operations that don't change state. Deferred until
    consumer feedback indicates the audit value. Out of scope for v1.

    R3 — SHALLOW CLONE FAILURE MODE. `caws specs recover` requires
    the commit_sha to be reachable. Shallow clones (e.g., CI
    checkouts with `--depth=50`) may not contain old archive
    commits. Documented as an operator constraint. A future
    `caws specs recover --fetch-deepen` could call `git fetch
    --deepen=N` automatically; deferred to a separate slice once
    CI patterns shake out.

    R4 — EVENT BACK-FILL. The schema-evolution invariant proposes
    either schema-level tolerance OR a one-time event-log back-fill.
    If the back-fill route is chosen, that's a separate
    `caws specs migrate-events` command and should be its own
    spec to keep this one's scope contained. Decision deferred to
    the implementing agent based on which is cleaner.
