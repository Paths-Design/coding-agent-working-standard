acceptance:
  - id: A1
    given: 'A v11.1.2+ caws-cli build.'
    when: 'A user runs an unknown command like `caws frobnicate`.'
    then: 'The suggestions list only references commands that actually exist in the v11 surface (init, doctor, status, scope, claim, gates, evidence, waiver, specs, worktree). No `validate`, `scaffold`, `diagnose`, `evaluate`, `iterate`, `waivers`, `templates`, `provenance`, `hooks`, `workflow`, `quality-monitor`, `test-analysis`.'
  - id: A2
    given: 'A v11.1.2+ caws-cli build.'
    when: 'A user runs an unknown option, or hits an error category with recovery suggestions.'
    then: 'No suggestion text instructs the user to run a removed command. `caws validate --suggestions`, `caws scaffold`, `caws provenance show`, `caws diagnose` references are all replaced with current v11 equivalents (typically `caws doctor`, `caws gates run`, `caws status`, or removed entirely if no equivalent exists).'
  - id: A3
    given: 'The TROUBLESHOOTING_GUIDES table inside error-handler.js.'
    when: 'Each guide entry is inspected.'
    then: 'No `commands:` list contains a removed v10 command. Guides whose entire purpose was a removed command (e.g., working-spec-validation referencing `caws validate`) are either rewritten to point at the v11 surface or removed.'
  - id: A4
    given: 'A built tarball after this slice.'
    when: 'node scripts/check-removed-commands.mjs is run.'
    then: 'Exit code 0; no references in dist/.'
  - id: A5
    given: 'The shell-level test suite for error-handler.'
    when: 'Tests are run.'
    then: 'Pass count unchanged or increased; no new test references removed commands.'
