# --- Triage ----------------------------------------------------------------
# Why this slice exists
# ---------------------
# LIFECYCLE-ROLLBACK-FAILURE-HARNESS-001 (closed 2026-05-22 per ee92234)
# mechanically witnessed two new half-state classes:
#
#   H4 (destroyWorktree post-fault, harness test:533-583): registry
#      entry absent; git worktree absent; spec_<id>.yaml still has
#      worktree: <name>.
#
#   H5 (bindWorktreeRepair post-fault, harness test:438-506): registry
#      points name -> spec_B; spec_A still claims worktree: name;
#      spec_B lacks worktree: field. 3-way contradiction.
#
# These convert PRUNE-REPAIR-WORKTREE-001 from "operational hygiene"
# to "authority-policy-bound." The pre-existing draft predates these
# findings and treats prune/repair/reconcile as one capability with
# A1-A4 all mutations. H5 is not safely repairable without a doctrine
# decision (which surface wins: registry, spec_A, or spec_B?). Any
# auto-repair shipped before authority policy exists will smuggle in a
# doctrine decision by accident.
#
# This slice stratifies the capability into Diagnose / Decide / Repair
# (§1.4) and routes:
#
#   Diagnose -> WORKTREE-DOCTOR-HALF-STATE-001 (filed here as draft)
#   Decide   -> WORKTREE-SPEC-AUTHORITY-CONTROL-PLANE-001
#               (unchanged; authority deliverable)
#   Repair   -> PRUNE-REPAIR-WORKTREE-001 (amended; stays draft;
#               blocked on Decide)
#
# Audit-quiet edits in this slice
# --------------------------------
# v11.1.6 ships caws specs create/list/show/close/archive only — no
# specs update, no specs promote. Therefore:
#
#   - WORKTREE-DOCTOR-HALF-STATE-001 was created via caws specs create
#     (which sets lifecycle_state: active by default) and then flipped
#     to draft via direct YAML edit. spec_created event fires with
#     lifecycle_state: active (the create-time state, not the
#     post-edit state). The flip-to-draft is audit-quiet by necessity
#     (no spec_lifecycle_changed event schema exists).
#
#   - PRUNE-REPAIR-WORKTREE-001 amendments (scope.out fix, new triage
#     block) are direct YAML edits. No event is emitted. Audit-quiet
#     by the same surface gap.
#
# Both are acceptable given the v11.1.6 surface. SPECS-PROMOTE-DRAFT
# remains deferred past v11.2 (per V11-2-STABILIZATION-RECON-001
# §1.3 finding 2). Recorded here so the gaps are visible to future
# auditors.
#
# scope.in note for PRUNE-REPAIR-WORKTREE-001
# --------------------------------------------
# This recon removes .caws/worktrees.json from PRUNE-REPAIR-WORKTREE-001's
# scope.out (the existing draft listed it there, contradicting its
# A1-A3 acceptance which require mutating that file). The recon does
# NOT preemptively add .caws/worktrees.json to scope.in. That admit
# decision belongs to the implementation slice when it picks up the
# spec — by then, the authority doctrine will have constrained which
# repairs the spec is allowed to perform, and scope.in can be set to
# match the actual planned mutations rather than to over-claim now.
#
# Sequencing
# ----------
# After this slice closes, the next implementation slice per §1.4
# ordering is WORKTREE-DOCTOR-HALF-STATE-001 (slice 2). Then the
# control-plane authority spec (slice 3) before any repair work.
