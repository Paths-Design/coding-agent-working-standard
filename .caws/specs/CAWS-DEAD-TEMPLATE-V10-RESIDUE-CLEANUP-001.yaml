id: CAWS-DEAD-TEMPLATE-V10-RESIDUE-CLEANUP-001
title: 'Remove unshipped legacy template hook dirs + deferred v10 agent-operating-spec residue'
risk_tier: 3
mode: chore
lifecycle_state: active
worktree: dead-template-residue
created_at: '2026-05-29T08:43:19.813Z'
updated_at: '2026-05-29T08:50:00.000Z'
blast_radius:
  modules:
    - unshipped legacy template hook dirs (deletion-only; not in package.json files, not referenced by the installer)
    - root .caws v10 agent-operating-spec residue (deletion-only; zero live readers)
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - packages/caws-cli/templates/.claude/hooks
    - packages/caws-cli/templates/.cursor/hooks
    - .caws/agent-operating-spec.yaml
    - .caws/specs/GATES-RUN-POST-QG-DOCTRINE-001.yaml
    - .caws/specs/CAWS-DEAD-TEMPLATE-V10-RESIDUE-CLEANUP-001.yaml
  out:
    - packages/caws-cli/templates/hook-packs
    - .caws/policy.yaml
    - .caws/policy.schema.json
    - .caws/waiver.schema.json
    - .caws/code-freeze.yaml
    - .caws/quality-exceptions.json
    - .caws/duplication-exceptions.yaml
    - .caws/refactor-baselines.yaml
    - .caws/refactor-targets.yaml
invariants:
  - Only tracked files with zero live consumers are removed. The shipped hook surface (templates/hook-packs/claude-code) is never touched; the npm files manifest ships only templates/hook-packs, so removing templates/.claude/hooks and templates/.cursor/hooks cannot change the published tarball or any installed-hook behavior.
  - The installer (dist/init/hook-install.js) sources hooks only from templates/hook-packs/claude-code; a repo-wide grep confirms no shipped code references templates/.claude or templates/.cursor as a source dir. Removal does not change init/doctor/gates behavior.
  - agent-operating-spec.yaml has zero live readers (its only remaining reference is historical investigation prose in docs/rewrite/investigations/04-template-drift.md, which is a point-in-time record, not a consumer). Its v10 budget-overrun/validation model is superseded by the v11 governance surface (policy.yaml + CLAUDE.md).
  - The quality-gates config files (code-freeze, quality-exceptions, duplication-exceptions, refactor-baselines, refactor-targets) are explicitly excluded; they still have live readers in packages/quality-gates and belong to the GATES-RUN-POST-QG-DOCTRINE-001 retirement decision. This slice only records them as a tracked follow-up there.
  - 'Untracked, gitignored orphan worktree dirs under .caws/worktrees/* are out of scope: they do not affect the tarball, and the active sibling session is writing tmp pointers into them, so they are a quiet-period prune job, not release-cleanup work.'
acceptance:
  - id: A1
    given: the repo after removing templates/.claude/hooks and templates/.cursor/hooks
    when: npm pack --dry-run is run for packages/caws-cli
    then: the tarball file list is byte-identical to before removal (those dirs were never packed), and the 34 templates/hook-packs/claude-code files plus the manifest still match 1:1.
  - id: A2
    given: the repo after all three deletions
    when: caws doctor runs
    then: doctor reports no new load errors and no change to any gate or command behavior.
  - id: A3
    given: a git grep across the tracked tree for the removed paths and for agent-operating-spec
    when: searching outside .caws/specs and docs/rewrite (historical records) and node_modules
    then: zero live references remain, proving nothing read these files.
  - id: A4
    given: GATES-RUN-POST-QG-DOCTRINE-001 after this slice
    when: its spec body is read
    then: it carries an explicit follow-up note that the five .caws quality-gates config files must be removed as part of the quality-gates package retirement.
non_functional: {}
contracts: []
