  out: []
invariants:
  - '`caws specs list --active`, `--draft`, and `--closed` route to the existing read-only lifecycle filter.'
  - '`--lifecycle <state>` and `--state <state>` are aliases for `--status <state>` and accept the same enum.'
  - 'Supplying more than one lifecycle selector is refused before mutation; `--archived` retains its existing include-archived meaning.'
acceptance:
  - id: A1
    given: 'a CAWS repository with active, draft, and closed specs'
    when: 'an operator runs caws specs list --active'
    then: 'the command exits 0 and prints only active specs.'
  - id: A2
    given: 'a CAWS repository with active specs'
    when: 'an operator runs caws specs list --lifecycle active or --state active'
    then: 'the output matches caws specs list --status active.'
  - id: A3
    given: 'a CAWS repository'
    when: 'an operator supplies conflicting lifecycle selectors'
    then: 'the command exits non-zero and leaves spec files, events, and worktree registry bytes unchanged.'
  - id: A4
    given: 'the built CLI command surface'
    when: 'an operator runs caws specs list --help'
    then: 'help lists the lifecycle selector aliases and keeps --archived documented as include-archived.'
non_functional: {}
contracts:
