  - id: A1
    given: a createSpec call whose rendered YAML fails kernel validation via an out-of-range risk_tier injected past the TS type at the JS test layer
    when: createSpec runs
    then: it returns Err and Result.errors[0] carries a non-empty kernel diagnostic message with subject defaulting to the spec id and data.source_rule present, killing the createSpec parse-error-branch mutants on dist 311-314.
  - id: A2
    given: a createSpec call that omits the now injector
    when: createSpec runs and the created spec yaml is read back
    then: created_at is a valid ISO-8601 timestamp within a few seconds of the real clock, proving the default now arrow executed and killing the now-fallback mutants on dist 317.
  - id: A3
    given: a closeSpec call with a structurally invalid spec id such as a path-traversal or pattern-violating id
    when: closeSpec runs
    then: it returns Err from the idValidation guard before any filesystem read, killing the idValidation conditional mutant on dist 354.
  - id: A4
    given: a normal lifecycle create then close of an active spec
    when: closeSpec succeeds
    then: 'the autocommit produces a commit whose subject is exactly "chore(caws): close <id>", killing the autocommit action string-literal mutant on dist 349 and exercising the txnResult success path on dist 345.'
  - id: A5
    given: an active spec whose on-disk yaml has been corrupted to a non-parseable form after creation while the active file still exists
    when: closeSpec runs and passes the fs.existsSync check but then fails readYamlSource or parse
    then: closeSpec returns Err from the not-isOk sourceResult guard, killing the dist-380 conditional mutant; if this state cannot be constructed from the public API plus on-disk fixture manipulation, the survivor is documented in closure notes as a genuine production-seam requirement.
  - id: A6
    given: the targeted Stryker harness using the existing stryker.conf.js line ranges run via the workspace-root stryker binary
    when: re-run after the new tests land
    then: closure notes record the before and after killed/survived deltas, with the target being to kill the internals survivors on dist 311-317 and 345-354 and to either kill or explicitly classify the dist-380 readYamlSource survivor.
