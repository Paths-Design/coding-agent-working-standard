id: CAWS-SPECS-WRITER-INTERNALS-MUTATION-SEAM-001
title: 'Harden createSpec/closeSpec internals against remaining surviving mutants'
risk_tier: 3
mode: chore
lifecycle_state: active
created_at: '2026-05-28T19:45:07.992Z'
updated_at: '2026-05-28T19:45:07.992Z'
blast_radius:
  modules:
    - packages/caws-cli specs-writer createSpec/closeSpec test surface (test-only; no production source change)
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - packages/caws-cli/tests/store/specs-writer-archive-tombstone.test.js
    - packages/caws-cli/tests/store/specs-writer-autocommit.test.js
