invariants:
  - >-
    closeSpec detects an archived-id state via the event log
    (spec_archived tombstone events keyed by spec_id), NOT via the
    legacy `.caws/specs/.archive/<id>.yaml` file-existence check.
    Pre-tombstone behavior: closeSpec looked for the archived file
    path; tombstone deletes that file, so the existence check always
    returned false and the diagnostic fell through to generic
    "not found". This invariant restores the correct diagnostic:
    `Spec "<id>" is archived; cannot close ...`.
  - >-
    The archived-id predicate is a thin event-log scan: load events
    via the existing store helper, filter for `event === 'spec_archived'
    && spec_id === <id>`, and treat any match as "archived." No
    body recovery, no git-blob lookup — the diagnostic only needs the
    existence signal. Cheap O(events) scan; happens only on the
    cold-path where the active spec file is absent (not on every
    close).
  - >-
    The legacy `.caws/specs/.archive/<id>.yaml` file-existence check
    is REMOVED from closeSpec's archived-id branch. The path itself
    remains a recognized concept for other surfaces (e.g., recover,
    list --include-archived) but for closeSpec the on-disk file is
    no longer authoritative.
  - >-
    Shell tests in `tests/shell/specs.test.js` are updated to match
    tombstone semantics for A3 (list section header string), A4
    (show requires explicit archived flag), A7 (archive event shape
    + no archive-file existence), and A8 (the close-on-archived
    refusal now works correctly post-implementation fix; the test
    assertion is unchanged but the implementation must satisfy it).
  - >-
    No changes to archiveSpec implementation. Tombstone authority
    (CAWS-ARCHIVE-AS-TOMBSTONE-001) remains the canonical archive
    write path. This slice's archive-direction work is purely
    test-side reconciliation.
  - >-
    Existing tombstone-specific tests (`specs-list-archived.test.js`,
    `specs-recover-show-archived.test.js`, `events-verify-archive.test.js`,
    `specs-prune-archive.test.js`) MUST remain green. The closeSpec
    implementation fix is additive at the cold-path archived-detection
    site; it does not alter any path covered by those tests.
acceptance:
  - id: A1
    given: |
      tests/shell/specs.test.js had 4 failing assertions on canonical
      HEAD as of merge fc7a48d: A3 list-archived header, A4 show
      archived, A7 archive event/file shape, A8 close-on-archived
      refusal.
    when: |
      The slice's edits are applied.
    then: |
      `npx jest tests/shell/specs.test.js` runs all tests; previously-
      failing 4 tests now pass. No prior-passing test regresses.
  - id: A2
    given: |
      A spec already archived via the tombstone path (active file
      deleted, spec_archived event in `.caws/events.jsonl`).
    when: |
      `closeSpec(cawsDir, { id, resolution: 'completed', ... })` is
      invoked for that id.
    then: |
      Returns Err with the existing diagnostic
      `Spec "<id>" is archived; cannot close (legal transitions:
      active → closed → archived).` and rule
      LIFECYCLE_PLAN_REJECTED. The generic "not found at <path>"
      diagnostic MUST NOT fire for this case.
  - id: A3
    given: |
      tests/shell/specs.test.js A7 ("moves the file and emits
      from_path/to_path on spec_archived").
    when: |
      The test is updated to reflect tombstone shape.
    then: |
      Test asserts: active file at `.caws/specs/<id>.yaml` is
      deleted post-archive; no file is required at
      `.caws/specs/.archive/<id>.yaml`; the `spec_archived` event
      carries `from_path` and `blob_sha` (and optionally
      `source_commit_sha`); the event does NOT carry `to_path`.
  - id: A4
    given: |
      tests/shell/specs.test.js A3 ("--archived includes archived
      specs").
    when: |
      The test is updated.
    then: |
      Asserts the new section header string:
      `-- archived (recoverable from history) --` (which is the
      string `runSpecsListCommand` actually emits per
      `src/shell/commands/specs.ts:217`).
  - id: A5
    given: |
      tests/shell/specs.test.js A4 ("finds archived specs").
    when: |
      The test is updated.
    then: |
      Asserts that `runSpecsShowCommand({id, archived: true})`
      exits 0 and surfaces the recovered body (matching tombstone's
      explicit-archived-flag contract per
      `src/shell/commands/specs.ts:248`).
  - id: A6
    given: |
      tests/shell/specs.test.js A8 ("refuses close on an archived
      spec") — the assertion text is correct; the implementation
      regression is what makes it fail.
    when: |
      The closeSpec event-log scan fix lands.
    then: |
      A8 passes WITHOUT modifying the test's stderr-match assertion.
      The test continues to assert `/archived; cannot close/` and
      the diagnostic now fires correctly.
  - id: A7
    given: |
      Full pre-existing tombstone-specific test corpus:
      specs-list-archived.test.js, specs-recover-show-archived.test.js,
      events-verify-archive.test.js, specs-prune-archive.test.js,
      lifecycle-rollback-failure-harness.test.js,
      worktree-merge-a2-fault-injection.test.js,
      specs-writer-autocommit.test.js, specs-writer-updated-at.test.js
      (this slice's predecessor).
    when: |
      The slice's edits are applied.
    then: |
      All pre-existing tests remain green. The closeSpec implementation
      fix is additive (new event-log scan in the cold path); the test
      updates are confined to specs.test.js.
non_functional:
  reliability:
    - >-
      The defect class is "structural change in one writer (archiveSpec
      tombstone restructure) propagated to its own callers but not to
      sibling writers' diagnostic branches (closeSpec) or to the shell-
      test layer." This slice closes the propagation gap for the
      narrowest concrete surfaces (closeSpec archived-detection + one
      shell test file). Other propagation gaps, if any surface later,
      get their own narrow slices — explicit non-goal: do NOT extend
      to a project-wide tombstone propagation audit in this slice.
