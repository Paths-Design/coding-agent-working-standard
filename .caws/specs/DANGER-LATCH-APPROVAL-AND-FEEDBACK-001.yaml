id: DANGER-LATCH-APPROVAL-AND-FEEDBACK-001
title: 'danger latch: first flagged ask warns (no sticky latch), second strike latches; explicit stop-now feedback at flag time; add merge-tree/cat-file/rev-list to read-only allow-list'
risk_tier: 2
mode: fix
lifecycle_state: active
worktree: v11-latch-ux
