id: QG-HOOKS-EXTRACT-001
title: 'Extract load-bearing quality-gates signals into single-file hooks'
risk_tier: 3
mode: feature
lifecycle_state: draft
created_at: '2026-05-18T00:00:00.000Z'
updated_at: '2026-05-18T00:00:00.000Z'
blast_radius:
  modules:
    - packages/caws-cli/templates/hook-packs/claude-code
    - packages/caws-cli/tests/init/hook-packs
  data_migration: false
operational_rollback_slo: 30m
scope:
  in:
    - packages/caws-cli/templates/hook-packs/claude-code/god-object-check.sh
    - packages/caws-cli/templates/hook-packs/claude-code/shortcut-language-check.sh
    - packages/caws-cli/templates/hook-packs/claude-code/duplicate-export-check.sh
    - packages/caws-cli/templates/hook-packs/claude-code/loc-delta-check.sh
    - packages/caws-cli/templates/hook-packs/claude-code/manifest-claude-code.js
