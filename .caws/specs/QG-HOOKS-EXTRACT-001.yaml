    - .releaserc.json
    - scripts/multi-package-release.mjs
invariants:
  - 'No file in packages/quality-gates/** is modified, removed, added, staged, imported, or executed at runtime by this slice. Source reads for design reference are permitted; mutation and runtime coupling are not.'
  - 'caws-cli gates command, gates adapter, and quality-gates subprocess wiring are unchanged.'
  - 'Existing sterling hooks (naming-check.sh, scope-guard.sh, doc-frontmatter-check.sh) are not duplicated and not modified.'
  - 'New hooks are single-file scoped: they receive the path being written/edited and inspect at most that file plus a bounded local-tree lookup (duplicate-export-check.sh only).'
  - 'Hooks skip generated, vendored, dist, build, coverage, node_modules paths.'
  - 'No hook mutates events.jsonl, policy.yaml, .caws/specs/**, or any caws-cli store file.'
  - 'No new npm publish, tag, or version bump.'
acceptance:
  - id: A1
    given: 'A repo with the Claude Code hook pack installed and a Write tool call on a source file exceeding the god-object threshold.'
    when: 'PostToolUse fires god-object-check.sh.'
    then: 'The hook emits an advisory warning naming the file, its LOC, and the local-import ratio; the hook exits 0 (advisory mode); no events are written to .caws/events.jsonl.'
  - id: A2
    given: 'A Write/Edit tool call on a non-test source file whose content contains TODO/FIXME/XXX, "not implemented", "implement later", "placeholder", or stub-return language (return null with TODO, throw new Error("not implemented"), return Promise.resolve() in a non-test file).'
    when: 'PostToolUse fires shortcut-language-check.sh.'
    then: 'The hook emits a progressive-strike warning naming the line and pattern; on the third strike in a session it blocks per the existing guard-strikes mechanism.'
  - id: A3
    given: 'A Write tool call that creates a new exported function/class/component whose name collides with an existing export in the local project tree, and the name is not on the generic allowlist (main, init, setup, run, handle, render, index, default).'
    when: 'PostToolUse fires duplicate-export-check.sh.'
    then: 'The hook emits an advisory warning naming both files and the colliding symbol; the hook exits 0 (advisory only); name matching is exact, not heuristic.'
  - id: A4
    given: 'An Edit tool call that adds more than 300 LOC to a single non-generated file.'
    when: 'PostToolUse fires loc-delta-check.sh.'
    then: 'The hook emits an advisory warning naming the LOC delta and suggesting a split; the hook never blocks; the threshold is configurable via env var.'
  - id: A5
    given: 'A Write tool call on a file under node_modules/, dist/, build/, coverage/, or matching common generated-file patterns.'
    when: 'Any of the four new hooks would otherwise fire.'
    then: 'Each hook exits 0 with no output (path skipped at the top of the hook).'
  - id: A6
    given: 'The hook pack manifest at packages/caws-cli/templates/hook-packs/claude-code/manifest-claude-code.js.'
    when: 'The pack is loaded.'
    then: 'The manifest declares all four new hooks with sourcePath, destination, managed: true, and parallels the existing naming-check.sh / scope-guard.sh / doc-frontmatter-check.sh entries.'
  - id: A7
    given: 'A fresh install via caws init --agent-surface claude-code.'
    when: 'The hook pack materializes.'
    then: 'All four new hook files are present, executable, and the existing fresh-install smoke test passes.'
  - id: A8
    given: 'The four new hooks.'
    when: 'Tests run.'
    then: 'Each hook has at least one positive test (the pattern triggers correctly) and one negative test (a near-miss does not trigger); tests run via the existing jest harness in packages/caws-cli/tests/init/hook-packs/.'
  - id: A9
    given: 'Any acceptance scenario above.'
    when: 'It is evaluated.'
    then: 'No file in packages/quality-gates/** is modified, staged, imported, executed, or used as a runtime dependency by the new hooks. Reading source for design reference is permitted and expected (this slice intentionally lifts intent from the prior checker implementations); the boundary is mutation and runtime coupling, not inspection.'
non_functional:
  reliability:
    - 'Each hook returns in under 200ms on a single-file invocation (no whole-repo scan).'
    - 'duplicate-export-check.sh bounds its lookup to packages/<pkg>/src/** when the edited file is inside a package, or to src/** at repo root otherwise; it never scans node_modules.'
  security:
    - 'Hooks do not execute arbitrary content from the file being checked; pattern matching only.'
    - 'Hooks do not write outside their own log/strike paths under .claude/.'
  performance:
    - 'shortcut-language-check.sh and god-object-check.sh use grep/awk; duplicate-export-check.sh uses ripgrep when available, falls back to grep -r.'
contracts: []
# --- Risk tier note --------------------------------------------------------
# risk_tier: 3 is provisional for the draft state. When this spec becomes
# active, re-evaluate: hook code changes are typically T3, but adding new
# advisory hooks that fire on every Write/Edit may warrant T2 if false-positive
# risk is high. If raised to T2, author at least one contract entry for the
# hook invocation interface (input JSON shape from Claude Code PreToolUse/
# PostToolUse, expected exit codes, stdout/stderr conventions).
#
# --- New hooks (each ~50-150 LOC bash) -------------------------------------
# god-object-check.sh
#   trigger: PostToolUse Write/Edit
#   mode: advisory
#   thresholds: LOC > 2000 default, local-import density < 0.1 default
#   env: CAWS_GOD_OBJECT_LOC, CAWS_GOD_OBJECT_LOCAL_IMPORT_RATIO
#
# shortcut-language-check.sh
#   trigger: PostToolUse Write/Edit
#   mode: progressive_warning (uses existing guard-strikes.sh)
#   patterns:
#     - \bTODO\b|\bFIXME\b|\bXXX\b
#     - "not implemented"|"implement later"|"placeholder"
#     - stub-return shapes in non-test files:
#         return null;? +// +TODO
#         throw new Error\("not implemented"\)
#         return Promise\.resolve\(\);  (only in *.ts/*.js implementation files,
#                                        whitelisted in *.test.* and *.spec.*)
#   env: CAWS_SHORTCUT_STRIKES (default 3)
#
# duplicate-export-check.sh
#   trigger: PostToolUse Write
#   mode: advisory
#   logic:
#     1. Extract new exported names from the written file
#     2. Skip allowlist: main, init, setup, run, handle, render, index, default
#     3. Bounded ripgrep for "export function <name>", "export class <name>",
#        "export default function <name>", "export const <name>" in the
#        local project tree (excluding the file just written)
#     4. If exact match found in different file: advisory warning
#   v1 limitation (acceptable, but documented):
#     The hook fires on Write only, not Edit. An Edit that adds a new
#     colliding export to an existing file will NOT be caught in v1.
#     Rationale: the most common shadow-export incident is the agent
#     CREATING a new file with the colliding export, which Write covers.
#     The Edit-add-new-export pattern is rarer and would require diffing
#     the post-Edit export set against the pre-Edit set; out of scope
#     for v1. Revisit if real incidents in this category accumulate.
#
# loc-delta-check.sh
#   trigger: PostToolUse Edit
#   mode: advisory (never blocks)
#   threshold: 300 LOC added in one edit
#   env: CAWS_LOC_DELTA_WARN_THRESHOLD
#   delta source (in priority order):
#     1. Claude Code Edit payload — diff old_string vs new_string line counts
#        (newline-counted difference). Payload-first because it is exact,
#        synchronous, and works even when the file is untracked or in a
#        worktree where git diff would be misleading.
#     2. git diff --numstat HEAD -- <file> as fallback when the payload
#        does not include old_string/new_string (e.g., multi-edit batch).
#     3. If both unavailable, exit 0 silently — advisory hook never
#        produces false positives from missing data.
#
# --- What is NOT in scope --------------------------------------------------
# - check-naming.mjs symbol-conventions: covered by linters (eslint, etc.),
#   no hook needed.
# - check-simplification.mjs: too heuristic for hook-time blocking.
# - check-code-freeze.mjs: belongs in scope-guard/policy, not its own hook.
# - check-duplication.mjs (line-level): jscpd in CI covers this better.
# - check-functional-duplication.mjs full similarity engine: out of scope;
#   duplicate-export-check.sh captures the practical 80% at hook time.
# - monitor-refactoring-progress.mjs: reporting, not enforcement.
# - manage-naming-exceptions.mjs: supports check-naming, which is being cut.
# - cache-manager.mjs, worker-pool.mjs, progress.mjs, shared-exception-framework.mjs:
#   batch-scan infrastructure, irrelevant to hooks.
