    - packages/caws-cli/tests/init/hook-packs/god-object-check.test.js
    - packages/caws-cli/tests/init/hook-packs/shortcut-language-check.test.js
    - packages/caws-cli/tests/init/hook-packs/duplicate-export-check.test.js
    - packages/caws-cli/tests/init/hook-packs/loc-delta-check.test.js
    - docs/guides/hook-packs.md
    - .caws/specs/QG-HOOKS-EXTRACT-001.yaml
