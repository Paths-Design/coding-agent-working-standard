invariants:
  - >-
    Lint-only hygiene; zero behavior change. Every edit clears an eslint
    error without altering runtime behavior, test assertions, or types. The
    empty-interface fixes convert `export interface X extends Base {}` to the
    eslint-recommended `export type X = Base;` (structurally identical — same
    exported name, same supertype, same usage sites). The empty-catch fixes
    add an explanatory comment inside an existing best-effort cleanup
    `catch {}` (no control-flow change). The unused-var removals delete a
    genuinely dead local/helper. The stale eslint-disable removals delete
    directives referencing a rule the flat config does not load.
  - >-
    No eslint config change. packages/caws-cli/eslint.config.js is scope.out.
    This slice satisfies the existing rule set; it does NOT relax, disable, or
    reconfigure any rule. The `@typescript-eslint/no-require-imports`
    directives are removed (not the rule re-added) because the flat config
    never loaded that rule — the directive itself is the error (unused/unknown
    disable), and the `require()` calls trigger no loaded rule once it is gone.
  - >-
    No new failures. After the edits, `npm run lint` exits 0 with 0 errors
    (warnings may remain — they are not the target and are not gated), and the
    full caws-cli jest suite is unchanged (no test logic touched; the
    empty-catch and unused-var sites are test scaffolding/cleanup, not
    assertions).
  - >-
    Scope-isolated from active siblings. CAWS-V11-NONDOC-SURFACE-DRIFT-001
    (package.json + templates/CLAUDE.md) and any axe-init work are disjoint
    from these 9 files. eslint.config.js, package.json, and CI are scope.out.
