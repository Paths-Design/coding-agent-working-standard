id: QUALITY-GATES-PACKAGE-REMOVE-001
title: 'Remove deprecated quality-gates batch scanner package'
risk_tier: 3
mode: chore
lifecycle_state: draft
created_at: '2026-05-18T00:00:00.000Z'
updated_at: '2026-05-29T00:30:00.000Z'
blast_radius:
  modules:
    - packages/quality-gates
    - package-lock.json
    - package.json
    - .github/workflows
    - docs
  data_migration: false
operational_rollback_slo: 60m
scope:
  in:
    - packages/quality-gates
    - .archive/packages/quality-gates
    - package-lock.json
    - package.json
    - .github/workflows/release.yml
    - .github/workflows/test.yml
    - docs/architecture/caws-vnext-command-surface.md
    - docs/guides/quality-gates.md
    - docs/architecture/quality-gates-deprecation.md
    - turbo.json
    - .caws/specs/QUALITY-GATES-PACKAGE-REMOVE-001.yaml
    - .caws/code-freeze.yaml
    - .caws/quality-exceptions.json
    - .caws/duplication-exceptions.yaml
    - .caws/refactor-baselines.yaml
    - .caws/refactor-targets.yaml
  out:
