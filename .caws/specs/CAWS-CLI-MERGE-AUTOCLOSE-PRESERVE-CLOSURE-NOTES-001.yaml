id: CAWS-CLI-MERGE-AUTOCLOSE-PRESERVE-CLOSURE-NOTES-001
title: 'worktree merge auto-close must preserve existing closure_notes'
risk_tier: 3
mode: fix
lifecycle_state: closed
resolution: completed
created_at: '2026-06-18T03:11:37.154Z'
updated_at: '2026-06-18T03:20:20.161Z'
closure_notes: |
  Root cause: mergeWorktree's auto-close passed an unconditional machine stub
  reason ("Auto-closed by caws worktree merge <name> at <sha>") to closeSpec.
  closeSpec's closure_notes branch overwrote an inline single-line value with
  that stub; block scalars survived only by accident of the
  hasComplexTopLevelValue carve-out. The governed merge reported success while
  silently clobbering author-written audit content — the "reports success
  while destroying data" class the release stance prioritizes.

  Fix: CloseSpecInput gains preserveExistingNotes (insert-only mode). When set,
  an existing non-empty closure_notes is preserved verbatim regardless of
  inline-vs-block shape; the stub fills closure_notes only when the spec
  carried none (audit provenance for note-less specs is retained). mergeWorktree
  sets the flag; the explicit `caws specs close --reason` path leaves it unset,
  so a user-supplied reason still updates existing notes (user intent wins).

  Evidence: lifecycle-rollback-harness adds A1 (inline preserved, stub absent),
  A1b (block preserved), A2 (absent-notes filled with stub), A3 (explicit reason
  without flag still replaces inline notes). Full store suite 205/205 green; the
  123 `tsc --noEmit` errors are the pre-existing Result<T>-union-narrowing
  posture (the build gate is build-cli.js, not tsc), none on the edited lines.

  These very notes are authored as a block scalar so the still-old live merge
  binary preserves them through the auto-close; the fix itself is what makes the
  inline shape equally safe going forward.
blast_radius:
  modules:
    - caws-cli-store
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - packages/caws-cli/src/store/specs-writer.ts
    - packages/caws-cli/src/store/worktrees-writer.ts
    - packages/caws-cli/tests/store/lifecycle-rollback-harness.test.js
  out: []
invariants:
  - 'closeSpec called with preserveExistingNotes never overwrites a closure_notes value that is already present and non-empty, regardless of whether that value is an inline scalar or a block scalar.'
  - 'mergeWorktree''s auto-close path always invokes closeSpec with preserveExistingNotes set, so its machine-generated stub reason can only insert closure_notes where none exist — it can never replace author-written notes.'
  - 'The explicit caws specs close --reason path is unchanged: without preserveExistingNotes, an explicit reason still updates an existing inline closure_notes value (user intent wins).'
acceptance:
  - id: A1
    given: 'an active spec whose closure_notes is an inline single-line scalar with detailed author notes'
    when: 'closeSpec is called with a stub reason and preserveExistingNotes=true (the merge auto-close shape)'
    then: 'the inline closure_notes value is preserved verbatim and the stub reason is not written to the spec YAML'
  - id: A2
    given: 'an active spec with no closure_notes field'
    when: 'closeSpec is called with a stub reason and preserveExistingNotes=true'
    then: 'the stub reason is inserted as closure_notes so the merge audit still records the auto-close provenance'
  - id: A3
    given: 'an active spec whose closure_notes is an inline single-line scalar'
    when: 'closeSpec is called with an explicit reason and preserveExistingNotes unset (the caws specs close --reason shape)'
    then: 'the explicit reason replaces the existing inline closure_notes, preserving the user-intent semantics of the explicit close path'
non_functional: {}
contracts: []
