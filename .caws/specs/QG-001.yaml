id: QG-001
title: quality-gates --json must emit contract-valid stdout on the zero-files commit path
risk_tier: 2
mode: fix
lifecycle_state: draft
created_at: '2026-05-16T00:00:00.000Z'
updated_at: '2026-05-16T00:00:00.000Z'
blast_radius:
  modules:
    - packages/quality-gates/run-quality-gates.mjs
    - packages/quality-gates/tests
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - packages/quality-gates/run-quality-gates.mjs
    - packages/quality-gates/tests/
  out:
    - packages/caws-cli/
    - packages/caws-kernel/
invariants:
  - When caws-quality-gates is invoked with --json, every successful exit path emits exactly one JSON document to stdout that conforms to the GatesReport contract.
  - The disk artifact written to docs-status/quality-gates-report.json and the stdout JSON in --json mode are the same payload.
acceptance:
  - id: A1
    given: caws-quality-gates is invoked with --json --context=commit in a git repo with zero staged files.
    when: The process completes.
    then: stdout contains exactly one JSON document parseable as a GatesReport (timestamp, context, files_scoped, violations, warnings, waivers, performance fields), and the exit code is 0.
  - id: A2
    given: The same invocation as A1.
    when: The stdout JSON is validated against the GatesReport contract used by packages/caws-cli/src/shell/gates/report-validator.ts.
    then: Validation passes with no diagnostics.
  - id: A3
    given: The same invocation as A1.
    when: The on-disk docs-status/quality-gates-report.json is compared to the stdout JSON.
    then: The two payloads are equal (same fields, same values).
  - id: A4
    given: A v11-shape .caws/ project with caws-cli installed and caws-quality-gates linked into node_modules/.bin (CLI-GATES-002 satisfied).
    when: caws gates run --spec <id> is invoked with no staged files.
    then: The subprocess emits valid JSON, the CLI does not surface GATES_SUBPROCESS_FAILED, and a gate_evaluated event is appended to .caws/events.jsonl per declared gate.
non_functional:
  security:
    - The minimal-payload JSON written to stdout must not include uncontrolled paths or contents from process state beyond what the GatesReport contract specifies.
contracts:
  - name: quality-gates --json stdout contract
    type: behavior
    path: packages/quality-gates/run-quality-gates.mjs
    description: In --json mode the binary must emit a single GatesReport JSON document to stdout before process.exit, on every code path including the zero-files commit shortcut.
  - name: caws-cli gates adapter expectation
    type: contract-test
    path: packages/caws-cli/src/shell/gates/quality-gates-adapter.ts
    description: defaultRunner treats empty stdout as GATES_SUBPROCESS_FAILED; QG-001 ensures the subprocess never trips this on a clean run.
