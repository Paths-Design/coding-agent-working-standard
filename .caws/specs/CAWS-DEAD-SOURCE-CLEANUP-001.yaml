  - caws --help and per-group --help still list exactly the v11.1 surface (init, doctor, status, scope, claim, gates, evidence, waiver, specs, worktree) with no regression.
  - npm pack --dry-run on packages/caws-cli reports fewer files than before; specifically the deleted files no longer appear in the package inventory.
  - Build (esbuild/tsc) and lint pass for packages/caws-cli.
  - worktree-manager.js's autoCloseBoundSpec retains its existing verify-acs require and AC-collection block (originally targeted for removal, but reverted mid-merge because tests/worktree-auto-close-spec.test.js asserts the AC-collection behavior). Net change to this file by this slice is zero.
