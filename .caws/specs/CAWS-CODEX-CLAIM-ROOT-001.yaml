invariants:
  - >-
    A `caws claim --takeover` must not record ownership for a session whose
    stable harness root is outside the target worktree. Phantom claims are
    refused before `.caws/worktrees.json` is patched.
  - >-
    The phantom-root check applies to both Claude Code (`CLAUDE_PROJECT_DIR`)
    and Codex (`CODEX_PROJECT_DIR`) roots, matching the hook packs that later
    enforce file-write authority.
acceptance:
  - id: A1
    given: 'A Codex session rooted at the main checkout and a foreign-owned CAWS worktree.'
    when: '`caws claim --takeover` is invoked from a transient shell cwd inside that worktree.'
    then: 'The command exits 1, reports a phantom-root takeover, and leaves the worktree owner unchanged.'
  - id: A2
    given: 'A Codex session rooted at the target CAWS worktree.'
    when: '`caws claim --takeover` is invoked from inside that worktree.'
    then: 'The command succeeds, records the new owner, and appends the displaced owner to `prior_owners`.'
