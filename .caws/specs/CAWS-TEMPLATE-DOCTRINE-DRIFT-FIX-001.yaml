invariants:
  - >-
    Root and shipped template doctrine must describe the currently
    installed v11.1 surface: no removed command is presented as current
    usage, shipped agents commands are not described as deferred, and
    worktree guidance must not mention removed `caws parallel setup`.
  - >-
    Root package scripts must not call removed CAWS commands.
acceptance:
  - id: A1
    given: the root package scripts
    when: they are scanned for removed CAWS commands
    then: no script invokes `caws validate`; validation guidance uses the v11 surfaces (`caws doctor` and/or `caws gates run`) instead.
  - id: A2
    given: root CLAUDE.md and shipped CAWS templates
    when: they are scanned for command-count and multi-agent guidance
    then: they describe 12 shipped command groups, shipped `agents list/show`, and no longer claim agents are planned for v11.2.
  - id: A3
    given: the template worktree-isolation rule
    when: it is scanned for worktree setup commands
    then: it uses `caws worktree create <name> --spec <id>` and contains no `caws parallel setup` guidance.
