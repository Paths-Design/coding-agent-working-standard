id: UX-WORKTREE-GROUP-PRUNE-HANDOFF-001
title: 'Route worktree --prune to prune leaf'
risk_tier: 3
mode: fix
lifecycle_state: active
worktree: worktree-group-prune-handoff
created_at: '2026-07-04T19:43:43.773Z'
updated_at: '2026-07-04T19:46:47.397Z'
blast_radius:
  modules:
    - 'packages/caws-cli shell registration and metadata'
    - 'CLI UX audit and generated command reference'
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - 'packages/caws-cli/src/shell/command-metadata.ts'
    - 'packages/caws-cli/src/shell/register.ts'
    - 'packages/caws-cli/tests/shell/worktree-group-prune-handoff.test.js'
    - 'docs/command-reference.md'
    - 'docs/architecture/cli-ux-job-model-audit.md'
    - packages/caws-cli/src/index.js
  out: []
invariants:
  - '`caws worktree --prune` is a compatibility handoff to the existing `caws worktree prune` cleanup model.'
  - 'Group-level prune selectors and apply/json flags forward to the same dry-run/apply implementation as the prune leaf.'
  - 'Supplying both --state and --status refuses before cleanup planning or mutation, matching the prune leaf.'
acceptance:
  - id: A1
    given: 'a CAWS project with worktree cleanup residue'
    when: 'an operator runs `caws worktree --prune --status ghost-registry --json`'
    then: 'the command returns the same read-only cleanup plan as `caws worktree prune --status ghost-registry --json`.'
  - id: A2
    given: 'a group-level worktree prune invocation'
    when: 'both --state and --status are supplied'
    then: 'the command refuses before cleanup planning or mutation with the same selector ambiguity diagnostic as the prune leaf.'
  - id: A3
    given: 'the CLI UX audit option-mismatch evidence'
    when: 'this slice lands'
    then: 'the audit records the worktree --prune handoff and next resample scope.'
non_functional: {}
contracts:
  - name: 'worktree-group-prune-handoff'
    type: behavior
    path: 'packages/caws-cli/tests/shell/worktree-group-prune-handoff.test.js'
