id: CANONICAL-CHECKOUT-GUARD-DISPATCHER-PROPAGATION-001
title: 'Dispatcher chain propagates canonical-checkout guard refusals'
risk_tier: 2
mode: chore
lifecycle_state: active
created_at: '2026-05-26T01:29:15.414Z'
updated_at: '2026-05-26T01:30:00.000Z'
blast_radius:
  modules:
    - packages/caws-cli/templates/hook-packs/claude-code/dispatch/pre_tool_use.sh
    - packages/caws-cli/templates/hook-packs/claude-code/lib/run-handlers.sh
    - packages/caws-cli/templates/hook-packs/claude-code/worktree-guard.sh
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - .caws/specs/CANONICAL-CHECKOUT-GUARD-DISPATCHER-PROPAGATION-001.yaml
    - packages/caws-cli/tests/integration/lite-hooks.test.js
    - packages/caws-cli/templates/hook-packs/claude-code/dispatch/pre_tool_use.sh
    - packages/caws-cli/templates/hook-packs/claude-code/lib/run-handlers.sh
