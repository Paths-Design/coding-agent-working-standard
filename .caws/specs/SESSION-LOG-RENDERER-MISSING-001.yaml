id: SESSION-LOG-RENDERER-MISSING-001
title: 'session-log.sh references session_log_renderer.py not in installedFiles manifest'
risk_tier: 3
mode: fix
lifecycle_state: draft
created_at: '2026-05-23T10:29:02.783Z'
updated_at: '2026-05-23T10:30:00.000Z'
blast_radius:
  modules:
    - packages/caws-cli/templates/hook-packs/claude-code
    - packages/caws-cli/src/init/hook-packs
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - .caws/specs/SESSION-LOG-RENDERER-MISSING-001.yaml
    - packages/caws-cli/templates/hook-packs/claude-code/session-log.sh
    - packages/caws-cli/src/init/hook-packs/manifest-claude-code.ts
  out:
    - .caws/policy.yaml
invariants:
  - >-
    Every executable referenced by a Claude Code hook script must be either
    a guaranteed platform builtin (bash, node, git, dirname, mkdir) OR
    declared in CLAUDE_CODE_PACK.installedFiles. The hook pack is
    self-contained at install time; no hook may depend on a file that is
    not shipped by the manifest.
acceptance:
  - id: A1
    given: A fresh `caws init --agent-surface claude-code` install.
    when: |
      The SessionStart dispatcher runs session-log.sh (in the handler
      chain alongside audit.sh and agent-register.sh).
    then: |
      session-log.sh either (a) finds session_log_renderer.py at the
      expected path and runs it cleanly, OR (b) is rewritten to not
      depend on the external renderer and instead inlines the
      summarization. In either case the script exits 0; dispatcher
      max_exit is no longer raised by this handler.
  - id: A2
    given: The packaging-smoke run from MULTI-AGENT-ACTIVITY-REGISTRY-001's
      fresh-install-smoke.mjs (which exposed this defect at commit 6).
    when: |
      The smoke runs after this slice's fix lands.
    then: |
      The "[info] dispatcher max_exit=2 (sibling handler noise — lease
      created OK)" diagnostic is gone. The dispatcher exits 0 cleanly on
      SessionStart and Stop in the installed-artifact smoke. (Smoke's
      lease-centric assertions remain unchanged; this AC just removes the
      sibling-handler noise.)
  - id: A3
    given: The CAWS_CODE_PACK manifest.
    when: |
      If option (a) is chosen — add session_log_renderer.py to templates
      and manifest — install.test.js's "all installed files materialize
      correctly" check counts the new file.
    then: |
      Manifest installedFiles count increases by 1; the new file has
      managed: true, executable: false (python script invoked via
      python3, not directly); the CLAUDE_CODE_PACK_VERSION is bumped
      to 4 (per pack version-bump convention).
non_functional:
  reliability:
    - >-
      Defect class: silent partial-install. The renderer reference shipped
      to every user since the session-log script was added but the smoke
      that would have caught it (fresh-install-smoke.mjs's lease-centric
      run) was only added in MULTI-AGENT-ACTIVITY-REGISTRY-001 commit 6.
      This slice closes the immediate gap; the structural fix is to
      assert at manifest-build time that every executable referenced by
      a managed hook script is in the manifest. Out of scope here;
      filed conceptually but not specced.
contracts: []
# --------------------------------------------------------------------------
# History
# --------------------------------------------------------------------------
#
# 2026-05-23: Spec created in lifecycle_state: draft (parking state).
#   Surfaced by MULTI-AGENT-ACTIVITY-REGISTRY-001 commit 6 fresh-install-smoke.
#   The smoke run reported `dispatcher max_exit=2` because session-log.sh
#   exits non-zero when python3 can't open RENDERER. session-log.sh:18
#   uses `set -euo pipefail`; line 85 calls python3 unconditionally.
#   Smoke handled it gracefully (lease-centric assertion); fresh installs
#   still emit the noise.
