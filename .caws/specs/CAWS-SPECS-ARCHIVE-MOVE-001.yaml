id: CAWS-SPECS-ARCHIVE-MOVE-001
title: 'Move archived specs into archive directory'
risk_tier: 2
mode: fix
lifecycle_state: active
worktree: archive-move
created_at: '2026-06-18T19:21:30.351Z'
updated_at: '2026-06-18T19:29:25.667Z'
blast_radius:
  modules:
    - 'packages/caws-cli spec lifecycle writer'
    - 'packages/caws-cli spec archive command output'
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - 'packages/caws-cli/src/store/specs-writer.ts'
    - 'packages/caws-cli/src/store/git-autocommit.ts'
    - 'packages/caws-cli/src/shell/commands/specs.ts'
    - 'packages/caws-cli/src/shell/command-metadata.ts'
    - 'packages/caws-cli/tests/store'
    - 'packages/caws-cli/tests/shell'
    - 'docs/api/cli.md'
    - 'docs/command-reference.md'
    - packages/caws-kernel/src/schemas/events/spec_archived.v1.json
  out: []
invariants:
  - 'caws specs archive preserves the spec body by moving it to .caws/specs/.archive/<id>.yaml instead of deleting it.'
  - 'The archive move must account for gitignore state so ignored archive destinations are not staged while tracked destinations are committed as a rename/delete-add transition.'
acceptance:
  - id: A1
    given: 'A closed spec exists at .caws/specs/<id>.yaml and .caws/specs/.archive/ is not ignored by git.'
    when: 'caws specs archive <id> runs successfully.'
    then: 'The source file is removed, .caws/specs/.archive/<id>.yaml exists with lifecycle_state: archived, the spec_archived event is appended, and the audit commit stages the tracked archive path.'
  - id: A2
    given: 'A closed spec exists and .caws/specs/.archive/ is ignored by git.'
    when: 'caws specs archive <id> runs successfully.'
    then: 'The source file is removed, the archive file remains in the ignored archive directory, and the git audit commit does not attempt to stage the ignored archive path.'
  - id: A3
    given: 'The archive destination already exists for the same spec id.'
    when: 'caws specs archive <id> is invoked.'
    then: 'The command refuses before mutating the source or destination files.'
non_functional: {}
contracts:
  - name: 'archive-move-behavior'
    type: behavior
    path: 'packages/caws-cli/tests/store/specs-writer-archive-move.test.js'
