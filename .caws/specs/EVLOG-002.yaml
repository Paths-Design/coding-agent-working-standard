id: EVLOG-002
type: feature
title: Event log reads — flip iterate/status/sidecar/gates to the renderer (Phase 2)
status: active
risk_tier: 3
mode: development
created_at: '2026-04-11T00:27:05.215Z'
updated_at: '2026-04-11T00:27:05.215Z'
blast_radius:
  modules:
    - packages/caws-cli/src/commands/iterate
    - packages/caws-cli/src/commands/status
    - packages/caws-cli/src/commands/sidecar
    - packages/caws-cli/src/commands/gates
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - packages/caws-cli/src/commands/iterate.js
    - packages/caws-cli/src/commands/status.js
    - packages/caws-cli/src/commands/sidecar.js
    - packages/caws-cli/src/commands/gates.js
    - packages/caws-cli/src/utils/event-renderer.js
    - packages/caws-cli/tests/event-renderer.test.js
    - packages/caws-cli/tests/integration/event-log-read-parity.test.js
    - docs/internal/EVENTS_LOG_MIGRATION.md
    - .caws/specs/EVLOG-002.yaml
  out:
    - node_modules/
    - dist/
    - packages/caws-cli/dist/
    - packages/caws-cli/src/utils/working-state.js
    - packages/caws-cli/src/utils/event-log.js
    - packages/caws-cli/src/commands/validate.js
    - packages/caws-cli/src/commands/evaluate.js
    - packages/caws-cli/src/commands/verify-acs.js
    - packages/caws-cli/src/commands/specs.js
    - packages/caws-cli/src/session/session-manager.js
invariants:
  - State layer (working-state.js) writes continue unchanged — Phase 2 is read-only
  - recordGates write at gates.js stays on the state layer; only the feedback-enrichment loadState call flips
  - loadStateFromEvents returns null for specs with zero matching events, matching loadState's contract exactly
  - >-
    Every consumer produces byte-identical output whether it reads from loadState or loadStateFromEvents (given the same
    event stream + state)
  - >-
    Deleting .caws/state/<spec-id>.json between runs does not change any consumer's output, because the event log alone
    is sufficient
acceptance:
  - id: A1
    given: A spec with events but no .caws/state/ file
    when: iterate --spec-id X --current-state "test" is run
    then: >-
      The command produces the same guidance it would produce with the state file present, and the workingState overlay
      correctly reflects validation/evaluation/gates evidence from the event log
  - id: A2
    given: A spec with a full observation pipeline (validate/evaluate/verify-acs/gates) recorded in the event log
    when: status --spec-id X is run
    then: >-
      Phase, validation grade, evaluation percentage, gates context, AC counts, and files_touched all match what the
      state-layer read would produce
  - id: A3
    given: A spec with events recorded
    when: sidecar drift gaps and waiver-draft subcommands are run
    then: Each subcommand produces identical output under event-log reads and state-layer reads
  - id: A4
    given: A spec with events recorded
    when: gates run is invoked
    then: >-
      The feedback enrichment at gates.js:116 surfaces the same blockers and next_actions as the state-layer read, and
      the recordGates write at ~85 is unchanged (still uses the state layer)
  - id: A5
    given: A fresh project with no events.jsonl and no state file
    when: loadStateFromEvents('NONEXISTENT') is called
    then: >-
      It returns null (not emptyView), matching loadState's contract exactly so status.js:1055's `|| null` coalesce
      remains a no-op
  - id: A6
    given: A spec that has been fully exercised through validate/evaluate/verify-acs/gates
    when: .caws/state/<spec-id>.json is deleted and each consumer command (iterate/status/sidecar/gates) is re-run
    then: >-
      Every consumer produces output identical to the pre-delete output, proving the event log alone is sufficient as a
      source of truth
  - id: A7
    given: The full jest suite before and after this change
    when: The suite is run
    then: >-
      No pre-existing test regresses beyond the 2 known pre-existing failures (spec-creation worktree-recording,
      parallel-manager spec propagation)
non_functional:
  perf:
    api_p95_ms: 50
  a11y: []
  security:
    - Phase 2 is read-only — no new writes, no new persisted surfaces. Read path already validated in EVLOG-001 Phase 1.
contracts: []
worktree: evlog-002
