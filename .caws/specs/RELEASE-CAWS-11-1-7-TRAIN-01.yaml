invariants:
  - 'I1: Release-prep slice with a HARD publish gate. NO `npm publish` invocation, NO `npm dist-tag` mutation, NO `git tag` push, NO `git push --tags` until the publish-gate report is returned AND the maintainer explicitly authorizes the external mutation as a separate step. The slice prepares the release artifacts (version bumps, CHANGELOG, lockfile sync, build, pack validation) and then STOPS.'
  - 'I2: Two-package release train, ordered: caws-kernel@1.1.2 publishes FIRST (manual `npm publish` from packages/caws-kernel/ — kernel has no CI publish path per CAWS-RELEASE-TAG-DRIVEN-001), then caws-cli@11.1.7 publishes SECOND (push `caws-cli-v11.1.7` tag; CI workflow handles the rest). The order is non-negotiable because caws-cli@11.1.7 depends on caws-kernel@^1.1.0 and the diagnostic fixes live IN kernel — publishing cli first would ship partial coverage (CLI fixes visible; kernel diagnostics still showing stale text via the npm-published kernel@1.1.1).'
  - 'I3: NO `caws-kernel-v*` git tag creation. The release workflow triggers on `caws-kernel-v*` (per .github/workflows/release.yml line 62), but `scripts/release-tag-publish.mjs` line 12 explicitly REFUSES that prefix and the asymmetric-failure-invariant deletes refused tags from origin. Creating such a tag would fire CI, get refused, and get auto-deleted — and might appear as a transient publish attempt in CI logs. Kernel publish provenance is recorded in closure_notes only (commit SHA + npm shasum/integrity from publish output + npm view confirmation). Formalizing kernel-side release provenance is the scope of follow-up slice KERNEL-RELEASE-PROVENANCE-01, NOT this slice.'
  - 'I4: NO audit remediation. The lockfile-hygiene slice surfaced 27 transitive-dep vulnerability findings (1 low, 7 moderate, 18 high, 1 critical); these are NOT remediated by this release train. They are tracked as a separate candidate slice (e.g., CAWS-DEPS-AUDIT-REMEDIATION-01). Pulling them into the release would introduce dependency churn and break the I3-style minimal-diff discipline.'
  - 'I5: NO source code changes. The four closed P0 fix slices (DOCS-V11-CUTOVER-FINALIZE-01, CAWS-STATUS-AGENTS-SUMMARIZE-ACTIVE-AGENTS-01, CAWS-STALE-VERSION-ADVICE-DIAGNOSTICS-01, CAWS-CLI-KERNEL-DEP-LOCKFILE-HYGIENE-01) already landed the source/test fixes. This slice ships ONLY release metadata: package.json version bumps, CHANGELOG section, lockfile refresh (post-version-bump), pack verification. If recon during this slice surfaces a missing fix that should have been in one of those prior slices, STOP and surface — do not silently amend.'
  - 'I6: BOTH dist trees MUST be rebuilt before pack validation and publish. Recon evidence: packages/caws-kernel/dist/* currently contains the OLD diagnostic strings (6 stale-text occurrences) AND packages/caws-cli/dist/shell/commands/claim.js contains the OLD claim diagnostic (2 stale-text occurrences); both source trees are post-fix. The dist build that ran during the source-fix slices was not retained. A `turbo run build --filter=@paths.design/caws-kernel... --force` and `turbo run build --filter=@paths.design/caws-cli... --force` MUST run cleanly before pack inspection. Pack inspection MUST verify the new text (not the stale text) is present in the unpacked tarball.'
  - 'I7: kernel package has NO CHANGELOG.md. Recon confirmed this. This slice does NOT introduce one (would set a new file-convention precedent without authorization). Kernel publish provenance for v1.1.2 is recorded in closure_notes only. Introducing kernel CHANGELOG.md is the scope of the follow-up KERNEL-RELEASE-PROVENANCE-01 slice.'
  - 'I8: The CLI release mechanism is MANUAL pre-bump + tag-driven CI publish per scripts/release-tag-publish.mjs:22 ("script never writes to packages/<pkg>/package.json, CHANGELOG.md"). The script VALIDATES tag-version equals package.json.version AND CHANGELOG.md has a matching section before publish; pre-publish failures DELETE the tag. The slice therefore: (a) maintainer manually bumps packages/caws-cli/package.json version from 11.1.6 to 11.1.7, (b) maintainer authors packages/caws-cli/CHANGELOG.md section for [11.1.7], (c) maintainer commits both, (d) post-publish-gate authorization: maintainer pushes the tag, CI handles the rest. The slice does NOT invoke semantic-release; despite @semantic-release/* being in devDeps, the established release path is tag-driven (per CAWS-RELEASE-TAG-DRIVEN-001 doctrine).'
acceptance:
  - id: A1
    given: 'The npm registry state at slice start.'
    when: 'A pre-prep `npm view` records both package versions and dist-tags.'
    then: 'Closure notes capture verbatim: caws-cli latest=11.1.6, caws-kernel latest=1.1.1, both with only "latest" dist-tag. This is the rollback baseline if anything goes wrong post-publish.'
  - id: A2
    given: 'The repo-local source state.'
    when: 'Versions are read from package.json files and dep edges from lockfile.'
    then: 'caws-cli package.json shows 11.1.6 → bumped to 11.1.7 (by this slice). caws-kernel package.json shows 1.1.1 → bumped to 1.1.2 (by this slice). caws-cli dep on caws-kernel stays at ^1.1.0 (^1.1.0 satisfies both 1.1.1 and 1.1.2; no caret bump needed). package-lock.json updated by `npm install --package-lock-only --ignore-scripts` after the version bumps so the lockfile-recorded versions track the package.json bumps.'
  - id: A3
    given: 'Both dist trees pre-rebuild contain stale diagnostic text per I6.'
    when: '`turbo run build --filter=@paths.design/caws-kernel... --force` and `turbo run build --filter=@paths.design/caws-cli... --force` are run.'
    then: 'Both builds succeed. Post-rebuild grep verifies zero stale-text occurrences in either dist tree: `grep -rc "v11.0.0 does not ship\|pin to caws-cli@\^10.2" packages/caws-kernel/dist packages/caws-cli/dist` returns zero matches. Spot-check confirms new text is present: `grep "caws worktree (create\|bind\|merge\|destroy)\|caws specs close" packages/caws-kernel/dist packages/caws-cli/dist` returns multiple matches across the rebuilt files.'
  - id: A4
    given: 'Both packages built clean per A3.'
    when: 'Targeted tests are run from canonical: kernel full suite + CLI shell suite subset.'
    then: 'Kernel: 525/525 pass across 25 suites. CLI shell subset (status-command, agents-command, claim-command, claim-stale-version-advice, status-kernel-feature-detect, doctor-command, scope-command): all pass. No regression introduced by the version bumps or lockfile refresh.'
  - id: A5
    given: 'Both packages built clean per A3.'
    when: 'Pack dry-runs are invoked: `npm pack --dry-run --workspace @paths.design/caws-kernel` and `npm pack --dry-run --workspace @paths.design/caws-cli`.'
    then: 'Both pack dry-runs succeed. Kernel tarball reports name @paths.design/caws-kernel@1.1.2. CLI tarball reports name @paths.design/caws-cli@11.1.7. Tarball file lists match expectations (kernel: dist/ only per files; cli: dist + README + templates/hook-packs/**). Each pack output is captured in closure_notes (tarball name, version, file count, size).'
  - id: A6
    given: 'The CHANGELOG section for caws-cli@11.1.7.'
    when: 'The maintainer authors `packages/caws-cli/CHANGELOG.md` `## [11.1.7]` section.'
    then: 'The section enumerates the four shipped fixes (DOCS-V11-CUTOVER-FINALIZE-01, CAWS-STATUS-AGENTS-SUMMARIZE-ACTIVE-AGENTS-01, CAWS-STALE-VERSION-ADVICE-DIAGNOSTICS-01, CAWS-CLI-KERNEL-DEP-LOCKFILE-HYGIENE-01) with their commit SHAs and one-line descriptions. The section ends with a Note: "Requires @paths.design/caws-kernel@^1.1.0 which resolves to ≥1.1.2 (the kernel patches for stale-diagnostic text live in kernel@1.1.2; users on kernel@1.1.1 will see the cli-side fixes only)." The CHANGELOG format matches the existing entry shape (recon: ## [version](compare-url) (YYYY-MM-DD), then prose + ### Features/Test coverage/Out of scope subsections).'
  - id: A7
    given: 'The slice completes prep through A6 successfully.'
    when: 'The publish gate is reached.'
    then: 'The slice STOPS and emits a publish-gate report containing: (a) all A1 baseline data, (b) the exact files changed (package.json x2, CHANGELOG.md, package-lock.json), (c) pack-dry-run summaries, (d) the exact proposed publish commands in order (kernel manual publish first, then cli tag push), (e) post-publish verification commands, (f) rollback recipe if publish partially fails. NO npm publish is invoked. NO tag is pushed. The maintainer reviews the report and authorizes publication in a separate turn.'
  - id: A8
    given: 'Recon confirmed the release workflow triggers on caws-kernel-v* but release-tag-publish.mjs refuses that prefix.'
    when: 'The kernel publish step is documented in the gate report.'
    then: 'The proposed kernel publish command is `cd packages/caws-kernel && npm publish` (manual, from canonical-checkout state at HEAD), explicitly NOT `git tag caws-kernel-v1.1.2 && git push --tags` (which would trigger CI refusal and auto-delete the tag). Kernel provenance is recorded post-publish: commit SHA, npm shasum, npm integrity, `npm view @paths.design/caws-kernel@1.1.2 time --json` confirmation. Formalizing kernel-release provenance is the scope of follow-up slice KERNEL-RELEASE-PROVENANCE-01.'
  - id: A9
    given: 'On explicit publish authorization (separate turn).'
    when: 'Kernel publishes first, CLI tag pushes second.'
    then: 'Post-kernel-publish verification (before cli tag push): `npm view @paths.design/caws-kernel version` returns 1.1.2. Post-cli-publish verification: `npm view @paths.design/caws-cli version` returns 11.1.7. A fresh-install smoke verifies the dep edge: `npm install -g @paths.design/caws-cli@11.1.7 --dry-run` resolves @paths.design/caws-kernel@1.1.2. Both publishes are recorded in closure_notes verbatim.'
  - id: A10
    given: 'The publish completes (or partially completes).'
    when: 'A post-publish smoke runs the rehearsal-shaped commands against a fresh-install fixture.'
    then: 'The newly-installed `caws doctor` against a project that would trigger the stale-advice rules shows the NEW diagnostic text (e.g., "caws worktree destroy <name>" instead of "pin to caws-cli@^10.2.x"). The newly-installed `caws status` against a fresh `caws init` does NOT crash with `summarizeActiveAgents is not a function`. These confirm the user-facing fixes shipped. If verification fails, rollback procedure: refer to npm deprecate (does NOT remove the version; marks it as deprecated with a message); per release-tag-publish.mjs the post-publish-failure invariant preserves tags but emits repair commands. NPM unpublish within 72 hours is theoretically possible but should not be used without explicit maintainer authorization.'
non_functional:
  reliability:
    - 'The two-package publish order MUST be deterministic. Kernel first, then cli — never overlapping, never parallel. The CLI tag push MUST NOT happen until `npm view @paths.design/caws-kernel@1.1.2 version` returns 1.1.2 (i.e., the registry has propagated the kernel publish). Brief propagation delays are normal; treat this as a serial pipeline.'
    - 'Pack dry-runs MUST be run AFTER the rebuilds, not before. The current dist trees on disk are stale; running pack against them would create misleading evidence that the publish includes the fixes when it would not.'
contracts: []
