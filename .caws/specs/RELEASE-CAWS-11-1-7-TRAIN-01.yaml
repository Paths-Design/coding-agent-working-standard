id: RELEASE-CAWS-11-1-7-TRAIN-01
title: 'Two-package release train: caws-kernel@1.1.2 then caws-cli@11.1.7 (gated)'
risk_tier: 3
mode: chore
lifecycle_state: active
created_at: '2026-05-26T17:53:37.915Z'
updated_at: '2026-05-26T17:53:37.915Z'
blast_radius:
  modules:
    - packages/caws-kernel/package.json
    - packages/caws-cli/package.json
    - packages/caws-cli/CHANGELOG.md
    - package-lock.json
  data_migration: false
operational_rollback_slo: 10m
scope:
  in:
    - .caws/specs/RELEASE-CAWS-11-1-7-TRAIN-01.yaml
    - packages/caws-kernel/package.json
    - packages/caws-cli/package.json
    - packages/caws-cli/CHANGELOG.md
    - package-lock.json
  out:
