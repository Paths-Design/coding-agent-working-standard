id: CLI-WORKTREE-001
title: 'Restore v11 worktree lifecycle commands: caws worktree create/list/bind/destroy/merge'
risk_tier: 2
mode: feature
lifecycle_state: closed
resolution: completed
closure_notes: 'Slice 6 complete. caws worktree lifecycle commands shipped; manual closure is no longer the canonical path for worktree lifecycle either. Verified end-to-end against the substrate (lifecycle-transaction + applyRegistryPatch + specs-writer.closeSpec for auto-close on merge).'
