contracts:
  - name: 'doctor-worktree-half-state'
    type: behavior
    path: packages/caws-kernel/src/doctor
    description: 'Doctor adds detection rules covering half-state classes H1-H6 from caws-vnext-command-surface.md §1.4. All rules are detect-only and emit no events. H5 diagnostic.repair MUST be a non-actionable doctrine pointer (no shell command substrings). Severity per §1.4 matrix.'
# --- Triage ----------------------------------------------------------------
# Provenance
# ----------
# Filed 2026-05-22 by PRUNE-REPAIR-WORKTREE-RECON-001 (closed same day).
# This spec is the Diagnose level of the §1.4 Diagnose / Decide / Repair
# stratification.
#
# Why detect-only first
# ---------------------
# §1.4 establishes that prune/repair was filed as one capability but is
# three at three different authority levels. Diagnose is the only level
# authority-free; Decide requires control-plane authority doctrine
# (WORKTREE-SPEC-AUTHORITY-CONTROL-PLANE-001); Repair requires Decide.
#
# Shipping detect-only first surfaces contradictions without choosing a
# winner. H5 cannot be auto-repaired without picking an authority
# surface (registry vs. spec_A vs. spec_B); any "helpful" repair
# command shipped before authority policy exists will permanently
# encode the wrong source of truth at first use.
#
# Implementation guidance
# -----------------------
# The diagnostic logic belongs in the kernel doctor surface
# (packages/caws-kernel/src/doctor), NOT in worktrees-writer.ts.
# Writers mutate; this is reader/diagnostic. Mixing detect with
# repair-capable code makes the future repair slice harder to reason
# about.
#
# Read state sources:
#   - .caws/worktrees.json
#   - active spec YAMLs under .caws/specs/
#   - git worktree list --porcelain
#
# The shell should render diagnostics, not own the truth calculation.
# If the current doctor implementation has a snapshot/check module,
# extend that. If not, create a small store-level checker that doctor
# calls.
#
# H2/H3 deduplication
# -------------------
# The kernel already has BINDING_SPEC_MISSING_REGISTRY (likely covers
# H2) and BINDING_REGISTRY_MISSING_SPEC (likely covers H3) per the
# audit conducted during PRUNE-REPAIR-WORKTREE-RECON-001. The
# implementing slice's FIRST step is verifying coverage with explicit
# fixtures matching the H-class observable state. If covered,
# acceptance A2/A3 are discharged with citations to the existing
# rules and tests, not by adding duplicate rules.
#
# Audit-quiet draft-flip
# ----------------------
# This spec was created via caws specs create (which forces
# lifecycle_state: active in v11.1.6, since the CLI has no
# --initial-state flag) and then flipped to draft via direct YAML
# edit. The spec_created event in events.jsonl will record
# lifecycle_state: active (the create-time state); the flip-to-draft
# is audit-quiet by necessity. SPECS-PROMOTE-DRAFT remains deferred
# past v11.2 per V11-2-STABILIZATION-RECON-001 §1.3 finding 2.
#
# Activation
# ----------
# This spec stays draft until an implementer is ready to pick it up.
# Activation is a separate (audit-quiet) direct YAML edit. The
# implementing agent should also at that time amend scope.in if the
# concrete implementation file paths differ from those listed here
# (e.g., if the test directory convention is tests/kernel/ rather
# than tests/store/, prefer the actual convention).
