invariants:
  - 'Earned claim: doctor detects and classifies worktree/spec/registry/git-worktree inconsistency states, including the lifecycle-harness-witnessed H4 and H5, without mutating repository state.'
  - 'All five (or six, including H6) rules are pure detection. No mutation of .caws/, no git worktree-altering commands. Only read-only inspection of worktrees.json, spec YAMLs, and git worktree list --porcelain.'
  - 'Doctor purity invariant (§6.3) holds: no fs writes, no process.env mutation, no Date.now beyond the snapshot timestamp. This slice adds rules, not new IO categories.'
  - 'H5 doctor-UX rule: the diagnostic for the 3-way contradiction MUST NOT suggest a mutating command. Its repair field is a non-actionable doctrine pointer referencing WORKTREE-SPEC-AUTHORITY-CONTROL-PLANE-001. Test asserts the repair string contains none of the substrings: "caws worktree", "caws specs", "git ", "rm ", "mv ", "sh ", "bash ", "$", or "`".'
  - 'No new event schema. No new CLI command. caws doctor remains the entry point. Severity discipline: ERROR for authority split-brain (H1, H4, H5 always; H2/H3 when bidirectional invariant violated); INFO for H6 foreign physical (CAWS does not govern raw git worktrees, but silent acceptance is a footgun); no new WARNs (stale display-only WARNs are a separate concern and must not be conflated with half-state classification).'
  - 'Tests construct each H-class state directly in fixtures (no dependency on the lifecycle-rollback fault-injection seam). The harness proves the states are real; the doctor tests prove classification on explicit fixtures. This decouples doctor regressions from injection-seam regressions.'
acceptance:
  - id: A1
    given: 'A test fixture with .caws/worktrees.json containing {name: {specId: id, ...}} but the backing git worktree directory absent'
    when: 'doctor runs'
    then: 'doctor emits doctor.worktree.ghost_registry_entry (or equivalent kernel-named rule) with severity ERROR and subject = worktree name. The diagnostic data includes spec id and the expected-but-missing path. Repair text suggests pruning (no shell command required to be present, but if present must be safe and unambiguous).'
  - id: A2
    given: 'A fixture with worktrees.json[name].specId === id and spec_<id>.yaml lacking a worktree: field'
    when: 'doctor runs'
    then: 'H2 detected. Likely satisfied by the existing kernel rule BINDING_SPEC_MISSING_REGISTRY. The implementing slice first verifies whether the existing rule covers this exact fixture; if yes, this AC is marked discharged with a citation; if no, a new rule is added.'
  - id: A3
    given: 'A fixture with spec_<id>.yaml containing worktree: <name> but worktrees.json lacking that name'
    when: 'doctor runs'
    then: 'H3 detected. Likely satisfied by the existing kernel rule BINDING_REGISTRY_MISSING_SPEC. Same verification posture as A2.'
  - id: A4
    given: 'A fixture mirroring destroyWorktree post-fault: spec_<id>.yaml has worktree: <name>, no registry entry for <name>, no git worktree dir at canonical path'
    when: 'doctor runs'
    then: 'doctor emits doctor.worktree.ghost_spec_binding (or equivalent) with severity ERROR and subject = spec id (and/or worktree name). Repair text suggests "clear the worktree: field from spec_<id>.yaml" — a specific actionable instruction, since H4 has a single defensible repair direction.'
  - id: A5
    given: 'A fixture mirroring bindWorktreeRepair post-fault: worktrees.json[name].specId === idB; spec_<idA>.yaml has worktree: <name>; spec_<idB>.yaml has no worktree: field'
    when: 'doctor runs'
    then: 'doctor emits doctor.worktree.binding_contradiction_3way (or equivalent) with severity ERROR. The diagnostic data names all three contradictory facts (registry.specId, spec_idA.worktree, spec_idB.worktree). The repair field is a non-actionable doctrine pointer: "Ambiguous authority split; no automatic repair available under current doctrine. See WORKTREE-SPEC-AUTHORITY-CONTROL-PLANE-001." Test ALSO asserts: the repair string does NOT contain any of these substrings: "caws worktree", "caws specs", "git ", "rm ", "mv ", "sh ", "bash ", "$", "`". This locks the H5 doctor-UX rule against future regressions.'
  - id: A6
    given: 'A fixture with a git worktree created outside CAWS (raw git worktree add at some path) and no corresponding entry in worktrees.json'
    when: 'doctor runs'
    then: 'doctor emits doctor.worktree.foreign_physical (or equivalent) with severity INFO (NOT ERROR; CAWS does not govern raw git worktrees, but silent acceptance is a footgun worth surfacing). Subject is the foreign worktree path.'
  - id: A7
    given: 'A repo in any fixture state from A1-A6'
    when: 'doctor runs and the test snapshots .caws/ byte-for-byte before and after, plus git worktree list --porcelain before and after'
    then: 'No byte-level change in .caws/ (no spec edits, no worktrees.json mutation, no events.jsonl append). No change in git worktree list (no git worktree add/remove). Doctor purity verified.'
  - id: A8
    given: 'The full pre-existing kernel doctor test suite'
    when: 'jest runs the kernel and store doctor tests'
    then: 'All pre-existing tests remain green. BINDING_*, OWNERSHIP_*, INIT_* rules are not affected. The harness-style fault-injection tests (worktree-merge-a2-fault-injection.test.js, lifecycle-rollback-failure-harness.test.js) remain independent and remain green.'
  - id: A9
    given: 'Wall-time budget'
    when: 'doctor runs on a repo with up to 20 worktrees'
    then: 'Half-state detection adds less than 50 ms to doctor wall time (the existing doctor budget). This is an observation target, not a hard correctness gate; report actual timing and only fail if the addition is wildly disproportionate (>500 ms).'
non_functional:
