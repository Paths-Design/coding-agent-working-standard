invariants:
  - >-
    `caws init` succeeds idempotently in a git repo and prints a next-step
    line directing the user to `git add .caws/ && git commit` when the
    .caws/ directory was newly created in a git working tree. Outside a
    git working tree, no commit hint is printed.
  - >-
    `caws worktree create <name> --spec <id>` prints a next-step line
    `cd .caws/worktrees/<name>` immediately after the success line. This
    hint is unconditional (the worktree directory always exists post-create).
  - >-
    `caws specs create <id> ...` prints a post-create guidance block naming
    the spec path and explaining that the spec ships with TODO placeholders
    in scope.in that must be replaced before edits will be admitted.
  - >-
    `docs/guides/worktree-isolation.md` documents the node_modules visibility
    constraint for workspace package managers (pnpm/yarn/npm workspaces),
    with two named recovery options (root-relative `-F` filter, or
    `pnpm install` inside the linked worktree).
  - >-
    Every worktrees-writer mutation that successfully writes
    `.caws/worktrees.json` (createWorktree, bindWorktree, destroyWorktree,
    mergeWorktree, claim transitions) commits the file as the final step
    of the lifecycle transaction via the shared git-autocommit utility.
    The commit message is `chore(caws): <op> <name>`. Hooks are not
    bypassed (no --no-verify).
  - >-
    The shared git-autocommit utility handles three states predictably:
    (a) cwd is not inside a git working tree -> skip commit, return ok
    with kind:'skipped_no_git' (defense-in-depth: caws worktree commands
    presuppose a git repo via resolveRepoRoot, so this branch is not
    reached in production; the utility must still be total over the
    case); (b) target file was dirty before the writer's own write ->
    refuse commit, return ok with kind:'refused_dirty' leaving the
    writer's change in the working tree for the user to resolve;
    (c) target file was clean before the writer's own write -> commit
    succeeds, return ok with kind:'committed' and the resulting sha.
acceptance:
  - id: A1
    given: a git repository with no prior .caws/ directory
    when: the user runs `caws init`
    then: |
      the command exits 0; .caws/ is created; the final line of stdout
      is the next-step hint `Next: git add .caws/ && git commit -m
      "chore: add caws governance state"` (or equivalent wording that
      names both the git add and the commit verbs); a snapshot test
      asserts the hint is present.
  - id: A2
    given: a directory that is NOT a git repository
    when: the user runs `caws init`
    then: |
      the command exits 0; .caws/ is created; no git commit hint is
      printed (the hint would be misleading because there is nothing
      to commit to). A regression test exercises this path with a
      tmpdir-without-git fixture.
  - id: A3
    given: a CAWS-initialized git repo and an active spec
    when: the user runs `caws worktree create <name> --spec <SPEC-ID>`
    then: |
      the command exits 0; the worktree is created and bound; the final
      line of stdout is `Next: cd .caws/worktrees/<name>` (or equivalent
      wording naming the directory); a test asserts the hint is present
      in command output.
  - id: A4
    given: a CAWS-initialized git repo
    when: the user runs `caws specs create <ID> --title "..." --mode chore --risk-tier 3`
    then: |
      the command exits 0; .caws/specs/<ID>.yaml is created; the stdout
      includes a guidance block stating that scope.in ships with TODO
      placeholders that must be replaced with real file paths before
      edits will be admitted by scope-guard; the block names the spec
      path so the user can open it directly. A test asserts the
      guidance is present.
  - id: A5
    given: a developer reading docs about worktree isolation
    when: they consult docs/guides/worktree-isolation.md
    then: |
      the doc contains a section titled "Workspace package managers
      (pnpm, yarn, npm workspaces)" or equivalent; the section explains
      that node_modules is not materialized inside linked worktrees;
      the section names two recovery patterns: (a) run package scripts
      from the repo root with the workspace filter flag (e.g.
      `pnpm -F <pkg> test`), and (b) run an in-worktree install.
  - id: A6
    given: |
      a git repo where .caws/worktrees.json is clean before a caws
      worktree command runs
    when: |
      the user runs `caws worktree create <name> --spec <ID>`
    then: |
      after the command exits 0, `git status --short` shows zero entries
      for .caws/worktrees.json (the file is committed); `git log -1
      --pretty=%s -- .caws/worktrees.json` shows
      `chore(caws): create <name>` (or `bind <name> to <ID>`, exact verb
      matching the writer's operation); the commit was authored by git's
      configured user, not by a forced override; the commit was created
      without --no-verify (verified by the pre-commit hook existing and
      passing).
  - id: A7
    given: |
      a git repo where .caws/worktrees.json is dirty (modified by
      a prior unrelated edit) before a caws worktree command runs
    when: |
      the user runs `caws worktree create <name> --spec <ID>`
    then: |
      the auto-commit step refuses with a typed diagnostic naming the
      conflict; the writer's own write is preserved in the working tree;
      the user is told the recovery path (commit the prior change manually
      OR discard with `git checkout -- .caws/worktrees.json` and re-run
      the caws command). The worktree itself is still created (the
      auto-commit refusal does not roll back the lifecycle transaction).
  - id: A8
    given: |
      a unit-test fixture where cwd is NOT inside a git working tree
      (defense-in-depth contract: the git-autocommit utility must be
      total over this case even though caws worktree commands cannot
      reach it in production because resolveRepoRoot refuses non-git
      cwd)
    when: |
      the utility is called directly with a target file and message
    then: |
      it returns ok with kind:'skipped_no_git'; no commit is attempted;
      no exception escapes the utility.
non_functional:
  reliability:
    - >-
      git-autocommit utility is total over its three states (skipped,
      refused, committed); no unhandled exceptions escape the utility.
      Tested via tests/store/git-autocommit.test.js.
    - >-
      writer rollback semantics are unchanged. If the lifecycle
      transaction succeeds and the auto-commit refuses, the writer
      change persists (user can commit manually). If the writer
      transaction itself fails, the auto-commit is never attempted.
  security:
    - >-
      auto-commit never uses --no-verify, --no-gpg-sign, or any
      hook-bypass flag. The commit goes through whatever pre-commit
      and commit-msg hooks the consumer project has installed.
      Upstream caws ships no .git/hooks/pre-commit template (the
      claude-code hook pack is agent-harness PreToolUse only), so a
      vanilla caws-init'd project has no git-side hooks to interact
      with; downstream consumers that install their own hooks remain
      responsible for admitting chore(caws):-prefixed commits if
      they want CAWS's auto-commit to work alongside their base-branch
      protection.
contracts: []
