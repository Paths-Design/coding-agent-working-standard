invariants:
  - 'scope plan is read-only and never writes specs, events, worktrees, waivers, or leases.'
  - 'each planned path uses the same binding resolution and kernel scope decision as scope show/check.'
  - 'batch output groups remediation commands but delegates all mutation to existing governed commands.'
acceptance:
  - id: A1
    given: 'multiple paths supplied with repeatable --path flags'
    when: 'the operator runs caws scope plan --path <a> --path <b> --json'
    then: 'the command exits 0, evaluates every path, and emits JSON with per-path decisions plus grouped remediation commands.'
  - id: A2
    given: 'paths supplied through a newline-delimited --paths-file'
    when: 'the file includes blank lines and comments'
    then: 'the command ignores blank/comment lines and evaluates the remaining paths without mutating state.'
  - id: A3
    given: 'multiple refused paths with the same amend-scope command'
    when: 'scope plan groups remediation'
    then: 'the output includes one grouped command with all matching paths rather than requiring the operator to inspect each path separately.'
  - id: A4
    given: 'no paths are supplied'
    when: 'scope plan runs'
    then: 'the command fails with usage guidance before composing or mutating any CAWS state.'
  - id: A5
    given: 'the completed slice'
    when: 'focused tests, docs check, caws doctor, caws gates run, and a dist-linked CLI smoke run'
    then: 'they pass without leaving unrelated repository dirt.'
