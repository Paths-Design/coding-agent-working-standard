id: CAWS-SPECS-CLOSE-DEFAULT-RESOLUTION-001
title: 'caws specs close defaults --resolution to completed'
risk_tier: 3
mode: fix
lifecycle_state: active
worktree: specs-close-default-resolution
created_at: '2026-05-27T19:19:07.281Z'
updated_at: '2026-05-27T19:19:07.281Z'
blast_radius:
  modules:
    - packages/caws-cli/src/shell/register.ts
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - .caws/specs/CAWS-SPECS-CLOSE-DEFAULT-RESOLUTION-001.yaml
    - packages/caws-cli/src/shell/register.ts
    - packages/caws-cli/tests/shell/specs.test.js
    - packages/caws-cli/tests/shell
  out:
    - packages/caws-kernel
    - .caws/policy.yaml
    - CODEOWNERS
    - packages/caws-cli/package.json
    - packages/caws-cli/CHANGELOG.md
    - packages/caws-cli/src/shell/commands/specs.ts
    - packages/caws-cli/src/shell/commands/worktree.ts
    - packages/caws-cli/src/shell/commands/gates.ts
    - packages/caws-cli/src/store/specs-writer.ts
    - packages/caws-cli/src/store/worktrees-writer.ts
invariants:
  - >-
    `caws specs close <id> --reason "..."` invoked WITHOUT --resolution
    succeeds and writes `resolution: completed` to the spec YAML. The
    shell-level Commander option for --resolution defaults to the string
    'completed' when omitted; the action handler passes that value
    through to runSpecsCloseCommand without branching on presence.
  - >-
    Explicit --resolution still wins. `caws specs close <id> --resolution
    superseded --superseded-by FOO-2` continues to write resolution:
    superseded with no behavioral change from the pre-fix path. Operator
    intent expressed via flag is never overridden by the default.
  - >-
    runSpecsCloseCommand's existing VALID_RESOLUTIONS enum check
    (packages/caws-cli/src/shell/commands/specs.ts ~line 259) runs
    against the defaulted value identically to how it runs against
    explicitly-passed values. The default 'completed' MUST appear in
    VALID_RESOLUTIONS; if it doesn't, the fix would replace one error
    with a different error.
  - >-
    Kernel acceptance is unchanged. The kernel's
    CLOSED_SPEC_MISSING_RESOLUTION semantic gate
    (packages/caws-kernel/src/spec/rules.ts) continues to refuse any
    close patch that arrives at the writer without a concrete
    resolution. This slice changes what value the shell SUPPLIES when
    the operator doesn't specify, not what the kernel ACCEPTS.
  - >-
    The composed `caws worktree merge` → closeSpec path
    (worktrees-writer.ts) is unaffected. That path already hardcodes
    `resolution: 'completed'` and never reaches the shell's option
    parser. The slice's scope is the manual close invocation path only.
  - >-
    --reason behavior is unchanged. The --reason option remains
    optional; when absent, no closure_notes are written. When present,
    closure_notes is written. The default-resolution fix MUST NOT
    introduce any coupling between --reason and --resolution; they
    remain independent options.
acceptance:
  - id: A1
    given: |
      A repo with an active spec FOO-1 whose lifecycle_state === 'active'
      and updated_at is set.
    when: |
      `caws specs close FOO-1 --reason "done"` is invoked WITHOUT
      `--resolution`.
    then: |
      The command exits 0. The on-disk spec YAML now has
      lifecycle_state: closed, resolution: completed, closure_notes:
      done. One spec_closed event is appended.
  - id: A2
    given: |
      Same active spec as A1.
    when: |
      `caws specs close FOO-1 --resolution superseded --superseded-by
      FOO-2 --reason "moved"` is invoked.
    then: |
      The command exits 0. The on-disk spec YAML has resolution:
      superseded (NOT completed). The default is overridden by the
      explicit flag.
  - id: A3
    given: |
      Same active spec as A1.
    when: |
      `caws specs close FOO-1` is invoked with NO flags at all.
    then: |
      The command exits 0 (the default fires). resolution: completed.
      No closure_notes are written (because --reason is absent). This
      proves --reason independence from the default-resolution change.
  - id: A4
    given: |
      Same active spec as A1.
    when: |
      `caws specs close FOO-1 --resolution invalid-value` is invoked.
    then: |
      The command exits 1 with the existing diagnostic
      `invalid --resolution "invalid-value"`. The fix MUST NOT bypass
      the VALID_RESOLUTIONS enum check.
  - id: A5
    given: |
      The existing test corpus for `caws specs close` (worktree.test.js
      A2 case, specs.test.js A5/A6 describes).
    when: |
      The slice's edits are applied.
    then: |
      Every pre-existing specs-close test continues to pass without
      modification. The fix is additive at the option-parsing layer.
non_functional:
  reliability:
    - >-
      Shell-UX defaulting must never override an operator's explicit
      flag. The Commander option default fires only when the flag is
      absent from argv; explicit `--resolution completed`, explicit
      `--resolution superseded`, etc. all pass through unmodified.
contracts: []
# --- Triage ---------------------------------------------------------------
# Origin: tier-1 follow-up queue item #6 (docs/reports/tier1-followups-queue.md).
# Sterling P1 — recurring friction during manual spec closure.
#
# Root cause (verified 2026-05-27):
#   packages/caws-cli/src/shell/register.ts:614 declares --resolution as
#   Commander `.requiredOption(...)` with no default. `caws specs close
#   FOO-1 --reason "..."` fails at the Commander option-parse layer with
#   "error: required option '--resolution <r>' not specified" BEFORE
#   runSpecsCloseCommand is invoked. The runSpecsCloseCommand handler
#   already enforces VALID_RESOLUTIONS (specs.ts:259), so the
#   pre-validation refusal at register.ts adds zero protection beyond
#   what the action handler already provides.
#
# Fix shape (one-line semantic change):
#   register.ts:614 `.requiredOption('--resolution <r>', '...')`
#   becomes      `.option('--resolution <r>', '... (default: completed)',
#                           'completed')`
#   The handler signature already types `resolution: string` (not
#   `resolution?: string`), so no downstream type change is needed —
#   Commander will populate opts.resolution with 'completed' when the
#   flag is absent.
#
# Out of scope:
#   - Kernel schema relaxation (kernel still requires concrete resolution)
#   - Worktree-merge composed close path (already hardcodes 'completed')
#   - Other shell commands with required options
#   - Release tooling (package.json, CHANGELOG.md) — tag-driven per
#     CLAUDE.md trap #7
