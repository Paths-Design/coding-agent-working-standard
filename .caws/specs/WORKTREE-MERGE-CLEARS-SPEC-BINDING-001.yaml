id: WORKTREE-MERGE-CLEARS-SPEC-BINDING-001
title: 'caws worktree merge / specs close must clear spec.worktree when the worktree no longer exists'
risk_tier: 2
mode: chore
lifecycle_state: draft
created_at: '2026-05-20T00:00:00.000Z'
updated_at: '2026-05-20T00:00:00.000Z'
