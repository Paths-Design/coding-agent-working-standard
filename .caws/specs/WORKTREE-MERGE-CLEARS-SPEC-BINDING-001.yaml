invariants:
  - 'After `caws worktree merge <name>` succeeds (registry entry destroyed, branch merged), the spec that was bound to <name> must NOT retain a `worktree:` field pointing at <name>. The pointer is stale by construction; leaving it triggers a guaranteed doctor.binding.spec_missing_registry error on the next doctor run.'
  - 'After `caws specs close <id>` succeeds, the spec must NOT retain a `worktree:` field. A closed spec cannot have a live worktree binding by definition.'
  - 'The clearing operation must be part of the same lifecycle transaction as the merge/close, so a partial failure does not leave a stale binding behind.'
  - 'Both operations must emit a corresponding event recording the binding clearance (e.g., worktree_unbound.v1 or extend spec_closed.v1 with a prior_worktree field) so the audit trail is preserved.'
acceptance:
  - id: A1
    given: 'A spec FEAT-001 is bound to worktree feat-001-wt via bidirectional binding (worktrees.json[feat-001-wt].specId = FEAT-001 AND FEAT-001.yaml has `worktree: feat-001-wt`).'
    when: '`caws worktree merge feat-001-wt` succeeds.'
    then: 'After the merge, FEAT-001.yaml no longer contains the `worktree:` field. `caws doctor` does not emit spec_missing_registry for FEAT-001. The auto-close path (when implemented) is unaffected — closure still emits spec_closed, but with the worktree field already cleared.'
  - id: A2
    given: 'A spec FEAT-002 is bound to worktree feat-002-wt. The worktree has been destroyed (by `caws worktree destroy` or manual `git worktree remove`) but FEAT-002.yaml still has the stale `worktree:` field.'
    when: '`caws specs close FEAT-002 --resolution completed` is invoked.'
    then: 'The close operation clears the stale `worktree:` field as part of the same YAML patch that flips lifecycle_state to closed. No follow-up `caws doctor` call reports spec_missing_registry for FEAT-002.'
  - id: A3
    given: 'A spec FEAT-003 is in lifecycle_state active with a `worktree:` field, but no corresponding registry entry exists (drift state).'
    when: '`caws doctor` is invoked.'
    then: 'doctor still reports spec_missing_registry as an error (this slice does not weaken doctor). The error message also surfaces the new repair option introduced by this spec — e.g., `caws specs unbind <id>` if such a command is added, or `caws specs close <id>` if closure is the intended path.'
  - id: A4
    given: 'The fix lands.'
    when: 'feat/ci-v11-workflow-repair is re-tested by running `caws specs close` on each of the three CI-substrate-repair specs from a state where their worktrees were already merged/destroyed.'
    then: 'The close operations clear the `worktree:` fields without manual intervention. `caws doctor` returns 0 errors. No manual YAML edits are needed.'
non_functional:
  reliability:
    - 'The clearing operation must be atomic with the merge/close lifecycle transaction. Crash mid-transaction must not leave a half-cleared binding.'
    - 'The fix is backward-compatible: existing specs without a `worktree:` field continue to work unchanged. The clearing operation is a no-op when the field is absent.'
  performance:
    - 'No measurable runtime impact — the fix adds at most one additional YAML patch operation per merge/close, which is already O(spec-file-size).'
contracts: []
# --- Triage ----------------------------------------------------------------
# Surfaced by PR #3 (feat/ci-v11-workflow-repair) on 2026-05-20. After
# both `caws worktree merge` (which destroyed the worktree and removed the
# registry entry) and `caws specs close --resolution completed` (which
# flipped lifecycle_state and recorded closure_notes), the affected specs
# still retained their `worktree:` fields. `caws doctor` then reported:
#
#   [ERROR] doctor.binding.spec_missing_registry:
#     Spec CI-CAWS-GATE-V11-SURFACE-001 points to worktree "ci-caws-gate-exec-wt",
#     but no registry entry exists.
#   [ERROR] doctor.binding.spec_missing_registry:
#     Spec CI-KERNEL-WORKSPACE-TYPECHECK-001 points to worktree
#     "ci-kernel-typecheck-wt", but no registry entry exists.
#
# Manual repair on the PR #3 branch: hand-edited the two specs to remove
# the `worktree:` line. This is a workaround, not a fix — every future
# worktree-backed spec will hit the same trap. The fix belongs in the
# CLI lifecycle code paths so future contributors don't accumulate the
# same dogfooding scar tissue.
#
# Two implementation directions to choose during this slice:
#
# Option A: clear `worktree:` in the merge command's lifecycle transaction.
#   When `caws worktree merge` destroys the registry entry, it also
#   patches the bound spec to remove the field. The auto-close path
#   (when the worktree's spec is auto-closed via the merge) is already
#   doing one YAML patch via specs-writer.closeSpec; adding the field
#   clearance is a small extension.
#
# Option B: clear `worktree:` in the specs close command.
#   When `caws specs close <id>` runs, check if the spec has a `worktree:`
#   field and clear it as part of the close transaction. This catches
#   the case where the worktree was destroyed independently (manual
#   `git worktree remove`, or `caws worktree destroy` without merge).
#
# Recommended: BOTH. Option A handles the canonical merge-then-close
# flow; Option B handles the drift case. The two complement each other
# and together close the door on this defect class.
#
# Doctor should also offer a clearer repair message: instead of just
# saying "Remove the worktree field", it should suggest the canonical
# CLI command once it exists (e.g., `caws specs unbind <id>` or the
# implicit clearance via `caws specs close <id>`).
