# --- Triage ----------------------------------------------------------------
# Why this slice exists
# ---------------------
# v11.1 stabilized the release loop and lifecycle paths. The next risk is
# architectural seam selection, not implementation throughput. Three drafts
# and one doctrine surface now overlap in the v11.2 zone:
#
#   - WORKTREE-CAWS-SHARED-STATE-001       (draft, refactor, tier 3)
#   - WORKTREE-SPEC-AUTHORITY-CONTROL-PLANE-001  (draft, feature, tier 3)
#   - PRUNE-REPAIR-WORKTREE-001            (draft, feature, tier 2)
#   - LIFECYCLE-ROLLBACK-FAILURE-HARNESS-001 (draft, chore, tier 3)
#   - docs/architecture/caws-vnext-command-surface.md §1 v11.2 plan
#
# Implementing any of them before reconciling the overlap risks solving the
# wrong abstraction. The fault-injection seam from
# WORKTREE-MERGE-A2-FAULT-INJECTION-001 is shipped, which makes
# LIFECYCLE-ROLLBACK-FAILURE-HARNESS-001 attractive as a first
# implementation slice — but architecture should drive that decision, not
# shovel-readiness.
#
# Three findings from exploration corrected the original planning frame:
#
# 1. Read-path authority is already control-plane.
#    resolveRepoRoot (packages/caws-cli/src/store/repo-root.ts:87) uses
#    `git rev-parse --path-format=absolute --git-common-dir`, so
#    `caws scope show/check`, `caws gates run --spec <id>`, and
#    `caws specs show <id>` invoked from a linked worktree all resolve to
#    the main repo's .caws/specs/. The v11.2 control-plane authority gap
#    is NOT "make read paths resolve correctly" — it is (a) worktree
#    checkout still contains tracked .caws/specs/*.yaml that look
#    authoritative but are ignored by the resolver, (b) absence of
#    doctor drift diagnostics between checked-out and resolver-loaded
#    bytes, (c) migration of pre-v11.2 worktrees.
#
# 2. `specs promote` has zero doctrine footprint.
#    No spec_promoted.v1.json in packages/caws-kernel/src/schemas/events/.
#    No mention in docs/architecture/caws-vnext-command-surface.md or
#    docs/migration-v10-to-v11.md. `caws specs` ships ten subcommands
#    (list, conflicts, migrate, create, show, update, delete, close,
#    archive, types); promote is not among them and is not deferred —
#    it has never been doctrine. Treat as net-new if pursued.
#
# 3. WORKTREE-CAWS-SHARED-STATE-001 and WORKTREE-SPEC-AUTHORITY-CONTROL-PLANE-001
#    overlap. The older spec uses mechanism framing ("shared state");
#    the newer spec uses authority framing (matches doctrine §6.9
#    liveness ≠ authority). Do not implement either until the §1.1
#    disposition is acted on by a subsequent slice.
#
# Slice constraints
# -----------------
# - doctrine-only edit to docs/architecture/caws-vnext-command-surface.md
# - new draft-then-active spec for governance
# - NO code changes
# - NO package version bump, CHANGELOG entry, or release tag
# - NO worktree/scope/doctor behavior changes
# - NO new event schema
# - NO edits to any spec being reconciled (only this spec and the doc)
#
# Out-of-scope discoveries during authoring must trigger a stop and a
# scope amendment (CLAUDE.md trap #5 — kernel-change escape clause
# applies equally here), not silent expansion.
#
# Spec was created in lifecycle_state: active by `caws specs create`,
# which does not expose an initial-state flag in v11.1.6. The plan
# originally specified draft; active is acceptable because this slice
# is non-destructive doc work governed by a single closure.
