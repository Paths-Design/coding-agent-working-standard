name: PR Quality Gates

on:
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # Quick sanity checks (fail fast)
  sanity:
    name: Quick Sanity Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

  # CAWS-specific guards
  caws_guards:
    name: CAWS Guards
    runs-on: ubuntu-latest
    needs: sanity
    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: |
          # Use critical level - many high-severity vulns are in bundled deps without fixes
          npm audit --audit-level=critical || {
            echo "::warning::Security vulnerabilities found. Review npm audit output."
            exit 0  # Don't fail PR for transitive dep issues
          }

      - name: Block shadow file patterns
        run: |
          BAD=$(git diff --name-only origin/${{ github.base_ref }}... | \
            grep -E '/(copy|final|enhanced|v2)[.-]|/(new-)| - copy\.' || true)
          if [ -n "$BAD" ]; then
            echo "❌ Shadow/duplicate filename patterns detected:"
            echo "$BAD"
            exit 1
          fi

      - name: Validate CAWS spec
        if: hashFiles('.caws/working-spec.yaml') != ''
        run: npm run caws:validate

      - name: Check scope compliance
        if: hashFiles('.caws/working-spec.yaml') != ''
        run: |
          # Install yq for YAML parsing
          if ! command -v yq &> /dev/null; then
            sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            sudo chmod +x /usr/local/bin/yq
          fi

          # Extract scope.in paths
          SCOPE_PATHS=$(yq '.scope.in[]' .caws/working-spec.yaml 2>/dev/null || echo "")

          if [ -n "$SCOPE_PATHS" ]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...)
            OUT=""
            
            for file in $CHANGED; do
              IN_SCOPE=false
              while IFS= read -r scope; do
                if [[ "$file" == $scope* ]]; then
                  IN_SCOPE=true
                  break
                fi
              done <<< "$SCOPE_PATHS"
              
              if [ "$IN_SCOPE" = false ]; then
                OUT="$OUT\n$file"
              fi
            done
            
            if [ -n "$OUT" ]; then
              echo -e "❌ Files outside scope.in:\n$OUT"
              echo "Add a Spec Delta with the new paths if intentional."
              exit 1
            fi
          fi

      - name: Enforce change budget
        if: hashFiles('.caws/working-spec.yaml') != ''
        run: |
          if ! command -v yq &> /dev/null; then
            sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            sudo chmod +x /usr/local/bin/yq
          fi

          MAXF=$(yq '.change_budget.max_files // 25' .caws/working-spec.yaml)
          MAXL=$(yq '.change_budget.max_loc // 1000' .caws/working-spec.yaml)
          FILES=$(git diff --name-only origin/${{ github.base_ref }}... | wc -l)
          LOC=$(git diff --unified=0 origin/${{ github.base_ref }}... | grep -E '^\+|^-' | wc -l)

          echo "Files: $FILES (budget: $MAXF)"
          echo "LOC: $LOC (budget: $MAXL)"

          if [ "$FILES" -gt "$MAXF" ] || [ "$LOC" -gt "$MAXL" ]; then
            echo "❌ Budget exceeded - consider breaking into smaller PRs"
            exit 1
          fi

  # Comprehensive testing
  test_suite:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: sanity
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Unit tests with coverage
        # The root `test:unit` script is `turbo run test`. Flags after the
        # script name belong to Jest, not to Turbo. Invoking Turbo directly
        # avoids the npm/turbo double-`--` ambiguity (npm run test:unit -- -- ...)
        # that future maintainers would trip over.
        # Governed by CI-PR-TEST-PASSTHROUGH-001.
        run: npx turbo run test -- --coverage --passWithNoTests

      - name: Contract tests
        if: hashFiles('tests/contract/**') != ''
        run: npm run test:contract

      - name: Integration tests
        if: hashFiles('tests/integration/**') != ''
        run: npm run test:integration

      - name: E2E smoke tests
        if: hashFiles('tests/e2e/**') != ''
        run: npm run test:e2e:smoke

  # Hook bash-guard behavioral suite (lineage-anchored). These prove each
  # failure-lineage guard still FIRES (block-dangerous, protected-paths,
  # scan-secrets, cwd-guard, naming-check) — the "do as I do" proof. Blocking.
  # Previously absent from every workflow (CAWS-TEST-CI-WIRING-001 A2).
  hook_bats:
    name: Hook Guards (bats)
    runs-on: ubuntu-latest
    needs: sanity
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Bats hook guard tests
        working-directory: packages/caws-cli
        run: npm run test:bats

  # Hook python-classifier suite (classify_command decision matrix +
  # session_log_renderer). Proves the git-init/rebase/hard-reset classifications
  # and the allow/ask/deny enforcement vocabulary. Blocking (CAWS-TEST-CI-WIRING-001 A2).
  hook_pytest:
    name: Hook Classifier (pytest)
    runs-on: ubuntu-latest
    needs: sanity
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Pytest hook classifier tests
        working-directory: packages/caws-cli
        run: npm run test:pytest

  # Quality gates (can run in parallel with tests)
  quality_gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    needs: sanity
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Mutation testing is NOT a per-PR step. The store run alone is ~22min and
      # the kernel run adds more; gating every PR on it would dominate the
      # critical path. It runs on a schedule + label + dispatch in
      # .github/workflows/mutation.yml (break:80, incremental-cached) instead.
      # The prior `if: hashFiles('tests/mutation/**')` step silently skipped
      # because that directory was removed in the test-corpus rebuild — a dead
      # guard that enforced nothing. Removed under CAWS-TEST-CI-WIRING-001.

      - name: Accessibility testing
        if: hashFiles('tests/axe/**') != ''
        run: npm run test:axe || echo "⚠️  Accessibility testing not configured"

      - name: Performance budgets
        run: npm run perf:budgets

  # Generate PR comment with summary
  pr_comment:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [caws_guards, test_suite, hook_bats, hook_pytest, quality_gates]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate PR comment
        run: |
          if [ -f "apps/tools/caws/pr-comment.js" ]; then
            npm run caws:pr-comment > pr-comment.md
          else
            echo "PR checks completed - see workflow for details" > pr-comment.md
          fi

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const comment = fs.readFileSync('pr-comment.md', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
