name: Release

on:
  push:
    branches:
      - main
    # RELEASE-AUTOMATION-GUARD-NONPUBLISH-COMMITS-001 — Layer 2.
    # Trigger paths name only files that, if changed, could legitimately
    # require a @paths.design/caws-cli release. Removed paths and why:
    #   - packages/quality-gates/**  : quality-gates is no longer published
    #                                  separately (see PACKAGES array in
    #                                  scripts/multi-package-release.mjs);
    #                                  its changes must not spin up the
    #                                  release workflow at all.
    #   - .releaserc.json            : no such file exists (script is the
    #                                  single source of truth per its own
    #                                  comment).
    #   - CHANGELOG.md (root)        : CHANGELOGs are per-package.
    #   - scripts/**                 : too broad; only the release script
    #                                  itself can change release behavior.
    paths:
      - 'packages/caws-cli/**'
      - 'scripts/multi-package-release.mjs'
      - '.github/workflows/release.yml'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: Release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Configure Git for CI
        run: |
          git config --global user.email "ci@paths.design"
          git config --global user.name "CAWS CI"

      - name: Install dependencies
        run: |
          # Configure npm for better reliability
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm config set fetch-retries 3
          npm config set fetch-retry-factor 10

          # Retry npm ci with exponential backoff
          for i in {1..3}; do
            echo "Attempt $i of 3..."
            npm ci --prefer-offline --no-audit --no-fund || {
              if [ $i -eq 3 ]; then
                echo "All attempts failed"
                exit 1
              fi
              echo "Attempt $i failed, waiting before retry..."
              sleep $((i * 10))
            } && break
          done

      - name: Run linting
        run: npx turbo run lint

      - name: Security audit
        run: |
          # Use critical level because many high-severity vulns are in bundled
          # transitive deps (npm, semantic-release) without available fixes.
          # MCP SDK fix (1.25.2) not yet published as of 2026-01.
          # Monitor: https://github.com/advisories
          npm audit --audit-level=critical || {
            echo "::warning::Security audit found vulnerabilities. Review npm audit output above."
            # Monorepo peer-dep conflicts prevent npm audit fix from resolving
            # even non-breaking fixes (ajv, js-yaml). Warn but don't block.
            # TODO: revisit after monorepo restructure / next major dep refresh.
            echo "::warning::Vulnerabilities present but unblocked — see TODO above."
          }

      - name: Run tests
        run: |
          echo "🔍 CI Environment Info:"
          echo "  Node version: $(node --version)"
          echo "  NPM version: $(npm --version)"
          echo "  Current directory: $(pwd)"
          echo "  Directory contents:"
          ls -la
          echo ""
          echo "🔍 Checking for template and demo directories:"
          echo "  Template paths:"
          find . -name "caws-template" -type d 2>/dev/null || echo "  ❌ No caws-template found"
          echo "  Demo project paths:"
          find . -name "demo-project" -type d 2>/dev/null || echo "  ❌ No demo-project found"
          echo ""
          echo "🔍 Checking test directory structure:"
          echo "  Test directory: $(ls -la packages/caws-cli/tests/ | head -10)"
          echo "  Contract tests: $(ls -la packages/caws-cli/tests/contract/)"
          echo ""
          npm test

      - name: Build packages
        run: npx turbo run build

      # V11-DOCTRINE-HYGIENE-001 — tarball-truth release blocker.
      # Scans the built @paths.design/caws-cli tarball contents for any
      # reference to commands removed in v11.0 (and not part of the
      # current v11.x or planned v11.2 surface). If shipped files
      # advertise commands that don't exist, agents reading the tarball
      # will try those commands and fail.
      #
      # Hard-blocks the release on match. Initial drift was cleaned up by
      # ERROR-HANDLER-V11-SURFACE-001; any new match is a regression to
      # fix before release. If v11.2+ restores a command, update
      # REMOVED_COMMANDS in scripts/check-removed-commands.mjs in the
      # same commit as the doctrine update.
      - name: Tarball truth — no removed-command references
        run: node scripts/check-removed-commands.mjs

      - name: Setup NPM with OIDC for Trusted Publisher
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NPM_TOKEN needed for @semantic-release/npm verifyConditions step.
          # Actual publish uses OIDC provenance via trusted publisher (bypasses OTP).
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Use multi-package release script to handle multiple packages
          # Falls back to standard semantic-release if script doesn't exist
          if [ -f "scripts/multi-package-release.mjs" ]; then
            node scripts/multi-package-release.mjs
          else
            npx semantic-release
          fi
