name: Release

# CAWS-RELEASE-TAG-DRIVEN-001 v1.
#
# Tag-driven release for @paths.design/caws-cli only. Pushing a tag
# matching `caws-cli-v*` triggers exactly one workflow run that:
#   1. parses the tag
#   2. validates packages/caws-cli/package.json version equals the tag
#   3. validates packages/caws-cli/CHANGELOG.md has a section for the version
#   4. builds caws-cli
#   5. runs the prepublish fresh-install smoke
#   6. runs `npm publish --provenance`
#   7. polls `npm view` to verify registry has the version
#   8. creates a GitHub Release with the CHANGELOG section as body
#
# Asymmetric failure invariant:
#   - Pre-publish failures (1–5): tag is DELETED from origin via gh api.
#   - npm publish failure (6): tag is DELETED (registry was not mutated).
#   - Post-publish failures (7–8): tag is PRESERVED; repair command emitted.
#
# Branch-push to main does NOT trigger publishes. There is no on: push:
# branches block. Refused tags (bare v*, caws-kernel-v*) exit early with
# a clear error and do NOT delete themselves (they're informational, not
# defective).
#
# The release-guard layers (release-guard-dry-run.mjs,
# release-guard-commit-analyzer-check.mjs, release-guard-scope-audit.mjs)
# remain as PR-time advisory checks in pr-checks.yml. They tell reviewers
# what a release-tag for a PR's content would publish. The human decides
# whether to tag.
#
# Releasing manually:
#   1. Verify release-guard PR advisory is happy on your PR
#   2. Author/update packages/caws-cli/CHANGELOG.md section for the version
#   3. Bump packages/caws-cli/package.json version to match
#   4. Commit both as a single non-shipping commit on main
#   5. Tag: git tag caws-cli-vX.Y.Z -m "..."
#   6. Push: git push origin caws-cli-vX.Y.Z
#   7. Watch this workflow
#   8. Verify npm registry shows the version and GitHub Release was created
#
# See docs/release-procedure.md for the full procedure.

on:
  push:
    tags:
      # All three patterns are TRIGGERS — not just the canonical accepted one.
      # "Refused via silent non-trigger" is not the same contract as "refused
      # with explicit deletion." The workflow must observe a refused tag so it
      # can delete it, emit a structured refusal log, and exit non-zero. That
      # eliminates the "tag exists, package does not" ambiguity class that
      # this slice exists to remove.
      #
      # caws-cli-v*     accepted candidate; script validates package/version/CHANGELOG
      # caws-kernel-v*  refused in v1 (kernel CI publish deferred); tag is deleted
      # v*              refused (legacy bare-v convention); tag is deleted
      - 'caws-cli-v*'
      - 'caws-kernel-v*'
      - 'v*'

permissions:
  # contents: write — required for tag deletion via gh api on pre-publish
  # failure (CAWS-RELEASE-TAG-DRIVEN-001 contract: pre-publish-failure-
  # deletes-tag). Verified at workflow init via the "Verify tag-deletion
  # permission" step below.
  contents: write
  # id-token: write — retained for future OIDC trusted-publisher adoption
  # (deferred to a follow-up slice; current publish uses NPM_TOKEN).
  id-token: write

jobs:
  release:
    name: Tag-driven release
    runs-on: ubuntu-latest
    environment: Release
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          # Checkout the tag SHA exactly, not a branch. The workflow operates
          # on the tagged commit content; main may have moved on since.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify tag context
        run: |
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            echo "::error::This workflow only runs on tag pushes (GITHUB_REF_TYPE was '${GITHUB_REF_TYPE}')."
            exit 1
          fi
          TAG_NAME="${GITHUB_REF_NAME}"
          if [ -z "$TAG_NAME" ]; then
            echo "::error::GITHUB_REF_NAME is empty; cannot determine tag."
            exit 1
          fi
          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"
          echo "🏷️  Tag: ${TAG_NAME}"
          echo "🔖 Commit SHA: ${GITHUB_SHA}"
        id: tag_ctx

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "package-lock.json"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: |
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm config set fetch-retries 3
          npm config set fetch-retry-factor 10

          for i in {1..3}; do
            echo "Attempt $i of 3..."
            npm ci --prefer-offline --no-audit --no-fund || {
              if [ $i -eq 3 ]; then
                echo "All attempts failed"
                exit 1
              fi
              echo "Attempt $i failed, waiting before retry..."
              sleep $((i * 10))
            } && break
          done

      - name: Verify tag-deletion permission
        # Sanity check: the rollback path requires `contents: write`. If this
        # check fails, the workflow surfaces it BEFORE attempting publish so
        # the maintainer knows the pre-publish-failure path is unavailable.
        run: |
          set -e
          echo "Checking that GITHUB_TOKEN can list refs (proxy for write access)..."
          gh api "repos/${GITHUB_REPOSITORY}/git/refs/tags/${GITHUB_REF_NAME}" >/dev/null || {
            echo "::error::Cannot read tag ref via gh api. Rollback path may be unavailable."
            exit 1
          }
          echo "✓ gh api ref access confirmed."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tag-driven publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          node scripts/release-tag-publish.mjs "${GITHUB_REF_NAME}"
