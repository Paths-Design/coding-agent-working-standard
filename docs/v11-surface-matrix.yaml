    disposition: replaced
    v11_status: shipped
    replacement: "caws doctor && caws gates run --spec <id>"
    since: "11.0"
    source_docs:
      - "docs/migration-v10-to-v11.md#replaced"
    implementation_probe:
      group: doctor
    runtime_diagnostic:
      kind: replaced
      message: "caws validate was replaced in v11."
      use:
