# CAWS v10.2 → v11 command surface matrix
#
# Authoritative classification of every v10.2 command/subcommand against the
# v11 surface. Two-axis schema:
#   - disposition  = what the v11 plan did with the v10.2 command
#                    (kept | renamed | replaced | removed | deferred)
#   - v11_status   = current implementation state of the replacement
#                    (shipped | planned | intentionally_absent)
#
# Source: docs/migration-v10-to-v11.md "Bucket map" + cross-check against
#         docs/architecture/caws-vnext-command-surface.md kept/removed lists.
# Owned-by: CAWS-V11-COMMAND-MATRIX-LOCK-001 (Slice 1 of the v11 surface
#           retirement-readiness campaign).
#
# Runtime mirror: packages/caws-cli/src/shell/legacy-command-map.js
# Equivalence test: packages/caws-cli/tests/matrix/surface-matrix-completeness.test.js
#
# This file is doctrine. The CLI does not read it at runtime (it is not
# bundled — see packages/caws-cli/package.json "files"). Runtime classifiers
# (Slice 2 and later) read the JS mirror; this YAML is the human-edited
# source of truth that the mirror must stay equivalent to.

schema_version: 1

source_authority:
  migration_doc: docs/migration-v10-to-v11.md
  command_surface_doc: docs/architecture/caws-vnext-command-surface.md

# The set of v11 command groups that the CLI registers today.
# Cross-checked against packages/caws-cli/src/shell/register.ts inline
# .command() calls at lines 106, 163, 178, 211, 227, 272, 306, 369, 453,
# 578, 793, 928. Twelve groups; matches caws --help output. The runtime
# unknown-command suggester in packages/caws-cli/src/index.js consumes
# this same twelve-group set via REGISTERED_COMMAND_GROUPS (unified by
# CAWS-REMOVED-COMMAND-DIAGNOSTICS-001; the prior 8-entry hand-list is
# gone).
v11_registered_groups:
  - init
  - doctor
  - scope
  - status
  - claim
  - gates
  - evidence
  - events
  - waiver
  - specs
  - worktree
  - agents

# Multi-token legacy commands appear with the full string in `command`
# (e.g., "sidecar gaps"). The longest-prefix classifier lands in Slice 2;
# Slice 1 ships the data shape and fixture cases only.
v10_2_commands:
  # ─── Replaced (different name, equivalent or stronger capability) ───
