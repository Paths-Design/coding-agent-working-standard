id: CAWSFIX-09
type: fix
title: Validator accepts modern acceptance_criteria shape as an alias (D1)
status: closed
risk_tier: 2
mode: development
created_at: '2026-04-17T16:37:05.400Z'
updated_at: '2026-04-17T16:37:05.400Z'
blast_radius:
  modules:
    - packages/caws-cli/src/validation/spec-validation
    - packages/caws-cli/src/commands/specs
  data_migration: false
operational_rollback_slo: 5m
scope:
  in:
    - packages/caws-cli/src/validation/spec-validation.js
    - packages/caws-cli/src/commands/specs.js
    - packages/caws-cli/tests/validation/spec-validation.test.js
    - packages/caws-cli/tests/validation/acceptance-criteria-alias.test.js
    - .caws/specs/CAWSFIX-09.yaml
  out:
